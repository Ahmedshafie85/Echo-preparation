// Manual paper-simulation trigger from Settings. Bypasses the 6h cooldown.
async function runPaperSimulationManual() {
  toast("Running paper-trade simulation…");
  try {
    const r = await runPaperSimulation({ force: true });
    if (!r.ran) {
      toast(`Simulation skipped: ${r.reason || "unknown"}`, 2400);
      return;
    }
    if (r.simulated === 0) {
      toast("No open paper trades to simulate");
    } else if (r.closed === 0) {
      toast(`Checked ${r.simulated} open paper trade${r.simulated === 1 ? "" : "s"} — none closed yet`);
    } else {
      toast(`${r.closed} of ${r.simulated} paper trade${r.simulated === 1 ? "" : "s"} closed`);

    if (state.currentView === "journal") {
      populateTradeLogList();
      populatePaperPerformance();
    }
  } catch (e) {
    errorToast("Paper simulation", e);
  }
}

// ============================================================================
// PHASE R — PAPER PERFORMANCE PANEL
// ============================================================================
// Replaces the H4 Track Record. Where Track Record reported "the entry signal
// trended favorably", this reports the real verdict-logic test: round-trip
// P&L on paper trades that have been closed by the simulation engine.
//
// Metrics — the things that actually answer "is the app's logic valid":
//   - Win rate: closed_target count / all closed
//   - Average win %, average loss %
//   - Expectancy: avg P&L per trade (the single number that matters)
//   - Average hold days
//   - Exit-reason breakdown: how many hit target vs stop vs timed out
// All split by stance and by conviction so you can see which verdict types
// the app gets right.

function computePaperPerformance(trades) {
  const paper = trades.filter(t => t.is_paper === true);
  const closed = paper.filter(t =>
    t.lifecycle_status && t.lifecycle_status.startsWith("closed")
  );
  const open = paper.filter(t => !t.lifecycle_status || t.lifecycle_status === "open");

  function statBlock(subset) {
    if (subset.length === 0) {
      return { n: 0, wins: 0, losses: 0, win_rate: null, avg_win: null,
               avg_loss: null, expectancy: null, avg_hold: null,
               n_target: 0, n_stop: 0, n_timeout: 0 };
    }
    const wins   = subset.filter(t => t.is_win === true);
    const losses = subset.filter(t => t.is_win !== true);
    const pnls   = subset.map(t => Number(t.pnl_pct) || 0);
    const winPnls  = wins.map(t => Number(t.pnl_pct) || 0);
    const lossPnls = losses.map(t => Number(t.pnl_pct) || 0);
    // Filter hold_days to sane values only. A closed trade in this app can't
    // have been held more than ~1 year; anything larger is a legacy bad-date
    // artifact and must not be averaged in.
    const holds  = subset.map(t => Number(t.hold_days))
                         .filter(d => !isNaN(d) && d >= 0 && d <= 400);
    const avg = arr => arr.length ? arr.reduce((a, b) => a + b, 0) / arr.length : null;
    return {
      n: subset.length,
      wins: wins.length,
      losses: losses.length,
      win_rate: Number((wins.length / subset.length * 100).toFixed(1)),
      avg_win:  winPnls.length  ? Number(avg(winPnls).toFixed(2))  : null,
      avg_loss: lossPnls.length ? Number(avg(lossPnls).toFixed(2)) : null,
      expectancy: Number(avg(pnls).toFixed(2)),
      avg_hold: holds.length ? Number(avg(holds).toFixed(0)) : null,
      n_target:  subset.filter(t => t.lifecycle_status === "closed_target").length,
      n_stop:    subset.filter(t => t.lifecycle_status === "closed_stop").length,
      n_timeout: subset.filter(t => t.lifecycle_status === "closed_timeout").length,
    };
  }

  function groupBy(picker) {
    const groups = {};
    for (const t of closed) {
      const key = picker(t) || "—";
      (groups[key] = groups[key] || []).push(t);
    }
    return Object.entries(groups)
      .map(([key, ts]) => ({ key, ...statBlock(ts) }))
      .sort((a, b) => b.n - a.n);
  }

  return {
    overall: statBlock(closed),
    open_count: open.length,
    total_paper: paper.length,
    by_stance: groupBy(t => {
      const s = t.analysis_snapshot?.stance;
      return s ? String(s).toUpperCase() : "—";
    }),
    by_conviction: groupBy(t => {
      const c = t.analysis_snapshot?.conviction;
      return c ? String(c).toLowerCase() : "—";
    }),
  };
}

function renderPaperPerformance(stats) {
  const o = stats.overall;
  const header = `<div class="section-head" style="padding: 0 4px 8px;">
    <h3 style="font-family:var(--display); font-size:18px; font-weight:500; letter-spacing:-0.01em;">Paper Performance</h3>
    <button class="btn-ghost-sm" data-act="run-paper-sim">Run sim</button>
  </div>`;

  if (stats.total_paper === 0) {
    return `<div class="settings-group" id="paperPerfInner">
      ${header}
      <div class="setting-row" style="color:var(--ink-muted);font-size:12px;line-height:1.5;">
        No paper trades yet. Log an ACT verdict as a paper trade — the simulation will replay it against its target, stop, and timeframe, then report the round-trip result here.
      </div>
    </div>`;
  }

  if (o.n === 0) {
    return `<div class="settings-group" id="paperPerfInner">
      ${header}
      <div class="setting-row" style="color:var(--ink-muted);font-size:12px;line-height:1.5;">
        ${stats.open_count} open paper trade${stats.open_count === 1 ? "" : "s"}, none closed yet. The simulation closes a trade when price touches its target or stop, or when the verdict's timeframe expires. Results appear here once trades resolve.
      </div>
    </div>`;
  }

  // Headline — expectancy is the single most important number.
  const expClass = o.expectancy > 0 ? "pp-pos" : o.expectancy < 0 ? "pp-neg" : "";
  const headline = `<div class="pp-headline">
    <div class="pp-headline-main">
      <div class="pp-exp ${expClass}">${o.expectancy >= 0 ? "+" : ""}${o.expectancy}%</div>
      <div class="pp-exp-label">expectancy / trade</div>
    </div>
    <div class="pp-headline-side">
      <div class="pp-stat"><span class="pp-stat-v">${o.win_rate}%</span><span class="pp-stat-l">win rate</span></div>
      <div class="pp-stat"><span class="pp-stat-v">${o.n}</span><span class="pp-stat-l">closed</span></div>
      <div class="pp-stat"><span class="pp-stat-v">${o.avg_hold != null ? o.avg_hold + "d" : "—"}</span><span class="pp-stat-l">avg hold</span></div>
    </div>
  </div>`;

  // Win/loss + exit-reason breakdown.
  const breakdown = `<div class="pp-breakdown">
    <div class="pp-bd-row">
      <span class="pp-bd-label">Avg win</span>
      <span class="pp-bd-val pp-pos">${o.avg_win != null ? "+" + o.avg_win + "%" : "—"}</span>
      <span class="pp-bd-label">Avg loss</span>
      <span class="pp-bd-val pp-neg">${o.avg_loss != null ? o.avg_loss + "%" : "—"}</span>
    </div>
    <div class="pp-bd-exits">
      <span class="pp-exit-chip pp-exit-target">${o.n_target} hit target</span>
      <span class="pp-exit-chip pp-exit-stop">${o.n_stop} hit stop</span>
      <span class="pp-exit-chip pp-exit-timeout">${o.n_timeout} timed out</span>
      ${stats.open_count > 0 ? `<span class="pp-exit-chip pp-exit-open">${stats.open_count} still open</span>` : ""}
    </div>
  </div>`;

  // Group tables.
  function groupTable(label, rows) {
    if (rows.length === 0) return "";
    return `<div class="pp-block">
      <div class="pp-block-label">${escAttr(label)}</div>
      <table class="tr-table">
        <thead><tr><th>${escAttr(label.replace("By ", ""))}</th><th>n</th><th>Win%</th><th>Expect.</th><th>Hold</th></tr></thead>
        <tbody>
          ${rows.map(r => {
            const e = r.expectancy > 0 ? "pp-pos" : r.expectancy < 0 ? "pp-neg" : "";
            return `<tr>
              <td class="tr-key">${escAttr(r.key)}</td>
              <td class="tr-count">${r.n}</td>
              <td class="tr-rate-cell">${r.win_rate}%</td>
              <td class="tr-rate-cell ${e}">${r.expectancy >= 0 ? "+" : ""}${r.expectancy}%</td>
              <td class="tr-days">${r.avg_hold != null ? r.avg_hold + "d" : "—"}</td>
            </tr>`;
          }).join("")}
        </tbody>
      </table>
    </div>`;
  }

  return `<div class="settings-group" id="paperPerfInner">
    ${header}
    ${headline}
    ${breakdown}
    ${groupTable("By stance", stats.by_stance)}
    ${groupTable("By conviction", stats.by_conviction)}
    <div class="tr-disclaimer">Each paper trade is replayed against its snapshotted target, stop, and timeframe using daily OHLC. First level touched closes the trade; if both touch the same day, the stop is assumed (conservative). Expectancy = average round-trip P&amp;L per closed trade — the core test of whether the verdict logic is valid.</div>
  </div>`;
}

async function populatePaperPerformance() {
  const slot = document.getElementById("paperPerfSlot");
  if (!slot) return;
  try {
    const trades = await loadTrades(500);
    const stats = computePaperPerformance(trades);
    slot.innerHTML = renderPaperPerformance(stats);
  } catch (e) {
    slot.innerHTML = `<div class="settings-group"><div class="setting-row" style="color:var(--red);font-size:12px;">Failed to load paper performance: ${escAttr(e.message || e)}</div></div>`;
  }
}

// ============================================================================
// PHASE H2 — Log Trade modal.
//
// Opens with fields prefilled from whatever's in context: symbol passed in,
// price from state.prices, direction inferred from the current verdict's
// action_line. The verdict + analysis snapshot is built behind the scenes
// and attached to the trade on save — invisible to the user but essential
// for the audit layer (H3+) to evaluate outcomes.
// ============================================================================
// Parse a magnitude hint out of an action_line. Used to pre-fill quantity
// in the Log Trade modal when the verdict action is explicit about size.
//
// Returns {kind: "pct"|"dollars"|"shares"|null, value: number|null, note: string}
//   "Trim 50%"     → {kind: "pct",     value: 50,  note: "50% of holding"}
//   "Add $200"     → {kind: "dollars", value: 200, note: "$200 worth"}
//   "Exit"         → {kind: "pct",     value: 100, note: "Full exit"}
//   "Trim some"    → {kind: null,      value: null, note: ""}
function parseActionMagnitude(actionLine) {
  if (!actionLine) return { kind: null, value: null, note: "" };
  const text = String(actionLine).toLowerCase();
  // Full exit signals — 100% of position
  if (/\b(exit|close|sell\s+(all|fully|entirely))\b/.test(text) && !/exit\s+strategy/.test(text)) {
    return { kind: "pct", value: 100, note: "Full position" };
  }
  // Percentage hint: "trim 50%", "add 25%", "reduce by 30%"
  const pctMatch = text.match(/(\d+(?:\.\d+)?)\s*%/);
  if (pctMatch) {
    const pct = parseFloat(pctMatch[1]);
    return { kind: "pct", value: pct, note: `${pct}% of holding` };
  }
  // Dollar hint: "add $200", "buy $500 worth", "$1000 position"
  const dollarMatch = text.match(/\$\s*(\d+(?:[,.]?\d+)*(?:\.\d+)?)/);
  if (dollarMatch) {
    const dollars = parseFloat(dollarMatch[1].replace(/,/g, ""));
    return { kind: "dollars", value: dollars, note: `$${dollars.toFixed(0)} worth` };
  }
  // Share hint: "buy 10 shares", "add 5"
  const shareMatch = text.match(/(\d+(?:\.\d+)?)\s*shares?\b/);
  if (shareMatch) {
    const shares = parseFloat(shareMatch[1]);
    return { kind: "shares", value: shares, note: `${shares} shares` };
  }
  return { kind: null, value: null, note: "" };
}

// Compute the suggested quantity from a magnitude hint + current context.
// Returns {qty: number, explanation: string} or {qty: null, explanation: ""}
function suggestQuantity(magnitude, currentHoldingQty, livePrice, direction) {
  if (!magnitude || magnitude.kind == null || magnitude.value == null) {
    return { qty: null, explanation: "" };
  }
  const isReduce = ["trim", "sell", "exit"].includes(direction);
  if (magnitude.kind === "pct") {
    if (isReduce && currentHoldingQty) {
      const q = currentHoldingQty * (magnitude.value / 100);
      return { qty: q, explanation: `${magnitude.note} (${q.toFixed(4)} of ${currentHoldingQty.toFixed(4)} shares)` };
    }
    if (!isReduce) {
      // % for an add is ambiguous (% of what?) — show note but no auto-fill
      return { qty: null, explanation: `Verdict says ${magnitude.note} — fill in quantity manually` };
    }
  }
  if (magnitude.kind === "dollars" && livePrice) {
    const q = magnitude.value / livePrice;
    return { qty: q, explanation: `${magnitude.note} ÷ $${livePrice.toFixed(2)} = ${q.toFixed(4)} shares` };
  }
  if (magnitude.kind === "shares") {
    return { qty: magnitude.value, explanation: magnitude.note };
  }
  return { qty: null, explanation: "" };
}

function openLogTrade(symbol, prefillDirection) {
  if (!state.uid) { toast("Sign in to log trades", 2400, "error"); return; }
  const sym = String(symbol || "").toUpperCase();
  if (!sym) { toast("Symbol required", 2400, "error"); return; }
  const holding = state.holdings.find(h => h.symbol === sym);
  const isHeld = !!holding && holding.asset_class !== "cash";
  const currentQty = holding?.quantity ?? null;
  const verdict = (state.verdicts || []).find(v => v.symbol === sym);
  const livePrice = state.prices?.[sym]?.current_price ?? null;
  const direction = prefillDirection
    || (verdict ? inferDirectionFromVerdict(verdict, isHeld) : (isHeld ? "trim" : "buy"));
  const today = new Date().toISOString().slice(0, 10);

  // Smart auto-fill — parse the action_line and pre-compute a quantity hint.
  const magnitude = parseActionMagnitude(verdict?.action_line);
  const suggested = suggestQuantity(magnitude, currentQty, livePrice, direction);
  // For paper trades with no magnitude hint, default to qty=1 (the H3 evaluator
  // is direction-based, doesn't care about size, so 1 is a fine placeholder).
  const defaultPaperQty = suggested.qty != null ? suggested.qty : 1;

  const ctxHtml = verdict
    ? `<div class="trade-ctx">

         </div>
       </div>`
    : `<div class="trade-ctx trade-ctx-empty">No verdict on record — this trade will be logged without verdict context.</div>`;

  const suggestedHint = suggested.explanation
    ? `<div class="field-hint">${escAttr(suggested.explanation)}</div>`
    : (isHeld && currentQty ? `<div class="field-hint">You hold ${currentQty.toFixed(4)} shares · current $${(livePrice * currentQty).toFixed(2)} value</div>` : "");

  openModal(`
    <div class="modal-head"><h3>Log Trade — ${escAttr(sym)}</h3></div>

         decision-audit tool, not a portfolio manager — most logs are paper

        <input id="lt_paper" type="checkbox" checked />
        <span>Paper trade</span>
      </label>

    </div>

    <div class="field">
      <label>Direction</label>
      <select id="lt_dir">
        ${TRADE_DIRECTIONS.map(d => `<option value="${d.value}" ${d.value === direction ? "selected" : ""}>${d.label}</option>`).join("")}
      </select>
    </div>
    <div class="field-row">
      <div class="field">
        <label>Quantity</label>
        <input id="lt_qty" type="number" step="any" placeholder="0" value="${defaultPaperQty != null ? defaultPaperQty : ""}" />
      </div>

  `);
}

// Detect when the chosen trade direction contradicts the verdict's own
// rationale. This is the guard for the BTC-class bug: a SELL/TRIM logged
// against an action line that says "add"/"buy" (or the reverse). Returns a
// human-readable conflict string, or null if consistent.
function tradeDirectionConflict(direction, ctx) {
  const dir = String(direction || "").toLowerCase();
  const line = String(ctx?.verdict_snapshot?.action_line || "").toLowerCase();
  if (!line) return null;
  const isSellSide = ["trim", "sell", "exit"].includes(dir);
  const isBuySide  = ["buy", "add"].includes(dir);
  // What does the rationale actually instruct? Use the explicit primary verb.
  const lineSaysBuy  = /\b(add|buy|open|accumulate)\b/.test(line);
  const lineSaysSell = /\b(trim|sell|exit|cut|reduce)\b/.test(line);
  // Conflict only when the line clearly points one way and the direction the
  // other. If the line says both (rare) or neither, don't block.
  if (isSellSide && lineSaysBuy && !lineSaysSell) {
    return `You're logging a ${dir.toUpperCase()} (selling), but the verdict says "${ctx.verdict_snapshot.action_line}". That reads like a buy instruction.`;
  }
  if (isBuySide && lineSaysSell && !lineSaysBuy) {
    return `You're logging a ${dir.toUpperCase()} (buying), but the verdict says "${ctx.verdict_snapshot.action_line}". That reads like a sell instruction.`;
  }
  return null;
}

async function submitLogTrade(symbol) {
  const sym = String(symbol || "").toUpperCase();
  const dir = $("#lt_dir")?.value;
  const qty = parseFloat($("#lt_qty")?.value);
  const px  = parseFloat($("#lt_px")?.value);
  const date = $("#lt_date")?.value;
  const notes = ($("#lt_notes")?.value || "").trim().slice(0, 400);
  const isPaper = $("#lt_paper")?.checked ?? true;
  if (!sym)              { toast("Symbol missing", 2400, "error"); return; }
  if (!dir)              { toast("Direction required", 2400, "error"); return; }
  if (!qty || qty <= 0)  { toast("Enter a valid quantity", 2400, "error"); return; }
  if (!px || px <= 0)    { toast("Enter a valid price", 2400, "error"); return; }
  if (!date)             { toast("Trade date required", 2400, "error"); return; }
  const ctx = buildTradeContext(sym);
  // Contradiction guard — don't let a trade be saved when its direction fights
  // its own rationale. The user can still proceed (sometimes you genuinely
  // trade against the read), but they must confirm it deliberately.
  const conflict = tradeDirectionConflict(dir, ctx);
  if (conflict) {
    const proceed = await confirmModal({
      title: "Direction looks inconsistent",
      body: `${conflict}  —  Log it anyway?`,
      confirmText: "Log anyway",
      cancelText: "Go back",
    });
    if (!proceed) return;
  }
  try {
    await saveTrade({
      symbol: sym,
      direction: dir,
      quantity: qty,
      price: px,
      trade_date: date,
      notes,
      is_paper: isPaper,
      ...ctx,
    });
    toast(isPaper ? "Paper trade logged" : "Trade logged");
    closeModal();
    if (state.currentView === "journal") renderJournal();
  } catch (e) {
    toast(`Failed to log: ${e.message || e}`, 3000, "error");
  }
}

    </div>
    <div class="field" style="position:relative;">
      <label>Symbol</label>
      <input id="aw_symbol" placeholder="e.g. NFLX, BTC" autocomplete="off" />
      <div id="aw_search_results" class="search-results hidden"></div>
    </div>
    <div class="field"><label>Display Name (optional)</label><input id="aw_name" placeholder="e.g. Netflix Inc." /></div>
    <button class="btn btn-block" data-act="submit-add-watch">Add to Watchlist</button>
  `);
  $("#aw_symbol").addEventListener("input", debouncedSearchWatch);
}
const debouncedSearchWatch = debounce(async () => {
  const q = $("#aw_symbol")?.value.trim();
  const results = $("#aw_search_results");
  if (!q || q.length < 1) { results.classList.add("hidden"); return; }
  try {
    const r = await fetch(`${WORKER_URL}/search?q=${encodeURIComponent(q)}`);
    const j = await r.json();
    const items = (j.results || []).slice(0, 6);
    if (items.length === 0) { results.classList.add("hidden"); return; }
    results.innerHTML = items.map(item => `
      <div class="search-result" data-act="pick-aw-symbol" data-symbol="${escAttr(item.symbol)}" data-name="${escAttr(item.name || '')}">
        <span class="ex">${escAttr(item.exchange || '')}</span>
        <div class="sym">${escAttr(item.symbol)}</div>
        <div class="nm">${escAttr(item.name || '')}</div>
      </div>
    `).join("");
    results.classList.remove("hidden");
  } catch (e) { results.classList.add("hidden"); }
}, 300);

// Default conditions auto-armed when a name is added to the watchlist, so the
// cron has something to alert on without the user hand-entering anything. Tuned
// to the moderate tier: oversold (RSI<30), a meaningful pullback, and a 50-day
// breakout. Types match what the Worker's evalStructuredCondition supports.
// Editable per-name afterward.
function defaultConditionsFor(symbol, assetClass) {
  const s = String(symbol || "").toLowerCase().replace(/[^a-z0-9]/g, "");
  const isCrypto = assetClass === "crypto";
  return [
    { id: `${s}_rsi`,    type: "rsi_below",      threshold: 30 },
    { id: `${s}_dip`,    type: "drop_from_peak", threshold_pct: isCrypto ? 18 : 12 },
    { id: `${s}_break`,  type: "breakout_high",  period: 50 },
  ];
}

async function submitAddWatch() {
  const symbol = $("#aw_symbol").value.trim().toUpperCase();
  const cls = $("#aw_class").value;
  const name = $("#aw_name").value.trim() || symbol;
  if (!symbol) { toast("Enter a symbol", 2400, "error"); return; }
  await db.collection("users").doc(state.uid).collection("watchlist").doc(symbol).set({
    symbol, asset_class: cls, name,
    conditions: defaultConditionsFor(symbol, cls),
    added_at: firebase.firestore.FieldValue.serverTimestamp(),
  }, { merge: true });
  toast(`${symbol} added · alerts armed`);
  closeModal();
  await loadWatchlist();
  renderWatchlist();
}

async function removeFromWatch(symbol) {
  if (!confirm(`Remove ${symbol} from watchlist?`)) return;
  await db.collection("users").doc(state.uid).collection("watchlist").doc(symbol).delete();
  toast(`${symbol} removed`);
  await loadWatchlist();
  state.selectedSymbol = null;
  renderWatchlist();
}

function openAddCondition(symbol) {
  openModal(`
    <div class="modal-head"><h3>Add Condition for ${escAttr(symbol)}</h3></div>
    <div class="field">
      <label>Condition Type</label>
      <select id="cond_type">
        ${CONDITION_TYPES.map(c => `<option value="${c.value}">${c.label}</option>`).join("")}
      </select>
    </div>
    <div id="cond_fields"></div>
    <div class="field-hint" style="margin-bottom:14px;">Conditions are checked every time you scan. When a condition becomes true, you'll see it in the Opportunities card on Portfolio tab.</div>
    <button class="btn btn-block" data-act="submit-cond" data-symbol="${escAttr(symbol)}">Add Condition</button>
  `);
  $("#cond_type").addEventListener("change", renderCondFields);
  renderCondFields();
}
function renderCondFields() {
  const type = $("#cond_type").value;
  const cfg = CONDITION_TYPES.find(c => c.value === type);
  const dflt = cfg?.default || {};
  const fieldsBox = $("#cond_fields");

  if (type === "rsi_below" || type === "rsi_above") {
    fieldsBox.innerHTML = `<div class="field"><label>Threshold (RSI)</label><input id="cf_threshold" type="number" step="1" value="${dflt.threshold}" /></div>`;
  } else if (type === "ma_touch") {
    fieldsBox.innerHTML = `
      <div class="field-row">
        <div class="field"><label>MA Period</label>
          <select id="cf_period">
            <option value="20">MA20</option>
            <option value="50" ${dflt.period === 50 ? 'selected' : ''}>MA50</option>
            <option value="200" ${dflt.period === 200 ? 'selected' : ''}>MA200</option>
          </select>
        </div>
        <div class="field"><label>Tolerance %</label><input id="cf_tolerance" type="number" step="0.1" value="${dflt.tolerance_pct}" /></div>
      </div>
    `;
  } else if (type === "near_52w_high" || type === "near_52w_low" || type === "drop_from_peak") {
    fieldsBox.innerHTML = `<div class="field"><label>Percent Threshold</label><input id="cf_threshold_pct" type="number" step="0.5" value="${dflt.threshold_pct}" /></div>`;
  } else if (type === "macd_bullish_cross" || type === "macd_bearish_cross" || type === "ma_cross_bullish" || type === "ma_cross_bearish") {
    fieldsBox.innerHTML = `<div class="field"><label>Within (days)</label><input id="cf_within_days" type="number" step="1" value="${dflt.within_days}" /></div>`;
  } else if (type === "price_above" || type === "price_below") {
    fieldsBox.innerHTML = `<div class="field"><label>Price Threshold ($)</label><input id="cf_threshold" type="number" step="any" value="${dflt.threshold}" /></div>`;
  } else if (type === "breakout_high") {
    fieldsBox.innerHTML = `<div class="field"><label>Lookback (days)</label><input id="cf_period" type="number" step="1" value="${dflt.period}" /><div class="field-hint">Fires when today's close = highest in last N days. 50 is standard, 252 = 52-week high.</div></div>`;
  } else if (type === "bollinger_lower" || type === "bollinger_upper") {
    fieldsBox.innerHTML = `
      <div class="field-row">
        <div class="field"><label>MA Period</label><input id="cf_period" type="number" step="1" value="${dflt.period}" /></div>
        <div class="field"><label>Std Dev</label><input id="cf_std" type="number" step="0.1" value="${dflt.std}" /></div>
      </div>
      <div class="field-hint" style="margin-top:8px;">Bollinger uses MA(N) ± Xσ. 20 / 2 is the standard setup.</div>
    `;
  } else if (type === "momentum_above") {
    fieldsBox.innerHTML = `
      <div class="field-row">
        <div class="field"><label>Months Lookback</label><input id="cf_months" type="number" step="1" value="${dflt.months}" /></div>
        <div class="field"><label>Min Return %</label><input id="cf_threshold_pct" type="number" step="1" value="${dflt.threshold_pct}" /></div>
      </div>
    `;
  }
}
async function submitCondition(symbol) {
  const w = state.watchlist.find(x => x.symbol === symbol);
  if (!w) return;
  const type = $("#cond_type").value;
  const newCond = { id: `${symbol.toLowerCase()}_${Date.now()}`, type };
  if (type === "rsi_below" || type === "rsi_above") {
    newCond.threshold = parseFloat($("#cf_threshold").value);
  } else if (type === "ma_touch") {
    newCond.period = parseInt($("#cf_period").value, 10);
    newCond.tolerance_pct = parseFloat($("#cf_tolerance").value);
  } else if (type === "near_52w_high" || type === "near_52w_low" || type === "drop_from_peak") {
    newCond.threshold_pct = parseFloat($("#cf_threshold_pct").value);
  } else if (type === "macd_bullish_cross" || type === "macd_bearish_cross" || type === "ma_cross_bullish" || type === "ma_cross_bearish") {
    newCond.within_days = parseInt($("#cf_within_days").value, 10);
  } else if (type === "price_above" || type === "price_below") {
    newCond.threshold = parseFloat($("#cf_threshold").value);
  } else if (type === "breakout_high") {
    newCond.period = parseInt($("#cf_period").value, 10);
  } else if (type === "bollinger_lower" || type === "bollinger_upper") {
    newCond.period = parseInt($("#cf_period").value, 10);
    newCond.std = parseFloat($("#cf_std").value);
  } else if (type === "momentum_above") {
    newCond.months = parseInt($("#cf_months").value, 10);
    newCond.threshold_pct = parseFloat($("#cf_threshold_pct").value);
  }
  const newConds = [...(w.conditions || []), newCond];
  await db.collection("users").doc(state.uid).collection("watchlist").doc(symbol).update({ conditions: newConds });
  toast("Condition added");
  closeModal();
  await loadWatchlist();
  renderWatchDetail(symbol);
}

async function removeCondition(symbol, condId) {
  const w = state.watchlist.find(x => x.symbol === symbol);
  if (!w) return;
  const newConds = (w.conditions || []).filter(c => c.id !== condId);
  await db.collection("users").doc(state.uid).collection("watchlist").doc(symbol).update({ conditions: newConds });
  await loadWatchlist();
  renderWatchDetail(symbol);
}



// Apply a logged trade to the user's actual holdings.
// BUY:  add to position (or create), AND subtract proceeds from cash
// SELL: subtract from position (or close), AND add proceeds to cash
//
// IMPORTANT: this app's holdings schema uses these fields:
//   - quantity:        units held
//   - avg_cost_unit:   weighted-average cost per unit (USD)
//   - avg_cost_total:  total invested (= quantity × avg_cost_unit)
//   - asset_class:     "crypto" | "etf" | "metal" | "us_stock" | "cash"
//   - name:            optional display name
async function syncTradeToHoldings(symbol, action, qty, price) {
  if (symbol === "CASH") throw new Error("Cannot trade CASH directly");
  const holdingsRef = db.collection("users").doc(state.uid).collection("holdings");
  const existing = state.holdings.find(h => h.symbol === symbol && h.asset_class !== "cash");
  const cashHolding = state.holdings.find(h => h.symbol === "CASH" && h.asset_class === "cash");
  const tradeValue = qty * price;

  if (action === "buy") {
    // Validate cash if we have a cash holding tracked
    if (cashHolding) {
      const available = cashHolding.quantity || 0;
      if (tradeValue > available + 1e-6) {
        throw new Error(`Need $${fmtUSD(tradeValue)} but only have $${fmtUSD(available)} cash`);
      }
    }
    if (existing) {
      const oldQty   = existing.quantity || 0;
      const oldUnit  = existing.avg_cost_unit ?? (existing.avg_cost_total ? existing.avg_cost_total / oldQty : price);
      const newQty   = oldQty + qty;
      const newUnit  = ((oldQty * oldUnit) + (qty * price)) / newQty;
      const newTotal = newUnit * newQty;
      await holdingsRef.doc(existing.id).update({
        quantity: newQty,
        avg_cost_unit: newUnit,
        avg_cost_total: newTotal,
        last_updated: firebase.firestore.FieldValue.serverTimestamp(),
      });
    } else {
      const assetClass = guessAssetClass(symbol);
      await holdingsRef.doc(symbol).set({
        symbol,
        quantity: qty,
        avg_cost_unit: price,
        avg_cost_total: qty * price,
        asset_class: assetClass,
        currency: "USD",
        added_at: firebase.firestore.FieldValue.serverTimestamp(),
      });
    }
    // Subtract from cash
    if (cashHolding) {
      const newCash = cashHolding.quantity - tradeValue;
      await holdingsRef.doc(cashHolding.id).update({
        quantity: newCash, avg_cost_total: newCash, avg_cost_unit: 1,
        last_updated: firebase.firestore.FieldValue.serverTimestamp(),
      });
    }
  } else if (action === "sell") {
    if (!existing) {
      throw new Error(`No ${symbol} position to sell from`);
    }
    const oldQty  = existing.quantity || 0;
    if (qty > oldQty + 1e-9) {
      throw new Error(`Trying to sell ${qty} ${symbol} but only have ${oldQty}`);
    }
    const newQty = oldQty - qty;
    if (newQty <= 1e-9) {
      await holdingsRef.doc(existing.id).delete();
    } else {
      const oldUnit = existing.avg_cost_unit ?? (existing.avg_cost_total ? existing.avg_cost_total / oldQty : 0);
      await holdingsRef.doc(existing.id).update({
        quantity: newQty,
        avg_cost_total: oldUnit * newQty,
        last_updated: firebase.firestore.FieldValue.serverTimestamp(),
      });
    }
    // Add proceeds to cash (or create cash holding if none yet)
    if (cashHolding) {
      const newCash = (cashHolding.quantity || 0) + tradeValue;
      await holdingsRef.doc(cashHolding.id).update({
        quantity: newCash, avg_cost_total: newCash, avg_cost_unit: 1,
        last_updated: firebase.firestore.FieldValue.serverTimestamp(),
      });
    } else {
      await holdingsRef.doc("CASH").set({
        symbol: "CASH", asset_class: "cash",
        quantity: tradeValue, avg_cost_total: tradeValue, avg_cost_unit: 1,
        currency: "USD", name: "Cash (USD)",
        added_at: firebase.firestore.FieldValue.serverTimestamp(),
      });
    }
  }
}

// Heuristic: is this likely crypto, ETF, metal, or stock? Used when creating new holdings.
function guessAssetClass(sym) {
  const knownCrypto = ["BTC", "ETH", "SOL", "ADA", "DOT", "MATIC", "LINK", "AVAX", "DOGE", "XRP"];
  const knownMetal  = ["GLD", "SLV", "IGLN", "ISLN", "PSLV"];
  const knownETF    = ["VOO", "QQQ", "SPY", "IWM", "DIA", "VTI", "TLT", "EIMI", "SWRD", "VEA", "EFA"];
  if (knownCrypto.includes(sym)) return "crypto";
  if (knownMetal.includes(sym))  return "metal";
  if (knownETF.includes(sym))    return "etf";
  return "us_stock";
}

async function openTrigger(symbol, triggerId) {
  if (triggerId) await markTriggerSeen(triggerId);
  openAsset(symbol, "portfolio");
}

// ============================================================================
// EVENT DELEGATION
// ============================================================================
document.addEventListener("click", (e) => {
  const target = e.target.closest("[data-act], [data-view]");
  if (!target) return;

  if (target.dataset.view) {
    setView(target.dataset.view);
    return;
  }

  const act = target.dataset.act;
  const symbol = target.dataset.symbol;

  try {
    switch (act) {
      case "open-asset":             openAsset(symbol); break;
      case "open-asset-from-watch":  openAsset(symbol, "watchlist"); break;
      case "open-watch":             openWatchItem(symbol); break;
      case "back-watch":             backToWatchlist(); break;
      case "back-markets":           backToMarkets(); break;
      case "set-range":              setRange(target.dataset.range, symbol); break;
      case "run-analysis":           runAnalysis(symbol); break;
      case "analyze-symbol":         analyzeSymbolFromCard(symbol); break;
      case "stress-test-verdict":    stressTestVerdict(symbol, target.dataset.action); break;
      case "dismiss-inversion":      dismissInversion(symbol); break;
      case "run-portfolio-analysis": runPortfolioAnalysis(); break;
      case "rescan":                 rescan(); break;
      case "open-trigger":           openTrigger(symbol, target.dataset.triggerId); break;
      case "log-trade":              openLogTrade(symbol, target.dataset.recKey); break;
      case "toggle-inline-verdict":
        // Phase M: expand/collapse verdict block on Watchlist + Opportunity rows.
        state.expandedVerdicts = state.expandedVerdicts || {};
        state.expandedVerdicts[symbol] = !state.expandedVerdicts[symbol];
        renderCurrentView();
        break;
      case "run-analysis-inline":
        // Phase M: same as run-analysis but doesn't navigate away. Stays
        // on the current row so the verdict expander can reflect the new
        // analysis once it lands.
        runAnalysis(symbol);
        break;
      case "add-holding":            openAddHolding(); break;
      case "submit-add":             submitAddHolding(); break;
      case "edit-holding":           openEditHolding(symbol); break;
      case "submit-edit":            submitEditHolding(symbol); break;
      case "delete-holding":         confirmDeleteHolding(symbol); break;
      case "save-notifications":     saveNotifications(); break;
      case "test-notification":      sendTestNotification(); break;
      case "toggle-howto":           state.howtoOpen = !state.howtoOpen; renderSettings(); break;
      case "notif-toggle": {
        // Live-update the label text on the toggle without re-rendering.
        const span = target.parentElement?.querySelector("span");
        if (span) span.textContent = target.checked ? "On" : "Off";
        break;
      }
      case "submit-log-trade":       submitLogTrade(target.dataset.symbol); break;
      case "copy-error":             copyToClipboard(target.dataset.errorText || ""); break;
      case "close-modal":            closeModal(); break;
      case "delete-trade":           confirmDeleteTrade(target.dataset.tradeId); break;
      case "run-paper-sim":          runPaperSimulationManual(); break;
      case "toggle-trade-traj":
        state.expandedTrades = state.expandedTrades || {};
        const tid = target.dataset.tradeId;
        state.expandedTrades[tid] = !state.expandedTrades[tid];
        populateTradeLogList();
        break;
      case "add-watch":              openAddWatch(); break;
      case "submit-add-watch":       submitAddWatch(); break;
      case "rm-watch":               removeFromWatch(symbol); break;
      case "add-cond":               openAddCondition(symbol); break;
      case "submit-cond":            submitCondition(symbol); break;
      case "rm-cond":                removeCondition(symbol, target.dataset.cid); break;
      case "refresh-news":           refreshNews(); break;
      case "run-presurge":           runPreSurge(); break;
      case "toggle-presurge-debug":  state.preSurgeDebug = !state.preSurgeDebug; renderCurrentView(); break;
      case "refresh-macro":          refreshMacro(); break;
      case "toggle-raw-signals":
        state.rawSignalsExpanded = !state.rawSignalsExpanded;
        try { localStorage.setItem("rawSignalsExpanded", state.rawSignalsExpanded ? "1" : "0"); } catch (e) {}
        renderCurrentView();
        break;
      case "toggle-hold-zone":
        state.holdZoneExpanded = !state.holdZoneExpanded;
        try { localStorage.setItem("holdZoneExpanded", state.holdZoneExpanded ? "1" : "0"); } catch (e) {}
        renderCurrentView();
        break;
      case "toggle-trade-plan": {
        const key = target.dataset.key;
        if (key) {
          if (!state.tradePlanExpanded) state.tradePlanExpanded = {};
          state.tradePlanExpanded[key] = !state.tradePlanExpanded[key];
          renderCurrentView();
        }
        break;
      }
      case "mark-rec-done":          markRecommendationDone(target.dataset.recKey); break;
      case "dismiss-rec":            dismissRecommendation(target.dataset.recKey); break;
      case "preview-chart":          togglePreviewChart(target.dataset.symbol, target.dataset.name); break;
      case "pick-symbol":
        $("#ah_symbol").value = target.dataset.symbol;
        $("#ah_name").value = target.dataset.name || "";
        $("#ah_search_results").classList.add("hidden");
        break;
      case "pick-aw-symbol":
        $("#aw_symbol").value = target.dataset.symbol;
        $("#aw_name").value = target.dataset.name || "";
        $("#aw_search_results").classList.add("hidden");
        break;
      case "reset-pin":              resetPin(); break;
      case "submit-investor-profile": submitInvestorProfile(); break;
      case "triggers-refresh":       runTriggersCheck(true); break;
      case "verdict-refresh":         runVerdict(true); break;
      case "analyze-all":             analyzeAllSymbols(); break;
      case "vrow-analyze":            inlineAnalyzeFromRow(symbol); break;
      case "ack-trigger":             ackTrigger(target.dataset.symbol, target.dataset.text); break;
      case "triggers-ack-all":        ackAllTriggers(); break;
      case "save-target-alloc":      saveTargetAlloc(); break;
      case "manual-refresh":         manualRefresh(); break;
      case "export-data":            exportData(); break;
      case "toggle-analysis":        toggleAnalysis(target.dataset.key); break;
      case "auth-tab":               setAuthMode(target.dataset.mode); break;
      case "auth-submit":            submitAuth(); break;
      case "auth-skip":              skipAuth(); break;
      case "auth-migrate-yes":       handleMigrate(true); break;
      case "auth-migrate-no":        handleMigrate(false); break;
      case "sign-out":               signOutUser(); break;
      case "add-curated":            addCuratedToWatchlist(target.dataset.symbol, target.dataset.name); break;
      case "analyze-from-discover":  analyzeFromDiscover(target.dataset.symbol, target.dataset.name); break;
      case "refresh-discover":       refreshDiscover(); break;
      case "clear-discover":         clearDiscoverDynamic(); break;
      case "filter-theme":           toggleDiscoverThemeFilter(target.dataset.theme); break;
      case "clear-discover-filters": clearDiscoverFilters(); break;
      case "refresh-leaderboard":    fetchEtfLeaderboard(true); break;
      case "lb-tf":                  setLeaderboardTimeframe(target.dataset.tf); break;
      case "lb-sort":                setLeaderboardSort(target.dataset.sort); break;
      case "dismiss-breakout-prompt": dismissBreakoutPrompt(); break;
      case "add-breakout-conditions": addBreakoutConditionsToHeld(); break;
    }
  } catch (err) {
    showError("Action failed: " + err.message);
  }
});

$("#refreshBtn").addEventListener("click", manualRefresh);
$("#modalBg").addEventListener("click", closeModal);

// Show PIN screen after load, with a fallback in case `load` never fires
let _pinShown = false;
function safeShowPin() {
  if (_pinShown) return;
  _pinShown = true;
  try { showPinScreen(); }
  catch (e) { showBootError("Failed to show PIN screen: " + e.message); }
}
window.addEventListener("load", () => { setTimeout(safeShowPin, 600); });
// Fallback: if for any reason the load event hasn't triggered our handler within 3 seconds, force it
setTimeout(safeShowPin, 3000);

if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js").catch(()=>{});
}
