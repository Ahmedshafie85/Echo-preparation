}

// ============================================================================
// PHASE B — Conviction Decay
// Per-asset-class window beyond which an analysis is considered stale and
// the UI prompts a re-analysis. The data is still shown — we don't hide it —
// but it's visually demoted and tagged so the user knows the call is aging.
// Windows are deliberately conservative: regime shifts faster in crypto than
// ETFs, so crypto gets the tightest window.
// ============================================================================
const CONVICTION_DECAY_DAYS = {
  crypto: 14,
  us_stock: 30,
  metal: 45,
  etf: 60,
  cash: 999,  // cash analysis never decays — it's always "hold"
};
const DECAY_DEFAULT_DAYS = 30;

// Returns { is_stale, days_old, window_days, status } given an analysis object
// and the asset_class of the holding/watch item. Returns null if there's no
// timestamp to check (treat as not-stale, since we can't tell).
function convictionDecay(analysis, assetClass) {
  if (!analysis || !analysis.generated_at) return null;
  const window_days = CONVICTION_DECAY_DAYS[assetClass] ?? DECAY_DEFAULT_DAYS;
  const ageMs = Date.now() - new Date(analysis.generated_at).getTime();
  const days_old = ageMs / 86400000;
  const is_stale = days_old >= window_days;
  let status;
  if (days_old < window_days * 0.5)      status = "fresh";
  else if (days_old < window_days)       status = "aging";
  else if (days_old < window_days * 2)   status = "stale";
  else                                    status = "very_stale";
  return {
    is_stale,
    days_old: Number(days_old.toFixed(1)),
    window_days,
    status,
  };
}

// ============================================================================
// PHASE G — CLIENT-SIDE PER-SYMBOL VERDICT
// Produces a verdict object (same schema as the server /verdict response)
// from a single analysis. Used by:
//   - Asset detail card (top-of-card verdict block, shown immediately after
//     analysis completes — no waiting on the portfolio /verdict round-trip)
//   - Placeholder rows on Portfolio (when /verdict hasn't returned yet)
//
// The verbs reframe based on context:
//   - For HELD positions: ACT = trim/add/exit, HOLD = on plan, WATCH = data stale
//   - For NON-HELD       : ACT = setup is live (open the position), HOLD = thesis
//                          intact but no setup yet, WATCH = data stale
// ============================================================================
function computeLocalVerdict(analysis, holding, opts = {}) {
  // opts: { isHeld: bool, currentPrice: number|null, decay: object|null }
  const isHeld = opts.isHeld ?? !!holding;
  const decay = opts.decay ?? (analysis ? convictionDecay(analysis, holding?.asset_class || analysis?.asset_class || "us_stock") : null);
  const stance = (analysis?.stance || analysis?.signal || "").toUpperCase();
  const conviction = (analysis?.conviction || "").toLowerCase();
  const price = opts.currentPrice ?? null;

  // ------ Missing / stale → WATCH --------------------------------------------
  if (!analysis) {
    return {
      verdict: "WATCH",
      action_line: "Run analyze for full read",
      severity: "low",
      freshness: "missing",
      reasoning_short: "No analysis on file for this symbol.",
      stance_echo: null, conviction: null, key_signal: "",
      fired_trigger: null,
      missing_inputs: ["No analysis exists — run analyze"],
      _source: "local",
    };
  }
  if (decay?.is_stale) {
    return {
      verdict: "WATCH",
      action_line: `Re-analyze — last call ${Math.round(decay.days_old)}d old`,
      severity: "low",
      freshness: decay.status,
      reasoning_short: "Analysis is past its decay window for this asset class.",
      stance_echo: stance || null,
      conviction: conviction || null,
      key_signal: "",
      fired_trigger: null,
      missing_inputs: [`Analysis ${Math.round(decay.days_old)}d old`],
      _source: "local",
    };
  }

  // ------ Fresh analysis → derive ACT / HOLD ---------------------------------
  // The deterministic rules echo the server prompt's decision table, so the
  // local verdict reads consistent with what /verdict would produce.

  // Map stance + price position + held/not-held → verdict + action_line.
  // priceZone is the analysis.action.price_zone string, often like "$48-$50"
  // or "Below $69". We parse it loosely for the in-zone check.
  const priceZone = analysis.action?.price_zone || "";
  const actionWhat = analysis.action?.what || "";
  const inZone = priceInZone(price, priceZone);
  const rr = analysis.reward_risk?.ratio ?? analysis.computed_reward_risk?.ratio ?? null;
  const meetsRR = rr == null ? null : rr >= 2.0;

  // Conviction-aware HOLD default: low-conviction stances shouldn't manufacture
  // ACT regardless of stance. BUT — the analysis often has an explicit
  // recommendation in action.what (e.g. "Pass. Liquidity trap.") even when
  // conviction is low. Surface THAT, not a generic "wait for stronger setup."
  // Only fall back to the generic line when action.what is empty.
  if (conviction === "low" && stance !== "EXIT" && stance !== "AVOID") {
    const explicitAction = actionWhat && actionWhat.length > 4 ? actionWhat : null;
    const risks = (Array.isArray(analysis?.key_risks) ? analysis.key_risks : [])
      .map(r => String(r || "").trim()).filter(Boolean).slice(0, 2);
    return {
      verdict: "HOLD",
      action_line: explicitAction
        || (isHeld ? "Low conviction — hold and reassess" : "Low conviction — wait for stronger setup"),
      severity: "low",
      freshness: decay?.status || "fresh",
      reasoning_short: analysis.headline
        || "Original analysis flagged low conviction. Don't force a decisive read from indecisive source data.",
      stance_echo: stance || null,
      conviction,
      key_signal: synthKeySignal(analysis),
      fired_trigger: null,
      missing_inputs: [],
      why: String(analysis?.action?.why || "").slice(0, 400),
      read: String(analysis?.read || "").slice(0, 320),
      key_risks: risks,
      counter_argument: String(analysis?.counter_argument || "").slice(0, 320),
      _source: "local",
    };
  }

  // HELD-position branches
  if (isHeld) {
    if (stance === "EXIT" || stance === "AVOID") {
      return verdictObj({
        verdict: "ACT", severity: "high",
        action_line: actionWhat || "Exit position per analysis",
        reasoning_short: analysis.headline
          || `Original stance is ${stance}. Anti-portfolio fit fails — close the position.`,
        stance, conviction, analysis, decay,
      });
    }
    if (stance === "TRIM") {
      if (inZone === true) {
        return verdictObj({
          verdict: "ACT", severity: "medium",
          action_line: actionWhat || `Trim — price in zone (${priceZone})`,
          reasoning_short: analysis.headline || "Price has reached the trim zone in the original analysis.",
          stance, conviction, analysis, decay,
        });
      }
      return verdictObj({
        verdict: "HOLD", severity: "low",
        action_line: priceZone ? `Trim above ${priceZone}` : (actionWhat || "Hold for now — trim level not reached"),
        reasoning_short: analysis.headline || "Original stance is TRIM but price hasn't reached the level.",
        stance, conviction, analysis, decay,
      });
    }
    if (stance === "ACCUMULATE") {
      if (inZone === true) {
        return verdictObj({
          verdict: "ACT", severity: "medium",
          action_line: actionWhat || `Add — price in entry zone (${priceZone})`,
          reasoning_short: analysis.headline || "Entry zone hit. Cash available scales the add per profile.",
          stance, conviction, analysis, decay,
        });
      }
      return verdictObj({
        verdict: "HOLD", severity: "low",
        action_line: priceZone ? `Entry missed — wait for ${priceZone}` : (actionWhat || "Hold — entry zone not reached"),
        reasoning_short: analysis.headline || "Original stance favours adding, but price ran past the zone.",
        stance, conviction, analysis, decay,
      });
    }
    // Default HELD path: HOLD with original headline as reasoning
    return verdictObj({
      verdict: "HOLD", severity: "low",
      action_line: actionWhat || "On plan",
      reasoning_short: analysis.headline || "Position aligned with thesis.",
      stance, conviction, analysis, decay,
    });
  }

  // NON-HELD branches (watchlist / opportunity / one-off lookup)
  // Verbs reframe: ACT = setup is live (open it), HOLD = thesis intact but wait
  if (stance === "EXIT" || stance === "AVOID") {
    return verdictObj({
      verdict: "HOLD", severity: "low",
      action_line: actionWhat || "Avoid — analysis flags exit/avoid",
      reasoning_short: analysis.headline || "Original stance is bearish on this name.",
      stance, conviction, analysis, decay,
    });
  }
  if (stance === "ACCUMULATE") {
    if (inZone === true) {
      return verdictObj({
        verdict: "ACT", severity: "medium",
        action_line: actionWhat || `Open position — price in entry zone (${priceZone})`,
        reasoning_short: meetsRR === false
          ? "Setup live but R:R below 2 — size cautiously."
          : (analysis.headline || "Entry zone hit. Setup is live."),
        stance, conviction, analysis, decay,
      });
    }
    return verdictObj({
      verdict: "HOLD", severity: "low",
      action_line: priceZone ? `Wait for ${priceZone}` : (actionWhat || "Wait for entry signal"),
      reasoning_short: analysis.headline || "Thesis intact but entry setup not live yet.",
      stance, conviction, analysis, decay,
    });
  }
  if (stance === "TRIM") {
    return verdictObj({
      verdict: "HOLD", severity: "low",
      action_line: actionWhat || "Stale for new buyers — analysis flags trim",
      reasoning_short: analysis.headline || "Stance is trim. Not a candidate for new positions.",
      stance, conviction, analysis, decay,
    });
  }
  // Default NON-HELD path
  return verdictObj({
    verdict: "HOLD", severity: "low",
    action_line: actionWhat || "Tracking — no setup yet",
    reasoning_short: analysis.headline || "Thesis on watch.",
    stance, conviction, analysis, decay,
  });
}

// Phase M — Inline verdict block. Used by the Verdict expanders on Watchlist
// and Today's Opportunities rows. Lightweight version of renderAssetVerdictBlock
// — same data source (computeLocalVerdict) but tighter visual treatment so it
// fits inside a row without dominating it.
function renderInlineVerdictBlock(symbol, analysis, holding, currentPrice) {
  if (!analysis) {
    return `<div class="inline-verdict inline-verdict-empty">
      No analysis yet. Tap ⚡ Analyze to generate one (~$0.02).
    </div>`;
  }
  const v = computeLocalVerdict(analysis, holding, { currentPrice });
  if (!v) {
    return `<div class="inline-verdict inline-verdict-empty">Verdict unavailable.</div>`;
  }
  const verbClass = `verb-${v.verdict.toLowerCase()}`;
  const sevClass = v.verdict === "ACT" ? `sev-${v.severity}` : "";
  const stanceTag = v.stance_echo ? `<span class="iv-stance">${escAttr(v.stance_echo)}</span>` : "";
  const convictionTag = v.conviction ? `<span class="iv-conviction">${escAttr(v.conviction)} conviction</span>` : "";
  const why = v.why ? `<div class="iv-section"><div class="iv-section-label">Why</div><div class="iv-section-body">${escAttr(v.why)}</div></div>` : "";
  const read = v.read ? `<div class="iv-section"><div class="iv-section-label">Read</div><div class="iv-section-body">${escAttr(v.read)}</div></div>` : "";
  const risks = (v.key_risks || []).length > 0
    ? `<div class="iv-section"><div class="iv-section-label">Top risks</div><div class="iv-section-body">${v.key_risks.slice(0, 2).map(r => escAttr(r)).join(" · ")}</div></div>`
    : "";
  const counter = v.counter_argument ? `<div class="iv-section"><div class="iv-section-label">Counter</div><div class="iv-section-body">${escAttr(v.counter_argument)}</div></div>` : "";
  return `<div class="inline-verdict ${verbClass} ${sevClass}" data-act="noop" onclick="event.stopPropagation()">
    <div class="iv-head">
      <span class="iv-verb">${escAttr(v.verdict)}</span>
      ${v.verdict === "ACT" ? `<span class="iv-sev">${escAttr(v.severity)}</span>` : ""}
      ${stanceTag}
      ${convictionTag}
    </div>
    <div class="iv-action">${escAttr(v.action_line)}</div>
    ${v.reasoning_short ? `<div class="iv-reasoning">${escAttr(v.reasoning_short)}</div>` : ""}
    ${why}
    ${read}
    ${risks}
    ${counter}
  </div>`;
}

// Helper: build the verdict object with key_signal + fresh status pulled in.
// Also pulls four substantive content fields from the analysis (when present)
// so the verdict block can surface the analyst's real rationale, top risks,
// and counter-argument — not just a one-line action.
function verdictObj({ verdict, severity, action_line, reasoning_short, stance, conviction, analysis, decay }) {
  // Top 2 key risks, shortened. The analysis stores these as full sentences;
  // we pick the most distinctive nouns/clauses for the verdict surface.
  const risks = (Array.isArray(analysis?.key_risks) ? analysis.key_risks : [])
    .map(r => String(r || "").trim())
    .filter(Boolean)
    .slice(0, 2);
  // NO NAKED ACTIONS: an actionable verdict must carry an invalidation/stop.
  // An "ADD"/"Exit" with no level to be wrong at isn't a decision, it's a vibe.
  // Pull the stop from the analysis exit strategy / action invalidation. If a
  // genuinely actionable verdict has none, we keep the verdict but make the
  // missing stop explicit so the user supplies one before acting.
  const stopText = String(
    analysis?.exit_strategy?.stop_loss
    || analysis?.action?.invalidation
    || ""
  ).trim().slice(0, 80);
  let action_line_final = String(action_line || "").slice(0, 160);
  let reasoning_final = String(reasoning_short || "").slice(0, 320);
  let needs_stop = false;
  if (verdict === "ACT") {
    if (stopText) {
      // Surface the stop inline on the action line if it isn't already implied.
      if (!/stop|invalidat|below|above/i.test(action_line_final)) {
        action_line_final = `${action_line_final} · stop ${stopText}`.slice(0, 160);
      }
    } else {
      needs_stop = true;
      if (!/stop|invalidat/i.test(reasoning_final)) {
        reasoning_final = `${reasoning_final} Set a stop before acting — no invalidation level on record.`.trim().slice(0, 320);
      }
    }
  }
  return {
    verdict,
    action_line: action_line_final,
    severity,
    freshness: decay?.status || "fresh",
    reasoning_short: reasoning_final,
    stance_echo: stance || null,
    conviction: conviction || null,
    key_signal: synthKeySignal(analysis),
    fired_trigger: null,
    missing_inputs: needs_stop ? ["No stop/invalidation on record — set one before acting"] : [],
    stop: stopText || null,
    needs_stop,
    // Phase G+ — richer content fields. The verdict block surfaces these so
    // the user reads the analyst's actual rationale, not a placeholder.
    why: String(analysis?.action?.why || "").slice(0, 400),
    read: String(analysis?.read || "").slice(0, 320),
    key_risks: risks,
    counter_argument: String(analysis?.counter_argument || "").slice(0, 320),
    _source: "local",
  };
}

// Synthesize a one-line "key signal" from analysis content. Picks the most
// salient line: TA summary first, then headline, then base case. Caps at 80
// chars so it fits the badge slot.
function synthKeySignal(analysis) {
  if (!analysis) return "";
  // Prefer headline first — it's the AI's own one-line distillation, written
  // to be the read-at-a-glance summary. ta_summary is verbose and full of
  // numbers that look ugly truncated. Fall through to scenarios.base_case
  // only if neither is present.
  const candidates = [
    analysis.headline,
    analysis.ta_summary,
    analysis.scenarios?.base_case,
  ].filter(Boolean);
  if (candidates.length === 0) return "";
  const first = String(candidates[0]).trim();
  // Take first sentence
  const sentenceEnd = first.search(/[.!?](?:\s|$)/);
  let slice = sentenceEnd > 0 ? first.slice(0, sentenceEnd) : first;
  // Cap at 90 chars but break on a word boundary so we don't chop mid-word
  if (slice.length > 90) {
    const cut = slice.slice(0, 90);
    const lastSpace = cut.lastIndexOf(" ");
    slice = (lastSpace > 50 ? cut.slice(0, lastSpace) : cut) + "…";
  }
  return slice;
}

// Loose price-zone parser. Returns true if price is in the zone, false if
// definitively out, null if we can't tell. Accepts: "$48-$50", "$48 - $50",
// "Below $69", "Above $76", "Near $50".
function priceInZone(price, zoneStr) {
  if (price == null || !zoneStr) return null;
  const s = String(zoneStr).replace(/[$£€,]/g, "").toLowerCase();
  // Range form "48-50" or "48 - 50"
  const range = s.match(/(\d+(?:\.\d+)?)\s*[-–]\s*(\d+(?:\.\d+)?)/);
  if (range) {
    const lo = Math.min(parseFloat(range[1]), parseFloat(range[2]));
    const hi = Math.max(parseFloat(range[1]), parseFloat(range[2]));
    return price >= lo * 0.98 && price <= hi * 1.02; // 2% tolerance
  }
  // "below X"
  const below = s.match(/below\s*(\d+(?:\.\d+)?)/);
  if (below) return price <= parseFloat(below[1]);
  // "above X"
  const above = s.match(/above\s*(\d+(?:\.\d+)?)/);
  if (above) return price >= parseFloat(above[1]);
  // "near X" / "at X" — within 3%
  const near = s.match(/(?:near|at|around)\s*(\d+(?:\.\d+)?)/);
  if (near) {
    const target = parseFloat(near[1]);
    return Math.abs(price - target) / target < 0.03;
  }
  // Single number — within 3%
  const single = s.match(/(\d+(?:\.\d+)?)/);
  if (single) {
    const target = parseFloat(single[1]);
    return Math.abs(price - target) / target < 0.03;
  }
  return null;
}

function getThemeColors() {
  const css = getComputedStyle(document.documentElement);
  return {
    bg: css.getPropertyValue("--bg-card").trim(),
    text: css.getPropertyValue("--ink").trim(),
    muted: css.getPropertyValue("--ink-muted").trim(),
    rule: css.getPropertyValue("--rule").trim(),
    green: css.getPropertyValue("--green").trim(),
    red:   css.getPropertyValue("--red").trim(),
    accent: css.getPropertyValue("--accent").trim(),
    gold: css.getPropertyValue("--gold").trim(),
  };
}
function renderChart(symbol, range) {
  const price = state.prices[symbol];
  if (!price || !price.ohlcv) return;
  const c = getThemeColors();
  const el = $("#chart");
  if (!el || !window.LightweightCharts) return;
  el.innerHTML = "";
  const chart = LightweightCharts.createChart(el, {
    layout: { background: { color: c.bg }, textColor: c.muted, fontFamily: "'IBM Plex Mono', monospace" },
    grid: { vertLines: { color: c.rule, style: 1 }, horzLines: { color: c.rule, style: 1 } },
    crosshair: { mode: 1, vertLine: { color: c.muted, width: 1, style: 2 }, horzLine: { color: c.muted, width: 1, style: 2 } },
    rightPriceScale: { borderColor: c.rule },
    timeScale: { borderColor: c.rule, timeVisible: false, secondsVisible: false },
    handleScroll: true, handleScale: true, height: 280,
  });
  const candle = chart.addCandlestickSeries({
    upColor: c.green, downColor: c.red,
    borderUpColor: c.green, borderDownColor: c.red,
    wickUpColor: c.green, wickDownColor: c.red,
  });
  const now = Date.now();
  const rangeMs = { "1M": 30*864e5, "3M": 90*864e5, "6M": 180*864e5, "1Y": 365*864e5, "ALL": Infinity }[range];
  const filtered = price.ohlcv.filter(d => (now - d.t) <= rangeMs);
  const data = filtered.map(d => ({ time: Math.floor(d.t / 1000), open: d.o, high: d.h, low: d.l, close: d.c }));
  candle.setData(data);
  const closes = filtered.map(d => d.c);
  const times  = filtered.map(d => Math.floor(d.t / 1000));
  function maSeries(period, color) {
    if (closes.length < period) return null;
    const series = chart.addLineSeries({ color, lineWidth: 1, priceLineVisible: false, lastValueVisible: false });
    const out = [];
    for (let i = period - 1; i < closes.length; i++) {
      const slice = closes.slice(i - period + 1, i + 1);
      const avg = slice.reduce((a,b) => a + b, 0) / period;
      out.push({ time: times[i], value: avg });
    }
    series.setData(out);
    return series;
  }
  maSeries(20, c.gold);
  maSeries(50, c.accent);
  maSeries(200, c.muted);
  chart.timeScale().fitContent();
  state.chart = chart;
}
function setRange(r, symbol) {
  state.selectedRange = r;
  try { renderChart(symbol, r); } catch (e) { console.warn(e); }
  $$(".range-btn").forEach(b => b.classList.toggle("active", b.textContent === r));
}

async function runAnalysis(symbol) {
  const btn = $(`[data-act="run-analysis"][data-symbol="${symbol}"]`);
  if (btn) { btn.innerHTML = '<span class="spinner"></span> Analyzing…'; btn.disabled = true; }
  try {
    // === DATA SANITY PRE-CHECK ===
    // Fetch price data first to check for anomalies BEFORE sending to AI.
    // Catches: cross-listed/multi-currency tickers (.L, .AS, .MI, .TO, .PA), suspicious
    // overnight gaps, mismatched prev-close vs current-price representations.
    // Without this, the AI gets bad data → produces "data error, avoid" verdicts on
    // legitimate but data-flaky assets (e.g. URNU.L showing 114% phantom gap).
    let preCheck = null;
    try {
      const priceR = await fetch(`${WORKER_URL}/price/${encodeURIComponent(symbol)}`);
      if (priceR.ok) {
        const priceData = await priceR.json();
        preCheck = await runDataSanityCheck(symbol, priceData);
      }
    } catch (e) { /* sanity check is best-effort; if it fails we just proceed */ }

    if (preCheck && preCheck.severity === "critical") {
      // Critical issue — ask the user before spending tokens on a flawed analysis
      const proceed = await confirmDataAnomaly(symbol, preCheck);
      if (!proceed) {
        if (btn) { btn.innerHTML = "Re-analyze"; btn.disabled = false; }
        return;
      }
    }
    // === END SANITY ===

    const holding = state.holdings.find(h => h.symbol === symbol);
    const idToken = await auth.currentUser.getIdToken();
    const m = portfolioMetrics();
    const portfolioContext = {
      total_value: m.totalValue,
      total_cost: m.totalCost,
      total_pnl_pct: m.totalPnLPct,
      allocation_by_class: m.alloc,
    };
    const r = await fetch(`${WORKER_URL}/analyze`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        uid: state.uid, symbol,
        holding: holding ? { quantity: holding.quantity, avg_cost: holding.avg_cost_unit } : null,
        portfolio_context: portfolioContext,
        // Pass the sanity result so the AI prompt can include it
        data_sanity: preCheck,
        // Phase A: investor profile drives personalized sizing + R:R calibration.
        // Null when the user hasn't filled out the form yet — worker handles absence.
        investor_profile: state.investorProfile,
        idToken,
      }),
    });
    if (!r.ok) throw new Error(await r.text());
    const j = await r.json();
    if (j.analysis) {
      state.analyses[symbol] = {
        ...j.analysis, symbol,
        asset_class: state.holdings.find(h => h.symbol === symbol)?.asset_class
                  || state.watchlist.find(w => w.symbol === symbol)?.asset_class
                  || "us_stock",
        generated_at: new Date().toISOString(),
        current_price: j.current_price,
        // Surface the worker's server-side R-multiple. Without this, the
        // per-symbol verdict block can't show R:R for symbols whose analysis
        // didn't include reward_risk in the LLM output (worker computes it
        // post-hoc from the scenarios).
        computed_reward_risk: j.computed_reward_risk || null,
        data_sanity_note: preCheck && preCheck.severity !== "none"
          ? `Data sanity: ${preCheck.severity}. ${preCheck.issues.map(i => i.msg).join(" ")}`.slice(0, 240)
          : null,
      };
      toast("Analysis complete");
      renderAssetDetail(symbol);
      // Phase C — fresh analysis invalidates the verdict cache for this symbol.
      // Force a /verdict re-run so the row on Portfolio reflects the new read.
      runVerdict(true).catch(() => {});
    } else throw new Error("No analysis returned");
  } catch (e) {
    errorToast("Analysis", e);
    if (btn) { btn.innerHTML = "Try Again"; btn.disabled = false; }
  }
}

// Wraps runAnalysis with the verdict-card UX: mark the symbol as "running"
// so the prompt-button on the verdict card shows a spinner, then re-render
// to surface the result. The actual /analyze call is reused, so the cost
// matches a manual analyze from the asset page (~$0.02 per call).
// ============================================================================
async function analyzeSymbolFromCard(symbol) {
  if (!symbol) return;
  if (!state.analyzingSymbols) state.analyzingSymbols = {};
  if (state.analyzingSymbols[symbol]) return; // already running
  state.analyzingSymbols[symbol] = true;
  renderCurrentView();
  try {
    await runAnalysis(symbol);
  } catch (e) {
    toast("AI Analyze failed: " + (e.message || "unknown error").slice(0, 80), 3000, "error");
  } finally {
    delete state.analyzingSymbols[symbol];
    renderCurrentView();
  }
}

// ============================================================================
// INVERSION CHECK / "STRESS-TEST THIS VERDICT" (Feature #12)
// Sends one targeted /analyze call with a system-prompt inversion modifier
// asking Claude to argue the OPPOSITE of the current verdict's action.
// The result is rendered inline beneath the verdict card.
//
// Cost: one /analyze call per stress-test (~$0.02). User-triggered only.
// ============================================================================
async function stressTestVerdict(symbol, currentAction) {
  if (!symbol) return;
  if (!state.inversionResults) state.inversionResults = {};
  if (state.inversionResults[symbol]?.loading) return;
  state.inversionResults[symbol] = { loading: true };
  renderCurrentView();

  try {
    const holding = state.holdings.find(h => h.symbol === symbol);
    const idToken = await auth.currentUser.getIdToken();
    const m = portfolioMetrics();
    const portfolioContext = {
      total_value: m.totalValue,
      total_cost: m.totalCost,
      total_pnl_pct: m.totalPnLPct,
      allocation_by_class: m.alloc,
    };

    // The worker's /analyze endpoint accepts an inversion_mode hint we pass
    // through in the body. The worker patches the system prompt accordingly.
    // (Worker change documented in worker_index.js — see handleAnalyze)
    const r = await fetch(`${WORKER_URL}/analyze`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        uid: state.uid, symbol,
        holding: holding ? { quantity: holding.quantity, avg_cost: holding.avg_cost_unit } : null,
        portfolio_context: portfolioContext,
        inversion_mode: {
          enabled: true,
          current_action: currentAction || "ADD",
          instruction: `The app's current verdict on ${symbol} is ${currentAction}. Your job is to make the STRONGEST case against this verdict. If verdict is ADD/PRIME, argue why this is wrong and the position should not be entered or held. If verdict is TRIM/EXIT, argue why this is wrong and the position should be kept or added. Be specific, cite data, name the bear/bull pivot. Don't hedge.`,
        },
        idToken,
      }),
    });
    if (!r.ok) throw new Error(await r.text());
    const j = await r.json();
    if (!j.analysis) throw new Error("No inversion result returned");

    state.inversionResults[symbol] = {
      headline: j.analysis.headline || `Counter-case for ${symbol}`,
      counter_argument: j.analysis.counter_argument || j.analysis.recommended_action || "",
      key_risks: Array.isArray(j.analysis.key_risks) ? j.analysis.key_risks : [],
      generated_at: new Date().toISOString(),
    };
    renderCurrentView();
  } catch (e) {
    state.inversionResults[symbol] = { error: (e.message || "request failed").slice(0, 100) };
    renderCurrentView();
  }
}

function dismissInversion(symbol) {
  if (state.inversionResults && state.inversionResults[symbol]) {
    delete state.inversionResults[symbol];
    renderCurrentView();
  }
}

// ============================================================================
// DATA SANITY CHECK
// Detects anomalies that should be flagged to user BEFORE running AI analysis.
// Returns null if everything looks fine, or { severity, type, issues, recommendation }
// ============================================================================
const INTERNATIONAL_SUFFIXES = [".L", ".AS", ".MI", ".TO", ".PA", ".DE", ".SW", ".HK", ".T", ".AX"];

async function runDataSanityCheck(symbol, priceData) {
  const issues = [];
  let severity = "none"; // "none" | "warning" | "critical"

  // 1. International ticker — common source of currency-conversion issues
  const isInternational = INTERNATIONAL_SUFFIXES.some(suf => symbol.toUpperCase().endsWith(suf));
  if (isInternational) {
    issues.push({
      type: "international_ticker",
      msg: `${symbol} is a non-US listing. Cross-currency data feeds can produce phantom price gaps.`,
    });
    severity = "warning";
  }

  // 2. Extreme price gap — prev_close vs current_price
  const cur = priceData.current_price;
  const prev = priceData.prev_close;
  if (cur != null && prev != null && prev > 0) {
    const gapPct = ((cur - prev) / prev) * 100;
    if (Math.abs(gapPct) > 50) {
      issues.push({
        type: "extreme_gap",
        msg: `Price reports ${gapPct.toFixed(0)}% gap from previous close ($${fmtUSD(prev)} → $${fmtUSD(cur)}). This is exceptionally rare without a known corporate action.`,
      });
      severity = "critical";
    } else if (Math.abs(gapPct) > 25) {
      issues.push({
        type: "large_gap",
        msg: `Price gapped ${gapPct.toFixed(1)}% from previous close. Verify no corporate action explains this.`,
      });
      if (severity === "none") severity = "warning";
    }
  }

  // 3. Volume sanity — was the gap supported by volume?
  if (priceData.ohlcv && priceData.ohlcv.length >= 20) {
    const recent = priceData.ohlcv.slice(-20);
    const todayVol = recent[recent.length - 1]?.v || 0;
    const avgVol = recent.slice(0, -1).reduce((s, d) => s + (d.v || 0), 0) / Math.max(1, recent.length - 1);
    if (avgVol > 0 && todayVol < avgVol * 0.5 && Math.abs(((cur - prev) / prev) * 100) > 30) {
      issues.push({
        type: "volume_mismatch",
        msg: `Large price move on below-average volume (${(todayVol/avgVol).toFixed(2)}x avg). Real moves are typically accompanied by elevated volume.`,
      });
      severity = "critical";
    }
  }

  // 4. Currency mismatch hint — if symbol info reports currency != USD but prices look like USD or vice versa
  // (We can't fully detect this client-side without more data, but the international flag covers most cases)

  if (issues.length === 0) return null;

  let recommendation;
  if (severity === "critical") {
    recommendation = "Likely a data feed error or unconverted currency representation. Verify the price elsewhere (Yahoo Finance, IBKR) before running analysis. AI analysis on bad data produces 'avoid' verdicts that may not reflect the real asset.";
  } else {
    recommendation = "Proceed with caution. The AI will note the anomaly but the analysis remains useful.";
  }

  // Include price context so the modal can show actual values for verification
  const lastOhlcv = priceData.ohlcv && priceData.ohlcv.length > 0
    ? priceData.ohlcv[priceData.ohlcv.length - 1]?.c
    : null;
  const priceContext = {
    current: priceData.current_price,
    prev: priceData.prev_close,
    lastOhlcv,
  };

  return { severity, issues, recommendation, symbol, priceContext };
}

// ============================================================================
// PHASE B — TRIGGERS-FIRED DIGEST
// Calls /triggers-check, which compares stored bull/bear trigger conditions
// against live market data and returns the ones that have fired. Debounced to
// once per 6h via localStorage so we don't burn AI tokens on every page open.
// User can force a re-check via the banner's refresh button.
// ============================================================================
const TRIGGERS_CHECK_DEBOUNCE_MS = 6 * 60 * 60 * 1000;

// ============================================================================
// PHASE C — Unified Verdict runner.
// Calls /verdict once per app open (4h debounce). The result is cached in
// localStorage so subsequent loads render the verdict zones immediately,
// before the network call completes. Force-refresh via the Portfolio header
// reload button.
// ============================================================================
const VERDICT_DEBOUNCE_MS = 4 * 60 * 60 * 1000;

async function runVerdict(force = false) {
  if (!state.uid) return;
  if (state.verdictsLoading) return;
  if (state.holdings.length === 0) {
    state.verdicts = [];
    state.portfolioNote = "";
    return;
  }

  if (!force && state.verdictsAt) {
    const age = Date.now() - new Date(state.verdictsAt).getTime();
    if (age < VERDICT_DEBOUNCE_MS) return;
  }

  state.verdictsLoading = true;
  if (state.currentView === "portfolio") renderPortfolio();

  try {
    const idToken = await auth.currentUser.getIdToken();
    const r = await fetch(`${WORKER_URL}/verdict`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        uid: state.uid,
        idToken,
        holdings: state.holdings,
        investor_profile: state.investorProfile,
        // Phase H1 — user-initiated refresh bypasses input-hash cache.
        // Automatic 4h refreshes hit the cache so verdicts stay stable.
        force: !!force,
      }),
    });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const j = await r.json();
    // Phase G — verb-delta tracking. Compare new verb vs previous verb per
    // symbol. Symbols whose verb changed get marked so the row renderer can
    // briefly highlight them. Auto-clears after 30 seconds so the indicator
    // doesn't linger past its usefulness.
    const prevBySym = new Map((state.verdicts || []).map(v => [v.symbol, v.verdict]));
    const newVerdicts = Array.isArray(j.verdicts) ? j.verdicts : [];
    state.verdictChanges = {};
    for (const v of newVerdicts) {
      const prev = prevBySym.get(v.symbol);
      if (prev && prev !== v.verdict) {
        state.verdictChanges[v.symbol] = { from: prev, to: v.verdict, at: Date.now() };
      }
    }
    // Schedule clearing of the change indicators after 30s.
    if (Object.keys(state.verdictChanges).length > 0) {
      setTimeout(() => {
        const cutoff = Date.now() - 30000;
        for (const sym of Object.keys(state.verdictChanges)) {
          if (state.verdictChanges[sym].at < cutoff) delete state.verdictChanges[sym];
        }
        if (state.currentView === "portfolio") renderPortfolio();
      }, 31000);
    }
    state.verdicts = newVerdicts;
    state.portfolioNote = String(j.portfolio_note || "");
    state.verdictsAt = j.generated_at || new Date().toISOString();
    localStorage.setItem("verdictsCache_v2", JSON.stringify(state.verdicts));
    localStorage.setItem("portfolioNote_v2", state.portfolioNote);
    localStorage.setItem("verdictsAt_v2", state.verdictsAt);
  } catch (e) {
    if (force) errorToast("Verdict refresh", e);
  } finally {
    state.verdictsLoading = false;
    if (state.currentView === "portfolio") renderPortfolio();
  }
}

// Inline-analyze entry point. Triggered by the ⚡ button on every Portfolio row
// (and reused by Today's Opportunities entries). Wraps runAnalysis so the row
// can show a spinner without the user having to drill into the asset detail.
// Stops event propagation upstream — the row's tap-to-open shouldn't fire.
// ============================================================================
// Analyze ALL — sequentially run /analyze for every non-cash holding.
// Sequential rather than parallel for two reasons: (1) keeps Anthropic API
// concurrency low (one in-flight call at a time), (2) lets the user watch
// progress and bail out by closing the tab if needed. Total cost ~$0.02/symbol
// so an 8-holding book is ~$0.16. After the last symbol completes the verdict
// is force-refreshed so the integrated view reflects every fresh analysis.
//
// Skips: cash, symbols already analyzed today (cheap optimisation — same-day
// re-runs are rarely informative and waste API spend). User can still hit the
// per-row ⚡ if they want to force re-analyze a specific symbol.
// ============================================================================
async function analyzeAllSymbols() {
  if (!state.uid) { toast("Not signed in", 2000, "error"); return; }
  if (state.analyzeAllRunning) return;
  const today = new Date().toISOString().slice(0, 10);
  // Build the target list — every non-cash holding that doesn't already have
  // a same-day analysis. state.analyses is keyed by symbol and holds the most
  // recent stored analysis, with a `date` field set by the worker.
  const targets = state.holdings
    .filter(h => h.asset_class !== "cash")
    .filter(h => {
      const a = state.analyses[h.symbol];
      return !a || a.date !== today;
    })
    .map(h => h.symbol);

  if (targets.length === 0) {
    toast("All holdings already analyzed today");
    return;
  }
  // Confirm so the user can cancel if they didn't mean to spend the tokens.
  const proceed = await confirmModal({
    title: "Analyze all holdings?",
    body: `This will run AI analysis on ${targets.length} symbol${targets.length === 1 ? "" : "s"}: ${targets.join(", ")}. Approx cost: $${(targets.length * 0.02).toFixed(2)}.`,
    confirmText: "Analyze all",
    cancelText: "Cancel",
  });
  if (!proceed) return;

  state.analyzeAllRunning = true;
  state.analyzeAllTotal = targets.length;
  state.analyzeAllDone = 0;
  if (state.currentView === "portfolio") renderPortfolio();

  let successes = 0, failures = 0;
  for (const sym of targets) {
    // Mark per-symbol so the row spinner shows too.
    if (!state.analyzingSymbols) state.analyzingSymbols = {};
    state.analyzingSymbols[sym] = true;
    if (state.currentView === "portfolio") renderPortfolio();
    try {
      await runAnalysis(sym);
      successes++;
    } catch (e) {
      failures++;
    } finally {
      if (state.analyzingSymbols) delete state.analyzingSymbols[sym];
      state.analyzeAllDone++;
      if (state.currentView === "portfolio") renderPortfolio();
    }
  }

  state.analyzeAllRunning = false;
  state.analyzeAllTotal = 0;
  state.analyzeAllDone = 0;
  toast(`Done — ${successes} analyzed${failures > 0 ? `, ${failures} failed` : ""}`);
  // runAnalysis already triggers a verdict refresh after each, but the final
  // verdict needs all of them — force one more pass so the integrated view
  // reflects every fresh analysis in one Claude call rather than N partials.
  runVerdict(true).catch(() => {});
}

// confirmModal — minimal promise-based confirm dialog using the existing modal
// machinery. Returns true if user confirms, false otherwise.
async function confirmModal({ title, body, confirmText = "OK", cancelText = "Cancel" }) {
  return new Promise(resolve => {
    const modal = document.createElement("div");
    modal.className = "modal-backdrop";
    modal.innerHTML = `
      <div class="modal-content" style="max-width: 420px;">
        <h3 style="margin: 0 0 12px; font-family: var(--display); font-size: 20px;">${escAttr(title)}</h3>
        <p style="margin: 0 0 18px; color: var(--ink-soft); font-size: 14px; line-height: 1.5;">${escAttr(body)}</p>
        <div style="display: flex; gap: 8px; justify-content: flex-end;">
          <button class="btn-ghost-sm" data-cm-act="cancel">${escAttr(cancelText)}</button>
          <button class="btn" data-cm-act="confirm">${escAttr(confirmText)}</button>
        </div>
      </div>`;
    document.body.appendChild(modal);
    const cleanup = (val) => { modal.remove(); resolve(val); };
    modal.addEventListener("click", (e) => {
      if (e.target === modal) cleanup(false);
      const act = e.target.closest("[data-cm-act]")?.dataset.cmAct;
      if (act === "confirm") cleanup(true);
      if (act === "cancel") cleanup(false);
    });
  });
}

async function inlineAnalyzeFromRow(symbol) {
  if (!symbol) return;
  if (!state.analyzingSymbols) state.analyzingSymbols = {};
  if (state.analyzingSymbols[symbol]) return;
  state.analyzingSymbols[symbol] = true;
  if (state.currentView === "portfolio") renderPortfolio();
  try {
    await runAnalysis(symbol);
    // runAnalysis already toasts + triggers a /verdict refresh on success.
  } catch (e) {
    // runAnalysis handles its own error toast — no double-toast here.
  } finally {
    if (state.analyzingSymbols) delete state.analyzingSymbols[symbol];
    if (state.currentView === "portfolio") renderPortfolio();
  }
}

async function runTriggersCheck(force = false) {
  if (!state.uid) return;
  if (state.triggersLoading) return;

  // Debounce: skip if a check ran within the last 6h, unless force is set.
  if (!force && state.triggersCheckedAt) {
    const age = Date.now() - new Date(state.triggersCheckedAt).getTime();
    if (age < TRIGGERS_CHECK_DEBOUNCE_MS) return;
  }

  state.triggersLoading = true;
  if (state.currentView === "portfolio") renderPortfolio();

  try {
    const idToken = await auth.currentUser.getIdToken();
    const r = await fetch(`${WORKER_URL}/triggers-check`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ uid: state.uid, idToken }),
    });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const j = await r.json();
    state.triggersFired = Array.isArray(j.fired) ? j.fired : [];
    state.triggersUnableToEvaluate = Array.isArray(j.unable_to_evaluate) ? j.unable_to_evaluate : [];
    state.triggersCheckedAt = new Date().toISOString();
    localStorage.setItem("triggersCheckedAt", state.triggersCheckedAt);
  } catch (e) {
    // Soft-fail: keep whatever's in state, don't toast on background runs.
    if (force) errorToast("Trigger check", e);
  } finally {
    state.triggersLoading = false;
    if (state.currentView === "portfolio") renderPortfolio();
  }
}

// Mark a specific (symbol, trigger_text) pair as acknowledged. The pair is
// added to the persisted ack set and the banner immediately hides it. The
// next /triggers-check run still receives it from the server — acks are
// purely client-side display state, not server-side history.
function ackTrigger(symbol, triggerText) {
  const key = `${symbol}|${(triggerText || "").slice(0, 80)}`;
  state.triggersAcknowledged.add(key);
  localStorage.setItem("triggersAcknowledged", JSON.stringify(Array.from(state.triggersAcknowledged)));
  if (state.currentView === "portfolio") renderPortfolio();
}

function ackAllTriggers() {
  for (const f of state.triggersFired) {
    state.triggersAcknowledged.add(`${f.symbol}|${(f.trigger_text || "").slice(0, 80)}`);
  }
  localStorage.setItem("triggersAcknowledged", JSON.stringify(Array.from(state.triggersAcknowledged)));
  if (state.currentView === "portfolio") renderPortfolio();
}

function visibleFiredTriggers() {
  return state.triggersFired.filter(f => {
    const key = `${f.symbol}|${(f.trigger_text || "").slice(0, 80)}`;
    return !state.triggersAcknowledged.has(key);
  });
}

// Render the triggers banner. Returns "" when nothing is fired (or all acked).
// Sits at the very top of the Portfolio view, above the hero — it's a "thing
// that needs your attention NOW" panel, not a card.
function renderTriggersBanner() {
  const visible = visibleFiredTriggers();
  if (visible.length === 0 && !state.triggersLoading) return "";

  if (state.triggersLoading && state.triggersFired.length === 0) {
    return `<div class="triggers-banner triggers-loading">
      <span class="spinner"></span>
      <span>Checking triggers against live prices…</span>
    </div>`;
  }

  // Group by severity. High first.
  const high = visible.filter(f => f.severity === "high");
  const med  = visible.filter(f => f.severity === "medium");
  const low  = visible.filter(f => f.severity === "low");
  const ordered = [...high, ...med, ...low];

  const rows = ordered.map(f => {
    const key = `${f.symbol}|${(f.trigger_text || "").slice(0, 80)}`;
    const dirIcon = f.direction === "bear"
      ? `<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>`
      : `<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 15 12 9 18 15"/></svg>`;
    return `
      <div class="trigger-row trigger-${escAttr(f.severity)}" data-act="open-asset" data-symbol="${escAttr(f.symbol)}">
        <div class="trigger-row-left">
          <div class="trigger-row-head">
            <span class="trigger-symbol">${escAttr(f.symbol)}</span>
            <span class="trigger-dir trigger-dir-${escAttr(f.direction)}">${dirIcon} ${escAttr(f.direction)} trigger fired</span>
            <span class="trigger-sev-pill trigger-sev-${escAttr(f.severity)}">${escAttr(f.severity)}</span>
          </div>
          <div class="trigger-row-condition">${escAttr(f.trigger_text)}</div>
          <div class="trigger-row-because">${escAttr(f.fired_because)}</div>
          ${f.action ? `<div class="trigger-row-action">→ ${escAttr(f.action)}</div>` : ""}
        </div>
        <button class="trigger-ack" data-act="ack-trigger" data-key="${escAttr(key)}" data-symbol="${escAttr(f.symbol)}" data-text="${escAttr(f.trigger_text)}" title="Dismiss">×</button>
      </div>
    `;
  }).join("");

  const checkedRel = state.triggersCheckedAt ? `Checked ${fmtRel(state.triggersCheckedAt)}` : "";

  return `
    <div class="triggers-banner">
      <div class="triggers-banner-head">
        <div>
          <div class="triggers-banner-title">${visible.length} trigger${visible.length === 1 ? "" : "s"} fired</div>
          <div class="triggers-banner-sub">${checkedRel}${state.triggersLoading ? " · refreshing…" : ""}</div>
        </div>
        <div class="triggers-banner-actions">
          <button class="btn-ghost-sm" data-act="triggers-refresh" ${state.triggersLoading ? "disabled" : ""}>Refresh</button>
          <button class="btn-ghost-sm" data-act="triggers-ack-all">Clear All</button>
        </div>
      </div>
      <div class="triggers-banner-list">${rows}</div>
    </div>
  `;
}

async function loadJournal() {
  const snap = await db.collection("users").doc(state.uid).collection("journal")
    .orderBy("date", "desc").limit(100).get();
  return snap.docs.map(d => ({ id: d.id, ...d.data() }));
}

// ============================================================================
// PHASE H2 — Trade Logging.
//
// Every trade carries (a) the decision data (direction, qty, price, date),
// (b) a SNAPSHOT of the verdict + analysis that produced it, and (c) slots
// for the H3 evaluator to fill in 4 weeks later (outcome, target_hit, etc).
//
// Why snapshots, not references: analyses decay and verdicts re-cache. We
// need the audit layer to know what we knew at decision time, even if the
// analysis aged out three months later. The trade document is self-contained
// from the moment it's saved.
//
// Storage: users/{uid}/trades/{trade_id}. trade_id is generated client-side
// from `${date}_${symbol}_${random}` so trades sort by date naturally and
// the same symbol can have multiple trades on the same day.
// ============================================================================

const TRADE_DIRECTIONS = [
  { value: "buy",   label: "Buy (new position)" },
  { value: "add",   label: "Add (to existing)" },
  { value: "trim",  label: "Trim (partial sell)" },
  { value: "sell",  label: "Sell" },
  { value: "exit",  label: "Exit (full close)" },
];

// Infer the most likely direction from a verdict's action_line.
// Best-effort — user can always change in the modal.
// Infer the most likely trade direction from a verdict.
//
// Priority order:
//   1. The fired trigger's direction. A fired BULL trigger means the verdict
//      is telling you to add/buy; a fired BEAR trigger means trim/exit. This
//      is the structured signal and it's authoritative — it should never be
//      overridden by fuzzy text matching.
//   2. Explicit verbs in the action_line text (exit/trim/sell/add/buy/open).
//   3. A NEUTRAL fallback. Critically: an ambiguous verdict on a held
//      position must NOT default to "trim" — defaulting an unclear signal to
//      a sell is the most dangerous wrong guess. For held positions with no
//      directional signal we default to "add" (the verdict surfaced as ACT
//      for a reason, and add is the non-destructive choice); for non-held we
//      default to "buy". The user can always change it in the modal.
function inferDirectionFromVerdict(verdict, isHeld) {
  const text = String(verdict?.action_line || "").toLowerCase();
  const firedDir = verdict?.fired_trigger?.direction;

  // 1. Explicit ACTION verb in the line is the strongest signal of intent.
  //    This must beat both the fired-trigger direction AND the weaker
  //    bull/bear-language scan. The BTC bug came from "Add limit buy ... bear
  //    trigger fired" — the action is ADD, but the old order let "bear trigger"
  //    flip it to a sell. The verb "add"/"buy" is what the analyst told you to
  //    DO; "bear trigger" is just the context for why it's cheap. Verb wins.
  const hasExplicitVerb =
    /\b(exit|trim|sell|add|open|buy|accumulate)\b/.test(text);
  if (text.includes("exit"))                       return "exit";
  if (text.includes("trim"))                       return "trim";
  if (text.includes("sell"))                       return "sell";
  if (/\b(add|accumulate)\b/.test(text))           return isHeld ? "add" : "buy";
  if (text.includes("open"))                       return "buy";
  if (text.includes("buy"))                         return isHeld ? "add" : "buy";

  // 2. No explicit verb → fall back to the structured fired-trigger direction.
  if (!hasExplicitVerb) {
    if (firedDir === "bull") return isHeld ? "add" : "buy";
    if (firedDir === "bear") return isHeld ? "trim" : "sell";
    // 3. Weaker bull/bear language scan.
    if (text.includes("bull trigger")) return isHeld ? "add" : "buy";
    if (text.includes("bear trigger")) return isHeld ? "trim" : "sell";
  }

  // 4. Neutral fallback — never sell-bias an ambiguous held verdict.
  return isHeld ? "add" : "buy";
}

// Build a trade ID — date-prefixed so trade lists sort chronologically by id
// even before they're fetched and ordered server-side.
function newTradeId(symbol) {
  const today = new Date().toISOString().slice(0, 10);
  const rand = Math.random().toString(36).slice(2, 8);
  return `${today}_${String(symbol).toUpperCase().replace(/[^A-Z0-9]/g, "")}_${rand}`;
}

// Persist a trade. The caller assembles the full doc; this function adds
// server timestamps and writes. Returns the trade_id.
async function saveTrade(trade) {
  if (!state.uid) throw new Error("Not signed in");
  if (!trade.symbol || !trade.direction || trade.quantity == null || trade.price == null) {
    throw new Error("Missing required fields: symbol/direction/quantity/price");
  }
  const id = trade.trade_id || newTradeId(trade.symbol);
  const doc = {
    ...trade,
    trade_id: id,
    symbol: String(trade.symbol).toUpperCase(),
    direction: String(trade.direction).toLowerCase(),
    quantity: Number(trade.quantity),
    price: Number(trade.price),
    trade_date: trade.trade_date || new Date().toISOString().slice(0, 10),
    created_at: trade.created_at || new Date().toISOString(),
    updated_at: new Date().toISOString(),
    // H3 fields — null until the evaluator job fills them in
    evaluated_at:           trade.evaluated_at           ?? null,
    outcome:                trade.outcome                ?? null,
    outcome_reason:         trade.outcome_reason         ?? null,
    price_at_evaluation:    trade.price_at_evaluation    ?? null,
    target_hit:             trade.target_hit             ?? null,
    stop_hit:               trade.stop_hit               ?? null,
    held_through_evaluation: trade.held_through_evaluation ?? null,
  };
  await db.collection("users").doc(state.uid).collection("trades").doc(id).set(doc, { merge: true });
  return id;
}

// Build the snapshot blob attached to every trade. Pulls the verdict object
// from state.verdicts (if any) and the analysis from state.analyses, plus
// current price + indicators. All optional — a trade logged via the manual
// add-trade flow may have no snapshot context at all.
function buildTradeContext(symbol) {
  const verdict = (state.verdicts || []).find(v => v.symbol === symbol) || null;
  const analysis = state.analyses?.[symbol] || null;
  const price = state.prices?.[symbol]?.current_price ?? null;
  const verdict_snapshot = verdict ? {
    verdict: verdict.verdict,
    action_line: verdict.action_line,
    severity: verdict.severity,
    freshness: verdict.freshness,
    reasoning_short: verdict.reasoning_short,
    stance_echo: verdict.stance_echo,
    conviction: verdict.conviction,
    key_signal: verdict.key_signal,
    fired_trigger: verdict.fired_trigger || null,
  } : null;
  const analysis_snapshot = analysis ? {
    generated_at: analysis.generated_at,
    stance: analysis.stance,
    conviction: analysis.conviction,
    headline: analysis.headline,
    action_what: analysis.action?.what || null,
    action_price_zone: analysis.action?.price_zone || null,
    action_invalidation: analysis.action?.invalidation || null,
    action_timeframe: analysis.action?.timeframe || null,
    reward_risk_ratio: analysis.reward_risk?.ratio ?? analysis.computed_reward_risk?.ratio ?? null,
    bull_trigger: analysis.scenarios?.bull_trigger?.condition || null,
    bear_trigger: analysis.scenarios?.bear_trigger?.condition || null,
  } : null;
  // Pre-Surge snapshot — so a trade taken off a Pre-Surge flag can be graded
  // against the very signal that triggered it (was missing before; you couldn't
  // tell WHY a Pre-Surge call worked, only the P&L).
  const ps = preSurgeScoreFor(symbol) || preSurgeFlagFor(symbol) || null;
  const presurge_snapshot = ps ? {
    composite: ps.composite,
    squeeze: ps.squeeze,
    accumulation: ps.accumulation,
    rs: ps.rs,
    confirmed: !!ps.confirmed,
    price_at_flag: ps.current_price ?? null,
  } : null;
  // Local (client) verdict snapshot — captures the strength-based conviction
  // and the exact vote stack at decision time, so the journal can show the
  // reasoning, not just the outcome.
  const holding = state.holdings.find(h => h.symbol === symbol && h.asset_class !== "cash");
  let local_verdict_snapshot = null;
  try {
    if (holding && typeof computeHeldVerdict === "function") {
      const lv = computeHeldVerdict(holding);
      local_verdict_snapshot = {
        action: lv.action,
        net: Number((lv.net ?? 0).toFixed(2)),
        conviction: Number((lv.conviction ?? 0).toFixed(2)),
        conflicted: !!lv.conflicted,
        votes: (lv.votes || []).map(v => ({ signal: v.signal, dir: v.dir, weight: v.weight, note: v.note })),
      };
    }
  } catch (e) { /* non-fatal — context is best-effort */ }
  return { verdict_snapshot, analysis_snapshot, presurge_snapshot, local_verdict_snapshot, price_at_decision: price };
}

// ============================================================================
// PHASE H3 — Trade outcome evaluator.
//
// Runs weekly per trade. Each evaluation appends a row to trade.outcomes[].
// The latest row's outcome IS the trade's current outcome (denormalized to
// trade.outcome for fast list rendering). Trade enters "final" status when
// any of:
//   - opposing-trade close (handled by checkRoundTripClose at log time)
//   - 60-day age cap reached
//   - 2 consecutive "successful" evaluations AND target hit
//   - 2 consecutive "failed" evaluations AND invalidation breached
//
// Pure deterministic classification — no Claude calls. Cheap to run on app
// open. The H5 quarterly research brief is where Claude reads ALL outcomes
// and writes a narrative; this evaluator just produces the data.
// ============================================================================

const EVAL_INTERVAL_DAYS = 7;
const EVAL_MAX_AGE_DAYS = 60;
const EVAL_LAST_RUN_KEY = "evaluatorLastRun";
// Cooldown: don't re-run the evaluator more than once every 6 hours, even if
// boot fires repeatedly. Manual button in Settings always bypasses cooldown.
const EVAL_COOLDOWN_MS = 6 * 60 * 60 * 1000;

// ============================================================================
// PHASE R — PAPER TRADE EXIT SIMULATION
// ============================================================================
//
// Replaces the flawed H3 weekly-grading evaluator. The old evaluator graded
// open positions weekly and never closed them, so "success" was undefined and
// outcomes drifted with price. It did not actually test the app's verdict
// logic.
//
// This engine treats each paper trade as a real trade with a mechanical exit
// plan derived from the three numbers the verdict produced:
//   - entry  = trade.price (price when logged)
//   - target = analysis_snapshot.action_price_zone (take-profit)
//   - stop   = analysis_snapshot.action_invalidation (stop-loss)
//   - deadline = analysis_snapshot.action_timeframe (timeframe expiry)
//
// The simulation replays the price path day-by-day since entry. Whichever
// level is touched FIRST closes the trade at that level. If neither is hit by
// the timeframe deadline, the trade closes at market on the deadline date.
// Result: a real round trip with entry, exit, P&L%, hold days, exit reason.
//
// Lifecycle:  open  ->  closed_target | closed_stop | closed_timeout
//
// Accuracy: we replay daily OHLC (high/low) so first-touch is determined
// correctly even when target and stop are both crossed in the same week.
// ============================================================================

const PAPER_SIM_LAST_RUN_KEY = "paperSimLastRun";
const PAPER_SIM_COOLDOWN_MS = 6 * 60 * 60 * 1000;
// Fallback deadline if the verdict's timeframe can't be parsed. The app's
// verdicts typically say "review in 2-3 weeks" — 30 days is a safe cap.
const PAPER_SIM_DEFAULT_DEADLINE_DAYS = 30;

// Parse a timeframe string into a number of days. The verdict writes these as
// free text: "Review in 3 weeks", "Monitor daily for next 10-14 days",
// "Reassess within 2 weeks". We extract the LARGEST day-count mentioned (the
// outer bound of the window) so we don't close a trade prematurely.
function parseTimeframeDays(tfStr) {
  if (!tfStr) return PAPER_SIM_DEFAULT_DEADLINE_DAYS;
  const s = String(tfStr).toLowerCase();
  let maxDays = 0;
  // "N-M weeks" or "N weeks"
  const weekMatches = s.matchAll(/(\d+)(?:\s*[-–]\s*(\d+))?\s*week/g);
  for (const m of weekMatches) {
    const hi = m[2] ? parseInt(m[2]) : parseInt(m[1]);
    maxDays = Math.max(maxDays, hi * 7);
  }
  // "N-M days" or "N days"
  const dayMatches = s.matchAll(/(\d+)(?:\s*[-–]\s*(\d+))?\s*day/g);
  for (const m of dayMatches) {
    const hi = m[2] ? parseInt(m[2]) : parseInt(m[1]);
    maxDays = Math.max(maxDays, hi);
  }
  // "N month(s)"
  const monthMatches = s.matchAll(/(\d+)\s*month/g);
  for (const m of monthMatches) {
    maxDays = Math.max(maxDays, parseInt(m[1]) * 30);
  }
  return maxDays > 0 ? maxDays : PAPER_SIM_DEFAULT_DEADLINE_DAYS;
}

// Parse a price zone string into {lo, hi} bounds. Same loose grammar as the
// existing priceInZone — but returns the numeric bounds so we can compute
// "target progress" not just in/out.
function parsePriceZone(zoneStr) {
  if (!zoneStr) return null;
  const s = String(zoneStr).replace(/[$£€,]/g, "").toLowerCase();
  const range = s.match(/(\d+(?:\.\d+)?)\s*[-–]\s*(\d+(?:\.\d+)?)/);
  if (range) {
    const lo = Math.min(parseFloat(range[1]), parseFloat(range[2]));
    const hi = Math.max(parseFloat(range[1]), parseFloat(range[2]));
    return { lo, hi, kind: "range" };
  }
  const below = s.match(/below\s*(\d+(?:\.\d+)?)/);
  if (below) {
    const v = parseFloat(below[1]); return { lo: 0, hi: v, kind: "below" };
  }
  const above = s.match(/above\s*(\d+(?:\.\d+)?)/);
  if (above) {
    const v = parseFloat(above[1]); return { lo: v, hi: Infinity, kind: "above" };
  }
  const near = s.match(/(?:near|at|around)\s*(\d+(?:\.\d+)?)/);
  if (near) {
    const v = parseFloat(near[1]); return { lo: v * 0.97, hi: v * 1.03, kind: "near" };
  }
  const single = s.match(/(\d+(?:\.\d+)?)/);
  if (single) {
    const v = parseFloat(single[1]); return { lo: v * 0.97, hi: v * 1.03, kind: "near" };
  }
  return null;
}

// Parse an invalidation string into a directional level + comparator.
// Returns {level: number, breach_if: "below"|"above"} or null.
function parseInvalidation(invStr) {
  if (!invStr) return null;
  const s = String(invStr).replace(/[$£€,]/g, "").toLowerCase();
  const below = s.match(/(?:below|under|<)\s*(\d+(?:\.\d+)?)/);
  if (below) return { level: parseFloat(below[1]), breach_if: "below" };
  const above = s.match(/(?:above|over|>)\s*(\d+(?:\.\d+)?)/);
  if (above) return { level: parseFloat(above[1]), breach_if: "above" };
  return null;
}

// Resolve a single take-profit level from the snapshotted price zone, given
// trade direction. For a bullish trade the target is the *low edge* of the
// zone (first touch into the zone = target reached). For a bearish trade
// (trim/exit), the "target" is the zone too but interpreted as price falling
// to it — we use the *high edge* as first-touch.
function resolveTargetLevel(zone, isBullish) {
  if (!zone) return null;
  if (isBullish) {
    // Bullish: target reached when price rises to the lower bound.
    return isFinite(zone.lo) && zone.lo > 0 ? zone.lo : (isFinite(zone.hi) ? zone.hi : null);
  } else {
    // Bearish: vindicated when price falls to the upper bound of the zone.
    return isFinite(zone.hi) ? zone.hi : (isFinite(zone.lo) ? zone.lo : null);
  }
}

// ============================================================================
// THE SIMULATION ENGINE
// ============================================================================
// simulateTradeExit replays a trade against a daily price series and returns
// the exit event. priceSeries is an array of { date: "YYYY-MM-DD", high, low,
// close } sorted ascending, starting at or after the trade date.
//
// Returns:
//   { status: "open" }                                  — still running
//   { status: "closed_target", exit_price, exit_date, hold_days, pnl_pct, exit_reason }
//   { status: "closed_stop",   ... }
//   { status: "closed_timeout",... }
// Resolve a trade's entry date from whatever shape it was stored in.
// Returns a valid Date, or null if nothing usable is found. Critically, this
// rejects epoch-zero / pre-2000 dates — a paper trade can't predate the app,
// and treating a 1970 date as real produced the 20-million-day hold bug.
function resolveTradeDate(trade) {
  const candidates = [trade.trade_date, trade.created_at, trade.logged_at];
  for (const c of candidates) {
    if (c == null || c === "" || c === 0) continue;
    let d = null;
    if (typeof c === "object" && c.seconds != null) {
      // Firestore Timestamp shape
      d = new Date(c.seconds * 1000);
    } else if (typeof c === "number") {
      // Unix ms or s — if it's suspiciously small treat as seconds
      d = new Date(c < 1e12 ? c * 1000 : c);
    } else {
      d = new Date(c);
    }
    if (d && !isNaN(d.getTime())) {
      // Sanity floor: anything before 2020 is not a real trade date for this
      // app. Reject so it can't poison hold-day math.
      if (d.getFullYear() >= 2020 && d.getTime() <= Date.now() + 86400000) {
        return d;
      }
    }
  }
  return null;
}

function simulateTradeExit(trade, priceSeries) {
  const entry = Number(trade.price);
  const direction = String(trade.direction || "").toLowerCase();
  const isBullish = ["buy", "add"].includes(direction);
  const isBearish = ["sell", "trim", "exit"].includes(direction);
  if (!entry || (!isBullish && !isBearish)) {
    return { status: "open", reason: "indeterminate direction or entry" };
  }

  const snap = trade.analysis_snapshot || {};
  const zone = parsePriceZone(snap.action_price_zone);
  const inv = parseInvalidation(snap.action_invalidation);
  const targetLevel = resolveTargetLevel(zone, isBullish);
  const stopLevel = inv ? inv.level : null;
  const deadlineDays = parseTimeframeDays(snap.action_timeframe);

  // Robust trade-date resolution. trade_date may be a "YYYY-MM-DD" string, an
  // ISO string, a Firestore timestamp object {seconds,...}, a number, null,
  // or garbage. A bad parse here produced the "20,207,687 day" hold bug —
  // epoch-zero subtracted from a real date. Guard every case.
  const tradeDate = resolveTradeDate(trade);
  if (!tradeDate) {
    // No usable date — cannot simulate. Leave open; the trade-log row still
    // shows, but it won't pollute Paper Performance with junk numbers.
    return { status: "open", reason: "unparseable trade date" };
  }
  const deadlineDate = new Date(tradeDate.getTime() + deadlineDays * 86400000);

  // Walk the price series day by day. First level touched wins.
  for (const bar of priceSeries) {
    const barDate = new Date(bar.date);
    if (isNaN(barDate.getTime())) continue;
    if (barDate < tradeDate) continue; // skip pre-entry bars
    const hold = Math.max(0, Math.round((barDate.getTime() - tradeDate.getTime()) / 86400000));

    const hi = bar.high != null ? bar.high : bar.close;
    const lo = bar.low  != null ? bar.low  : bar.close;

    if (isBullish) {
      // Bullish: target is an UP level, stop is a DOWN level.
      const targetTouched = targetLevel != null && hi >= targetLevel;
      const stopTouched   = stopLevel  != null && lo <= stopLevel;
      // If both touched same day, we cannot know order intraday — resolve
      // conservatively as the STOP (worst case). This is the honest choice:
      // assuming the win when we can't prove it would inflate the record.
      if (stopTouched) {
        return closeEvent("closed_stop", stopLevel, bar.date, hold, entry, isBullish,
          `Stop ${fmtUSD(stopLevel)} hit`);
      }
      if (targetTouched) {
        return closeEvent("closed_target", targetLevel, bar.date, hold, entry, isBullish,
          `Target ${fmtUSD(targetLevel)} reached`);
      }
    } else {
      // Bearish (trim/exit): "target" = price fell to level, "stop" = price
      // rose past the invalidation (trim was wrong).
      const targetTouched = targetLevel != null && lo <= targetLevel;
      const stopTouched   = stopLevel  != null && hi >= stopLevel;
      if (stopTouched) {
        return closeEvent("closed_stop", stopLevel, bar.date, hold, entry, isBullish,
          `Invalidation ${fmtUSD(stopLevel)} breached`);
      }
      if (targetTouched) {
        return closeEvent("closed_target", targetLevel, bar.date, hold, entry, isBullish,
          `Target ${fmtUSD(targetLevel)} reached`);
      }
    }

    // Deadline check — if this bar is at/past the deadline and nothing has
    // been hit, close at this bar's close.
    if (barDate >= deadlineDate) {
      return closeEvent("closed_timeout", bar.close, bar.date, hold, entry, isBullish,
        `Timeframe expired (${deadlineDays}d) — closed at market`);
    }
  }

  // Series exhausted, no level hit, deadline not yet reached → still open.
  return { status: "open", target_level: targetLevel, stop_level: stopLevel, deadline_days: deadlineDays };
}

// Build a close event with P&L computed in the thesis direction.
function closeEvent(status, exitPrice, exitDate, holdDays, entry, isBullish, reason) {
  const rawPct = ((exitPrice - entry) / entry) * 100;
  // P&L in thesis terms: bullish trade profits when price rises; bearish
  // (trim/exit) "profits" — i.e. was correct — when price falls.
  const pnlPct = isBullish ? rawPct : -rawPct;
  return {
    status,
    exit_price: Number(exitPrice.toFixed(4)),
    exit_date: exitDate,
    hold_days: holdDays,
    raw_move_pct: Number(rawPct.toFixed(2)),
    pnl_pct: Number(pnlPct.toFixed(2)),
    exit_reason: reason,
    is_win: pnlPct > 0,
  };
}



// ============================================================================
// ORCHESTRATOR — runs the simulation across all open paper trades.
// ============================================================================
// For each open paper trade: fetch the symbol's daily OHLC history (the
// /price endpoint already returns a year of ohlcv), slice to bars since the
// trade date, run simulateTradeExit. If it returns a close event, write the
// closed trade back to Firestore.
//
// Real (non-paper) trades are NOT simulated — they reflect actual broker
// activity and the user manages their real exits. Simulation is the paper
// hypothesis test only.

async function runPaperSimulation({ force = false } = {}) {
  if (!state.uid) return { ran: false, reason: "not_signed_in" };
  if (!force) {
    try {
      const last = localStorage.getItem(PAPER_SIM_LAST_RUN_KEY);
      if (last && Date.now() - new Date(last).getTime() < PAPER_SIM_COOLDOWN_MS) {
        return { ran: false, reason: "cooldown" };
      }
    } catch (e) { /* ignore */ }
  }

  let trades;
  try {
    trades = await loadTrades(500);
  } catch (e) {
    return { ran: false, reason: "load_failed", error: e.message };
  }

  // Open paper trades only. A trade is "open" if it has no lifecycle_status
  // or its status is "open". Closed trades (closed_target/stop/timeout) skip.
  const openPaper = trades.filter(t =>
    t.is_paper === true &&
    (!t.lifecycle_status || t.lifecycle_status === "open")
  );
  if (openPaper.length === 0) {
    localStorage.setItem(PAPER_SIM_LAST_RUN_KEY, new Date().toISOString());
    return { ran: true, simulated: 0, closed: 0 };
  }

  // Group by symbol so we fetch each symbol's history once.
  const bySymbol = {};
  for (const t of openPaper) {
    (bySymbol[t.symbol] = bySymbol[t.symbol] || []).push(t);
  }

  let simulated = 0, closed = 0;
  for (const [symbol, symTrades] of Object.entries(bySymbol)) {
    // Fetch daily OHLC history for this symbol.
    let series = [];
    try {
      const r = await fetch(`${WORKER_URL}/price/${encodeURIComponent(symbol)}`);
      if (r.ok) {
        const j = await r.json();
        // ohlcv is [{t, o, h, l, c, v}] — t is a unix-seconds timestamp.
        series = (j.ohlcv || []).map(bar => ({
          date: new Date(bar.t * 1000).toISOString().slice(0, 10),
          high: bar.h, low: bar.l, close: bar.c,
        })).filter(b => b.high != null && b.low != null);
      }
    } catch (e) {
      console.warn("paper-sim price fetch failed for", symbol, e);
      continue; // skip this symbol's trades this run
    }
    if (series.length === 0) continue;

    for (const trade of symTrades) {
      simulated++;
      const result = simulateTradeExit(trade, series);
      if (result.status === "open") {
        // Still open — record the latest open snapshot (levels + deadline)
        // so the panel can show distance-to-target without re-deriving.
        try {
          await db.collection("users").doc(state.uid).collection("trades").doc(trade.id).update({
            lifecycle_status: "open",
            sim_target_level: result.target_level ?? null,
            sim_stop_level: result.stop_level ?? null,
            sim_deadline_days: result.deadline_days ?? null,
            sim_checked_at: new Date().toISOString(),
          });
        } catch (e) { console.warn("paper-sim open-update failed", trade.id, e); }
        continue;
      }
      // Trade closed — write the round trip.
      try {
        await db.collection("users").doc(state.uid).collection("trades").doc(trade.id).update({
          lifecycle_status: result.status,
          exit_price: result.exit_price,
          exit_date: result.exit_date,
          hold_days: result.hold_days,
          pnl_pct: result.pnl_pct,
          raw_move_pct: result.raw_move_pct,
          exit_reason: result.exit_reason,
          is_win: result.is_win,
          sim_checked_at: new Date().toISOString(),
          updated_at: new Date().toISOString(),
        });
        closed++;
      } catch (e) { console.warn("paper-sim close-write failed", trade.id, e); }
    }
  }

  localStorage.setItem(PAPER_SIM_LAST_RUN_KEY, new Date().toISOString());
  return { ran: true, simulated, closed };
}

async function runMarketScan(opts = {}) {
  if (state.marketScanLoading) return;
  state.marketScanLoading = true;
  renderCurrentView();

  try {
    const exclude = [
      ...state.holdings.filter(h => h.asset_class !== "cash").map(h => h.symbol),
      ...state.watchlist.map(w => w.symbol),
    ];
    const bodyReq = {
      uid: state.uid,
      exclude_symbols: exclude,
      focus_hint: state.marketScanFocus || undefined,
      write_reads: true,
    };
    const r = await fetch(`${WORKER_URL}/scan-market`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(bodyReq),
    });
    if (!r.ok) throw new Error(`scan-market ${r.status}`);
    const j = await r.json();
    state.marketScan = j;
    state.marketScanRanAt = new Date().toISOString();
  } catch (e) {
    console.warn("market scan failed:", e.message || e);
    state.marketScan = { results: [], reads: [], scan_note: "Scan failed — try again.", _error: String(e.message || e) };
  } finally {
    state.marketScanLoading = false;
    renderCurrentView();
  }
}

function msTimeAgo(iso) {
  const s = (Date.now() - new Date(iso).getTime()) / 1000;
  if (s < 60) return "just now";
  if (s < 3600) return `${Math.floor(s / 60)}m ago`;
  if (s < 86400) return `${Math.floor(s / 3600)}h ago`;
  return `${Math.floor(s / 86400)}d ago`;
}

              <span class="trade-traj-day">d+${o.days_since_trade}</span>
              <span class="trade-traj-outcome trade-outcome-${escAttr(o.outcome)}">${escAttr(o.outcome)}</span>
              <span class="trade-traj-move ${(o.thesis_move_pct ?? 0) >= 0 ? 'pos' : 'neg'}">${(o.thesis_move_pct ?? 0) >= 0 ? '+' : ''}${(o.thesis_move_pct ?? 0).toFixed(1)}%</span>
              <span class="trade-traj-reason">${escAttr(o.reasoning || "")}</span>
            </div>
          `).join("")}
          ${isFinal && t.final_reason ? `<div class="trade-traj-final">Finalized: ${escAttr(t.final_reason)}</div>` : ""}
        </div>` : "";

      // Decision rationale — WHY this trade was taken, from the snapshots
      // captured at log time. This is what turns the journal from a P&L ledger
      // into a decision-grading tool: pair the reasoning with the outcome and
      // you can see whether your good calls were good for the right reasons.
      const vs = t.verdict_snapshot || null;
      const lvs = t.local_verdict_snapshot || null;
      const pss = t.presurge_snapshot || null;
      const rationaleBits = [];
      if (vs?.verdict) {
        rationaleBits.push(`<span class="trade-why-verb">${escAttr(vs.verdict)}</span>${vs.action_line ? ` ${escAttr(vs.action_line)}` : ""}`);
      }
      if (vs?.stance_echo) {
        rationaleBits.push(`stance ${escAttr(vs.stance_echo)}${vs.conviction ? ` · ${escAttr(vs.conviction)} conv` : ""}`);
      }
      if (lvs && typeof lvs.conviction === "number") {
        const convPct = Math.round(lvs.conviction * 100);
        rationaleBits.push(`signal conviction ${convPct}%${lvs.conflicted ? " · conflicted" : ""}`);
      }
      if (pss?.composite != null) {
        rationaleBits.push(`Pre-Surge ${pss.composite}${pss.confirmed ? " confirmed" : " watching"}`);
      }
      if (vs?.key_signal) rationaleBits.push(escAttr(vs.key_signal));
      const rationaleHtml = rationaleBits.length > 0
        ? `<div class="trade-why">${rationaleBits.join(" · ")}</div>`
        : `<div class="trade-why trade-why-none">No decision context captured — logged without a verdict on record.</div>`;

      return `
        <div class="trade-row" data-trade-id="${escAttr(t.id)}">
          <div class="trade-row-main">
            <div class="trade-row-head">
              <span class="trade-dir" style="color:${dirColor};">${escAttr(dir)}</span>
              <span class="trade-sym">${escAttr(t.symbol)}</span>
              ${t.is_paper === true ? `<span class="trade-paper-badge">paper</span>` : ""}
              <span class="trade-qty">${fmtNum(t.quantity, 4)} @ $${fmtUSD(t.price, 2)}${notional}</span>
            </div>
            ${rationaleHtml}
            <div class="trade-row-meta">
              ${escAttr(t.trade_date || "")}${t.notes ? ` · ${escAttr(t.notes)}` : ""}
            </div>
            ${trajectoryHtml}
          </div>
          <div class="trade-row-right">
            ${outcomeBadge}
            ${outcomes.length > 0 ? `<button class="btn-ghost-sm" data-act="toggle-trade-traj" data-trade-id="${escAttr(t.id)}" title="${expanded ? "Hide" : "Show"} history">${expanded ? "▴" : "▾"}</button>` : ""}
            <button class="btn-ghost-sm" data-act="delete-trade" data-trade-id="${escAttr(t.id)}" title="Delete">×</button>
          </div>
        </div>`;
    }).join("");
  } catch (e) {
    slot.innerHTML = `<div class="setting-row" style="color:var(--red);font-size:12px;">Failed to load trades: ${escAttr(e.message || e)}</div>`;
  }
}

async function confirmDeleteTrade(tradeId) {

  const ok = await confirmModal({
