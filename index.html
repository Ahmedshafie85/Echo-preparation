let pinBuffer = "", pinMode = "enter", pinFirstTry = "";

function setupPinPad() {
  const pad = $("#pinPad");
  pad.innerHTML = "";
  const keys = [1,2,3,4,5,6,7,8,9,"",0,"⌫"];
  keys.forEach(k => {
    const b = document.createElement("button");
    b.className = "pin-key" + (k === "" ? " empty" : "") + (k === "⌫" ? " del" : "");
    b.textContent = k;
    b.addEventListener("click", () => handlePinKey(k));
    pad.appendChild(b);
  });
}
function handlePinKey(k) {
  $("#pinError").textContent = "";
  if (k === "⌫") pinBuffer = pinBuffer.slice(0, -1);
  else if (typeof k === "number" && pinBuffer.length < 4) pinBuffer += String(k);
  else return;
  updatePinDots();
  if (pinBuffer.length === 4) setTimeout(processPin, 120);
}
function updatePinDots(error = false) {
  $$("#pinDots .pin-dot").forEach((d, i) => {
    d.classList.toggle("filled", i < pinBuffer.length);
    d.classList.toggle("error", error);
  });
}
function processPin() {
  const stored = localStorage.getItem("pinHash");
  if (!stored) {
    if (pinMode === "create") {
      pinFirstTry = pinBuffer; pinBuffer = "";
      pinMode = "confirm";
      updatePinDots();
      $("#pinPrompt").textContent = "Confirm your PIN";
      return;
    }
    if (pinMode === "confirm") {
      if (pinBuffer === pinFirstTry) {
        localStorage.setItem("pinHash", hashPin(pinBuffer));
        unlockApp();
      } else {
        showPinError("PINs don't match. Start over.");
        pinFirstTry = ""; pinBuffer = "";
        pinMode = "create";
        $("#pinPrompt").textContent = "Create a 4-digit PIN";
        updatePinDots();
      }
    }
  } else {
    if (hashPin(pinBuffer) === stored) {
      unlockApp();
    } else {
      state.pinAttempts++;
      showPinError(state.pinAttempts >= 5 ? "Too many attempts." : "Incorrect PIN");
      pinBuffer = "";
      updatePinDots(true);
      setTimeout(() => updatePinDots(false), 400);
    }
  }
}
function showPinError(msg) { $("#pinError").textContent = msg; }
function hashPin(p) {
  let h = 0x811c9dc5;
  for (let i = 0; i < p.length; i++) {
    h ^= p.charCodeAt(i);
    h = (h * 0x01000193) >>> 0;
  }
  return h.toString(16);
}
function unlockApp() {
  $("#pinScreen").classList.add("hidden");
  $("#topbarMeta").textContent = new Date().toLocaleDateString("en-GB", { day: "numeric", month: "short", year: "numeric" });
  // Check auth state — if signed in (anonymous or email), proceed to app
  // If never authed AND user hasn't opted into anonymous, show auth screen
  const skipAuth = localStorage.getItem("skipAuth") === "1";
  const currentUser = auth.currentUser;
  if (currentUser && (!currentUser.isAnonymous || skipAuth)) {
    enterApp();
  } else {
    showAuthScreen();
  }
}
function showPinScreen() {
  $("#loader").classList.add("hidden");
  $("#pinScreen").classList.remove("hidden");
  setupPinPad();
  if (!localStorage.getItem("pinHash")) {
    pinMode = "create";
    $("#pinPrompt").textContent = "Create a 4-digit PIN";
  }
}

function showAuthScreen() {
  $("#authScreen").classList.remove("hidden");
  $("#authError").textContent = "";
  state.authMode = "signin";
  updateAuthMode();
  $("#authMigrate").classList.add("hidden");
}

function updateAuthMode() {
  const mode = state.authMode || "signin";
  $$(".auth-tab").forEach(t => t.classList.toggle("active", t.dataset.mode === mode));
  $("#authSubmitBtn").textContent = mode === "signup" ? "Create Account" : "Sign In";
  const pwInput = $("#authPassword");
  if (pwInput) pwInput.autocomplete = mode === "signup" ? "new-password" : "current-password";
}

function setAuthMode(mode) {
  state.authMode = mode;
  updateAuthMode();
  $("#authError").textContent = "";
}

async function submitAuth() {
  const email = $("#authEmail").value.trim();
  const password = $("#authPassword").value;
  const errEl = $("#authError");
  errEl.textContent = "";
  const submitBtn = $("#authSubmitBtn");
  if (!email || !password) { errEl.textContent = "Email and password required"; return; }
  if (password.length < 6) { errEl.textContent = "Password must be at least 6 characters"; return; }
  if (submitBtn.disabled) return;
  submitBtn.disabled = true;
  submitBtn.textContent = "...";

  // Capture the anonymous UID BEFORE we sign in (so we can migrate from it)
  const anonUid = (auth.currentUser?.isAnonymous && auth.currentUser?.uid) || null;
  const mode = state.authMode || "signin";

  try {
    if (mode === "signup") {
      await auth.createUserWithEmailAndPassword(email, password);
    } else {
      await auth.signInWithEmailAndPassword(email, password);
    }
    // Auth state listener will update state.uid
    await new Promise(r => setTimeout(r, 200)); // allow listener to settle
    state.uid = auth.currentUser.uid;
    localStorage.removeItem("skipAuth");

    // If we had anonymous data, offer migration
    if (anonUid && anonUid !== state.uid) {
      const hasAnonData = await checkAnonHasData(anonUid);
      if (hasAnonData) {
        state._pendingAnonUid = anonUid;
        $("#authMigrate").classList.remove("hidden");
        submitBtn.disabled = false;
        submitBtn.textContent = mode === "signup" ? "Create Account" : "Sign In";
        return;
      }
    }
    enterApp();
  } catch (e) {
    errEl.textContent = friendlyAuthError(e);
    submitBtn.disabled = false;
    submitBtn.textContent = mode === "signup" ? "Create Account" : "Sign In";
  }
}

function friendlyAuthError(e) {
  const code = e.code || "";
  if (code === "auth/email-already-in-use") return "Email already registered. Try signing in.";
  if (code === "auth/invalid-email") return "That doesn't look like a valid email";
  if (code === "auth/weak-password") return "Password too weak";
  if (code === "auth/user-not-found" || code === "auth/wrong-password" || code === "auth/invalid-credential") return "Email or password incorrect";
  if (code === "auth/too-many-requests") return "Too many attempts. Try again in a moment.";
  if (code === "auth/network-request-failed") return "Network error — check connection";
  return e.message || "Sign-in failed";
}

async function checkAnonHasData(anonUid) {
  try {
    const holdings = await db.collection("users").doc(anonUid).collection("holdings").limit(1).get();
    if (holdings.docs.length > 0) return true;
    const journal = await db.collection("users").doc(anonUid).collection("journal").limit(1).get();
    if (journal.docs.length > 0) return true;
    return false;
  } catch (e) { return false; }
}

async function migrateAnonData(anonUid, newUid) {
  // Copy these subcollections from anon to new account
  const subcollections = ["holdings", "watchlist", "journal", "analyses", "portfolio_analyses", "triggers", "bot"];
  for (const sub of subcollections) {
    try {
      const snap = await db.collection("users").doc(anonUid).collection(sub).get();
      for (const doc of snap.docs) {
        const data = doc.data();
        // Avoid copying serverTimestamp() sentinels (they become null on a re-write); strip them
        delete data.added_at; delete data.last_updated; delete data.timestamp; delete data.saved_at;
        await db.collection("users").doc(newUid).collection(sub).doc(doc.id).set(data, { merge: true });
      }
    } catch (e) { console.warn("migrate failed for", sub, e); }
  }
}

async function handleMigrate(yes) {
  const anonUid = state._pendingAnonUid;
  if (!anonUid) { enterApp(); return; }
  const submitBtn = $("#authSubmitBtn");
  submitBtn.disabled = true;
  submitBtn.textContent = "Importing...";
  $("#authError").textContent = "";
  try {
    if (yes) {
      await migrateAnonData(anonUid, state.uid);
      toast("Data imported");
    }
    state._pendingAnonUid = null;
    enterApp();
  } catch (e) {
    $("#authError").textContent = "Import failed: " + (e.message || e);
    submitBtn.disabled = false;
    submitBtn.textContent = "Sign In";
  }
}

function skipAuth() {
  // Use anonymous account — single device only
  localStorage.setItem("skipAuth", "1");
  if (!auth.currentUser) {
    auth.signInAnonymously().then(() => {
      state.uid = auth.currentUser.uid;
      enterApp();
    }).catch(e => {
      $("#authError").textContent = "Could not start anonymous session: " + (e.message || e);
    });
  } else {
    state.uid = auth.currentUser.uid;
    enterApp();
  }
}

function enterApp() {
  $("#authScreen").classList.add("hidden");
  $("#app").classList.remove("hidden");

async function signOutUser() {
  if (!confirm("Sign out? You'll need to sign back in to see your synced data.")) return;
  try {
    await auth.signOut();
    localStorage.removeItem("skipAuth");
    location.reload();
  } catch (e) { toast("Sign out failed: " + (e.message || e), 3000, "error"); }

async function ensureAuth() {
  // By the time loadInitialData runs, auth has been settled by the auth-screen flow.
  // This is just a safety check + state.uid sync.
  return new Promise((resolve, reject) => {
    if (auth.currentUser) {
      state.uid = auth.currentUser.uid;
      resolve(auth.currentUser);
      return;
    }
    auth.onAuthStateChanged(async user => {
      if (user) { state.uid = user.uid; resolve(user); }
      else {
        try {
          await auth.signInAnonymously();
          state.uid = auth.currentUser.uid;
          resolve(auth.currentUser);
        }
        catch (e) { reject(e); }
      }
    });
  });
}

async function loadInitialData() {
  await ensureAuth();
  await loadHoldingsFromFirestore();
  if (state.holdings.length === 0) await seedHoldings();
  await loadInvestorProfile();
  await loadAnalysesFromFirestore();
  await loadPortfolioAnalysis();
  await loadWatchlist();
  if (state.watchlist.length === 0) await seedWatchlist();
  await loadTriggers();
  await loadNotifications();
  await refreshAllPrices();
  renderCurrentView();
  // Background scan after first render
  setTimeout(() => runScan().catch(() => {}), 1500);
  // Phase B — check fired triggers on first load. Debounced to 6h via state.triggersCheckedAt.
  setTimeout(() => runTriggersCheck(false).catch(() => {}), 3500);
  // Phase C — unified verdict on first load. Debounced to 4h.
  setTimeout(() => runVerdict(false).catch(() => {}), 4500);
  // Phase R — paper-trade exit simulation on first load. Cooldown 6h via
  // localStorage. Replays every open paper trade against its symbol's daily
  // OHLC history and closes any that hit target/stop/timeout.
  setTimeout(() => {
    runPaperSimulation().then(r => {
      if (r.closed > 0) {
        toast(`${r.closed} paper trade${r.closed === 1 ? "" : "s"} closed by simulation`);
        if (state.currentView === "journal") {
          populateTradeLogList();
          populatePaperPerformance();
        }
      }
    }).catch(() => {});
  }, 5500);

  // ROUND 1+1.5 AUTO-REFRESH:
  // The verdict math depends on 5 signal sources — Daily Scan (always runs),
  // AI Analyses (per-symbol manual), Macro, Pre-Surge, News, ETF momentum.
  // The latter three previously only ran when the user pressed buttons, which
  // meant the verdict was usually computed with 2-of-5 signals missing.
  // Auto-run each one in the background after first render. Each fetcher has
  // its own cache (Macro 6h, Pre-Surge 12h, News ~6h, ETF leaderboard ~24h)
  // so this is cheap on repeat opens.
  setTimeout(() => { autoRefreshSignals().catch(e => console.warn("auto-refresh:", e)); }, 2000);
}

// Background-fetch every signal the verdict depends on. Each individual
// fetcher decides whether to use cache or hit network; we just kick them off.
async function autoRefreshSignals() {
  // Macro — fetchMacroRegime already returns cached if <6h old
  try {
    const cached = loadMacroCache();
    if (!cached) {
      const m = await fetchMacroRegime();
      state.macro = m;
      renderCurrentView();
    } else {
      state.macro = cached;
    }
  } catch (e) { console.warn("auto macro:", e.message || e); }

  // Pre-Surge — only run if no cached scan from last 12h
  try {
    const lastRanAt = state.preSurgeRanAt ? new Date(state.preSurgeRanAt).getTime() : 0;
    const ageH = (Date.now() - lastRanAt) / 3600000;
    if (!state.preSurge || ageH > 12) {
      await runPreSurge(); // already renders on completion
    }
  } catch (e) { console.warn("auto pre-surge:", e.message || e); }

  // News — refresh on app open if cache is older than 6h. Previously this
  // only loaded when state was completely empty (first-ever open), which
  // caused Today's Opportunities to feel frozen across sessions.
  try {
    const newsAgeH = state.newsFetchedAt ? (Date.now() - new Date(state.newsFetchedAt).getTime()) / 3600000 : 999;
    if (!state.newsItems || newsAgeH > 6) {
      await refreshNews();
    }
  } catch (e) { console.warn("auto news:", e.message || e); }

  // ETF Leaderboard — same pattern: refresh if older than 24h, not only
  // when missing entirely. The leaderboard moves slowly, so a daily refresh
  // is enough to keep momentum picks current without burning API quota.
  try {
    const etfAgeH = state.etfLeaderboardFetchedAt ? (Date.now() - new Date(state.etfLeaderboardFetchedAt).getTime()) / 3600000 : 999;
    if (!state.etfLeaderboard || etfAgeH > 24) {
      await fetchEtfLeaderboard(false); // false = let function decide based on cache
    }
  } catch (e) { console.warn("auto etf:", e.message || e); }

  // Calendar — earnings + ex-div dates for held + watchlist symbols.
  // Cheap: one bulk POST. 24h client cache + 6h worker cache.
  try {
    if (!state.calendar) {
      const heldSyms = state.holdings.map(h => h.symbol);
      const watchSyms = state.watchlist.map(w => w.symbol);
      const allSyms = Array.from(new Set([...heldSyms, ...watchSyms]));
      if (allSyms.length > 0) {
        state.calendarLoading = true;
        const cal = await fetchCalendarForUniverse(allSyms);
        state.calendar = cal;
        state.calendarLoading = false;
      }
    }
  } catch (e) {
    console.warn("auto calendar:", e.message || e);
    state.calendarLoading = false;
  }

  // IV Rank — options-derived volatility expectations per held + watch symbol.
  // 4h client cache + 4h worker cache. Skipped on crypto/illiquid (worker
  // returns null and we render no chip).
  try {
    if (!state.ivRank || Object.keys(state.ivRank).length === 0) {
      const heldSyms = state.holdings.map(h => h.symbol);
      const watchSyms = state.watchlist.map(w => w.symbol);
      const allSyms = Array.from(new Set([...heldSyms, ...watchSyms]));
      if (allSyms.length > 0) {
        const iv = await fetchIvRankForUniverse(allSyms);
        state.ivRank = iv || {};
      }
    }
  } catch (e) {
    console.warn("auto iv-rank:", e.message || e);
  }

  renderCurrentView();
}

async function loadInvestorProfile() {

async function loadHoldingsFromFirestore() {

  // code issue (logic bug) or a data issue (Firestore record malformed).
  const cashHoldings = state.holdings.filter(h =>
    h.symbol === "CASH" ||
    (typeof h.asset_class === "string" && h.asset_class.toLowerCase() === "cash")
  );

    console.warn("[CASH DIAGNOSTIC] No cash holding found in Firestore.");
  } else {
    console.log("[CASH DIAGNOSTIC] Cash holding(s) loaded:", cashHoldings.map(h => ({
      id: h.id,
      symbol: h.symbol,
      asset_class: h.asset_class,
      asset_class_type: typeof h.asset_class,
      quantity: h.quantity,
      quantity_type: typeof h.quantity,

async function loadWatchlist() {

async function seedWatchlist() {

async function loadTriggers() {
  try {
    const snap = await db.collection("users").doc(state.uid).collection("triggers")
      .where("seen", "==", false).limit(20).get();
    const remoteTriggers = snap.docs.map(d => ({ id: d.id, ...d.data() }))
      .sort((a, b) => (b.triggered_at || "").localeCompare(a.triggered_at || ""));
    // Merge with any local-only triggers (don't overwrite if remote returns nothing)
    if (remoteTriggers.length > 0) state.triggers = remoteTriggers;
  } catch (e) {
    console.warn("loadTriggers failed (probably no index):", e.message || e);
    // Keep whatever we already have in state.triggers
  }

async function loadAnalysesFromFirestore() {
  try {
    const snap = await db.collection("users").doc(state.uid).collection("analyses")
      .orderBy("generated_at", "desc").limit(50).get();
    const latest = {};
    snap.docs.forEach(d => {
      const data = d.data();
      if (!latest[data.symbol] || (data.generated_at > latest[data.symbol].generated_at)) latest[data.symbol] = data;
    });
    state.analyses = latest;
  } catch (e) { console.warn("analyses load failed", e); state.analyses = {}; }

async function loadPortfolioAnalysis() {

    const snap = await db.collection("users").doc(state.uid).collection("portfolio_analyses")
      .orderBy("generated_at", "desc").limit(1).get();
    state.portfolioAnalysis = snap.docs[0]?.data() || null;
  } catch (e) { state.portfolioAnalysis = null; }

async function refreshAllPrices() {
  // Build full price-fetch set:
  //   - All non-cash holdings
  //   - All watchlist symbols
  //   - SPY (benchmark for Pre-Surge Relative Strength scoring)
  // Watchlist symbols are usually also fetched by runScan, but having them here
  // means the Pre-Surge scanner has full OHLCV coverage even before /scan runs.
  const symbols = new Set();
  for (const h of state.holdings) if (h.asset_class !== "cash") symbols.add(h.symbol);
  for (const w of state.watchlist) symbols.add(w.symbol);
  symbols.add("SPY"); // benchmark
  const promises = Array.from(symbols).map(sym =>
    fetch(`${WORKER_URL}/price/${encodeURIComponent(sym)}`)
      .then(r => r.json())
      .then(p => { state.prices[sym] = p; })
      .catch(e => console.warn("price fetch failed:", sym, e))
  );
  await Promise.all(promises);
}

// ----- Lazy data fetcher for Pre-Surge scanner -----
// The scanner needs OHLCV for the full universe (watchlist + holdings + ETF_UNIVERSE).
// We don't pre-fetch the entire ETF universe on boot — too heavy. Instead, this
// function fetches any missing symbols on demand (when the scanner runs), with
// concurrency limited to 6 to avoid hammering the worker.
async function ensurePreSurgeData(onProgress) {
  const universe = getPreSurgeUniverse();
  const missing = universe.filter(sym => {
    const p = state.prices[sym];
    return !p || !p.ohlcv || p.ohlcv.length < 150;
  });
  if (missing.length === 0) return { fetched: 0, total: universe.length };

  let fetched = 0;
  // Concurrency 8 — balances first-scan latency (now ~166 symbols with SCAN_UNIVERSE)
  // against not hammering the worker. Yahoo's rate limits tolerate this fine.
  const concurrency = 8;
  const work = missing.slice();
  if (onProgress) onProgress(0, missing.length);

  await Promise.all(Array.from({ length: concurrency }, async () => {
    while (work.length > 0) {
      const sym = work.shift();
      if (!sym) break;
      try {
        const r = await fetch(`${WORKER_URL}/price/${encodeURIComponent(sym)}`);
        if (r.ok) {
          const p = await r.json();
          state.prices[sym] = p;
        }
      } catch (e) { /* tolerate failures */ }
      fetched++;
      if (onProgress) onProgress(fetched, missing.length);
    }
  }));
  return { fetched, total: universe.length };
}

async function runScan() {
  if (state.watchlist.length === 0) return;

  // Try worker /scan first, fall back to client-side computation
  try {
    const idToken = await auth.currentUser.getIdToken();
    const r = await fetch(`${WORKER_URL}/scan`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ uid: state.uid, idToken }),
    });
    if (r.ok) {
      const j = await r.json();
      if (j.results && j.results.length) {
        for (const item of j.results) state.watchlistSnapshot[item.symbol] = item;
        state.lastScanAt = new Date().toISOString();
        await loadTriggers();
        if (state.currentView === "portfolio" || state.currentView === "discover") renderCurrentView();
        return j;
      }
    }
    throw new Error("scan endpoint failed or returned no results");
  } catch (e) {
    console.warn("worker scan failed, using client-side scan:", e.message || e);
  }

  // Client-side scan
  await fetchWatchlistSnapshot();
  state.lastScanAt = new Date().toISOString();
  // collect triggers from snapshots into local state.triggers
  state.triggers = [];
  for (const w of state.watchlist) {
    const snap = state.watchlistSnapshot[w.symbol];
    if (snap?.triggers?.length) {
      for (const t of snap.triggers) {
        state.triggers.push({
          id: `${w.symbol}_${t.condition_id}_${Date.now()}`,
          symbol: w.symbol,
          condition_id: t.condition_id,
          condition_type: t.type,
          detail: t.detail,
          triggered_at: new Date().toISOString(),
          seen: false,
        });
      }
    }
  }
  if (state.currentView === "portfolio" || state.currentView === "discover") renderCurrentView();
  return { results: Object.values(state.watchlistSnapshot) };
}

async function fetchWatchlistSnapshot() {
  if (state.watchlist.length === 0) return;

  // Try worker endpoint first; if it fails, compute client-side.
  try {
    const symbols = state.watchlist.map(w => w.symbol);
    const conditions_by_symbol = {};
    for (const w of state.watchlist) conditions_by_symbol[w.symbol] = w.conditions || [];
    const r = await fetch(`${WORKER_URL}/scan-snapshot`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ symbols, conditions_by_symbol }),
    });
    if (r.ok) {
      const j = await r.json();
      if (j.results && j.results.length) {
        for (const item of j.results) state.watchlistSnapshot[item.symbol] = item;
        return;
      }
    }
    throw new Error("scan-snapshot empty or failed");
  } catch (e) {
    console.warn("scan-snapshot failed; falling back to client-side TA:", e.message || e);
  }

  // ---- Client-side fallback: fetch prices, compute indicators locally ----
  for (const w of state.watchlist) {
    try {
      const snap = await computeClientSnapshot(w.symbol, w.conditions || []);
      if (snap) state.watchlistSnapshot[w.symbol] = snap;
    } catch (e) {
      console.warn("client snapshot failed for", w.symbol, e.message || e);
    }
  }
}

async function getOhlcv(symbol) {
  // cache for 5 min
  const cached = state.ohlcvCache[symbol];
  if (cached && (Date.now() - cached.fetched_at < 5 * 60 * 1000)) return cached.data;
  let data = null;
  if (state.prices[symbol] && state.prices[symbol].ohlcv) {
    data = state.prices[symbol];
  } else {
    const r = await fetch(`${WORKER_URL}/price/${encodeURIComponent(symbol)}`);
    if (!r.ok) throw new Error(`price fetch ${r.status}`);
    data = await r.json();
    state.prices[symbol] = data;
  }
  state.ohlcvCache[symbol] = { data, fetched_at: Date.now() };
  return data;
}

async function computeClientSnapshot(symbol, conditions) {
  const data = await getOhlcv(symbol);
  if (!data || !data.ohlcv || data.ohlcv.length < 30) {
    return {
      symbol,
      current_price: data?.current_price || null,
      day_change_pct: null,
      rsi14: null, trend: null,
      pct_from_52w_high: null,
      drop_from_peak_90d: null,
      triggers: [],
      setup_score: 0,
    };
  }
  const ohlcv = data.ohlcv;
  const closes = ohlcv.map(d => d.c);
  const highs  = ohlcv.map(d => d.h);
  const lows   = ohlcv.map(d => d.l);
  const cur    = data.current_price ?? closes[closes.length - 1];
  const prev   = data.prev_close ?? closes[closes.length - 2];
  const dayChangePct = prev ? ((cur - prev) / prev) * 100 : null;

  const rsi14 = computeRSI(closes, 14);
  const ma50  = computeMA(closes, 50);
  const ma200 = computeMA(closes, 200);
  const trend = ma200 != null && cur > ma200 ? "above_200ma" : "below_200ma";

  // 52-week range (last 252 sessions ≈ 1 year)
  const yearSlice = closes.slice(-252);
  const yearHighs = highs.slice(-252);
  const yearLows  = lows.slice(-252);
  const high52w = Math.max(...yearHighs);
  const low52w  = Math.min(...yearLows);
  const pctFrom52wHigh = high52w > 0 ? ((cur - high52w) / high52w) * 100 : null;
  const pctFrom52wLow  = low52w > 0  ? ((cur - low52w)  / low52w)  * 100 : null;

  // 90-day peak (drop_from_peak)
  const slice90 = highs.slice(-90);
  const peak90 = slice90.length ? Math.max(...slice90) : null;
  const dropFromPeak90 = peak90 ? ((cur - peak90) / peak90) * 100 : null;

  // MACD
  // MACD removed (no reliable data signal)

  // Evaluate conditions
  const triggers = [];
  for (const c of (conditions || [])) {
    let fired = false;
    let detail = "";
    switch (c.type) {
      case "rsi_below":
        if (rsi14 != null && rsi14 < c.threshold) { fired = true; detail = `RSI ${rsi14.toFixed(1)} < ${c.threshold}`; }
        break;
      case "rsi_above":
        if (rsi14 != null && rsi14 > c.threshold) { fired = true; detail = `RSI ${rsi14.toFixed(1)} > ${c.threshold}`; }
        break;
      case "ma_touch": {
        const period = c.period || 200;
        const tol = c.tolerance_pct || 1.5;
        const ma = computeMA(closes, period);
        if (ma != null) {
          const diffPct = Math.abs((cur - ma) / ma) * 100;
          if (diffPct <= tol) { fired = true; detail = `${diffPct.toFixed(2)}% from MA${period}`; }
        }
        break;
      }
      case "near_52w_high":
        if (pctFrom52wHigh != null && Math.abs(pctFrom52wHigh) <= (c.threshold_pct || 3)) {
          fired = true; detail = `${Math.abs(pctFrom52wHigh).toFixed(2)}% from 52w high`;
        }
        break;
      case "near_52w_low":
        if (pctFrom52wLow != null && pctFrom52wLow <= (c.threshold_pct || 5)) {
          fired = true; detail = `${pctFrom52wLow.toFixed(2)}% above 52w low`;
        }
        break;
      case "drop_from_peak":
        if (dropFromPeak90 != null && dropFromPeak90 <= -(c.threshold_pct || 10)) {
          fired = true; detail = `${dropFromPeak90.toFixed(2)}% off 90d peak`;
        }
        break;
      case "price_above":
        if (cur > c.threshold) { fired = true; detail = `$${cur.toFixed(2)} > $${c.threshold}`; }
        break;
      case "price_below":
        if (cur < c.threshold) { fired = true; detail = `$${cur.toFixed(2)} < $${c.threshold}`; }
        break;
      case "ma_cross_bullish": {
        // MA50 crossed above MA200 within `within_days` sessions
        const within = c.within_days || 3;
        for (let lb = 0; lb <= within; lb++) {
          const i = closes.length - 1 - lb;
          if (i < 200) break;
          const upToI    = closes.slice(0, i + 1);
          const upToIm1  = closes.slice(0, i);
          const m50_i    = computeMA(upToI, 50);
          const m200_i   = computeMA(upToI, 200);
          const m50_im1  = computeMA(upToIm1, 50);
          const m200_im1 = computeMA(upToIm1, 200);
          if (m50_i == null || m200_i == null || m50_im1 == null || m200_im1 == null) continue;
          if (m50_im1 <= m200_im1 && m50_i > m200_i) {
            fired = true; detail = `${lb}d ago`; break;
          }
        }
        break;
      }
      case "ma_cross_bearish": {
        const within = c.within_days || 3;
        for (let lb = 0; lb <= within; lb++) {
          const i = closes.length - 1 - lb;
          if (i < 200) break;
          const upToI    = closes.slice(0, i + 1);
          const upToIm1  = closes.slice(0, i);
          const m50_i    = computeMA(upToI, 50);
          const m200_i   = computeMA(upToI, 200);
          const m50_im1  = computeMA(upToIm1, 50);
          const m200_im1 = computeMA(upToIm1, 200);
          if (m50_i == null || m200_i == null || m50_im1 == null || m200_im1 == null) continue;
          if (m50_im1 >= m200_im1 && m50_i < m200_i) {
            fired = true; detail = `${lb}d ago`; break;
          }
        }
        break;
      }
      case "breakout_high": {
        const period = c.period || 50;
        if (closes.length >= period) {
          const window = closes.slice(-period);
          const winMax = Math.max(...window);
          if (cur >= winMax) { fired = true; detail = `${period}-day high $${cur.toFixed(2)}`; }
        }
        break;
      }
      case "bollinger_lower": {
        const period = c.period || 20;
        const std = c.std || 2;
        const bb = computeBollinger(closes, period, std);
        if (bb && cur <= bb.lower) {
          fired = true; detail = `at lower BB $${bb.lower.toFixed(2)}`;
        }
        break;
      }
      case "bollinger_upper": {
        const period = c.period || 20;
        const std = c.std || 2;
        const bb = computeBollinger(closes, period, std);
        if (bb && cur >= bb.upper) {
          fired = true; detail = `at upper BB $${bb.upper.toFixed(2)}`;
        }
        break;
      }
      case "momentum_above": {
        const months = c.months || 3;
        const threshold = c.threshold_pct || 10;
        const sessionsBack = months * 21; // ~21 trading days per month
        if (closes.length > sessionsBack) {
          const past = closes[closes.length - 1 - sessionsBack];
          const pct = past > 0 ? ((cur - past) / past) * 100 : 0;
          if (pct >= threshold) { fired = true; detail = `${months}m return ${pct.toFixed(1)}%`; }
        }
        break;
      }
    }
    if (fired) triggers.push({ condition_id: c.id, type: c.type, detail });
  }

  // setup score: simple heuristic (more triggers + RSI extremes + drop = higher)
  let score = triggers.length * 25;
  if (rsi14 != null) {
    if (rsi14 < 30) score += 20;
    else if (rsi14 < 40) score += 10;
    else if (rsi14 > 70) score -= 10;
  }
  if (dropFromPeak90 != null && dropFromPeak90 < -10) score += 15;

  return {
    symbol, current_price: cur, day_change_pct: dayChangePct,
    rsi14: rsi14 != null ? Math.round(rsi14 * 10) / 10 : null,
    trend, pct_from_52w_high: pctFrom52wHigh,
    pct_from_52w_low: pctFrom52wLow,
    drop_from_peak_90d: dropFromPeak90,
    triggers, setup_score: score,
  };
}

// ============================================================================
// TECHNICAL INDICATORS (client-side, used by watchlist + bot)
// ============================================================================
function computeRSI(closes, period = 14) {
  if (!closes || closes.length < period + 1) return null;
  let gains = 0, losses = 0;
  for (let i = closes.length - period; i < closes.length; i++) {
    const diff = closes[i] - closes[i - 1];
    if (diff >= 0) gains += diff; else losses -= diff;
  }
  const avgGain = gains / period;
  const avgLoss = losses / period;
  if (avgLoss === 0) return 100;
  const rs = avgGain / avgLoss;
  return 100 - (100 / (1 + rs));
}

function computeMA(closes, period) {
  if (!closes || closes.length < period) return null;
  const slice = closes.slice(-period);
  return slice.reduce((a, b) => a + b, 0) / period;
}

// ============================================================================
// PRE-SURGE MATH — leading-indicator helpers for the Pre-Surge scanner
// Free, fully client-side, uses only data already cached in state.prices.
// ============================================================================

// On-Balance Volume time series (Granville 1963).
// Returns array same length as closes; obv[i] = cumulative volume signed by
// direction of close[i] vs close[i-1]. Flat closes contribute 0.
function computeOBVSeries(closes, volumes) {
  if (!closes || !volumes || closes.length !== volumes.length || closes.length < 2) return null;
  const out = new Array(closes.length);
  out[0] = 0;
  for (let i = 1; i < closes.length; i++) {
    const prev = out[i - 1];
    const v = volumes[i] || 0;
    if (closes[i] > closes[i - 1])      out[i] = prev + v;
    else if (closes[i] < closes[i - 1]) out[i] = prev - v;
    else                                 out[i] = prev;
  }
  return out;
}

// Linear-regression slope of a numeric series over its full length.
// Returns slope per-index (i.e. per-bar). Use directly to compare two series.
// For comparing slope MAGNITUDES across scales, divide by the series mean.
function linearSlope(series) {
  if (!series || series.length < 2) return null;
  const n = series.length;
  let sumX = 0, sumY = 0, sumXY = 0, sumXX = 0;
  for (let i = 0; i < n; i++) {
    sumX += i;
    sumY += series[i];
    sumXY += i * series[i];
    sumXX += i * i;
  }
  const denom = n * sumXX - sumX * sumX;
  if (denom === 0) return 0;
  return (n * sumXY - sumX * sumY) / denom;
}

// Slope normalized to series mean — comparable across series of different scales.
// Returns slope-per-bar as a fraction of the average value (≈ daily % drift).
function normalizedSlope(series) {
  if (!series || series.length < 2) return null;
  const slope = linearSlope(series);
  if (slope == null) return null;
  const mean = series.reduce((a, b) => a + b, 0) / series.length;
  if (Math.abs(mean) < 1e-9) return 0;
  return slope / Math.abs(mean);
}

// Bollinger Bandwidth = (upper - lower) / mid. Returns time-series of bandwidth
// values over the last `lookback` sessions (used for percentile ranking).
function computeBandwidthSeries(closes, period = 20, stdMult = 2, lookback = 126) {
  if (!closes || closes.length < period + lookback) return null;
  const out = [];
  const start = closes.length - lookback;
  for (let i = start; i < closes.length; i++) {
    const slice = closes.slice(i - period + 1, i + 1);
    if (slice.length < period) { out.push(null); continue; }
    const mid = slice.reduce((a, b) => a + b, 0) / period;
    const variance = slice.reduce((s, x) => s + (x - mid) ** 2, 0) / period;
    const std = Math.sqrt(variance);
    out.push(mid > 0 ? ((mid + stdMult * std) - (mid - stdMult * std)) / mid : 0);
  }
  return out;
}

// Returns percentile rank of `value` within `series` (lower = tighter = more compressed).
function percentileRank(series, value) {
  if (!series || series.length === 0 || value == null) return null;
  const valid = series.filter(x => x != null && !isNaN(x));
  if (valid.length === 0) return null;
  let below = 0;
  for (const v of valid) if (v < value) below++;
  return (below / valid.length) * 100;
}

// Comparative Relative Strength series = price[target] / price[bench].
// Both arrays must align by index (same trading days). Returns null if misaligned.
function computeRSSeries(targetCloses, benchCloses) {
  if (!targetCloses || !benchCloses) return null;
  const n = Math.min(targetCloses.length, benchCloses.length);
  if (n < 2) return null;
  // Use the trailing window so the arrays align even if start dates differ
  const tSlice = targetCloses.slice(-n);
  const bSlice = benchCloses.slice(-n);
  const out = [];
  for (let i = 0; i < n; i++) {
    if (bSlice[i] > 0) out.push(tSlice[i] / bSlice[i]);
    else out.push(null);
  }
  return out;
}

// ============================================================================
// MACRO REGIME — DXY + 10Y yield → regime classification + sector mapping
//
// Two macro variables drive cross-asset capital flow more than anything else:
//   • US Dollar Index (DXY): when it falls, dollar-denominated risk assets
//     (gold, silver, EM, long-duration tech, crypto) tend to outperform.
//     When it rises, defensive sectors and US-listed multinationals lag.
//   • 10-Year Treasury Yield: when it falls, long-duration assets (growth tech,
//     REITs, utilities, gold) tend to outperform. When it rises sharply,
//     financials and value tend to outperform; growth tech and metals lag.
//
// The combination produces 4 archetypal regimes. We classify by 252d percentile
// rank of DXY and 50d change in 10Y yield, mapping to a "favors / against"
// list of sectors and a few specific tickers in the user's universe.
//
// Data refresh: localStorage TTL of 6 hours (macro moves slowly).
// ============================================================================

const MACRO_CACHE_KEY = "macroRegime_v1";
const MACRO_TTL_HOURS = 6;

// IMPORTANT: cache key/TTL inlined inside functions to avoid TDZ on state init.
// (Same pattern as the calendar and IV-rank cache loaders below.)

function loadMacroCache() {
  const CACHE_KEY = "macroRegime_v1";
  const TTL_HOURS = 6;
  try {
    const raw = localStorage.getItem(CACHE_KEY);
    if (!raw) return null;
    const c = JSON.parse(raw);
    if (!c.fetchedAt) return null;
    const ageH = (Date.now() - new Date(c.fetchedAt).getTime()) / 3600000;
    if (ageH > TTL_HOURS) return null;
    return c;
  } catch (e) { return null; }
}
function saveMacroCache(payload) {
  const CACHE_KEY = "macroRegime_v1";
  try {
    localStorage.setItem(CACHE_KEY, JSON.stringify({
      ...payload, fetchedAt: new Date().toISOString(),
    }));
  } catch (e) {}
}

// Returns percentile rank of `value` within `series` (0 = lowest, 100 = highest).
function pctileRank(series, value) {
  const valid = series.filter(x => x != null && !isNaN(x));
  if (valid.length === 0 || value == null) return null;
  let below = 0;
  for (const v of valid) if (v < value) below++;
  return (below / valid.length) * 100;
}

// Given DXY + TNX response, compute the regime classification.
function classifyMacroRegime(raw) {
  if (!raw || !raw.dxy || !raw.tnx) return null;
  const dxyCloses = raw.dxy.ohlcv.map(d => d.c);
  const tnxCloses = raw.tnx.ohlcv.map(d => d.c);
  if (dxyCloses.length < 50 || tnxCloses.length < 50) return null;

  const dxyCur  = raw.dxy.current ?? dxyCloses[dxyCloses.length - 1];
  const tnxRaw  = raw.tnx.current ?? tnxCloses[tnxCloses.length - 1];

  // Yahoo's ^TNX historically returns the yield × 10 (e.g. 45.0 for 4.50%).
  // But the convention has flipped sources/dates in the past — some endpoints
  // return the raw yield (4.5). Self-detect: real 10Y yields trade 1-8% these
  // last 40 years, so a value > 15 must be the ×10 convention.
  const tnxScaleDivisor = tnxRaw > 15 ? 10 : 1;
  const tnxDisplayPct = tnxRaw / tnxScaleDivisor;

  // DXY: 252d percentile rank (low = weak dollar regime = bullish risk/metals)
  const dxy252 = pctileRank(dxyCloses.slice(-252), dxyCur);
  const dxy50  = pctileRank(dxyCloses.slice(-50), dxyCur);
  // DXY 20-day slope (sign matters more than magnitude)
  const dxy20Slope = dxyCloses.length >= 20
    ? (dxyCloses[dxyCloses.length - 1] - dxyCloses[dxyCloses.length - 20]) / dxyCloses[dxyCloses.length - 20] * 100
    : null;

  // 10Y: 50d change in yield (in real % points). Use the same scaling
  // divisor we detected for the current value so the math is consistent
  // regardless of which ^TNX convention Yahoo is currently using.
  const tnxAgo50 = tnxCloses.length >= 50 ? tnxCloses[tnxCloses.length - 50] : null;
  const tnx50Change = tnxAgo50 != null
    ? (tnxRaw - tnxAgo50) / tnxScaleDivisor
    : null;

  // Classify into one of 4 archetypes
  const dxyFalling = (dxy20Slope != null && dxy20Slope < -1.5) || (dxy252 != null && dxy252 < 25);
  const dxyRising  = (dxy20Slope != null && dxy20Slope > 1.5)  || (dxy252 != null && dxy252 > 75);
  const yieldsFalling = tnx50Change != null && tnx50Change < -0.3;
  const yieldsRising  = tnx50Change != null && tnx50Change > 0.3;

  let regime, regimeLabel, regimeBlurb, favors, against;

  if (dxyFalling && yieldsFalling) {
    regime = "risk_on_metals";
    regimeLabel = "Weak Dollar + Falling Yields";
    regimeBlurb = "Strongest tailwind for long-duration risk: metals, growth tech, EM, crypto. Defensive value lags.";
    favors = ["Gold/Silver (ISLN, IGLN, PPLT, GLD, SLV)", "Long-duration tech (QQQ, MSFT, NVDA)", "EM equities (EIMI, VWO, INDA)", "Crypto (BTC, ETH, MSTR)"];
    against = ["Financials (XLF, JPM)", "Dollar-strong defensive (utilities)"];
  } else if (dxyFalling && yieldsRising) {
    regime = "reflation";
    regimeLabel = "Weak Dollar + Rising Yields";
    regimeBlurb = "Reflation trade — commodities and value cyclicals tend to win, long-duration growth and gold get mixed signals.";
    favors = ["Energy (XLE, XOM, CVX)", "Industrials (XLI, CAT, DE)", "EM equities", "Materials"];
    against = ["Long-duration growth", "Utilities", "Gold gets mixed signals — watch DXY break"];
  } else if (dxyRising && yieldsFalling) {
    regime = "deflation_scare";
    regimeLabel = "Strong Dollar + Falling Yields";
    regimeBlurb = "Defensive/flight-to-quality regime — typically a slowdown signal. Treasuries and quality outperform; risk assets struggle.";
    favors = ["Long Treasuries (TLT, IEF)", "Quality defensive (utilities, healthcare)", "Cash"];
    against = ["EM (EIMI, VWO)", "Metals (mixed — gold may benefit from real-yield drop)", "Commodities", "Crypto"];
  } else if (dxyRising && yieldsRising) {
    regime = "risk_off";
    regimeLabel = "Strong Dollar + Rising Yields";
    regimeBlurb = "Risk-off regime — both real rates and dollar headwinds against most asset classes. Cash and short-duration win.";
    favors = ["Cash / short-duration bonds", "Financials (rising yields help margins)", "Dollar-positive defensive"];
    against = ["Metals (ISLN, IGLN, PPLT)", "Long-duration growth (QQQ, tech)", "EM", "Crypto", "MSTR"];
  } else if (dxyFalling) {
    // Dollar clearly falling, yields ambiguous — risk-on bias for metals + crypto
    regime = "weak_dollar_only";
    regimeLabel = "Weak Dollar · Yields Range-Bound";
    regimeBlurb = "Dollar weakness alone is a tailwind for metals and dollar-denominated risk. Yield direction unclear — long-duration growth gets a partial pass.";
    favors = ["Metals (ISLN, IGLN, PPLT)", "EM equities (EIMI, INDA)", "Crypto (BTC, ETH, MSTR)"];
    against = ["Dollar-positive defensive"];
  } else if (dxyRising) {
    regime = "strong_dollar_only";
    regimeLabel = "Strong Dollar · Yields Range-Bound";

// Map each macro regime to which of the user's holdings get a "favored" tag.
// Lightweight — just sector-class heuristics, not a full mapping.
function userHoldingsMacroVerdict(classified) {
  if (!classified) return { favored: [], headwind: [] };
  const favored = [], headwind = [];
  for (const h of state.holdings) {
    if (h.asset_class === "cash") continue;
    const v = symbolMacroVerdict(h.symbol, h.asset_class, classified.regime);
    if (v === "favored") favored.push(h.symbol);
    else if (v === "headwind") headwind.push(h.symbol);
  }
  // Watchlist too
  for (const w of state.watchlist) {
    const v = symbolMacroVerdict(w.symbol, w.asset_class, classified.regime);
    if (v === "favored" && !favored.includes(w.symbol)) favored.push(w.symbol);
    else if (v === "headwind" && !headwind.includes(w.symbol)) headwind.push(w.symbol);
  }
  return { favored, headwind };
}

function symbolMacroVerdict(symbol, assetClass, regime) {
  // Defensive: this is heuristic — we use asset_class buckets + a few known tickers.
  const metalSyms = new Set(["GLD","SLV","ISLN","IGLN","PPLT","PSLV","SIVR","GDX","GDXJ"]);
  const cryptoProxies = new Set(["BTC","ETH","MSTR","COIN","MARA","RIOT"]);
  const longDurationTech = new Set(["QQQ","MSFT","AAPL","NVDA","GOOGL","AMZN","META","TSLA","ADBE","CRM","NFLX","ORCL","AVGO","AMD"]);
  const emEquity = new Set(["EIMI","VWO","INDA","MCHI","EWJ"]);
  const longTreasuries = new Set(["TLT","IEF","ZROZ","EDV"]);
  const financials = new Set(["JPM","BAC","GS","MS","C","XLF","WFC","SCHW"]);
  const energy = new Set(["XOM","CVX","COP","SLB","EOG","OXY","XLE"]);
  const cyclicals = new Set(["CAT","DE","GE","BA","XLI","XLB"]);

  const isMetal = assetClass === "metal" || metalSyms.has(symbol);
  const isCrypto = assetClass === "crypto" || cryptoProxies.has(symbol);
  const isLDT = longDurationTech.has(symbol);
  const isEM = emEquity.has(symbol);
  const isLT = longTreasuries.has(symbol);
  const isFin = financials.has(symbol);
  const isEnergy = energy.has(symbol);
  const isCyc = cyclicals.has(symbol);

  switch (regime) {
    case "risk_on_metals":
      if (isMetal || isCrypto || isLDT || isEM) return "favored";
      if (isFin) return "headwind";
      return null;
    case "reflation":
      if (isEnergy || isCyc || isEM) return "favored";
      if (isLT || isMetal) return "headwind";
      return null;
    case "deflation_scare":
      if (isLT) return "favored";
      if (isCrypto || isEM || isCyc || isEnergy) return "headwind";
      if (isMetal) return null; // mixed for metals
      return null;
    case "risk_off":
      if (isFin) return "favored";
      if (isMetal || isCrypto || isLDT || isEM) return "headwind";
      return null;
    case "weak_dollar_only":
      if (isMetal || isCrypto || isEM) return "favored";
      return null;
    case "strong_dollar_only":
      if (isMetal || isCrypto || isEM) return "headwind";
      if (isFin) return "favored";
      return null;
    case "duration_rally":
      if (isLDT || isLT || isMetal) return "favored";
      if (isFin) return "headwind";
      return null;
    case "duration_pain":
      if (isFin || isEnergy) return "favored";
      if (isLDT || isLT || isMetal) return "headwind";
      return null;
    case "neutral":
    default:
      return null;
  }
}

// ============================================================================
// IV RANK ENGINE (Feature #9)
// Fetches ATM straddle IV vs 252d HV distribution from worker /iv-rank endpoint.
// Cached 4h client-side (worker also caches 4h server-side).
//
// Used in two ways:
//   1. As a chip on each verdict card ("IV 82 · expensive options")
//   2. As an input to the trade plan — high IV means consider selling premium
//      instead of buying stock outright, OR wait for IV to fall after earnings.
//
// Null result (crypto, illiquid, international) → no chip, no plan effect.
// ============================================================================
// Cache key version bump history:
//   v1 → v2 (May 2026): worker v1.7 added `source` field for IV/HV distinction.
//   Old v1 cache lacks this field. Any cached entry without `source` is treated
//   as invalid and the whole cache is discarded so we re-fetch from the new worker.
//
// IMPORTANT: constants are inlined inside the functions below, NOT declared at
// module scope. Reason: state initialization (line ~3160) calls loadIvRankCache().
// If these were top-level `const`s declared here (after state init), accessing
// them from inside the function during state init would hit the temporal dead
// zone and crash boot. Inlining inside the function makes them evaluated at
// call time, not module-load time, which is what we need.

function loadIvRankCache() {
  const CACHE_KEY = "ivRank_v2";
  const LEGACY_KEYS = ["ivRank_v1"];
  const TTL_HOURS = 4;

  // Clean up legacy keys so stale data doesn't sit in localStorage forever.
  // Runs once per page load; localStorage.removeItem on a missing key is a no-op.
  for (const k of LEGACY_KEYS) {
    try { localStorage.removeItem(k); } catch (e) {}
  }
  try {
    const raw = localStorage.getItem(CACHE_KEY);
    if (!raw) return null;
    const c = JSON.parse(raw);
    if (!c.fetchedAt) return null;
    const ageH = (Date.now() - new Date(c.fetchedAt).getTime()) / 3600000;
    if (ageH > TTL_HOURS) return null;
    if (!c.results || typeof c.results !== "object") return null;
    // Shape validation: every non-null entry must have a `source` field.
    // If any entry fails this, the cache is from an old worker version and
    // we discard the whole thing so we re-fetch fresh shapes.
    for (const sym of Object.keys(c.results)) {
      const entry = c.results[sym];
      if (entry === null) continue; // null is fine — symbol legitimately has no data
      if (!entry.source || (entry.source !== "iv" && entry.source !== "hv")) {
        // Old-shape cache detected → invalidate everything
        try { localStorage.removeItem(CACHE_KEY); } catch (e) {}
        return null;
      }
    }
    return c.results;
  } catch (e) { return null; }
}
function saveIvRankCache(results) {
  const CACHE_KEY = "ivRank_v2";
  try {
    localStorage.setItem(CACHE_KEY, JSON.stringify({
      results, fetchedAt: new Date().toISOString(),
    }));
  } catch (e) {}
}
