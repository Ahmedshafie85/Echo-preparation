.modal-head h3 { font-family: var(--display); font-size: 22px; font-weight: 500; letter-spacing: -0.01em; }
.modal-handle { width: 36px; height: 4px; background: var(--rule); border-radius: 2px; margin: 0 auto 18px; }

.field { margin-bottom: 14px; }
.field label {
  display: block; font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--ink-muted); font-weight: 500; margin-bottom: 6px;
}
.field input, .field select, .field textarea {
  width: 100%; padding: 12px 14px;
  border: 1px solid var(--rule);
  background: var(--bg); color: var(--ink);
  font-family: var(--mono); font-size: 15px;
  border-radius: var(--radius-sm);
  -webkit-appearance: none; appearance: none;
}
.field input:focus, .field select:focus, .field textarea:focus { outline: none; border-color: var(--ink); }
.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.field-hint { font-size: 11px; color: var(--ink-muted); margin-top: 4px; letter-spacing: 0.02em; line-height: 1.4; }

.search-results {
  position: absolute; left: 0; right: 0; top: 100%;
  background: var(--bg-card);
  border: 1px solid var(--rule); border-radius: var(--radius-sm);
  margin-top: 4px; max-height: 240px; overflow-y: auto;
  box-shadow: var(--shadow-deep); z-index: 5;
}
.search-result { padding: 10px 14px; border-bottom: 1px solid var(--rule-soft); cursor: pointer; transition: background .12s; }
.search-result:last-child { border: none; }
.search-result:hover { background: var(--bg-elev); }
.search-result .sym { font-family: var(--mono); font-weight: 600; font-size: 13px; }
.search-result .nm { font-size: 11.5px; color: var(--ink-muted); margin-top: 2px; }
.search-result .ex { font-family: var(--mono); font-size: 10px; color: var(--ink-muted); float: right; }

.empty-state { text-align: center; padding: 60px 30px; color: var(--ink-muted); }
.empty-state .display { font-size: 22px; font-weight: 500; color: var(--ink-soft); margin-bottom: 8px; display: block; }
.empty-state p { font-size: 13px; margin-bottom: 22px; }

.settings-group {
  margin: 0 20px 24px;
  border: 1px solid var(--rule); border-radius: var(--radius);
  background: var(--bg-card); overflow: hidden;
}
.setting-row { display: flex; justify-content: space-between; align-items: center; padding: 14px 18px; border-bottom: 1px solid var(--rule-soft); }
.setting-row:last-child { border-bottom: none; }
.setting-row .lbl { font-size: 14px; }
.setting-row .sub { font-size: 11px; color: var(--ink-muted); margin-top: 2px; }

.howto-card { background: var(--bg-card); }
.howto-toggle {
  width: 100%; display: flex; justify-content: space-between; align-items: center;
  padding: 15px 18px; background: none; border: none; cursor: pointer;
  font-family: var(--sans); font-size: 14px; color: var(--ink); text-align: left;
}
.howto-chevron { color: var(--ink-muted); font-size: 13px; }
.howto-body { padding: 4px 18px 18px; border-top: 1px solid var(--rule-soft); }
.howto-step {
  display: flex; gap: 12px; align-items: flex-start; padding: 9px 0;
  font-family: var(--sans); font-size: 13px; line-height: 1.5; color: var(--ink-soft);
}
.howto-step b { color: var(--ink); }
.howto-num {
  flex: 0 0 22px; width: 22px; height: 22px; border-radius: 50%;
  background: var(--bg-elev); color: var(--ink-muted);
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700; margin-top: 1px;
}
.howto-note {
  margin-top: 12px; padding: 12px 14px; border-radius: 8px;
  background: var(--bg-elev); font-family: var(--sans); font-size: 12.5px;
  line-height: 1.55; color: var(--ink-soft);
}
.howto-note b { color: var(--ink); }

.toggle {
  position: relative; width: 44px; height: 26px;
  background: var(--rule); border-radius: 13px;
  cursor: pointer; transition: background .2s; flex-shrink: 0;
}
.toggle::after {
  content: ""; position: absolute; top: 3px; left: 3px;
  width: 20px; height: 20px; background: var(--bg-card);
  border-radius: 50%; transition: transform .2s; box-shadow: var(--shadow);
}
.toggle.on { background: var(--ink); }
.toggle.on::after { transform: translateX(18px); }

.journal-entry { padding: 14px 20px; border-bottom: 1px solid var(--rule-soft); }
.journal-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; }
.journal-symbol { font-family: var(--display); font-size: 16px; font-weight: 600; }
.journal-action {
  font-family: var(--mono); font-size: 10.5px; letter-spacing: 0.1em; text-transform: uppercase;
  padding: 2px 7px; border-radius: 3px; margin-left: 8px;
}
.journal-action.buy  { background: rgba(74,122,74,0.12); color: var(--green); }
.journal-action.sell { background: rgba(161,61,45,0.12); color: var(--red); }
.journal-meta { font-family: var(--mono); font-size: 11px; color: var(--ink-muted); letter-spacing: 0.02em; }
.journal-reason { font-size: 13px; margin-top: 8px; color: var(--ink-soft); line-height: 1.45; }
.journal-snapshot {
  font-family: var(--mono); font-size: 10.5px; color: var(--ink-muted);
  margin-top: 6px; padding: 6px 8px; background: var(--bg-elev);
  border-radius: 4px; letter-spacing: 0.02em;
}
.journal-del {
  background: transparent; border: 1px solid var(--rule); border-radius: 4px;
  width: 26px; height: 26px;
  display: flex; align-items: center; justify-content: center;
  color: var(--ink-muted); cursor: pointer;
  transition: all .12s;
  padding: 0;
}
.journal-del:hover { color: var(--red); border-color: var(--red); }
.journal-del:active { transform: scale(0.92); }

/* ===== RAW SIGNALS SECTION (collapsible — old cards demoted under Verdict) ===== */
.raw-signals-section {
  margin: 16px 20px 0;
}
.raw-signals-toggle {
  width: 100%;
  display: flex; align-items: center; gap: 10px;
  padding: 12px 16px;
  background: var(--bg-elev);
  border: 1px dashed var(--rule);
  border-radius: var(--radius);
  cursor: pointer;
  text-align: left;
  transition: background .15s;
}
.raw-signals-toggle:hover { background: var(--bg-card); }
.rst-arrow {
  font-family: var(--mono); font-size: 10px;
  color: var(--ink-muted); flex-shrink: 0;
}
.rst-label {
  font-family: var(--display); font-size: 13px; font-weight: 500;
  color: var(--ink);
}
.rst-sub {
  font-family: var(--mono); font-size: 10.5px;
  color: var(--ink-muted);
  margin-left: auto;
  text-align: right;
  letter-spacing: 0.02em;
}
@media (max-width: 600px) {
  .rst-sub { display: none; }
}
.raw-signals-section .scan-card,
.raw-signals-section .opp-card,
.raw-signals-section .ai-card,
.raw-signals-section .presurge-card {
  margin-left: 0;
  margin-right: 0;
  margin-top: 12px;
}

/* ===== TODAY'S VERDICT CARD ===== */
.verdict-card {
  margin: 12px 20px 0;
  background: var(--bg-card);
  border: 1px solid var(--rule);
  border-radius: var(--radius);
  overflow: hidden;
  position: relative;
}
.verdict-card::before {
  content: ""; position: absolute; left: 0; top: 0; bottom: 0;
  width: 3px; background: var(--ink);
}
/* ===== PORTFOLIO RISK CARD ===== */
.risk-card {
  margin: 12px 20px 0;
  background: var(--bg-card);
  border: 1px solid var(--rule);
  border-radius: var(--radius);
  overflow: hidden;
  position: relative;
}
.risk-card::before {
  content: ""; position: absolute; left: 0; top: 0; bottom: 0;
  width: 3px; background: var(--gold);
}
.risk-head { padding: 14px 18px 8px; }
.risk-head h3 {
  font-family: var(--display); font-size: 16px; font-weight: 500;
  letter-spacing: -0.005em; margin-bottom: 2px;
}
.risk-sub {
  font-family: var(--mono); font-size: 10.5px;
  color: var(--ink-muted); letter-spacing: 0.04em;
}
.risk-list { display: flex; flex-direction: column; border-top: 1px solid var(--rule-soft); }
.risk-row { padding: 12px 18px; border-bottom: 1px solid var(--rule-soft); }
.risk-row:last-child { border-bottom: none; }
.risk-row-warn { background: rgba(161,61,45,0.05); }
.risk-row-head { display: flex; align-items: baseline; gap: 8px; margin-bottom: 5px; }
.risk-tag {
  font-family: var(--mono); font-size: 9.5px; font-weight: 600;
  letter-spacing: 0.06em; text-transform: uppercase;
  padding: 2px 7px; border-radius: 4px;
}
.risk-tag.warn  { background: var(--red);   color: var(--bg); }
.risk-tag.over  { background: var(--gold);  color: var(--bg); }
.risk-tag.under { background: var(--bg-elev); color: var(--ink-soft); border: 1px solid var(--rule); }
.risk-row-pct {
  font-family: var(--mono); font-size: 10.5px; color: var(--ink-muted);
  letter-spacing: 0.03em;
}
.risk-row-text { font-size: 12.5px; color: var(--ink-soft); line-height: 1.45; }
.risk-row-text b { color: var(--ink); font-weight: 600; }
.risk-footer {
  padding: 9px 18px; font-family: var(--mono); font-size: 10px;
  color: var(--ink-muted); border-top: 1px solid var(--rule-soft);
  background: var(--bg-elev); letter-spacing: 0.02em;
}
.verdict-head {
  display: flex; justify-content: space-between; align-items: start;
  gap: 12px; padding: 14px 18px 8px;
}
.verdict-head h3 {
  font-family: var(--display); font-size: 16px; font-weight: 500;
  letter-spacing: -0.005em; margin-bottom: 2px;
}
.verdict-sub {
  font-family: var(--mono); font-size: 10.5px;
  color: var(--ink-muted); letter-spacing: 0.04em;
}
.verdict-list {
  display: flex; flex-direction: column;
  border-top: 1px solid var(--rule-soft);
}
.verdict-item {
  padding: 12px 18px;
  border-bottom: 1px solid var(--rule-soft);
  cursor: pointer;
  transition: background .12s;
}
.verdict-item:last-child { border-bottom: none; }
.verdict-item:hover { background: var(--bg-elev); }
.verdict-item.add::before    { /* uses ::before only on card */ }
.verdict-item-head {
  display: flex; justify-content: space-between; align-items: center;
  gap: 10px; margin-bottom: 8px;
}
.vih-left { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; min-width: 0; }
.vih-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.verdict-action-badge {
  font-family: var(--mono); font-size: 10px; font-weight: 700;
  padding: 4px 8px; border-radius: 4px;
  letter-spacing: 0.08em;
}
.verdict-action-badge.add   { background: var(--green); color: var(--bg); }
.verdict-action-badge.trim  { background: var(--gold); color: var(--bg); }
.verdict-action-badge.exit  { background: var(--red); color: var(--bg); }
.verdict-action-badge.prime { background: var(--bg-elev); color: var(--gold); border: 1px solid var(--gold); }
.verdict-action-badge.hold  { background: var(--bg-elev); color: var(--ink-muted); border: 1px solid var(--rule); }
.verdict-sym {
  font-family: var(--display); font-size: 15px; font-weight: 600;
}
.verdict-dollars {
  font-family: var(--mono); font-size: 12px;
  color: var(--ink-soft);
}
.verdict-net {
  font-family: var(--mono); font-size: 11px;
  color: var(--ink-muted);
}
.verdict-del {
  background: transparent; border: none;
  color: var(--ink-muted); cursor: pointer;
  width: 26px; height: 26px; border-radius: 50%;
  font-size: 18px; line-height: 1;
  display: flex; align-items: center; justify-content: center;
  padding: 0;
}
.verdict-del:hover, .verdict-del:active {
  background: rgba(161,61,45,0.12); color: var(--red);
}
.verdict-votes {
  display: flex; flex-wrap: wrap; gap: 4px;
}
.vote-chip {
  font-family: var(--mono); font-size: 10.5px;
  padding: 3px 7px; border-radius: 3px;
  letter-spacing: 0.02em;
}
.vote-chip.buy  { background: rgba(74,122,74,0.12);  color: var(--green); border: 1px solid rgba(74,122,74,0.3); }
.vote-chip.sell { background: rgba(161,61,45,0.12);  color: var(--red);   border: 1px solid rgba(161,61,45,0.3); }
.vote-chip.tilt { background: var(--bg-elev);         color: var(--ink-soft); border: 1px solid var(--rule-soft); }
.vote-chip.tilt.pos { background: rgba(74,122,74,0.06); color: var(--green); border: 1px solid rgba(74,122,74,0.2); opacity: 0.85; }
.vote-chip.tilt.neg { background: rgba(161,61,45,0.06); color: var(--red);   border: 1px solid rgba(161,61,45,0.2); opacity: 0.85; }

/* ===== AI ANALYZE STALENESS PROMPT (#6) ===== */
.ai-prompt {
  display: flex; align-items: center; justify-content: space-between; gap: 10px;
  margin-top: 8px; padding: 7px 10px;
  border-radius: 4px;
  font-family: var(--mono); font-size: 11px;
  border: 1px dashed var(--rule);
}
.ai-prompt.missing { background: rgba(176,141,60,0.06); border-color: rgba(176,141,60,0.3); color: var(--ink-soft); }
.ai-prompt.stale   { background: var(--bg-elev); border-color: var(--rule-soft); color: var(--ink-muted); }
.ai-prompt.running { background: rgba(74,122,122,0.06); border-color: rgba(74,122,122,0.3); color: var(--ink-soft); font-style: italic; }
.ai-prompt-text { flex: 1; min-width: 0; }
.ai-prompt-btn { flex-shrink: 0; }
.ai-prompt-spinner { display: inline-block; animation: spin 1.2s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ===== INVERSION CHECK (#12) ===== */
.verdict-inversion-row {
  display: flex; justify-content: flex-end;
  margin-top: 8px; padding: 0 2px;
}
.verdict-inversion-btn {
  font-family: var(--mono); font-size: 10.5px; letter-spacing: 0.04em;
  opacity: 0.85;
}
.verdict-inversion-btn:hover { opacity: 1; }
.inversion-card {
  margin-top: 10px; padding: 12px 14px;
  background: rgba(176,141,60,0.05);
  border: 1px solid rgba(176,141,60,0.25);
  border-left: 3px solid var(--gold);
  border-radius: 4px;
}
.inversion-card.loading,
.inversion-card.error {
  font-family: var(--mono); font-size: 11px;
  color: var(--ink-muted); font-style: italic;
  display: flex; align-items: center; gap: 8px;
}
.inversion-head {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 8px;
}
.inversion-label {
  font-family: var(--mono); font-size: 10.5px; letter-spacing: 0.06em;
  color: var(--gold); text-transform: uppercase;
}
.inversion-dismiss {
  background: transparent; border: none; color: var(--ink-muted);
  font-size: 16px; cursor: pointer; padding: 0 4px;
}
.inversion-headline {
  font-family: var(--display); font-size: 14px; font-weight: 500;
  color: var(--ink); margin-bottom: 6px;
}
.inversion-body {
  font-size: 12.5px; color: var(--ink-soft); line-height: 1.5;
  margin-bottom: 8px;
}
.inversion-risks {
  list-style: none; padding: 0; margin: 0;
}
.inversion-risks li {
  font-family: var(--mono); font-size: 10.5px; color: var(--ink-muted);
  padding: 2px 0 2px 12px; position: relative;
  line-height: 1.5;
}
.inversion-risks li::before {
  content: "·"; position: absolute; left: 4px; color: var(--gold);
}

/* ===== IV RANK CHIP (#9) ===== */
.iv-chip {
  font-family: var(--mono); font-size: 10.5px;
  padding: 3px 7px; border-radius: 3px;
  letter-spacing: 0.02em;
  display: inline-flex; align-items: center; gap: 4px;
}
.iv-chip.low    { background: rgba(74,122,74,0.10);  color: var(--green);    border: 1px solid rgba(74,122,74,0.25); }
.iv-chip.medium { background: var(--bg-elev);        color: var(--ink-soft); border: 1px solid var(--rule); }
.iv-chip.high   { background: rgba(176,141,60,0.10); color: var(--gold);     border: 1px solid rgba(176,141,60,0.3); }
.iv-chip.extreme{ background: rgba(161,61,45,0.12);  color: var(--red);      border: 1px solid rgba(161,61,45,0.3); }
.iv-chip.hv-fallback {
  /* Subtly dim the HV-fallback variant so it's visually clear this is realized vol,
     not the better forward-looking IV. Still readable, still color-banded. */
  opacity: 0.75;
  border-style: dashed;
}
.tp-row.tp-iv-advisory .tp-text {
  color: var(--gold);
  font-size: 11.5px;
  font-style: italic;
}
.vote-chip.decayed {
  background: transparent;
  color: var(--ink-muted);
  border: 1px dashed var(--rule-soft);
  font-style: italic;
}
.verdict-blocker {
  margin-top: 8px; padding: 6px 10px;
  background: rgba(176,141,60,0.08);
  border-left: 2px solid var(--gold);
  border-radius: 4px;
  font-family: var(--mono); font-size: 11px;
  color: var(--ink-soft);
  line-height: 1.4;
}
.verdict-conflict-badge {
  display: inline-block;
  margin-left: 6px;
  padding: 2px 6px;
  background: rgba(176,141,60,0.15);
  color: var(--gold);
  border: 1px solid rgba(176,141,60,0.4);
  border-radius: 3px;
  font-family: var(--mono); font-size: 10px;
  letter-spacing: 0.05em;
  text-transform: uppercase;
}
.verdict-conflict-note {
  margin-top: 8px; padding: 6px 10px;
  background: rgba(176,141,60,0.05);
  border-left: 2px dashed var(--gold);
  border-radius: 4px;
  font-family: var(--mono); font-size: 11px;
  color: var(--ink-soft);
  line-height: 1.4;
  font-style: italic;
}
.verdict-item.conflicted {
  border-left-width: 3px;
  border-left-color: var(--gold);
}
.trade-plan {
  margin-top: 10px;
  padding: 10px 12px;
  background: var(--bg-elev);
  border-radius: 4px;
  border-left: 2px solid var(--rule-soft);
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.trade-plan-wrap {
  margin-top: 8px;
}
.trade-plan-wrap.expanded .trade-plan {
  margin-top: 4px;
}
.tp-toggle {
  background: transparent;
  border: none;
  cursor: pointer;
  width: 100%;
  text-align: left;
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 8px;
  border-radius: 3px;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--ink-soft);
  letter-spacing: 0.04em;
  transition: background 120ms;
}
.tp-toggle:hover {
  background: var(--bg-elev);
}
.tp-toggle-chevron {
  color: var(--ink-muted);
  font-size: 9px;
  width: 10px;
  display: inline-block;
}
.tp-summary {
  color: var(--ink-muted);
  font-style: italic;
  margin-left: 4px;
}
.tp-empty {
  margin-top: 8px;
  padding: 6px 10px;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--ink-muted);
  font-style: italic;
  border-left: 2px dashed var(--rule-soft);
}
.tp-row {
  display: flex;
  gap: 10px;
  font-family: var(--mono);
  font-size: 11px;
  line-height: 1.5;
  align-items: flex-start;
}
.tp-label {
  flex-shrink: 0;
  width: 75px;
  color: var(--ink-muted);
  letter-spacing: 0.05em;
  text-transform: uppercase;
  font-size: 10px;
  padding-top: 1px;
}
.tp-text {
  flex: 1;
  color: var(--ink-soft);
}
.tp-row-warn .tp-text { color: var(--red); }
.tp-row-warn .tp-label { color: var(--red-soft); }
.verdict-holds {
  padding: 10px 18px;
  border-top: 1px solid var(--rule-soft);
  background: var(--bg-elev);
  font-family: var(--mono); font-size: 11px;
  color: var(--ink-muted);
  line-height: 1.4;
}
.verdict-empty {
  padding: 14px 18px;
  border-top: 1px solid var(--rule-soft);
}
.verdict-empty-headline {
  font-family: var(--display); font-size: 14px;
  margin-bottom: 6px;
  color: var(--ink);
}
.verdict-empty-closest {
  font-family: var(--mono); font-size: 12px;
  color: var(--ink-soft);
  margin-bottom: 4px;
}
.verdict-empty-hint {
  font-size: 12px; color: var(--ink-muted);
  font-style: italic;
}
.verdict-footer {
  padding: 8px 18px;
  border-top: 1px solid var(--rule-soft);
  font-family: var(--mono); font-size: 9.5px;
  color: var(--ink-muted); text-align: center;
  letter-spacing: 0.04em;
}

/* ===== TODAY'S OPPORTUNITIES CARD ===== */
.opps-card {
  margin: 12px 20px 0;
  background: var(--bg-card);
  border: 1px solid var(--rule);
  border-radius: var(--radius);
  overflow: hidden;
  position: relative;
}
.opps-card::before {
  content: ""; position: absolute; left: 0; top: 0; bottom: 0;
  width: 3px; background: var(--green);
}
.opps-card.empty::before { background: var(--ink-muted); }
.opps-head {
  display: flex; justify-content: space-between; align-items: start;
  gap: 12px; padding: 14px 18px 8px;
}
.opps-head h3 {
  font-family: var(--display); font-size: 16px; font-weight: 500;
  letter-spacing: -0.005em; margin-bottom: 2px;
}
.opps-sub {
  font-family: var(--mono); font-size: 10.5px;
  color: var(--ink-muted); letter-spacing: 0.04em;
}
.opps-empty-body {
  padding: 8px 20px 14px;
  font-size: 12.5px; color: var(--ink-soft);
  line-height: 1.55;
}
.opps-list {
  display: flex; flex-direction: column;
  border-top: 1px solid var(--rule-soft);
}
.opp-item {
  padding: 12px 18px;
  border-bottom: 1px solid var(--rule-soft);
  cursor: pointer;
  transition: background .12s;
}
.opp-item:last-child { border-bottom: none; }
.opp-item:hover { background: var(--bg-elev); }
.opp-item-head {
  display: flex; justify-content: space-between; align-items: center;
  gap: 10px; margin-bottom: 6px;
}
.oih-left { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; min-width: 0; }
.oih-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.opp-action-badge {
  font-family: var(--mono); font-size: 10px; font-weight: 700;
  padding: 4px 8px; border-radius: 4px;
  letter-spacing: 0.08em;
}
.opp-action-badge.starter   { background: var(--green); color: var(--bg); }
.opp-action-badge.consider  { background: var(--gold); color: var(--bg); }
.opp-action-badge.watch     { background: var(--bg-elev); color: var(--ink-soft); border: 1px solid var(--rule); }
.opp-sym {
  font-family: var(--display); font-size: 15px; font-weight: 600;
}
.opp-price {
  font-family: var(--mono); font-size: 11.5px;
  color: var(--ink-soft);
}
.opp-tag.onlist {
  font-family: var(--mono); font-size: 9.5px;
  padding: 2px 6px; border-radius: 3px;
  background: rgba(74,122,74,0.12); color: var(--green);
  border: 1px solid var(--green);
  letter-spacing: 0.06em; text-transform: uppercase;
}
.opp-net {
  font-family: var(--mono); font-size: 11px;
  color: var(--ink-muted);
}
.opp-del {
  background: transparent; border: none;
  color: var(--ink-muted); cursor: pointer;
  width: 26px; height: 26px; border-radius: 50%;
  font-size: 18px; line-height: 1;
  display: flex; align-items: center; justify-content: center;
  padding: 0;
}
.opp-del:hover, .opp-del:active {
  background: rgba(161,61,45,0.12); color: var(--red);
}
.opp-action-line {
  font-family: var(--mono); font-size: 12px;
  color: var(--ink-soft); margin-bottom: 6px;
}
.opp-votes {
  display: flex; flex-wrap: wrap; gap: 4px;
}
.opp-quick-actions {
  margin-top: 8px;
  display: flex; gap: 6px;
}
.opps-footer {
  padding: 8px 18px;
  border-top: 1px solid var(--rule-soft);
  font-family: var(--mono); font-size: 9.5px;
  color: var(--ink-muted); text-align: center;
  letter-spacing: 0.04em;
}

/* ===== MACRO REGIME CARD ===== */
.macro-card {
  margin: 12px 20px 0;
  background: var(--bg-card);
  border: 1px solid var(--rule);
  border-radius: var(--radius);
  overflow: hidden;
  position: relative;
}
.macro-card::before {
  content: ""; position: absolute; left: 0; top: 0; bottom: 0;
  width: 3px; background: var(--ink-muted);
}
.macro-card.tailwind::before { background: var(--green); }
.macro-card.headwind::before { background: var(--red); }
.macro-card.empty,
.macro-card.loading { padding-bottom: 12px; }
.macro-head {
  display: flex; justify-content: space-between; align-items: start;
  gap: 12px; padding: 14px 18px 6px;
}
.macro-head h3 {
  font-family: var(--display); font-size: 15px; font-weight: 500;
  letter-spacing: -0.005em; margin-bottom: 2px;
}
.macro-sub {
  font-family: var(--mono); font-size: 10.5px;
  color: var(--ink-muted); letter-spacing: 0.04em;
}
.macro-empty-body {
  padding: 8px 20px 4px;
  font-size: 12.5px; color: var(--ink-soft);
  line-height: 1.55;
}
.macro-regime-label {
  padding: 8px 18px 12px;
}
.mrl-cur {
  font-family: var(--display); font-size: 18px; font-weight: 600;
  letter-spacing: -0.01em; margin-bottom: 4px;
}
.macro-card.tailwind .mrl-cur { color: var(--green); }
.macro-card.headwind .mrl-cur { color: var(--red); }
.mrl-blurb {
  font-size: 12.5px; color: var(--ink-soft);
  line-height: 1.5;
}
.macro-stats {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 1px; background: var(--rule-soft);
  border-top: 1px solid var(--rule-soft);
  border-bottom: 1px solid var(--rule-soft);
}
.macro-stat {
  padding: 12px 18px;
  background: var(--bg-card);
}
.macro-stat-lbl {
  font-family: var(--mono); font-size: 10px;
  letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--ink-muted); margin-bottom: 4px;
}
.macro-stat-val {
  font-family: var(--mono); font-size: 18px; font-weight: 600;
  color: var(--ink);
}
.macro-stat-sub {
  font-family: var(--mono); font-size: 10.5px;
  color: var(--ink-soft); margin-top: 3px;
}
.macro-stat-sub .pos { color: var(--green); }
.macro-stat-sub .neg { color: var(--red); }
.macro-stat-sub .muted { color: var(--ink-muted); }
.macro-verdict {
  padding: 10px 18px;
  display: flex; flex-direction: column; gap: 10px;
  border-bottom: 1px solid var(--rule-soft);
}
.mv-block { display: flex; flex-direction: column; gap: 5px; }
.mv-lbl {
  font-family: var(--mono); font-size: 10px;
  letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--ink-muted);
}
.mv-block.favored .mv-lbl { color: var(--green); }
.mv-block.headwind .mv-lbl { color: var(--red); }
.mv-syms { display: flex; flex-wrap: wrap; gap: 4px; }
.mv-chip {
  font-family: var(--display); font-size: 11px; font-weight: 600;
  padding: 3px 8px; border-radius: 4px;
}
.mv-chip.favored { background: rgba(74,122,74,0.15); color: var(--green); border: 1px solid var(--green); }
.mv-chip.headwind { background: rgba(161,61,45,0.12); color: var(--red); border: 1px solid var(--red); }
.macro-favors-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 1px; background: var(--rule-soft);
}
@media (max-width: 480px) {
  .macro-favors-grid { grid-template-columns: 1fr; }
}
.macro-fg-col {
  padding: 10px 14px;
  background: var(--bg-card);
}
.mfg-lbl {
  font-family: var(--mono); font-size: 10px;
  letter-spacing: 0.08em; text-transform: uppercase;
  margin-bottom: 6px;
}
.macro-fg-col.favors .mfg-lbl { color: var(--green); }
.macro-fg-col.against .mfg-lbl { color: var(--red); }
.macro-fg-col ul { list-style: none; padding: 0; margin: 0; }
.macro-fg-col li {
  font-size: 12px; color: var(--ink-soft);
  padding: 2px 0; line-height: 1.35;
}
.macro-fg-col li::before { content: "·  "; color: var(--ink-muted); }
.macro-footer {
  padding: 8px 18px;
  border-top: 1px solid var(--rule-soft);
  font-family: var(--mono); font-size: 9.5px;
  color: var(--ink-muted); text-align: center;
  letter-spacing: 0.04em;
}

/* DTC / short-interest badges on Pre-Surge rows */
.presurge-tag.short-high-short {
  background: rgba(176,141,60,0.15);
  color: var(--gold);
  border: 1px solid var(--gold);
}
.presurge-tag.short-squeeze-prone {
  background: rgba(161,61,45,0.15);
  color: var(--red);
  border: 1px solid var(--red);
  animation: pulse-squeeze 2s ease-in-out infinite;
}
@keyframes pulse-squeeze {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.6; }
}

/* ===== PRE-SURGE SCANNER CARD ===== */
.presurge-card {
  margin: 12px 20px 0;
  background: var(--bg-card);
  border: 1px solid var(--rule);
  border-radius: var(--radius);
  overflow: hidden;
  position: relative;
}
.presurge-card.empty,
.presurge-card.loading { padding-bottom: 12px; }
.rotation-grid {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 1px; background: var(--rule-soft); padding: 1px;
}
.rot-cat { background: var(--bg-card); padding: 9px 10px; }
.rot-cat-head {
  font-family: var(--sans); font-size: 9.5px; font-weight: 700;
  letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink-muted);
  margin-bottom: 6px; display: flex; align-items: center; gap: 5px;
}
.rot-cat-dot { width: 7px; height: 7px; border-radius: 50%; flex: 0 0 auto; }
.rot-cat-dot.hot  { background: var(--green); }
.rot-cat-dot.warm { background: var(--gold); }
.rot-cat-dot.cold { background: var(--red); opacity: 0.6; }
.rot-row {
  display: flex; align-items: center; gap: 6px; padding: 4px 6px;
  cursor: pointer; border-radius: 5px; margin-bottom: 2px;
}
.rot-row:hover { outline: 1px solid var(--rule); }
.rot-sym { font-family: var(--mono); font-size: 12.5px; font-weight: 600; color: var(--ink); flex: 1; min-width: 0; display: flex; align-items: center; gap: 3px; }
.rot-star { color: var(--gold); font-size: 9px; }
.rot-rs { font-family: var(--mono); font-size: 12.5px; font-weight: 700; color: var(--ink); }
.rot-pct { font-size: 9px; opacity: 0.6; margin-left: 1px; }
.rot-trend { font-family: var(--mono); font-size: 11px; width: 10px; text-align: center; }
.rot-trend.up   { color: var(--green); }
.rot-trend.down { color: var(--red); }
.rot-watch {
  flex: 0 0 auto; width: 16px; height: 16px; padding: 0; border-radius: 4px;
  border: 1px solid var(--rule); background: var(--bg-card); color: var(--ink-soft);
  font-size: 12px; line-height: 1; cursor: pointer; display: flex;
  align-items: center; justify-content: center;
}
.rot-watch:hover { border-color: var(--green); color: var(--green); }
.rot-watch.on { border: none; background: none; color: var(--green); cursor: default; }
.rot-read {
  font-family: var(--sans); font-size: 12.5px; color: var(--ink-soft);
  padding: 10px 14px; line-height: 1.5; border-bottom: 1px solid var(--rule-soft);
}
.rot-read b { color: var(--ink); font-weight: 600; }
.presurge-card::before {
  content: ""; position: absolute; left: 0; top: 0; bottom: 0;
  width: 3px; background: linear-gradient(180deg, var(--gold), var(--green));
}
.presurge-head {
  display: flex; justify-content: space-between; align-items: start;
  gap: 12px; padding: 14px 18px 8px;
}
.presurge-head h3 {
  font-family: var(--display); font-size: 15px; font-weight: 500;
  letter-spacing: -0.005em; margin-bottom: 2px;
}
.presurge-sub {
  font-family: var(--mono); font-size: 10.5px;
  color: var(--ink-muted); letter-spacing: 0.04em;
}
.presurge-empty-body {
  padding: 12px 20px 4px;
  font-size: 12.5px; color: var(--ink-soft);
  line-height: 1.55;
}
.presurge-progress {
  height: 3px; background: var(--bg-elev);
  margin: 4px 18px 6px; border-radius: 2px; overflow: hidden;
}
.presurge-progress-bar {
  height: 100%; background: var(--gold);
  transition: width .25s ease-out;
}
.presurge-list {
  display: flex; flex-direction: column;
  border-top: 1px solid var(--rule-soft);
}
.presurge-row {
  display: grid; grid-template-columns: 44px 1fr auto;
  gap: 12px; align-items: start;
  padding: 12px 18px;
  border-bottom: 1px solid var(--rule-soft);
  cursor: pointer;
  transition: background .12s;
}
.presurge-row:hover { background: var(--bg-elev); }
.presurge-row.rec-done { opacity: 0.55; }
.presurge-row.rec-done .presurge-sym { text-decoration: line-through; }
.presurge-rank {
  font-family: var(--display); font-size: 22px; font-weight: 600;
  line-height: 1; padding-top: 4px;
  color: var(--ink);
  background: var(--bg-elev);
  border-radius: 6px;
  width: 44px; height: 44px;
  display: flex; align-items: center; justify-content: center;
  border: 1px solid var(--rule-soft);
}
.presurge-mid { min-width: 0; }
.presurge-sym-row {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 8px;
}
.presurge-sym {
  font-family: var(--display); font-size: 15px; font-weight: 600;
}
.presurge-tag {
  font-family: var(--mono); font-size: 9px;
  padding: 2px 5px; border-radius: 3px;
  letter-spacing: 0.06em; text-transform: uppercase;
}
.presurge-tag.held    { background: rgba(176,141,60,0.15); color: var(--gold); border: 1px solid var(--gold); }
.presurge-tag.watched { background: rgba(74,122,74,0.12); color: var(--green); border: 1px solid var(--green); }
.presurge-price {
  font-family: var(--mono); font-size: 11.5px;
  color: var(--ink-soft); margin-left: auto;
}
.presurge-bars {
  display: flex; flex-direction: column; gap: 4px;
  margin-bottom: 8px;
}
.presurge-bar-row {
  display: grid; grid-template-columns: 56px 1fr 42px;
  gap: 8px; align-items: center;
}
.presurge-bar-lbl {
  font-family: var(--mono); font-size: 10px;
  color: var(--ink-muted); letter-spacing: 0.04em;
  text-transform: uppercase;
}
.presurge-bar-track {
  height: 6px; background: var(--bg-elev);
  border-radius: 3px; overflow: hidden;
}
.presurge-bar-fill {
  height: 100%; border-radius: 3px;
  transition: width .25s;
}
.presurge-bar-val {
  font-family: var(--mono); font-size: 10.5px;
  color: var(--ink-soft); text-align: right;
}
.presurge-details {
  display: flex; flex-wrap: wrap; gap: 4px;
}
.presurge-detail-chip {
  font-family: var(--mono); font-size: 10px;
  color: var(--ink-muted);
  padding: 2px 6px;
  background: var(--bg-elev);
  border-radius: 3px;
  border: 1px solid var(--rule-soft);
}
.presurge-actions {
  display: flex; flex-direction: column; gap: 6px;
  align-items: center; justify-content: center;
}
.presurge-del {
  background: transparent; border: none;
  color: var(--ink-muted); cursor: pointer;
  width: 26px; height: 26px; border-radius: 50%;
  font-size: 18px; line-height: 1;
  display: flex; align-items: center; justify-content: center;
  padding: 0;
}
.presurge-del:hover, .presurge-del:active {
  background: rgba(161,61,45,0.12); color: var(--red);
}
.presurge-track {
  border-top: 1px solid var(--rule-soft);
  padding: 12px 18px;
  background: var(--bg-elev);
}
.presurge-track-head {
  display: flex; justify-content: space-between; align-items: baseline;
  margin-bottom: 8px;
}
.presurge-track-head > span:first-child {
  font-family: var(--display); font-size: 12px; font-weight: 500;
  letter-spacing: 0.02em;
}
.presurge-track-stats {
  font-family: var(--mono); font-size: 10.5px;
  color: var(--ink-muted);
}
.presurge-track-stats .pos { color: var(--green); }
.presurge-track-stats .neg { color: var(--red); }
.presurge-track-list {
  display: flex; flex-direction: column; gap: 4px;
}
.presurge-track-row {
  display: grid; grid-template-columns: 52px 1fr auto auto;
  gap: 8px; align-items: center;
  font-family: var(--mono); font-size: 11px;
  padding: 6px 8px;
  background: var(--bg);
  border-radius: 4px;
  cursor: pointer;
}
.presurge-track-row:hover { background: var(--bg-card); }
.ptr-sym { font-family: var(--display); font-weight: 600; font-size: 12px; }
.ptr-age { color: var(--ink-muted); font-size: 10.5px; }
.ptr-score { color: var(--ink-soft); font-size: 10.5px; }
.ptr-pnl { font-weight: 600; text-align: right; }
.ptr-pnl.pos { color: var(--green); }
.ptr-pnl.neg { color: var(--red); }
.presurge-watching {
  border-top: 1px solid var(--rule-soft);
  background: color-mix(in srgb, var(--bg-elev) 40%, transparent);
}
.presurge-watching-head {
  padding: 9px 18px 4px;
  font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--ink-muted); font-weight: 500;
}
.presurge-row-watching { opacity: 0.82; }
.presurge-rank-watching { color: var(--ink-muted); font-weight: 500; }
.presurge-tag-need {
  background: transparent; color: var(--ink-muted);
  border: 1px dashed var(--rule); font-style: italic;
}
.screener-list { display: flex; flex-direction: column; }
.screener-row {
  display: flex; align-items: center; gap: 12px;
  padding: 11px 18px; border-bottom: 1px solid var(--rule-soft);
  cursor: pointer;
}
.screener-row:last-child { border-bottom: none; }
.screener-score {
  font-family: var(--mono); font-size: 18px; font-weight: 600;
  min-width: 30px; text-align: center;
}
.unified-action { display: flex; align-items: flex-start; gap: 12px; margin-top: 8px; }
.unified-score {
  font-family: var(--mono); font-size: 18px; font-weight: 600;
  min-width: 30px; text-align: center; flex: 0 0 auto; line-height: 1.3;
}
.unified-action-body { flex: 1; min-width: 0; }
.screener-mid { flex: 1; min-width: 0; }
.screener-sym-row { display: flex; align-items: baseline; gap: 7px; flex-wrap: wrap; }
.screener-sym { font-family: var(--mono); font-size: 14px; font-weight: 600; color: var(--ink); }
.screener-setup {
  font-size: 9.5px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase;
  padding: 1px 6px; border-radius: 999px; border: 1px solid;
}
.screener-detail { font-size: 11.5px; color: var(--ink-muted); margin-top: 3px; line-height: 1.4; }
.screener-actions { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
.screener-analyze { white-space: nowrap; }
.presurge-footer {
  padding: 8px 18px;
  border-top: 1px solid var(--rule-soft);
  font-family: var(--mono); font-size: 9.5px;
  color: var(--ink-muted); text-align: center;
  letter-spacing: 0.04em;
}

/* Debug mode — diagnostic view when zero flags shows up */
.presurge-card.debug::before {
  background: var(--ink-muted);
}
.presurge-debug-stats {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 6px; padding: 10px 18px;
  background: var(--bg-elev);
  border-top: 1px solid var(--rule-soft);
  border-bottom: 1px solid var(--rule-soft);
}
.pds-cell {
  display: flex; flex-direction: column; gap: 1px;
  padding: 6px 8px;
  background: var(--bg-card);
  border-radius: 4px;
  border: 1px solid var(--rule-soft);
}
.pds-lbl {
  font-family: var(--mono); font-size: 9.5px;
  letter-spacing: 0.06em; text-transform: uppercase;
  color: var(--ink-muted);
}
.pds-val {
  font-family: var(--mono); font-size: 14px; font-weight: 600;
  color: var(--ink);
}
.presurge-debug-hint {
  padding: 10px 18px;
  font-size: 11.5px; line-height: 1.5;
  color: var(--ink-soft);
  background: var(--bg);
}
/* In debug view, rows above threshold get a subtle gold glow so you can spot them */
.presurge-row.over-thresh .presurge-rank {
  background: rgba(176,141,60,0.15);
  border-color: var(--gold);
  color: var(--gold);
}

/* ===== JOURNAL STRATEGY ROWS (TP + Exit on logged trades) ===== */
.journal-strategy {
  display: flex; flex-wrap: wrap; gap: 8px;
  margin-top: 8px; padding: 8px 10px;
  background: var(--bg-elev); border-radius: 6px;
  font-family: var(--mono); font-size: 11px;
  align-items: center;
}
.journal-strategy.tp   { border-left: 2px solid var(--green); }
.journal-strategy.exit { border-left: 2px solid var(--red); }
.journal-strategy .js-lbl {
  font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--ink-muted); margin-right: 6px;
}
.journal-strategy .js-cell { color: var(--ink-soft); }
.journal-strategy .js-cell b { color: var(--ink); margin-right: 4px; }
.journal-strategy .js-cell-wide { flex-basis: 100%; }

/* ===== LOG TRADE STRATEGY BLOCKS ===== */
.lt-strategy-block {
  margin: 14px 0;
  padding: 12px 14px;
  background: var(--bg-elev);
  border: 1px solid var(--rule-soft);
  border-radius: 8px;
}
.lt-strategy-head {
  font-family: var(--display); font-size: 13px; font-weight: 500;
  margin-bottom: 4px; letter-spacing: -0.005em;
}
.lt-strategy-hint {
  font-size: 11px; color: var(--ink-muted);
  margin-bottom: 10px;
}

/* ===== TP + EXIT GRID (analysis card) ===== */
.tp-exit-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 10px; padding: 12px 18px 6px;
}
@media (max-width: 480px) {
  .tp-exit-grid { grid-template-columns: 1fr; }
}
.tp-block, .exit-block, .sizing-block {
  padding: 10px 12px;
  background: var(--bg-elev); border-radius: 8px;
  border: 1px solid var(--rule-soft);
}
.tp-block  { border-left: 3px solid var(--green); }
.exit-block { border-left: 3px solid var(--red); }
.sizing-block {
  border-left: 3px solid var(--gold);
  margin-top: 10px;
}
.tpe-lbl {
  font-family: var(--mono); font-size: 10px;
  letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--ink-muted); margin-bottom: 8px;
}
.tpe-row {
  font-family: var(--mono); font-size: 12px;
  margin-bottom: 4px; color: var(--ink-soft);
  line-height: 1.4;
}
.tpe-row b {
  color: var(--ink); font-weight: 600;
  margin-right: 6px; display: inline-block; min-width: 38px;
}
.tpe-row-wrap { display: block; }
.tpe-note {
  font-size: 11px; color: var(--ink-muted);
  margin-top: 6px; padding-top: 6px;
  border-top: 1px dashed var(--rule-soft);
  font-family: var(--mono);
}

/* ===== SCAN CARD: done state, dismiss button ===== */
.scan-actions-col {
  display: flex; flex-direction: column; gap: 4px;
  align-items: center; justify-content: center;
  margin-left: 4px;
}
.scan-del {
  background: transparent; border: none;
  color: var(--ink-muted); cursor: pointer;
  width: 26px; height: 26px; border-radius: 50%;
  font-size: 18px; line-height: 1;
  display: flex; align-items: center; justify-content: center;
  padding: 0;
}
.scan-del:hover, .scan-del:active {
  background: rgba(161,61,45,0.12); color: var(--red);
}
.scan-log.done {
  background: rgba(74,122,74,0.18);
  color: var(--green);
  border: 1px solid var(--green);
  cursor: default; opacity: 1;
}
.scan-item.rec-done { opacity: 0.65; }
.scan-item.rec-done .scan-action { text-decoration: line-through; text-decoration-color: var(--ink-muted); text-decoration-thickness: 1px; }
.scan-recency.done {
  background: var(--green); color: var(--bg);
}

/* ===== WATCHLIST SUGGEST-STRIP: done + delete ===== */
.watch-suggest-strip .wss-del {
  background: transparent; border: none;
  color: var(--ink-muted); cursor: pointer;
  width: 24px; height: 24px; border-radius: 50%;
  font-size: 16px; line-height: 1;
  display: flex; align-items: center; justify-content: center;
  margin-left: 4px; padding: 0;
}
.watch-suggest-strip .wss-del:active { background: rgba(161,61,45,0.12); color: var(--red); }
.watch-suggest-strip.done {
  opacity: 0.75;
  background: rgba(74,122,74,0.08);
}
.watch-suggest-strip.done .wss-action { color: var(--green); }
.wss-log.done {
  background: rgba(74,122,74,0.18);
  color: var(--green); border: 1px solid var(--green);
  cursor: default;
}

/* ===== INLINE CHART PREVIEW (Ideas + ETF Leaderboard) ===== */
.preview-chart-wrap {
  margin: 8px 0 4px;
  padding: 10px 12px 12px;
  background: var(--bg-elev);
  border-radius: 8px;
  border: 1px solid var(--rule-soft);
}
.preview-chart-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 8px;
}
.preview-chart-head .pc-sym {
  font-family: var(--display); font-weight: 600; font-size: 14px;
  margin-right: 8px;
}
.preview-chart-head .pc-price {
  font-family: var(--mono); font-size: 13px; color: var(--ink-soft);
  margin-right: 6px;
}
.preview-chart-head .pc-day {
  font-family: var(--mono); font-size: 11px;
  padding: 2px 6px; border-radius: 3px;
}
.preview-chart-head .pc-day.pos { background: rgba(74,122,74,0.15); color: var(--green); }
.preview-chart-head .pc-day.neg { background: rgba(161,61,45,0.15); color: var(--red); }
.preview-chart-head .pc-close {

/* ===== NEWS TAB (Big Opportunities) ===== */
.news-intro {

}

.news-sym-row {

}

}

.news-live-price .news-day.neg { background: rgba(161,61,45,0.18); color: var(--red); }
.news-dir {

}
.news-dir.long  { background: rgba(74,122,74,0.15); color: var(--green); border: 1px solid var(--green); }
.news-dir.short { background: rgba(161,61,45,0.15); color: var(--red);   border: 1px solid var(--red); }

.news-tag {

}
.news-tag.held    { background: rgba(176,141,60,0.15); color: var(--gold); border: 1px solid var(--gold); }
.news-tag.onlist  { background: rgba(74,122,74,0.12); color: var(--green); border: 1px solid var(--green); }
.news-thesis {
  font-size: 13px; line-height: 1.5; color: var(--ink-soft);

}
.news-strat-grid {
  display: grid; grid-template-columns: repeat(2, 1fr);
  gap: 8px; margin-bottom: 10px;
}
.news-strat-cell {
  padding: 8px 10px; background: var(--bg-elev); border-radius: 6px;
}
.news-strat-cell .lbl {
  font-family: var(--mono); font-size: 9.5px;

}
.news-strat-cell .val {
  font-family: var(--mono); font-size: 12px; color: var(--ink);
  line-height: 1.3;
}
.news-risk {
  font-size: 11.5px; color: var(--ink-soft);
  padding: 8px 10px; margin-bottom: 10px;
  background: rgba(161,61,45,0.06); border-left: 2px solid var(--red);
  border-radius: 4px; line-height: 1.45;
}
.news-risk-lbl {
  font-family: var(--mono); font-size: 10px;
  letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--red); margin-right: 4px;
}
.news-source {
  font-family: var(--mono); font-size: 10.5px; color: var(--ink-muted);
  margin-bottom: 8px;
}
.news-actions {
  display: flex; gap: 6px; flex-wrap: wrap;
}

.toast {
  position: fixed; bottom: 100px; left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--ink); color: var(--bg);
  padding: 12px 18px; border-radius: var(--radius-sm);
  font-size: 13px; font-weight: 500; letter-spacing: 0.02em;
  box-shadow: var(--shadow-deep);
  z-index: 200; opacity: 0; pointer-events: none;
  transition: opacity .2s, transform .2s;
  max-width: 90%;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); pointer-events: all; }
.toast.error { background: var(--red); }

.spinner {
  width: 18px; height: 18px;
  border: 2px solid var(--rule); border-top-color: var(--ink);
  border-radius: 50%; animation: spin .8s linear infinite;
  display: inline-block;
}
@keyframes spin { to { transform: rotate(360deg); } }

.error-banner {
  margin: 12px 20px; padding: 12px 14px;
  background: rgba(161,61,45,0.08); border: 1px solid var(--red-soft);
  border-radius: var(--radius-sm);
  font-family: var(--mono); font-size: 11.5px; color: var(--red);
  line-height: 1.5; word-break: break-word;
}

.hidden { display: none !important; }
::-webkit-scrollbar { width: 0; }

/* ===== BOT SIMULATOR ===== */
.bot-hero {
  background: var(--bg-card);
  border: 1px solid var(--rule); border-radius: var(--radius);
  padding: 22px 20px;
  margin: 16px 20px 12px;
  position: relative; overflow: hidden;
}
.bot-hero::before {
  content: ""; position: absolute; top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--green) 0%, var(--gold) 50%, var(--accent) 100%);
}
.bot-hero h3 { font-family: var(--display); font-size: 18px; font-weight: 500; margin-bottom: 4px; }
.bot-hero .sub { font-size: 12px; color: var(--ink-muted); margin-bottom: 16px; }
.bot-stats {
  display: grid; grid-template-columns: repeat(2, 1fr);
  gap: 12px 18px;
}
.bot-stat-block {
  padding: 12px 14px;
  background: var(--bg-elev);
  border-radius: var(--radius-sm);
  border: 1px solid var(--rule-soft);
}
.bot-stat-block .label { display: block; margin-bottom: 4px; }
.bot-stat-block .val { font-family: var(--mono); font-size: 16px; font-weight: 500; }
.bot-stat-block .val.pos { color: var(--green); }
.bot-stat-block .val.neg { color: var(--red); }
.bot-stat-block .sub { font-size: 10.5px; color: var(--ink-muted); margin-top: 2px; font-family: var(--mono); }

.strategy-card {
  margin: 12px 20px;
  background: var(--bg-card);
  border: 1px solid var(--rule);
  border-radius: var(--radius);
  padding: 18px 20px;
}
.strategy-card .strat-head {
  display: flex; justify-content: space-between; align-items: baseline;
  margin-bottom: 14px;
}
.strategy-card .strat-name {
  font-family: var(--display); font-size: 17px; font-weight: 500;
}
.strategy-card .strat-tag {
  font-family: var(--mono); font-size: 10px; letter-spacing: 0.08em;
  text-transform: uppercase; padding: 3px 8px; border-radius: 4px;
}
.strat-tag.app { background: rgba(176,141,60,0.15); color: var(--gold); border: 1px solid var(--gold); }
.strat-tag.classic { background: rgba(74,122,74,0.12); color: var(--green); border: 1px solid var(--green); }

.strat-metrics {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin-bottom: 12px;
}
.strat-metric {
  text-align: left;
  padding: 8px 10px;
  background: var(--bg-elev);
  border-radius: 6px;
}
.strat-metric .label { font-size: 9.5px; }
.strat-metric .val { font-family: var(--mono); font-size: 14px; font-weight: 500; margin-top: 2px; }
.strat-metric .val.pos { color: var(--green); }
.strat-metric .val.neg { color: var(--red); }

.bot-trade-list { margin: 0; padding: 0; }
.bot-trade {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 16px;
  border-bottom: 1px solid var(--rule-soft);
  font-size: 13px;
}
.bot-trade:last-child { border-bottom: none; }
.bot-trade-l { display: flex; flex-direction: column; gap: 2px; }
.bot-trade-sym { font-family: var(--display); font-weight: 600; font-size: 14px; }
.bot-trade-meta { font-family: var(--mono); font-size: 10.5px; color: var(--ink-muted); }
.bot-trade-r { text-align: right; }
.bot-trade-pnl { font-family: var(--mono); font-size: 13px; font-weight: 500; }
.bot-trade-pnl.pos { color: var(--green); }
.bot-trade-pnl.neg { color: var(--red); }
.bot-trade-pnl.open { color: var(--ink-muted); }
.bot-trade-act {
  font-family: var(--mono); font-size: 9.5px; letter-spacing: 0.08em;
  text-transform: uppercase; padding: 2px 6px; border-radius: 3px;
  display: inline-block; margin-right: 6px;
}
.bot-trade-act.buy { background: rgba(74,122,74,0.15); color: var(--green); }
.bot-trade-act.sell { background: rgba(161,61,45,0.15); color: var(--red); }
.bot-trade-act.open-pos { background: var(--bg-elev); color: var(--ink-muted); }

.bot-bar {
  display: flex; gap: 8px;
  padding: 12px 20px;
  background: var(--bg-elev);
  border-bottom: 1px solid var(--rule);
  font-size: 11px; color: var(--ink-muted);
  font-family: var(--mono);
  align-items: center;
}
.bot-bar button {
  background: var(--ink); color: var(--bg); border: none;
  padding: 6px 12px; border-radius: 6px;
  font-family: var(--sans); font-size: 11px; font-weight: 500;
  letter-spacing: 0.04em; cursor: pointer;
}
.bot-bar button:disabled { opacity: 0.5; cursor: not-allowed; }
.bot-bar .grow { flex: 1; }

.equity-chart {
  margin: 12px 20px; padding: 14px;
  background: var(--bg-card);
  border: 1px solid var(--rule);
  border-radius: var(--radius);
}
.equity-chart h4 {
  font-family: var(--display); font-size: 14px; font-weight: 500;
  margin-bottom: 10px;
}
.equity-chart svg { width: 100%; height: 160px; display: block; }

.head-to-head {
  margin: 12px 20px; padding: 16px 18px;
  background: var(--bg-card); border: 1px solid var(--rule);
  border-radius: var(--radius);
}
.head-to-head h4 { font-family: var(--display); font-size: 15px; margin-bottom: 12px; font-weight: 500; }
.h2h-row {
  display: grid; grid-template-columns: 1fr 60px 1fr;
  align-items: center; gap: 8px;
  padding: 8px 0; border-bottom: 1px solid var(--rule-soft);
}
.h2h-row:last-child { border-bottom: none; }
.h2h-side { font-family: var(--mono); font-size: 13px; font-weight: 500; }
.h2h-side.app { text-align: right; color: var(--gold); }
.h2h-side.classic { text-align: left; color: var(--green); }
.h2h-side.winner { font-weight: 700; }

.h2h-label {
  text-align: center; font-size: 9.5px; letter-spacing: 0.08em;
  text-transform: uppercase; color: var(--ink-muted);
}

.bot-empty {
  margin: 24px 20px; padding: 32px 22px;
  background: var(--bg-card); border: 1px dashed var(--rule);
  border-radius: var(--radius);
  text-align: center;
}
.bot-empty .display { font-family: var(--display); font-size: 22px; display: block; margin-bottom: 8px; }
.bot-empty p { color: var(--ink-muted); font-size: 13px; line-height: 1.5; margin-bottom: 16px; }

  border-top: 1px solid var(--rule-soft);

  flex: 1;
  padding: 8px 12px;
  background: var(--bg); border: 1px solid var(--rule); border-radius: 6px;

.discover-clear-btn {
  background: transparent; border: 1px solid var(--rule); border-radius: 6px;
  font-family: var(--mono); font-size: 10.5px; letter-spacing: 0.06em;
  padding: 7px 11px; color: var(--ink-muted);
  cursor: pointer; text-transform: uppercase;
  white-space: nowrap;
}
.discover-clear-btn:hover { color: var(--ink); border-color: var(--ink); }

  display: flex; gap: 6px; flex-wrap: wrap;

  border-bottom: 1px solid var(--rule-soft);

  font-style: italic;
}
.discover-no-results strong { color: var(--ink); font-style: normal; }
.discover-fresh-badge {
  display: inline-block;
  margin-left: 6px;
  font-family: var(--mono); font-size: 9px; letter-spacing: 0.08em;
  padding: 2px 6px; border-radius: 3px; text-transform: uppercase;
  background: var(--gold); color: var(--bg);
}

/* Breakout-conditions prompt banner (Portfolio tab) */
.breakout-prompt-card {
  margin: 12px 20px;
  padding: 12px 16px;
  background: rgba(74,122,74,0.08);
  border: 1px solid var(--green);
  border-radius: 6px;
  display: flex; align-items: start; justify-content: space-between; gap: 12px;
}
.breakout-prompt-body { flex: 1; min-width: 0; }
.breakout-prompt-head {
  font-family: var(--display); font-size: 14px; font-weight: 500;
  margin-bottom: 4px;
}
.breakout-prompt-sub {
  font-family: var(--mono); font-size: 11px; color: var(--ink-muted);
  line-height: 1.4; margin-bottom: 8px;
}
.breakout-prompt-actions { display: flex; gap: 8px; flex-wrap: wrap; }
.breakout-prompt-dismiss {
  background: transparent; border: none;
  font-family: var(--display); font-size: 18px;
  color: var(--ink-muted); cursor: pointer;
  padding: 4px 8px; line-height: 1;
  flex-shrink: 0;
}
.breakout-prompt-dismiss:hover { color: var(--red); }

/* ===== STRATEGY TIER HEADERS (bot tab) ===== */
.strategy-tier-header {
  margin: 22px 20px 8px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--rule-soft);
}
.strategy-tier-label {
  font-family: var(--display); font-size: 16px; font-weight: 500;
  letter-spacing: -0.01em;
}
.strategy-tier-hint {
  font-family: var(--mono); font-size: 11px; color: var(--ink-muted);
  margin-top: 3px; letter-spacing: 0.02em;
}

/* ===== BUY SUGGESTION CARD (watchlist detail) ===== */
.buy-suggest-card {
  margin: 12px 20px;
  background: var(--bg-card);
  border: 2px solid var(--green);
  border-radius: var(--radius);
  overflow: hidden;
  position: relative;
}
.buy-suggest-card::before {
  content: ""; position: absolute; top: 0; left: 0; right: 0; height: 3px;
  background: var(--green);
}
.buy-suggest-head {
  display: flex; justify-content: space-between; align-items: start; gap: 12px;
  padding: 16px 18px 8px;
}
.buy-suggest-eyebrow {
  font-family: var(--mono); font-size: 10px; letter-spacing: 0.10em;
  color: var(--green); text-transform: uppercase; margin-bottom: 6px;
  font-weight: 600;
}
.buy-suggest-action {
  font-family: var(--display); font-size: 17px; font-weight: 500;
  line-height: 1.3; color: var(--ink); margin-bottom: 4px;
}
.buy-suggest-meta {
  font-family: var(--mono); font-size: 11px; color: var(--ink-muted);
  line-height: 1.4;
}
.buy-suggest-why {
  padding: 0 18px 8px;
  font-family: var(--mono); font-size: 11.5px; color: var(--ink-soft);
  line-height: 1.45;
}
.buy-suggest-disclaimer {
  padding: 8px 18px;
  background: var(--bg-elev);
  font-family: var(--mono); font-size: 10.5px; color: var(--ink-muted);
  line-height: 1.5;
  border-top: 1px solid var(--rule-soft);
}
.buy-suggest-actions {
  display: flex; gap: 8px;
  padding: 10px 18px 14px;
  border-top: 1px solid var(--rule-soft);
}

/* ===== DAILY PORTFOLIO SCAN ===== */
.scan-card {
  margin: 14px 20px;
  background: var(--bg-card);
  border: 1px solid var(--rule);
  border-radius: var(--radius);
  overflow: hidden;
  position: relative;
}
.scan-card::before {
  content: ""; position: absolute; top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--green) 0%, var(--gold) 50%, var(--red) 100%);
}
.scan-head {
  display: flex; justify-content: space-between; align-items: center;
  padding: 18px 18px 10px;
}
.scan-head h3 {
  font-family: var(--display); font-size: 17px; font-weight: 500;
  letter-spacing: -0.01em;
}
.scan-pill {
  font-family: var(--mono); font-size: 10px; letter-spacing: 0.08em;
  background: var(--ink); color: var(--bg);
  padding: 4px 10px; border-radius: 12px;
  text-transform: uppercase;
}
.scan-empty {
  padding: 14px 18px 22px;
  font-family: var(--mono); font-size: 12px; color: var(--ink-muted);
  text-align: center; font-style: italic;
}
.scan-deployment-summary {
  padding: 10px 18px;
  background: var(--bg-elev);
  border-top: 1px solid var(--rule-soft);
  border-bottom: 1px solid var(--rule-soft);
}
.scan-deployment-summary.low { background: rgba(74,122,74,0.06); }
.scan-deployment-summary.medium { background: rgba(176,141,60,0.06); }
.scan-deployment-summary.high { background: rgba(161,61,45,0.06); }
.sds-row {
  display: flex; justify-content: space-between; align-items: center; gap: 10px;
}
.sds-label {
  font-family: var(--mono); font-size: 10.5px; letter-spacing: 0.06em;
  color: var(--ink-muted); text-transform: uppercase;
}
.sds-value {
  font-family: var(--display); font-size: 13px; font-weight: 500;
  color: var(--ink);
  text-align: right;
}
.sds-note {
  margin-top: 4px;
  font-family: var(--mono); font-size: 10.5px; color: var(--ink-muted);
  font-style: italic;
}
.scan-list { padding: 0; }
.scan-item {
  display: grid; grid-template-columns: 28px 1fr auto;
  gap: 12px; align-items: start;
  padding: 12px 18px;
  border-top: 1px solid var(--rule-soft);
  cursor: pointer;
  transition: background-color .12s;
}
.scan-item:hover { background: var(--bg-elev); }
.scan-icon {
  font-family: var(--display); font-size: 22px; font-weight: 700;
  line-height: 1; padding-top: 2px;
  display: flex; justify-content: center;
}
.scan-body { min-width: 0; }
.scan-action {
  font-family: var(--display); font-size: 14px; font-weight: 500;
  margin-bottom: 4px; line-height: 1.35;
}
.scan-why {
  font-family: var(--mono); font-size: 11px; color: var(--ink-muted);
  line-height: 1.4; margin-bottom: 6px;
}
.scan-pills { display: flex; gap: 6px; flex-wrap: wrap; }
.scan-sym {
  font-family: var(--display); font-size: 11px; font-weight: 600;
  padding: 2px 7px; background: var(--bg-elev); border-radius: 3px;
}
.scan-kind {
  font-family: var(--mono); font-size: 9.5px; letter-spacing: 0.08em;
  padding: 2px 6px; border-radius: 3px;
}
.scan-kind.trim { background: rgba(161,61,45,0.15); color: var(--red); }
.scan-kind.add  { background: rgba(74,122,74,0.15); color: var(--green); }
.scan-kind.open { background: rgba(176,141,60,0.15); color: var(--gold); }
.scan-conf {
  font-family: var(--mono); font-size: 9.5px; letter-spacing: 0.08em;
  padding: 2px 6px; border-radius: 3px;
  background: var(--bg-elev); color: var(--ink-muted);
  text-transform: uppercase;
}
.scan-conf.high { color: var(--green); }
.scan-conf.low { color: var(--ink-muted); }

/* Recency badges on scan items */
.scan-recency {
  font-family: var(--mono); font-size: 9px; letter-spacing: 0.08em;
  padding: 2px 6px; border-radius: 3px;
  text-transform: uppercase; font-weight: 600;
}
.scan-recency.new      { background: var(--green); color: var(--bg); }
.scan-recency.stronger { background: var(--gold); color: var(--bg); }
.scan-recency.carried  { background: var(--bg-elev); color: var(--ink-muted); border: 1px solid var(--rule-soft); }
.scan-recency.stale    { background: rgba(161,61,45,0.15); color: var(--red); border: 1px solid var(--red); }

/* Stale scan item — slightly de-emphasized */
.scan-item.stale {
  background: rgba(161,61,45,0.03);
}
.scan-item.stale .scan-action {
  color: var(--ink-soft);
}
.scan-log {
  background: var(--ink); color: var(--bg); border: none;
  padding: 6px 12px; border-radius: 4px;
  font-family: var(--sans); font-size: 11px; font-weight: 500;
  letter-spacing: 0.04em; cursor: pointer; align-self: center;
  flex-shrink: 0;
}
.scan-footer {
  padding: 8px 18px;
  border-top: 1px solid var(--rule-soft);
  background: var(--bg-elev);
  font-family: var(--mono); font-size: 10px; color: var(--ink-muted);
  text-align: center; letter-spacing: 0.04em;
}

/* ===== COLLAPSIBLE ANALYSIS ===== */
.collapsible-card {
  background: var(--bg-card);
  border: 1px solid var(--rule);
  border-radius: var(--radius);
  margin: 12px 20px;
  overflow: hidden;
}

/* Recommended action banner — shown prominently at top of expanded analysis */
.recommended-action-banner {
  margin: 0 20px 12px;
  padding: 14px 16px;
  background: var(--bg-elev);
  border-left: 4px solid var(--ink-soft);
  border-radius: 6px;
}
.recommended-action-banner.compact {
  margin: 12px 20px 0;
  padding: 10px 14px;
}
.recommended-action-banner.buy,
.recommended-action-banner.strong-buy,
.recommended-action-banner.accumulate { border-left-color: var(--green); background: rgba(74,122,74,0.08); }
.recommended-action-banner.sell,
.recommended-action-banner.strong-sell,
.recommended-action-banner.trim,
.recommended-action-banner.reduce { border-left-color: var(--red); background: rgba(161,61,45,0.08); }
.recommended-action-banner.hold,
.recommended-action-banner.wait,
.recommended-action-banner.neutral { border-left-color: var(--gold); background: rgba(176,141,60,0.08); }
.rab-lbl {
  font-family: var(--mono); font-size: 9.5px; letter-spacing: 0.10em;
  text-transform: uppercase; color: var(--ink-muted);
  margin-bottom: 6px;
}
.rab-text {
  font-family: var(--display); font-size: 15px; font-weight: 500;
  line-height: 1.4; color: var(--ink);
}
.rab-inv {
  margin-top: 10px; padding-top: 8px;
  border-top: 1px dashed var(--rule);
  font-family: var(--mono); font-size: 11px; color: var(--ink-soft);
  line-height: 1.45;
}
.rab-inv strong { color: var(--ink); font-weight: 600; }

/* Scenarios mini-collapsible inside the analysis */
.scenarios-collapsible {
  margin: 12px 0;
  padding: 10px 12px;
  background: var(--bg-elev);
  border: 1px solid var(--rule-soft);
  border-radius: 6px;
}
.scenarios-head {
  display: flex; justify-content: space-between; align-items: center;
  cursor: pointer;
  font-family: var(--display); font-size: 13px; font-weight: 500;
  color: var(--ink-soft);
  user-select: none;
}
.scenarios-head:hover { color: var(--ink); }
.scenarios-collapsible.expanded .scenarios-head { color: var(--ink); }

.collapsible-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 18px;
  cursor: pointer;
  user-select: none;
}
.collapsible-head:hover { background: var(--bg-elev); }
.collapsible-head h3 {
  font-family: var(--display); font-size: 15px; font-weight: 500;
}
.collapsible-summary {
  font-family: var(--mono); font-size: 11px; color: var(--ink-muted);
  margin-top: 2px;
}
.collapsible-chev {
  width: 18px; height: 18px;
  display: flex; align-items: center; justify-content: center;
  color: var(--ink-muted);
  transition: transform .2s;
  flex-shrink: 0;
}
.collapsible-card.expanded .collapsible-chev { transform: rotate(180deg); }
.collapsible-body {
  display: none;
  padding: 0 18px 16px;
  border-top: 1px solid var(--rule-soft);
}
.collapsible-card.expanded .collapsible-body { display: block; }


/* ===== MARKET SCANNER STYLES (v1.12) ===== */
/* ============================================================================
   MARKET SCANNER CARD — styles (paste into the <style> block in index.html)
   Uses your existing CSS variables (--bg-card, --ink, --accent, etc.)
   ============================================================================ */
.ms-card {
  background: var(--bg-card);
  border: 1px solid var(--rule);
  border-radius: var(--radius, 14px);
  padding: 18px 16px 12px;
  margin: 16px 0;
  box-shadow: var(--shadow);
  position: relative;
}
.ms-card::before {
  content: "";
  position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
  background: linear-gradient(180deg, var(--gold), var(--accent));
  border-radius: var(--radius, 14px) 0 0 var(--radius, 14px);
}
.ms-head { display: flex; align-items: center; justify-content: space-between; }
.ms-head h3 {
  font-family: "Fraunces", Georgia, serif;
  font-weight: 600; font-size: 1.25rem; margin: 0; color: var(--ink);
}
.ms-run {
  font-family: "IBM Plex Sans", sans-serif; font-weight: 500; font-size: 0.85rem;
  background: var(--ink); color: var(--bg); border: none;
  padding: 7px 16px; border-radius: 999px; cursor: pointer;
  transition: opacity .15s;
}
.ms-run:disabled { opacity: 0.5; cursor: default; }
.ms-sub {
  font-size: 0.78rem; color: var(--ink-muted); line-height: 1.4;
  margin: 6px 0 12px; max-width: 52ch;
}
.ms-focus { margin-bottom: 12px; }
.ms-focus input {
  width: 100%; box-sizing: border-box;
  font-family: "IBM Plex Sans", sans-serif; font-size: 0.85rem;
  background: var(--bg); border: 1px solid var(--rule);
  border-radius: 10px; padding: 9px 12px; color: var(--ink);
}
.ms-focus input::placeholder { color: var(--ink-muted); }

.ms-loading { display: flex; align-items: center; gap: 10px; padding: 14px 0; color: var(--ink-soft); font-size: 0.85rem; }
.ms-spinner {
  width: 16px; height: 16px; border: 2px solid var(--rule);
  border-top-color: var(--accent); border-radius: 50%;
  animation: ms-spin .7s linear infinite;
}
@keyframes ms-spin { to { transform: rotate(360deg); } }

.ms-note {
  font-size: 0.82rem; color: var(--ink-soft); line-height: 1.45;
  background: var(--bg-elev); border-radius: 10px; padding: 10px 12px; margin-bottom: 12px;
}
.ms-empty { font-size: 0.85rem; color: var(--ink-muted); padding: 14px 0; }

.ms-list { display: flex; flex-direction: column; gap: 10px; }
.ms-row {
  display: flex; gap: 12px; padding: 12px;
  border: 1px solid var(--rule-soft); border-radius: 12px;
  background: var(--bg); transition: background .15s;
}
.ms-row:hover { background: var(--bg-elev); }
.ms-rank {
  font-family: "IBM Plex Mono", monospace; font-weight: 600; font-size: 1.1rem;
  color: var(--ink-muted); min-width: 22px; text-align: center; padding-top: 2px;
}
.ms-mid { flex: 1; min-width: 0; }
.ms-sym-row { display: flex; align-items: baseline; gap: 8px; }
.ms-sym { font-family: "IBM Plex Mono", monospace; font-weight: 600; font-size: 1rem; color: var(--ink); }
.ms-composite {
  font-family: "IBM Plex Mono", monospace; font-weight: 600; font-size: 0.95rem;
  color: var(--accent); background: rgba(161,61,45,0.08);
  padding: 1px 8px; border-radius: 999px;
}
.ms-dc { font-family: "IBM Plex Mono", monospace; font-size: 0.8rem; }
.ms-dc.pos { color: var(--green); }
.ms-dc.neg { color: var(--red); }
.ms-name { font-size: 0.75rem; color: var(--ink-muted); margin: 1px 0 6px; }

.ms-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 8px; }
.ms-tag {
  font-size: 0.66rem; font-weight: 500; text-transform: uppercase; letter-spacing: 0.03em;
  padding: 2px 7px; border-radius: 999px; border: 1px solid var(--rule);
  color: var(--ink-soft); background: var(--bg-card);
}
.ms-tag-volume-surge { color: var(--gold); border-color: var(--gold); }
.ms-tag-rs-leader    { color: var(--green); border-color: var(--green-soft); }
.ms-tag-squeeze-fuel { color: var(--red); border-color: var(--red-soft); }
.ms-tag-coiled       { color: #6b7a9b; border-color: #6b7a9b; }
.ms-tag-catalyst-near{ color: var(--accent); border-color: var(--accent-soft); }

.ms-bars { display: flex; flex-direction: column; gap: 3px; margin-bottom: 8px; }
.ms-bar-row { display: flex; align-items: center; gap: 8px; }
.ms-bar-lbl { font-size: 0.66rem; color: var(--ink-muted); min-width: 30px; font-family: "IBM Plex Mono", monospace; }
.ms-bar-track { flex: 1; height: 5px; background: var(--rule-soft); border-radius: 3px; overflow: hidden; }
.ms-bar-fill { display: block; height: 100%; border-radius: 3px; transition: width .4s ease; }
.ms-bar-val { font-size: 0.68rem; color: var(--ink-soft); min-width: 18px; text-align: right; font-family: "IBM Plex Mono", monospace; }

.ms-read {
  border-top: 1px dashed var(--rule); margin-top: 8px; padding-top: 8px;
}
.ms-read-one { font-size: 0.82rem; font-weight: 500; color: var(--ink); margin-bottom: 3px; }
.ms-read-setup { font-size: 0.78rem; color: var(--ink-soft); line-height: 1.4; margin-bottom: 6px; }
.ms-read-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 4px 12px;
  font-size: 0.74rem; color: var(--ink-soft);
}
.ms-read-k { color: var(--ink-muted); font-weight: 500; }
.ms-conv { font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.03em; }
.ms-conv-high { color: var(--green); }
.ms-conv-medium { color: var(--gold); }
.ms-conv-low { color: var(--ink-muted); }

.ms-footer {
  font-size: 0.7rem; color: var(--ink-muted); margin-top: 12px;
  padding-top: 8px; border-top: 1px solid var(--rule-soft);
  font-family: "IBM Plex Mono", monospace;
}

/* ===== DISCOVER TWO-PANEL LAYOUT (v1.12) ===== */
.discover-panel {
  background: var(--bg-card, #fffdf8);
  border: 1px solid var(--border, rgba(0,0,0,0.08));
  border-radius: 14px;
  overflow: hidden;
}
.discover-panel-head {
  padding: 16px 20px 0;
}
.discover-panel-head h2 {
  margin: 0;
  font-family: "Fraunces", serif;
  font-size: 20px;
  font-weight: 600;
  color: var(--ink, #1a1814);
  letter-spacing: -0.01em;
}
.discover-panel-body {
  padding: 12px 14px 16px;
}
/* Cards already carry their own background; inside a panel, soften their
   borders so the panel reads as the container. */
.discover-panel-body .ms-card,
.discover-panel-body .screener-card,
.discover-panel-body .presurge-card {
  box-shadow: none;
}
/* ===== END MARKET SCANNER STYLES ===== */
</style>
</head>
<body>

<div class="loader-screen" id="loader">
  <div class="loader-logo">Portfolio</div>
  <div class="loader-bar"></div>
</div>

<div class="pin-screen hidden" id="pinScreen">
  <div class="pin-logo">Portfolio</div>
  <div class="pin-tag">Advisor</div>
  <div class="pin-prompt" id="pinPrompt">Enter your 4-digit PIN</div>
  <div class="pin-dots" id="pinDots">
    <div class="pin-dot"></div><div class="pin-dot"></div>
    <div class="pin-dot"></div><div class="pin-dot"></div>
  </div>
  <div class="pin-pad" id="pinPad"></div>
  <div class="pin-error" id="pinError"></div>
</div>

<div class="auth-screen hidden" id="authScreen">
  <div class="auth-card">
    <div class="auth-logo">Portfolio</div>
    <div class="auth-tag">Sign in to sync across devices</div>
    <div id="authMode" class="auth-tabs">
      <button class="auth-tab active" data-act="auth-tab" data-mode="signin">Sign In</button>
      <button class="auth-tab" data-act="auth-tab" data-mode="signup">Create Account</button>
    </div>
    <div class="auth-fields">
      <div class="field">
        <label>Email</label>
        <input id="authEmail" type="email" autocomplete="email" placeholder="you@example.com" />
      </div>
      <div class="field">
        <label>Password</label>
        <input id="authPassword" type="password" autocomplete="current-password" placeholder="At least 6 characters" />
      </div>
    </div>
    <div class="auth-error" id="authError"></div>
    <button class="btn btn-block" data-act="auth-submit" id="authSubmitBtn">Sign In</button>
    <div class="auth-secondary">
      <button class="link-btn" data-act="auth-skip">Continue without account (this device only)</button>
    </div>
    <div id="authMigrate" class="auth-migrate hidden">
      <div class="auth-migrate-head">Existing data found</div>
      <p>This device already has trades, holdings, and watchlist data tied to a temporary account. Import them into your new account?</p>
      <div class="auth-migrate-actions">
        <button class="btn btn-sm" data-act="auth-migrate-yes">Import data</button>
        <button class="btn btn-secondary btn-sm" data-act="auth-migrate-no">Start fresh</button>
      </div>
    </div>
  </div>
</div>

<div class="app hidden" id="app">
  <div class="topbar">
    <div>
      <div class="topbar-title" id="topbarTitle">Portfolio</div>
      <div class="topbar-meta" id="topbarMeta">—</div>
    </div>
    <div class="topbar-icons">
      <button class="icon-btn" id="refreshBtn" title="Refresh">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12a9 9 0 1 1-9-9c2.5 0 4.7 1 6.4 2.6L21 8"/>
          <path d="M21 3v5h-5"/>
        </svg>
      </button>
    </div>
  </div>

  <div class="view" id="view"></div>

  <div class="tabs" id="tabs">
    <button class="tab active" data-view="portfolio">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/>

const $  = (sel, root) => (root || document).querySelector(sel);
const $$ = (sel, root) => Array.from((root || document).querySelectorAll(sel));

function fmtUSD(n, decimals = 2) {
  if (n == null || isNaN(n)) return "—";
  if (Math.abs(n) >= 1000) return n.toLocaleString("en-US", { minimumFractionDigits: decimals, maximumFractionDigits: decimals });
  return n.toFixed(decimals);
}
function fmtPct(n, withSign = true) {
  if (n == null || isNaN(n)) return "—";
  const s = withSign && n > 0 ? "+" : "";
  return s + n.toFixed(2) + "%";
}
function fmtNum(n, decimals = 4) {
  if (n == null || isNaN(n)) return "—";
  return Number(n).toLocaleString("en-US", { minimumFractionDigits: 0, maximumFractionDigits: decimals });
}
function fmtRel(iso) {
  if (!iso) return "—";
  const d = new Date(iso);
  const ms = Date.now() - d.getTime();
  const m = Math.floor(ms / 60000);
  if (m < 1) return "just now";
  if (m < 60) return m + "m ago";
  const h = Math.floor(m / 60);
  if (h < 24) return h + "h ago";
  const days = Math.floor(h / 24);
  if (days < 7) return days + "d ago";
  return d.toLocaleDateString();
}
function debounce(fn, ms) {
  let t;
  return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), ms); };
}
function toast(msg, ms = 2400, type = "default") {
  const el = $("#toast");
  el.textContent = msg;
  el.className = "toast show" + (type === "error" ? " error" : "");
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove("show"), ms);
}

// Phase N — intelligent error surface. When an error is short and atomic,
// a toast is fine. When it carries structured payload (nested JSON, stack
// traces, embedded API error envelopes), the toast truncates at ~60 chars
// and HIDES the actual useful information. This helper detects "long or
// structured" errors and routes them to a copyable modal instead.
//
// Pattern: replace `toast(`Foo failed: ${err}`, 3000, "error")` calls with
// `errorToast("Foo", err)`. Short errors still show as a toast; structured
// or long ones get the modal.
function errorToast(context, err) {
  const raw = (err && err.message) ? String(err.message) : String(err || "Unknown error");
  let humanMessage = raw;
  let structuredJson = null;
  const jsonStart = raw.indexOf("{");
  if (jsonStart >= 0) {
    const jsonPart = raw.slice(jsonStart);
    try {
      const parsed = JSON.parse(jsonPart);
      structuredJson = parsed;
      // Walk common error-envelope shapes for the actual human-readable cause.
      humanMessage = parsed?.error?.message
                  || parsed?.message
                  || parsed?.error?.type
                  || raw;
    } catch (_) { /* not JSON, keep raw */ }
  }
  const prefix = context ? `${context}: ` : "";
  const isLong = (prefix + humanMessage).length > 110;
  const hasStructure = !!structuredJson;
  if (!isLong && !hasStructure) {
    toast(prefix + humanMessage, 3500, "error");
    return;
  }
  openErrorModal({ context, humanMessage, raw, structuredJson });
}

function openErrorModal({ context, humanMessage, raw, structuredJson }) {
  const title = context ? `${context} failed` : "Error";
  const fullText = structuredJson ? JSON.stringify(structuredJson, null, 2) : raw;
  openModal(`
    <div class="modal-head"><h3>${escAttr(title)}</h3></div>
    <div class="err-modal-message">${escAttr(humanMessage)}</div>
    <details class="err-modal-details">
      <summary>Show full error</summary>
      <pre class="err-modal-raw">${escAttr(fullText)}</pre>
    </details>
    <div class="err-modal-actions">
      <button class="btn btn-sm" data-act="copy-error" data-error-text="${escAttr(fullText)}">Copy error</button>
      <button class="btn btn-secondary btn-sm" data-act="close-modal">Dismiss</button>
    </div>
  `);
}

async function copyToClipboard(text) {
  try {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      await navigator.clipboard.writeText(text);
      toast("Copied");
    } else {
      const ta = document.createElement("textarea");
      ta.value = text;
      ta.style.position = "fixed"; ta.style.opacity = "0";
      document.body.appendChild(ta);
      ta.select();
      document.execCommand("copy");
      document.body.removeChild(ta);
      toast("Copied");
    }
  } catch (e) {
    toast("Copy failed — select manually", 2400, "error");
  }
}

function escAttr(s) {
  return String(s == null ? "" : s).replace(/&/g, "&amp;").replace(/"/g, "&quot;").replace(/</g, "&lt;");
}
function signalToClass(s) { return String(s || "neutral").replace(/[^a-z]/g, ""); }
function stanceToClass(s) { return String(s || "HOLD").replace(/[^A-Z]/g, ""); }
function describeCondition(c) {
  switch (c.type) {
    case "rsi_below": return `RSI < ${c.threshold}`;
    case "rsi_above": return `RSI > ${c.threshold}`;
    case "ma_touch": return `MA${c.period || 200} touch (±${c.tolerance_pct || 1.5}%)`;
    case "near_52w_high": return `Within ${c.threshold_pct || 3}% of 52w high`;
    case "near_52w_low": return `Within ${c.threshold_pct || 5}% of 52w low`;
    case "drop_from_peak": return `${c.threshold_pct || 10}% off 90d peak`;
    case "price_above": return `Price > $${c.threshold}`;
    case "price_below": return `Price < $${c.threshold}`;
    case "ma_cross_bullish": return `Golden cross (${c.within_days || 3}d)`;
    case "ma_cross_bearish": return `Death cross (${c.within_days || 3}d)`;
    case "breakout_high": return `${c.period || 50}-day high breakout`;
    case "bollinger_lower": return `At lower BB (${c.period || 20},${c.std || 2}σ)`;
    case "bollinger_upper": return `At upper BB (${c.period || 20},${c.std || 2}σ)`;
    case "momentum_above": return `${c.months || 3}m return > ${c.threshold_pct || 10}%`;
    default: return c.type;
  }
}
