// Return any macro event within N days of today (default 5).
// Negative `daysOut` = event already passed today.
function upcomingMacroEvents(daysAhead = 5) {
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const out = [];
  for (const ev of MACRO_CALENDAR_2026) {
    const d = new Date(ev.date + "T00:00:00");
    const daysOut = Math.round((d.getTime() - today.getTime()) / 86400000);
    if (daysOut >= -1 && daysOut <= daysAhead) {
      out.push({ ...ev, daysOut });
    }
  }
  return out;
}

// ----------------------------------------------------------------------------
// ANNIVERSARY PIVOT SCANNER
// ----------------------------------------------------------------------------
// Scans last 3 years of OHLCV for the strongest highs and lows by magnitude,
// then checks if today's calendar date (same month-day) falls within ±5
// trading days of any of those anniversary dates.
//
// Why this is the only Gann method used:
//   - Anniversaries have a defensible mechanism (tax-year cycles, seasonal
//     earnings patterns, trader memory, fund rebalancing windows).
//   - Square of 9 and Gann fans generate so many "important" dates per year
//     that one always lands near any move retroactively — curve fit.
//
// Returns { anniversaryHigh, anniversaryLow } where each is either null or
// { date, price, daysFromToday, yearsAgo }.
function anniversaryPivotsFor(symbol) {
  const data = state.prices?.[symbol];
  if (!data?.ohlcv || data.ohlcv.length < 252) return { anniversaryHigh: null, anniversaryLow: null };

  const today = new Date();
  const todayMonth = today.getMonth();
  const todayDay = today.getDate();
  const todayMs = today.getTime();

  // Find top 5 highs and top 5 lows over last 3 years (756 trading days)
  const lookback = Math.min(data.ohlcv.length, 756);
  const window = data.ohlcv.slice(-lookback);

  // For pivots: a "local high" is the max of an 11-bar window centered on it
  // (5 bars each side). Same for lows. This avoids treating every minor wiggle
  // as a pivot.
  const highs = [];
  const lows = [];
  for (let i = 5; i < window.length - 5; i++) {
    const slice = window.slice(i - 5, i + 6);
    const h = window[i].h;
    const l = window[i].l;
    if (h === Math.max(...slice.map(b => b.h))) highs.push({ t: window[i].t, price: h });
    if (l === Math.min(...slice.map(b => b.l))) lows.push({ t: window[i].t, price: l });
  }
  // Keep top 5 by magnitude (extreme highs, deep lows)
  highs.sort((a, b) => b.price - a.price);
  lows.sort((a, b) => a.price - b.price);
  const topHighs = highs.slice(0, 5);
  const topLows = lows.slice(0, 5);

  // Check if any of those dates falls within ±5 days of today's anniversary
  let bestHighMatch = null;
  let bestLowMatch = null;
  for (const h of topHighs) {
    const d = new Date(h.t);
    // Build the anniversary date in current year
    const anniv = new Date(today.getFullYear(), d.getMonth(), d.getDate());
    const daysFromToday = Math.round((anniv.getTime() - todayMs) / 86400000);
    if (Math.abs(daysFromToday) <= 5) {
      const yearsAgo = today.getFullYear() - d.getFullYear();
      if (!bestHighMatch || Math.abs(daysFromToday) < Math.abs(bestHighMatch.daysFromToday)) {
        bestHighMatch = { date: d.toISOString().slice(0, 10), price: h.price, daysFromToday, yearsAgo };
      }
    }
  }
  for (const l of topLows) {
    const d = new Date(l.t);
    const anniv = new Date(today.getFullYear(), d.getMonth(), d.getDate());
    const daysFromToday = Math.round((anniv.getTime() - todayMs) / 86400000);
    if (Math.abs(daysFromToday) <= 5) {
      const yearsAgo = today.getFullYear() - d.getFullYear();
      if (!bestLowMatch || Math.abs(daysFromToday) < Math.abs(bestLowMatch.daysFromToday)) {
        bestLowMatch = { date: d.toISOString().slice(0, 10), price: l.price, daysFromToday, yearsAgo };
      }
    }
  }
  return { anniversaryHigh: bestHighMatch, anniversaryLow: bestLowMatch };
}

// ----------------------------------------------------------------------------
// TIMING VOTE COMPUTER
// ----------------------------------------------------------------------------
// Returns a vote-compatible object that the verdict aggregator can splice in:
//   { signal: "Timing", dir: "buy"|"sell"|"tilt", weight, note, sources: [...] }
// or returns null if no calendar signal applies (skip the vote entirely —
// don't fake it).
//
// Weighting philosophy: each source contributes at most 0.5 to net score.
// Multiple sources stack additively. Hard cap at ±1.0 total weight (so even
// stacked catalysts can't outvote a real Pre-Surge or AI Analyze).
//
// Sources:
//   A. Earnings within 0-3 days  → -0.5 (binary event, don't add ahead)
//   B. Earnings 5-15 days + bullish drift signal → +0.5 (pre-earnings runup)
//   C. Ex-dividend 0-2 days on high-yield (>3%) → -0.5 (price drops by div amount next day)
//   D. FOMC/CPI/NFP within 0-2 days → -0.3 (broad caution, all symbols)
//   E. Anniversary high within ±5d → -0.4 (historical resistance window)
//   F. Anniversary low within ±5d → +0.4 (historical support window)
// ----------------------------------------------------------------------------
function computeTimingVote(symbol, assetClass) {
  const sources = [];
  let net = 0;

  // -- A & B: Earnings proximity --
  const cal = calendarFor(symbol);
  if (cal?.earnings_date) {
    const today = new Date();
    today.setHours(0, 0, 0, 0);
    const earn = new Date(cal.earnings_date + "T00:00:00");
    const daysOut = Math.round((earn.getTime() - today.getTime()) / 86400000);
    if (daysOut >= 0 && daysOut <= 3) {
      // Binary event imminent — flag as caution
      net -= 0.5;
      sources.push({ kind: "earnings_imminent", days: daysOut, label: `earnings ${daysOut === 0 ? "today" : `+${daysOut}d`} (avoid)` });
    } else if (daysOut >= 5 && daysOut <= 15) {
      // Pre-earnings drift window — only count as tailwind if AI is bullish
      const ai = aiStanceFor(symbol);
      if (ai && (ai.stance === "ACCUMULATE" || ai.stance === "HOLD")) {
        net += 0.5;
        sources.push({ kind: "earnings_drift", days: daysOut, label: `earnings +${daysOut}d tailwind` });
      }
    }
  }

  // -- C: Ex-dividend proximity --
  if (cal?.ex_dividend_date && cal?.dividend_yield_pct != null && cal.dividend_yield_pct >= 3) {
    const today = new Date();
    today.setHours(0, 0, 0, 0);
    const xd = new Date(cal.ex_dividend_date + "T00:00:00");
    const daysOut = Math.round((xd.getTime() - today.getTime()) / 86400000);
    if (daysOut >= 0 && daysOut <= 2) {
      // Don't add right before ex-div — price drops by div amount the next day
      net -= 0.5;
      sources.push({ kind: "ex_div", days: daysOut, label: `ex-div ${daysOut === 0 ? "today" : `+${daysOut}d`} (-${cal.dividend_yield_pct.toFixed(1)}%/yr)` });
    }
  }

  // -- D: Macro events --
  const macroEvents = upcomingMacroEvents(2);
  if (macroEvents.length > 0) {
    const closest = macroEvents.reduce((a, b) => Math.abs(a.daysOut) < Math.abs(b.daysOut) ? a : b);
    // Crypto and rate-sensitive sectors react more to FOMC; everything reacts to CPI/NFP
    if (closest.daysOut >= 0 && closest.daysOut <= 2) {
      net -= 0.3;
      sources.push({ kind: "macro_event", days: closest.daysOut, label: `${closest.type} ${closest.daysOut === 0 ? "today" : `+${closest.daysOut}d`}` });
    }
  }

  // -- E & F: Anniversary pivots --
  const { anniversaryHigh, anniversaryLow } = anniversaryPivotsFor(symbol);
  if (anniversaryHigh) {
    net -= 0.4;
    sources.push({
      kind: "anniv_high",
      days: anniversaryHigh.daysFromToday,
      label: `${anniversaryHigh.yearsAgo}y-ago high $${fmtUSD(anniversaryHigh.price)} window`,
    });
  }
  if (anniversaryLow) {
    net += 0.4;
    sources.push({
      kind: "anniv_low",
      days: anniversaryLow.daysFromToday,
      label: `${anniversaryLow.yearsAgo}y-ago low $${fmtUSD(anniversaryLow.price)} window`,
    });
  }

  // No signals → skip the vote entirely. Better silent than fake.
  if (sources.length === 0) return null;

  // Clamp net to ±1.0 — Timing should refine, not dominate
  if (net > 1.0) net = 1.0;
  if (net < -1.0) net = -1.0;

  // Build the chip label — shortest source description, with count if multiple
  let chipLabel;
  if (sources.length === 1) {
    chipLabel = sources[0].label;
  } else {
    // Pick the strongest-signed source as headline, mention count
    const headline = sources.reduce((a, b) => Math.abs(net) > 0 ? a : b);
    chipLabel = `${sources[0].label} +${sources.length - 1} more`;
  }

  return {
    signal: "Timing",
    dir: "tilt", // signed weight, just like Macro
    weight: net,
    note: chipLabel,
    sources, // kept for debugging; UI uses note
  };
}

// ----------------------------------------------------------------------------
// IV VOTE — penalize entries when implied/realized vol is elevated and there's
// NO earnings catalyst to justify the elevated vol.
//
// Why a separate vote from Timing:
//   - Timing already handles earnings-imminent (-0.5 weight). If IV is high
//     BECAUSE of earnings, Timing has it covered — IV vote would double-count.
//   - The case this catches is different: IV elevated for *no obvious reason*.
//     Examples: stock just ran 15% in a week, sector rotation, macro fear.
//     Entering here means paying up — you're chasing volatility, not entering
//     a quiet setup that's about to expand.
//
// Logic:
//   - If earnings within 7 days exist → skip this vote (Timing already firing)
//   - If macro event within 3 days → skip (already penalized by Timing macro source)
//   - IV/HV rank ≥ 90 (extreme): -0.4 weight
//   - IV/HV rank ≥ 75 (elevated, stricter than chip threshold): -0.2 weight
//   - IV/HV rank ≤ 15 (compressed): +0.2 weight (often precedes expansion)
//   - Otherwise: no vote
//
// Weight chosen to be smaller than Timing (±0.5) so two simultaneous fires
// (Timing -0.5 + IV -0.4) can't combine to override a 1.0+ buy vote.
// ----------------------------------------------------------------------------
function computeIvVote(symbol) {
  const iv = ivRankFor(symbol);
  if (!iv || iv.iv_rank == null) return null;

  // Skip if earnings imminent — Timing handles this case
  const cal = calendarFor(symbol);
  if (cal?.earnings_date) {
    const today = new Date(); today.setHours(0, 0, 0, 0);
    const earn = new Date(cal.earnings_date + "T00:00:00");
    const daysOut = Math.round((earn.getTime() - today.getTime()) / 86400000);
    if (daysOut >= 0 && daysOut <= 7) return null; // Timing owns this
  }

  // Skip if macro event imminent — Timing handles this case too
  const macros = upcomingMacroEvents(3);
  if (macros.length > 0) return null;

  const r = iv.iv_rank;
  const prefix = iv.source === "hv" ? "HV" : "IV";

  if (r >= 90) {
    return {
      signal: "Vol",
      dir: "tilt",
      weight: -0.4,
      note: `${prefix} ${Math.round(r)} extreme — paying up for vol`,
    };
  }
  if (r >= 75) {
    return {
      signal: "Vol",
      dir: "tilt",
      weight: -0.2,
      note: `${prefix} ${Math.round(r)} elevated — entry expensive`,
    };
  }
  if (r <= 15) {
    return {
      signal: "Vol",
      dir: "tilt",
      weight: 0.2,
      note: `${prefix} ${Math.round(r)} compressed — coiled`,
    };
  }
  return null;
}

// ============================================================================
// PRE-SURGE COMPOSITE SCORER
// Three signals, composite 0-100. Threshold ≥70 = flagged.
//
// SQUEEZE (0-40): Bollinger Bandwidth percentile vs 6-month history.
//   - Bandwidth percentile ≤ 5: 25 pts (severe compression)
//   - Bandwidth percentile ≤ 10: 20 pts (compressed)
//   - Bandwidth percentile ≤ 20: 12 pts (tight)
//   - + days-in-squeeze bonus (max 8 pts): 1 pt per session BW < 10th pctile, capped
//   - + volume-expansion bonus (max 7 pts): today's vol > 1.5× 20d avg AND we're in squeeze
//
// ACCUMULATION (0-30): OBV slope vs price slope over 20 sessions.
//   - normalizedSlope ratio = obvSlope / max(absPriceSlope, smallEpsilon)
//   - Strong (price flat ±2%, OBV slope > 0): 20-30 pts scaled
//   - + up-volume vs down-volume ratio bonus (max 5 pts)
//
// RELATIVE STRENGTH (0-30): RS line slope vs SPY over 50 sessions.
//   - Positive RS slope + flat-to-down absolute price: 15-25 pts scaled
//   - + RS percentile rank vs last 6 months (max 5 pts)
//
// Returns { composite, squeeze, accumulation, rs, breakdown } or null if
// insufficient data.
// ============================================================================
function computePreSurgeScore(symbol, opts = {}) {
  const data = state.prices[symbol];
  if (!data || !data.ohlcv || data.ohlcv.length < 150) return null;

  // Build aligned closes + volumes arrays — skip any bars with bad data so the
  // two arrays stay index-aligned (critical for OBV correctness).
  const closes = [];
  const volumes = [];
  for (const d of data.ohlcv) {
    if (d.c == null || isNaN(d.c)) continue;
    closes.push(d.c);
    volumes.push(d.v != null && !isNaN(d.v) ? d.v : 0);
  }
  if (closes.length < 150) return null;

  const breakdown = [];

  // ---- SQUEEZE ----
  let squeezeScore = 0;
  const bwSeries = computeBandwidthSeries(closes, 20, 2, 126);
  let bwPctile = null;
  let daysInSqueeze = 0;
  let volExpansion = false;
  if (bwSeries && bwSeries.length > 0) {
    const curBw = bwSeries[bwSeries.length - 1];
    // For percentile rank, use the FULL 126-session window
    bwPctile = percentileRank(bwSeries, curBw);
    if (bwPctile != null) {
      if (bwPctile <= 5)       squeezeScore += 25;
      else if (bwPctile <= 10) squeezeScore += 20;
      else if (bwPctile <= 20) squeezeScore += 12;
      // Days-in-squeeze bonus: count trailing sessions where BW was in bottom 10th
      const threshold10 = (() => {
        const sorted = bwSeries.filter(x => x != null).slice().sort((a, b) => a - b);
        return sorted.length ? sorted[Math.floor(sorted.length * 0.10)] : null;
      })();
      if (threshold10 != null) {
        for (let i = bwSeries.length - 1; i >= 0; i--) {
          if (bwSeries[i] != null && bwSeries[i] <= threshold10) daysInSqueeze++;
          else break;
        }
        squeezeScore += Math.min(8, daysInSqueeze);
      }
      // Volume expansion bonus: today's vol > 1.5× 20-day avg, AND we're in squeeze
      if (bwPctile <= 20 && volumes.length >= 21) {
        const todayVol = volumes[volumes.length - 1];
        const avg20 = volumes.slice(-21, -1).reduce((a, b) => a + b, 0) / 20;
        if (avg20 > 0 && todayVol > 1.5 * avg20) {
          volExpansion = true;
          squeezeScore += 7;
        }
      }
    }
  }
  squeezeScore = Math.min(40, Math.max(0, squeezeScore));
  breakdown.push({
    label: "Squeeze",
    score: squeezeScore,
    max: 40,
    detail: bwPctile != null
      ? `BW pctile ${bwPctile.toFixed(0)}% · ${daysInSqueeze}d in squeeze${volExpansion ? " · vol expansion ✓" : ""}`
      : "insufficient data",
  });

  // ---- ACCUMULATION ----
  let accuScore = 0;
  let obvDir = null, priceDir = null;
  if (closes.length >= 20 && volumes.length === closes.length) {
    const recent20Closes = closes.slice(-20);
    const recent20Vols   = volumes.slice(-20);
    const obvSeries = computeOBVSeries(recent20Closes, recent20Vols);
    if (obvSeries) {
      const obvSlopeNorm = normalizedSlope(obvSeries);
      const priceSlopeNorm = normalizedSlope(recent20Closes);
      if (obvSlopeNorm != null && priceSlopeNorm != null) {
        obvDir = obvSlopeNorm;
        priceDir = priceSlopeNorm;
        // Flat-to-down price AND positive OBV slope = textbook accumulation
        if (priceSlopeNorm < 0.002 && obvSlopeNorm > 0) {
          // Scale: stronger OBV climb relative to price flatness = more points
          const ratio = obvSlopeNorm / Math.max(Math.abs(priceSlopeNorm), 0.0005);
          if (ratio > 3)      accuScore += 25;
          else if (ratio > 2) accuScore += 20;
          else if (ratio > 1) accuScore += 14;
          else                accuScore += 8;
        }
        // Up-day vs down-day volume ratio bonus
        let upVol = 0, downVol = 0;
        for (let i = 1; i < recent20Closes.length; i++) {
          if (recent20Closes[i] > recent20Closes[i - 1]) upVol += recent20Vols[i];
          else if (recent20Closes[i] < recent20Closes[i - 1]) downVol += recent20Vols[i];
        }
        if (downVol > 0 && upVol / downVol > 1.5) accuScore += 5;
      }
    }
  }
  accuScore = Math.min(30, Math.max(0, accuScore));
  breakdown.push({
    label: "Accumulation",
    score: accuScore,
    max: 30,
    detail: (obvDir != null && priceDir != null)
      ? `OBV ${obvDir > 0 ? "↑" : "↓"} · Price ${priceDir > 0 ? "↑" : priceDir < -0.002 ? "↓" : "→"}`
      : "insufficient data",
  });

  // ---- RELATIVE STRENGTH ----
  let rsScore = 0;
  let rsSlopeNorm = null, rsPctile = null;
  const bench = opts.benchmarkCloses || state.prices["SPY"]?.ohlcv?.map(d => d.c);
  if (bench && bench.length >= 50 && closes.length >= 50) {
    const tCloses50 = closes.slice(-50);
    const bCloses50 = bench.slice(-50);
    const rs50 = computeRSSeries(tCloses50, bCloses50);
    if (rs50 && rs50.length >= 30) {
      rsSlopeNorm = normalizedSlope(rs50.filter(x => x != null));
      const priceSlopeNorm = normalizedSlope(tCloses50);
      if (rsSlopeNorm != null && priceSlopeNorm != null) {
        // Positive RS slope while price is flat-to-down = capital rotating in quietly
        if (rsSlopeNorm > 0 && priceSlopeNorm < 0.003) {
          if (rsSlopeNorm > 0.003)      rsScore += 25;
          else if (rsSlopeNorm > 0.001) rsScore += 18;
          else                          rsScore += 10;
        } else if (rsSlopeNorm > 0.002) {
          // Even with rising price, strong RS gets some credit
          rsScore += 12;
        }
        // RS percentile bonus
        if (bench.length >= 126 && closes.length >= 126) {
          const rs126 = computeRSSeries(closes.slice(-126), bench.slice(-126));
          if (rs126) {
            const curRS = rs126[rs126.length - 1];
            rsPctile = percentileRank(rs126, curRS);
            if (rsPctile != null && rsPctile > 75) rsScore += 5;
          }
        }
      }
    }
  }
  rsScore = Math.min(30, Math.max(0, rsScore));
  breakdown.push({
    label: "Relative Strength",
    score: rsScore,
    max: 30,
    detail: rsSlopeNorm != null
      ? `RS ${rsSlopeNorm > 0 ? "↑" : "↓"} vs SPY${rsPctile != null ? ` · ${rsPctile.toFixed(0)}th pctile` : ""}`
      : "no SPY benchmark",
  });

  const composite = squeezeScore + accuScore + rsScore;
  return {
    symbol,
    composite,
    squeeze: squeezeScore,
    accumulation: accuScore,
    rs: rsScore,
    breakdown,
    current_price: data.current_price || closes[closes.length - 1],
    flagged_at: new Date().toISOString(),
  };
}

// ============================================================================
// PRE-SURGE UNIVERSE SCANNER
// Runs computePreSurgeScore across watchlist + non-cash holdings + ETF_UNIVERSE.
// Filters composite ≥ THRESHOLD, ranks descending. Returns array.
// ============================================================================
// PRE-SURGE SCAN-ONLY UNIVERSE
// ~80 large-cap names the Pre-Surge scanner watches WITHOUT cluttering the
// watchlist UI. These are high-liquidity stocks where leading indicators
// (OBV, BB squeeze, RS rotation) are most reliable — i.e. enough institutional
// flow for accumulation to be detectable on daily bars.
//
// Selection criteria:
//   - US-listed (so SPY benchmark is comparable for RS)
//   - $20B+ market cap, $500M+ avg daily volume
//   - Across all S&P sectors so rotation is detectable
//   - A handful of high-quality mid-caps that move with rotation
//
// If you want to add a name permanently to your watchlist with conditions,
// use the Watchlist tab. SCAN_UNIVERSE just gives Pre-Surge eyes on more names.
// ============================================================================
// SCAN_UNIVERSE v2 — re-aimed toward MID-CAPS where pre-surge patterns work.
//
// WHY THIS CHANGED: the old list was ~80 mega-caps (AAPL, MSFT, JPM, UNH...).
// Mega-caps are the most efficiently priced names on the market — quiet
// accumulation almost never PRECEDES their moves because everything is already
// in the price. Pre-surge (a fund building a position before a move shows up on
// the tape) leaves a detectable footprint mainly in MID-CAPS and smaller, less
// over-covered names. The old universe was fishing where the fish aren't.
//
// This list keeps a thin spine of liquid large-caps (so SPY-relative RS stays
// meaningful and you still see rotation in the names you care about), but the
// bulk is now $2B–$30B growth/quality mid-caps across sectors — the segment
// where coiling-then-breakout actually happens. All US-listed for clean RS.
const SCAN_UNIVERSE = [
  // Thin large-cap spine (rotation reference / liquidity anchors)
  "NVDA","AVGO","AMD","NFLX","COIN","PLTR","UBER","SHOP","NOW","PANW",
  // Semis & semicap mid/large (high beta, rotation-sensitive)
  "MRVL","ON","MPWR","ALGM","WOLF","ACLS","CRDO","ALAB","SMCI","COHR",
  "LSCC","RMBS","SITM","AMKR","ONTO","FORM","NVMI","UCTT","ICHR",
  // Software / cloud mid-caps (where accumulation precedes re-rating)
  "DDOG","NET","CRWD","ZS","SNOW","MDB","HUBS","TEAM","OKTA","TWLO",
  "GTLB","S","CFLT","FROG","BRZE","ESTC","PCOR","APPF","BL","PD",
  // Fintech / payments mid-caps
  "AFRM","SOFI","TOST","BILL","FOUR","NU","DLO","STNE","UPST",
  // Healthcare / biotech mid-caps (catalyst + accumulation prone)
  "VKTX","CYTK","MDGL","RXRX","TEM","HALO","EXEL","NTRA","TNDM","INSP",
  "PCVX","CRNX","ARWR","IONS","ROIV","ALKS",
  // Industrials / defense / clean-energy mid-caps
  "PWR","BWXT","HEI","AXON","FIX","PRIM","STRL","STEM","FLR","STRZ",
  // Energy / materials mid-caps (rotation + commodity beta)
  "RRC","AR","SM","MTDR","CIVI","CRC","UEC","CCJ","MP","ALB",
  // Consumer / retail mid-caps (momentum + turnaround prone)
  "ELF","CAVA","DKNG","CELH","WING","TXRH","DECK","CROX","RH","CHWY",
  // Crypto-adjacent / high-beta thematic
  "MSTR","RIOT","MARA","CLSK","HOOD","BMNR",
];
function getScanUniverseSymbols() { return SCAN_UNIVERSE; }

// ============================================================================
// Pre-Surge tiers (v2 — confirmation-gated, not just a raw composite cutoff).
//
// WHY THIS CHANGED: the old design flagged on composite ≥ 70 alone. Because the
// composite is additive (Squeeze 40 + Accumulation 30 + RS 30), a name could
// clear the bar on a coil + supportive volume while RELATIVE STRENGTH was flat
// or negative — i.e. price is squeezing but capital is NOT actually rotating in.
// Those resolve down as often as up. Lowering the cutoff would only have surfaced
// MORE of these false coils. The fix is a GATE, not a lower number:
//
//   FLAGGED ("primed") requires BOTH:
//     - composite ≥ PRESURGE_FLAG (quality bar), AND
//     - a directional confirmation: accumulation AND relative-strength BOTH
//       contributing real points (squeeze alone, with no one stepping in, is
//       just stored energy with no vector).
//
//   WATCHING (the new lower band) = composite ≥ PRESURGE_WATCH but NOT yet
//     confirmed. Surfaced as a separate, lower-priority list so you can see
//     coils building WITHOUT them masquerading as actionable signals.
//
// This raises hit-rate at the flag tier while widening what you can monitor.
const PRESURGE_FLAG  = 65;  // quality bar for a confirmed flag (was a flat 70)
const PRESURGE_WATCH = 55;  // "coiling, not yet confirmed" — monitor list
// Minimum component points for the confirmation gate. A confirmed flag needs
// the move to have a DIRECTION, evidenced by both accumulation and RS pulling
// their weight — not a squeeze sitting on its own.
const PRESURGE_MIN_ACCUM = 8;   // OBV genuinely rising under flat/down price
const PRESURGE_MIN_RS    = 8;   // RS line genuinely outperforming SPY
// Back-compat alias: older call-sites referenced PRESURGE_THRESHOLD.
const PRESURGE_THRESHOLD = PRESURGE_FLAG;
const PRESURGE_LOCAL_KEY = "presurge_flags_v1"; // localStorage history cache

// The confirmation gate. A scored row is a CONFIRMED flag only if it clears the
// quality bar AND shows a direction (both accumulation and RS contributing).
function preSurgeConfirmed(r) {
  if (!r) return false;
  return r.composite >= PRESURGE_FLAG
      && (r.accumulation ?? 0) >= PRESURGE_MIN_ACCUM
      && (r.rs ?? 0) >= PRESURGE_MIN_RS;
}

function getPreSurgeUniverse() {
  // Deduped union of: watchlist + non-cash holdings + ETF universe + SCAN_UNIVERSE
  // + Discover Ideas (CURATED_PICKS). This is the SINGLE universe behind the one
  // scored list — every name the app knows about gets scored together, so the
  // Screener is the only discovery surface (no separate ETF/Ideas sections).
  const set = new Set();
  for (const w of state.watchlist) set.add(w.symbol);
  for (const h of state.holdings) if (h.asset_class !== "cash") set.add(h.symbol);
  for (const e of (typeof ETF_UNIVERSE !== "undefined" ? ETF_UNIVERSE : [])) set.add(e.symbol);
  for (const s of SCAN_UNIVERSE) set.add(s);
  for (const p of (typeof CURATED_PICKS !== "undefined" ? CURATED_PICKS : [])) set.add(p.symbol);
  return Array.from(set);
}

function computePreSurgeUniverse() {
  // Returns { flagged, watching, allScored }:
  //   - flagged:  CONFIRMED setups — clear the quality bar AND show direction
  //               (accumulation + RS both contributing). The actionable list.
  //   - watching: composite ≥ PRESURGE_WATCH but not yet confirmed. Coils that
  //               are building but haven't shown which way capital is leaning.
  //               Lower-priority monitor list, NOT actionable signals.
  //   - allScored: every symbol that produced a score, ranked desc (debug mode)
  // Need SPY benchmark cached for RS. If missing, RS won't score and nothing can
  // confirm — which is correct: no benchmark means no direction evidence.
  const benchCloses = state.prices["SPY"]?.ohlcv?.map(d => d.c);
  const universe = getPreSurgeUniverse();
  const allScored = [];
  for (const sym of universe) {
    if (sym === "SPY") continue; // can't compute RS of SPY vs itself usefully
    const r = computePreSurgeScore(sym, { benchmarkCloses: benchCloses });
    if (r) { r.confirmed = preSurgeConfirmed(r); allScored.push(r); }
  }
  allScored.sort((a, b) => b.composite - a.composite);
  const flagged  = allScored.filter(r => r.confirmed);
  const watching = allScored.filter(r => !r.confirmed && r.composite >= PRESURGE_WATCH);
  return { flagged, watching, allScored };
}

// ============================================================================
// PRE-SURGE HISTORY — persist flags so we can show track record over time.
// Stored as localStorage (lightweight, no extra Firestore writes) keyed by
// "{date}__{symbol}" so re-flagging the same name same day is idempotent.
// Each entry: { symbol, date, composite, squeeze, accumulation, rs, price_at_flag }
// ============================================================================
function loadPreSurgeHistory() {
  try {
    const raw = localStorage.getItem(PRESURGE_LOCAL_KEY);
    return raw ? JSON.parse(raw) : {};
  } catch (e) { return {}; }
}
function savePreSurgeHistory(history) {
  try { localStorage.setItem(PRESURGE_LOCAL_KEY, JSON.stringify(history)); } catch (e) {}
}
function recordPreSurgeFlags(flags) {
  const history = loadPreSurgeHistory();
  const today = new Date().toISOString().slice(0, 10);
  let added = 0;
  for (const f of flags) {
    const key = `${today}__${f.symbol}`;
    if (history[key]) continue; // already recorded today
    history[key] = {
      symbol: f.symbol,
      date: today,
      composite: f.composite,
      squeeze: f.squeeze,
      accumulation: f.accumulation,
      rs: f.rs,
      price_at_flag: f.current_price,
    };
    added++;
  }
  // Trim history to last 60 days to bound localStorage size
  const cutoff = new Date(Date.now() - 60 * 86400 * 1000).toISOString().slice(0, 10);
  for (const k of Object.keys(history)) {
    if (history[k].date < cutoff) delete history[k];
  }
  if (added > 0) savePreSurgeHistory(history);
  return added;
}

// Returns the N most-recent flags older than `minAgeDays` (so we can show
// "flagged X days ago, now at Y%"). Used by the track-record panel.
function getRecentPreSurgeFlags(minAgeDays = 3, maxAgeDays = 30, limit = 6) {
  const history = loadPreSurgeHistory();
  const now = Date.now();
  const out = [];
  for (const k of Object.keys(history)) {
    const f = history[k];
    const flagDate = new Date(f.date + "T00:00:00").getTime();
    const ageDays = (now - flagDate) / 86400000;
    if (ageDays < minAgeDays || ageDays > maxAgeDays) continue;
    const curPrice = state.prices[f.symbol]?.current_price;
    if (curPrice == null || !f.price_at_flag) continue;
    const sinceFlagPct = ((curPrice - f.price_at_flag) / f.price_at_flag) * 100;
    out.push({ ...f, age_days: ageDays, current_price: curPrice, since_flag_pct: sinceFlagPct });
  }
  out.sort((a, b) => a.age_days - b.age_days); // most recent first
  return out.slice(0, limit);
}

function computeEMA(closes, period) {
  if (!closes || closes.length < period) return [];
  const k = 2 / (period + 1);
  const out = [];
  let ema = closes.slice(0, period).reduce((a, b) => a + b, 0) / period;
  out[period - 1] = ema;
  for (let i = period; i < closes.length; i++) {
    ema = closes[i] * k + ema * (1 - k);
    out[i] = ema;
  }
  return out;
}

function computeMACD(closes, fast = 12, slow = 26, signal = 9) {
  if (!closes || closes.length < slow + signal) return null;
  const emaFast = computeEMA(closes, fast);
  const emaSlow = computeEMA(closes, slow);
  const macdLine = closes.map((_, i) =>
    (emaFast[i] != null && emaSlow[i] != null) ? emaFast[i] - emaSlow[i] : null
  );
  const macdValues = macdLine.filter(v => v != null);
  const signalLine = computeEMA(macdValues, signal);
  // align signal to original index
  const offset = macdLine.indexOf(macdValues[0]);
  // detect last crossover
  let lastCrossover = "none", daysSinceCross = Infinity;
  for (let i = closes.length - 1; i > offset + signal; i--) {
    const sigIdx = i - offset;
    const sigPrev = signalLine[sigIdx - 1];
    const sigCur  = signalLine[sigIdx];
    const macdPrev = macdLine[i - 1];
    const macdCur  = macdLine[i];
    if (sigPrev == null || sigCur == null || macdPrev == null || macdCur == null) continue;
    const diffPrev = macdPrev - sigPrev;
    const diffCur  = macdCur - sigCur;
    if (diffPrev <= 0 && diffCur > 0) {
      lastCrossover = "bullish";
      daysSinceCross = closes.length - 1 - i;
      break;
    }
    if (diffPrev >= 0 && diffCur < 0) {
      lastCrossover = "bearish";
      daysSinceCross = closes.length - 1 - i;
      break;
    }
  }
  return { lastCrossover, daysSinceCross };
}

async function markTriggerSeen(triggerId) {
  // Always update local state
  state.triggers = state.triggers.filter(t => t.id !== triggerId);
  // Try Firestore update (may fail for local-only triggers, that's OK)
  try {
    await db.collection("users").doc(state.uid).collection("triggers").doc(triggerId)
      .update({ seen: true });
  } catch (e) { /* local-only trigger, no Firestore doc */ }
}

// ============================================================================
// METRICS
// ============================================================================

// Phase O — price-feed sanity check. We've been bitten three times by stale
// or wrong prev_close values producing impossible day-change percentages
// (URNU.L cross-currency, PPLT quantity, SWRD stale prev_close). Defense is
// at the row-render layer: if a symbol's day-change exceeds reasonable
// per-asset-class bounds, we flag it as a price anomaly rather than trusting
// the number.
//
// Bounds are deliberately loose — these are "obviously wrong" thresholds,
// not normal-volatility thresholds. A 14% day move on a single stock is
// extreme but possible; on an index ETF tracking 1,500 names it's not.
//
// Returns { anomaly: bool, reason: string|null }
function priceAnomaly(symbol, assetClass) {
  const p = state.prices?.[symbol];
  if (!p || p.current_price == null || p.prev_close == null) {
    return { anomaly: false, reason: null };
  }
  const ratio = p.current_price / p.prev_close;
  if (!isFinite(ratio) || p.prev_close <= 0) {
    return { anomaly: true, reason: "Invalid price ratio" };
  }
  const movePct = (ratio - 1) * 100;
  // Thresholds raised (Phase Q follow-up): the earlier tighter bands were
  // catching false positives where prev_close was merely stale by a session
  // or two — producing a phantom 15-25% "move" even though the current price
  // was perfectly fine. That eroded trust in the flag.
  //
  // These thresholds now only catch CATASTROPHIC feed errors: the URNU.L
  // cross-currency artifact (GBp vs GBP, ~100x) and PPLT-style 10x shifts.
  // A merely-large daily move passes through — better to occasionally trust
  // a real big move than to constantly false-flag a stale prev_close.
  let threshold;
  switch (assetClass) {
    case "etf":      threshold = 40; break;
    case "metal":    threshold = 35; break;
    case "us_stock": threshold = 50; break;
    case "crypto":   threshold = 60; break;
    default:         threshold = 50; break;
  }
  if (Math.abs(movePct) > threshold) {
    return {
      anomaly: true,
      reason: `Day change ${movePct >= 0 ? "+" : ""}${movePct.toFixed(1)}% exceeds ${threshold}% ${assetClass || "asset"} threshold — likely a broken price feed`,
    };
  }
  return { anomaly: false, reason: null };
}

function holdingMetrics(h) {
  // Cash is special: h.quantity already IS the USD value. The edit form stores
  // it that way (single "Amount (USD)" field), and the deployment scan reads it
  // the same way. Without this branch, cash holdings get value=null because
  // there's no price feed for "CASH", which silently dropped cash from
  // totalValue and the allocation donut.
  //
  // DEFENSIVE: detect cash via multiple signals so a malformed asset_class field
  // (e.g. "CASH" uppercase, missing, or "Cash") still gets treated correctly.
  const isCash = (
    (typeof h.asset_class === "string" && h.asset_class.toLowerCase() === "cash") ||
    h.symbol === "CASH" ||
    h.symbol === "USD"
  );
  if (isCash) {
    const cashValue = Number(h.quantity) || 0;
    return {
      current_price: 1,
      value: cashValue,
      pnlAbs: 0,
      pnlPct: 0,
      dayPct: 0,
    };
  }
  const p = state.prices[h.symbol];
  const cur = p?.current_price;
  const value = cur != null ? cur * h.quantity : null;
  const pnlAbs = value != null ? value - h.avg_cost_total : null;
  const pnlPct = h.avg_cost_total > 0 && pnlAbs != null ? (pnlAbs / h.avg_cost_total) * 100 : null;
  const dayPct = p && p.prev_close ? ((cur - p.prev_close) / p.prev_close) * 100 : null;
  return { current_price: cur, value, pnlAbs, pnlPct, dayPct };
}
function portfolioMetrics() {
  let totalValue = 0, totalCost = 0;
  let alloc = {};
  let dayChangeAbs = 0;
  // Phase O — when summing day-change, skip holdings whose price feed shows
  // an obviously-broken move. The per-row UI surfaces the anomaly separately;
  // we don't want one bad price feed to throw off the whole portfolio's
  // "+$X today" number.
  let anomalyCount = 0;
  for (const h of state.holdings) {
    const m = holdingMetrics(h);
    if (m.value != null) {
      totalValue += m.value;
      alloc[h.asset_class] = (alloc[h.asset_class] || 0) + m.value;
      const p = state.prices[h.symbol];
      if (p && p.prev_close) {
        const anomaly = priceAnomaly(h.symbol, h.asset_class);
        if (anomaly.anomaly) {
          anomalyCount++;
        } else {
          const prevValue = p.prev_close * h.quantity;
          dayChangeAbs += (m.value - prevValue);
        }
      }
    }
    totalCost += h.avg_cost_total;
  }
  const totalPnL = totalValue - totalCost;
  const totalPnLPct = totalCost > 0 ? (totalPnL / totalCost) * 100 : 0;
  const dayPct = (totalValue - dayChangeAbs) > 0 ? (dayChangeAbs / (totalValue - dayChangeAbs)) * 100 : 0;
  return { totalValue, totalCost, totalPnL, totalPnLPct, dayChangeAbs, dayPct, alloc, anomalyCount };
}

// ============================================================================
// PHASE G — Drawdown tracker.
// Track the running peak portfolio value in localStorage so we can compute
// drawdown vs the user's drawdown_tolerance_pct. This is approximate — without
// trade history we can't truly distinguish "drawdown from peak" from "we added
// more capital." But for a portfolio that's mostly stable in cost basis, the
// peak of (total_value) is a reasonable proxy for "how much risk budget have
// I used up." The user can reset it from settings if they make a big deposit.
//
// Storage: localStorage["portfolioPeak"] = { value: number, date: ISO }
// ============================================================================
function updatePortfolioPeak(currentValue) {
  if (currentValue == null || currentValue <= 0) return;
  let peak = null;
  try {
    const raw = localStorage.getItem("portfolioPeak");
    if (raw) peak = JSON.parse(raw);
  } catch (e) { peak = null; }
  if (!peak || currentValue > peak.value) {
    peak = { value: currentValue, date: new Date().toISOString() };
    localStorage.setItem("portfolioPeak", JSON.stringify(peak));
  }
  return peak;
}

function getDrawdownState() {
  const m = portfolioMetrics();
  if (!m.totalValue || m.totalValue <= 0) return null;
  const peak = updatePortfolioPeak(m.totalValue);
  if (!peak) return null;
  const drawdownPct = peak.value > 0
    ? ((m.totalValue - peak.value) / peak.value) * 100
    : 0;
  const tolerance = state.investorProfile?.drawdown_tolerance_pct ?? null;
  // Risk budget utilization: (current drawdown abs / tolerance) * 100
  // 0 means we're at peak, 100% means we've used the full budget.
  const utilization = tolerance && tolerance > 0
    ? Math.min(100, (Math.abs(Math.min(0, drawdownPct)) / tolerance) * 100)
    : null;
  return {
    current_value: m.totalValue,
    peak_value: peak.value,
    peak_date: peak.date,
    drawdown_pct: Number(drawdownPct.toFixed(2)),
    tolerance_pct: tolerance,
    utilization_pct: utilization == null ? null : Number(utilization.toFixed(1)),
  };
}

// Render the drawdown gauge as an inline strip. Hides itself entirely when
// we're at or above peak (utilization 0) — there's no information to convey
// and the strip would just be visual noise. Color shifts: green<33%, gold
// 33-66%, red 66%+.
function renderDrawdownGauge() {
  const dd = getDrawdownState();
  if (!dd || dd.utilization_pct == null) return "";
  if (dd.drawdown_pct >= 0) return ""; // at peak, no gauge needed
  const u = dd.utilization_pct;
  const colorClass = u < 33 ? "dd-green" : u < 66 ? "dd-gold" : "dd-red";
  return `
    <div class="drawdown-gauge ${colorClass}">
      <div class="dd-row">
        <div class="dd-label">Drawdown · ${Math.abs(dd.drawdown_pct).toFixed(1)}%</div>
        <div class="dd-meta">Budget used: ${u.toFixed(0)}% of ${dd.tolerance_pct}% tolerance</div>
      </div>
      <div class="dd-bar"><div class="dd-fill" style="width:${u}%;"></div></div>
    </div>
  `;
}


// ============================================================================
// PORTFOLIO RISK ANALYSIS — allocation drift + correlation/concentration.
// Pure client-side: no network, no AI. Runs on every portfolio render.
//
// 1. DRIFT: compares current asset-class weights against a target model.
//    The default target is a moderate-growth mix; the user can override it
//    via localStorage key "targetAlloc" (JSON map of class→fraction).
//    Any class more than DRIFT_TOLERANCE off target is flagged with the
//    concrete rebalancing action.
//
// 2. CONCENTRATION: groups holdings into "correlated clusters" — positions
//    that really move as one bet (e.g. BTC + ETH + MSTR = one crypto bet).
//    If any cluster exceeds CLUSTER_WARN_PCT of the portfolio it's flagged,
//    because the allocation strip's per-class view hides this.
// ============================================================================
const DEFAULT_TARGET_ALLOC = {
  etf: 0.55, us_stock: 0.20, crypto: 0.10, metal: 0.10, cash: 0.05,
};
const DRIFT_TOLERANCE  = 0.07; // 7 percentage points off target = flag
const CLUSTER_WARN_PCT = 35;   // a single correlated bet over 35% = flag

function getTargetAlloc() {
  try {
    const raw = localStorage.getItem("targetAlloc");
    if (raw) {
      const parsed = JSON.parse(raw);
      if (parsed && typeof parsed === "object") return parsed;
    }
  } catch (e) {}
  return DEFAULT_TARGET_ALLOC;
}

// Map a holding to its correlation cluster. These are deliberately broad —
// the point is to surface "this is really one bet", not precise factor models.
function correlationCluster(h) {
  const sym = (h.symbol || "").toUpperCase();
  const cls = h.asset_class;
  // MSTR trades as a leveraged Bitcoin proxy → belongs in the crypto bet.
  if (cls === "crypto" || sym === "MSTR") return "Crypto / digital assets";
  if (cls === "metal")  return "Precious metals";
  if (cls === "cash")   return "Cash";
  // Tech / AI / semis names and ETFs cluster together.
  const techish = ["QQQ","SMH","SOXX","VGT","XLK","NVDA","AMD","AVGO","TSM","MSFT","AAPL","GOOGL","META","AMZN","SWRD"];
  if (techish.includes(sym)) return "Tech / AI / semis";
  if (cls === "etf") return "Broad equity ETFs";
  return "Individual equities";
}

function computePortfolioRisk() {
  const pm = portfolioMetrics();
  const total = pm.totalValue;
  if (total <= 0) return { drift: [], clusters: [], total: 0 };

  // --- DRIFT ---
  const target = getTargetAlloc();
  const drift = [];
  const classes = new Set([...Object.keys(target), ...Object.keys(pm.alloc)]);
  for (const cls of classes) {
    const curFrac = (pm.alloc[cls] || 0) / total;
    const tgtFrac = target[cls] || 0;
    const delta = curFrac - tgtFrac;
    if (Math.abs(delta) >= DRIFT_TOLERANCE) {
      const deltaDollars = delta * total;
      drift.push({
        cls,
        curPct: curFrac * 100,
        tgtPct: tgtFrac * 100,
        deltaPct: delta * 100,
        action: delta > 0
          ? `Overweight ${cls} by ${(delta * 100).toFixed(1)}pp — consider trimming ~$${fmtUSD(Math.abs(deltaDollars), 0)} back toward target.`
          : `Underweight ${cls} by ${(Math.abs(delta) * 100).toFixed(1)}pp — consider adding ~$${fmtUSD(Math.abs(deltaDollars), 0)} to reach target.`,
      });
    }
  }
  drift.sort((a, b) => Math.abs(b.deltaPct) - Math.abs(a.deltaPct));

  // --- CONCENTRATION CLUSTERS ---
  const clusterMap = {};
  for (const h of state.holdings) {
    const m = holdingMetrics(h);
    if (m.value == null) continue;
    const c = correlationCluster(h);
    if (!clusterMap[c]) clusterMap[c] = { name: c, value: 0, symbols: [] };
    clusterMap[c].value += m.value;
    clusterMap[c].symbols.push(h.symbol);
  }
  const clusters = Object.values(clusterMap)
    .map(c => ({ ...c, pct: (c.value / total) * 100 }))
    .sort((a, b) => b.pct - a.pct);

  return { drift, clusters, total };
}
