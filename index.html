// ----------------------------------------------------------------------------
// Router — 3 top-level views:
//   portfolio, discover, settings.
// Legacy view names (markets, watchlist, signals, news, bot, journal, scans)
// are remapped to current homes so old setView() calls and deep links keep
// working. Discover holds Watchlist + Pre-Surge scanner (no sub-tabs).
// ----------------------------------------------------------------------------
function renderCurrentView() {
  const v = state.currentView;
  if (v === "portfolio") return renderPortfolio();
  if (v === "discover")  return renderDiscover();
  if (v === "journal")   return renderJournal();
  if (v === "settings")  return renderSettings();
  // Legacy fallthrough — old view names get re-routed to current homes so
  // stale localStorage state doesn't break the app on first load.
  if (v === "markets" || v === "watchlist") { state.currentView = "discover"; return renderDiscover(); }
  if (v === "signals" || v === "news" || v === "bot" || v === "scans") {
    state.currentView = "portfolio";
    return renderPortfolio();
  }
  state.currentView = "portfolio";
  renderPortfolio();
}
function setView(v) {
  // Remap legacy view names to the new 3-tab structure (Portfolio, Discover,
  // Settings). Anything that used to live under Signals now redirects to
  // Portfolio — the verdict layer covers the same ground.
  const LEGACY_TO_NEW = {
    markets:   { view: "discover", sub: "watchlist" },
    watchlist: { view: "discover", sub: "watchlist" },
    news:      { view: "portfolio" },
    bot:       { view: "portfolio" },
    signals:   { view: "portfolio" },
    scans:     { view: "portfolio" },
  };
  const mapped = LEGACY_TO_NEW[v];
  if (mapped) {
    if (mapped.view === "discover" && mapped.sub) state.discoverTab = mapped.sub;
    v = mapped.view;
  }
  state.currentView = v;
  $$(".tab").forEach(t => t.classList.toggle("active", t.dataset.view === v));
  state.selectedSymbol = null;
  renderCurrentView();
}

// ----- Portfolio
// ============================================================================
// BREAKOUT CONDITION PROMPT
// Detects held symbols that have NO upward-direction watchlist conditions
// (breakout_high, near_52w_high, momentum_above, rsi_above).
// These are the conditions that would alert you to RISING prices — which is
// what we missed on silver. Shows a one-tap prompt to add them in bulk.
// ============================================================================
const UPWARD_CONDITION_TYPES = ["breakout_high", "near_52w_high", "momentum_above", "rsi_above"];

function getHeldSymbolsMissingBreakouts() {
  const heldNonCash = state.holdings.filter(h => h.asset_class !== "cash").map(h => h.symbol);
  if (heldNonCash.length === 0) return [];
  const result = [];
  for (const sym of heldNonCash) {
    const watchEntry = state.watchlist.find(w => w.symbol === sym);
    const conds = watchEntry?.conditions || [];
    const hasUpward = conds.some(c => UPWARD_CONDITION_TYPES.includes(c.type));
    if (!hasUpward) result.push(sym);
  }
  return result;
}

// ============================================================================
// UNIFIED DECISION ENGINE
// Replaces the cognitive overhead of reading 6 separate cards. Synthesizes
// every signal into one weighted vote per symbol → one action verdict.
//
// Two outputs:
//   • Today's Verdict — for symbols ALREADY HELD (add / trim / hold / exit)
//   • Today's Opportunities — for symbols NOT held (open / watch / skip)
//
// Design principles:
//   - Honest about uncertainty: missing signals lower conviction, never inflate it
//   - Show the reasoning: every verdict lists which signals voted which way
//   - Diagnostic on empty: "why nothing today" beats silent empty card
//   - PRIME tier: "one signal away from action" preserves the pipeline view
// ============================================================================

// Helper: given a symbol, return the macro verdict ("favored" | "headwind" | null)
function macroVerdictFor(symbol, assetClass) {
  if (!state.macro || !state.macro.classified) return null;
  return symbolMacroVerdict(symbol, assetClass, state.macro.classified.regime);
}

// Helper: is symbol currently flagged by Pre-Surge?
function preSurgeFlagFor(symbol) {
  if (!state.preSurge) return null;
  return state.preSurge.find(f => f.symbol === symbol) || null;
}

// Helper: top-N pre-surge candidates (including below-threshold for opportunities scoring)
function preSurgeScoreFor(symbol) {
  if (!state.preSurgeAllScored) return null;
  return state.preSurgeAllScored.find(f => f.symbol === symbol) || null;
}

// Helper: short-interest DTC for symbol (or null)
function dtcFor(symbol) {
  return state.shortInterest?.[symbol]?.dtc ?? null;
}

// Helper: latest AI stance for symbol — also returns age-based weight multiplier
// so stale analyses don't outvote fresh Daily Scan signals.
//
// Decay is CONVICTION-AWARE. A high-conviction call is a 6-12 month thesis —
// it shouldn't expire in a week. A low-conviction call is tactical and decays
// fast. Schedules (full weight → zero):
//   high conviction:   full 0-14d,  taper 14d→90d   (thesis play)
//   medium conviction: full 0-5d,   taper 5d→30d
//   low conviction:    full 0-2d,   taper 2d→14d    (tactical, original schedule)
function aiStanceFor(symbol) {
  const a = state.analyses[symbol];
  if (!a || !a.stance) return null;
  const ts = a.generated_at;
  let ageDays = 999;
  if (ts) {
    const ageMs = Date.now() - new Date(ts).getTime();
    ageDays = ageMs / 86400000;
  }
  const conv = String(a.conviction || "medium").toLowerCase();
  // [fullUntil, zeroAt] days
  let fullUntil, zeroAt;
  if (conv === "high")      { fullUntil = 14; zeroAt = 90; }
  else if (conv === "low")  { fullUntil = 2;  zeroAt = 14; }
  else                      { fullUntil = 5;  zeroAt = 30; }

  let weightMult = 1;
  if (ageDays <= fullUntil)      weightMult = 1.0;
  else if (ageDays >= zeroAt)    weightMult = 0;
  else                           weightMult = 1 - ((ageDays - fullUntil) / (zeroAt - fullUntil));
  return {
    stance: String(a.stance).toUpperCase(),
    conviction: a.conviction,
    confidence: a.confidence,
    ageDays,
    weightMult,
    decayZeroAt: zeroAt,
  };
}

// Helper: AI Analyze status for verdict cards.
// Returns one of: "fresh" | "stale" | "missing" | "running"
// Used to drive the inline "Run AI Analyze" prompt on verdict cards.
//
// Thresholds are conviction-aware to match aiStanceFor's decay schedule:
//   - within the "full weight" window → "fresh"
//   - in the taper window             → "stale" (refresh recommended)
//   - past zero-weight point OR missing → "missing"
function aiAnalysisStatus(symbol) {
  if (state.analyzingSymbols && state.analyzingSymbols[symbol]) return "running";
  const a = state.analyses[symbol];
  if (!a || !a.stance) return "missing";
  const ts = a.generated_at;
  if (!ts) return "missing";
  const ageDays = (Date.now() - new Date(ts).getTime()) / 86400000;
  const conv = String(a.conviction || "medium").toLowerCase();
  let fullUntil, zeroAt;
  if (conv === "high")      { fullUntil = 14; zeroAt = 90; }
  else if (conv === "low")  { fullUntil = 2;  zeroAt = 14; }
  else                      { fullUntil = 5;  zeroAt = 30; }
  if (ageDays >= zeroAt)    return "missing"; // effectively gone
  if (ageDays >= fullUntil) return "stale";
  return "fresh";
}

// ----------------------------------------------------------------------------
// HELD-SYMBOL VERDICT — what to do with what we own
// Returns: { symbol, name, action, conviction, dollars, votes, blocker, prime }
// ----------------------------------------------------------------------------
function computeHeldVerdict(holding, cachedScanActions) {
  const sym = holding.symbol;
  const votes = []; // { signal, dir: 'buy'|'sell'|'tilt', weight, note }

  // --- DAILY SCAN signal (use cache if provided to avoid O(N²)) ---
  const scanActions = cachedScanActions || computeDailyScan();
  const scanAction = scanActions.find(a => a.symbol === sym);
  if (scanAction) {
    if (scanAction.kind === "add") {
      const w = scanAction.recency === "stronger" ? 2 : 1;
      votes.push({ signal: "Daily Scan", dir: "buy", weight: w, note: scanAction.recency === "stronger" ? "add · STRONGER" : "add" });
    } else if (scanAction.kind === "trim") {
      votes.push({ signal: "Daily Scan", dir: "sell", weight: 1, note: "trim" });
    }
  }

  // --- AI ANALYSIS stance (decay-weighted by analysis age) ---
  const ai = aiStanceFor(sym);
  if (ai && ai.weightMult > 0.05) { // skip if fully decayed
    const ageNote = ai.ageDays > 7 ? ` (${Math.round(ai.ageDays)}d old)` : "";
    if (["ACCUMULATE"].includes(ai.stance)) {
      votes.push({ signal: "AI Analyze", dir: "buy", weight: 2 * ai.weightMult, note: ai.stance + ageNote });
    } else if (["HOLD"].includes(ai.stance)) {
      votes.push({ signal: "AI Analyze", dir: "buy", weight: 0.5 * ai.weightMult, note: "HOLD (mild)" + ageNote });
    } else if (["TRIM"].includes(ai.stance)) {
      votes.push({ signal: "AI Analyze", dir: "sell", weight: 2 * ai.weightMult, note: ai.stance + ageNote });
    } else if (["EXIT", "AVOID"].includes(ai.stance)) {
      votes.push({ signal: "AI Analyze", dir: "sell", weight: 3 * ai.weightMult, note: ai.stance + ageNote });
    }
  } else if (ai && ai.weightMult <= 0.05) {
    // Track as "decayed — needs refresh" so user knows what's missing, but it doesn't vote
    votes.push({ signal: "AI Analyze", dir: "decayed", weight: 0, note: `stale (${Math.round(ai.ageDays)}d) — refresh to vote` });
  }

  // --- PRE-SURGE flag (only CONFIRMED flags reach state.preSurge now) ---
  const ps = preSurgeFlagFor(sym);
  if (ps) {
    const dtc = dtcFor(sym);
    if (dtc != null && dtc >= 10) {
      votes.push({ signal: "Pre-Surge", dir: "buy", weight: 3, note: `confirmed ${ps.composite} · DTC ${dtc.toFixed(1)}` });
    } else {
      votes.push({ signal: "Pre-Surge", dir: "buy", weight: 2, note: `confirmed ${ps.composite}` });
    }
  }

  // --- MACRO tilt ---
  const macroV = macroVerdictFor(sym, holding.asset_class);
  if (macroV === "favored") {
    votes.push({ signal: "Macro", dir: "tilt", weight: 0.5, note: "regime tailwind" });
  } else if (macroV === "headwind") {
    votes.push({ signal: "Macro", dir: "tilt", weight: -0.5, note: "regime headwind" });
  }

  // --- NEWS catalyst (held names too — earnings beat, fraud, downgrade, etc.) ---
  // Previously only fed Today's Opportunities; now also votes here so a major
  // news catalyst on something you own can flip the verdict.
  if (state.newsItems) {
    const newsItem = state.newsItems.find(n => n.symbol === sym);
    if (newsItem) {
      const w = newsItem.urgency === "high" ? 2 : 1;
      if (newsItem.direction === "long") {
        votes.push({ signal: "News", dir: "buy", weight: w, note: newsItem.urgency === "high" ? "high-urgency catalyst" : "positive catalyst" });
      } else if (newsItem.direction === "short" || newsItem.direction === "negative") {
        votes.push({ signal: "News", dir: "sell", weight: w, note: newsItem.urgency === "high" ? "high-urgency risk" : "negative catalyst" });
      }
    }
  }

  // --- TIMING vote (earnings / ex-div / macro / anniversary pivots) ---
  // Low-weight tilt vote that refines conviction. Hard-capped at ±1.0 weight
  // so it never overrides the directional votes above.
  const timing = computeTimingVote(sym, holding.asset_class);
  if (timing) {
    votes.push(timing);
  }

  // --- VOL vote (IV/HV rank — entry cost when no event nearby) ---
  // Skipped automatically when earnings/macro within window (Timing owns those).
  const volVote = computeIvVote(sym);
  if (volVote) {
    votes.push(volVote);
  }

  // --- Tally ---
  let net = 0;
  for (const v of votes) {
    if (v.dir === "buy")  net += v.weight;
    if (v.dir === "sell") net -= v.weight;
    if (v.dir === "tilt") net += v.weight; // tilt weights already signed
  }

  // --- CONFLICT DETECTION ---
  // When buy-side and sell-side both have real weight (≥1 each), the verdict
  // is a contested call, not a clean signal. Flag it so the user knows the
  // math is averaging across a real disagreement, not a unanimous read.
  const buyWeight  = votes.filter(v => v.dir === "buy").reduce((s, v) => s + v.weight, 0);
  const sellWeight = votes.filter(v => v.dir === "sell").reduce((s, v) => s + v.weight, 0);
  const conflicted = buyWeight >= 1 && sellWeight >= 1;

  // --- Classify ---
  // PRIME is GONE. It was an "almost a buy" limbo state that read like analysis
  // but operationally told you to do nothing while feeling like you should act.
  // Two states for a held position: ACT (with a size + stop) or HOLD. If a
  // sub-threshold buy lean exists, it's a HOLD whose note says what's brewing —
  // not a third verb. Honest beats hedging.
  let action, dollars = null;
  const prime = false; // retired; kept on the return for back-compat call-sites
  const baseSize = scanAction?.buySize?.dollars || 0;
  if (net >= 2) {
    action = "ADD";
    dollars = baseSize;
  } else if (net <= -3) {
    action = "EXIT";
  } else if (net <= -1) {
    action = "TRIM";
  } else {
    action = "HOLD";
  }

  // Conviction — STRENGTH-based, not count-based.
  // OLD: participating ÷ 4 — measured how MANY sources spoke, so 3 weakly
  // disagreeing signals scored the same as 3 strongly aligned ones. That's why
  // the number felt disconnected from what you saw. NEW: net directional weight
  // ÷ total weight cast — measures how ALIGNED and STRONG the read is. Three
  // signals all pointing one way → high; three fighting each other → low.
  const totalDirWeight = votes
    .filter(v => v.dir === "buy" || v.dir === "sell")
    .reduce((s, v) => s + Math.abs(v.weight), 0);
  const conviction = totalDirWeight > 0
    ? Math.min(1, Math.abs(net) / totalDirWeight)
    : 0;

  // Diagnostic note for HOLD-with-a-lean: what would tip it to ACT? Surfaced in
  // the HOLD state of play, not as a separate tier.
  let blocker = null;
  if (action === "HOLD" && net >= 0.5) {
    const missing = [];
    if (!ps) missing.push("Pre-Surge confirm");
    if (!ai) missing.push("Run AI Analyze");
    if (macroV === "headwind") missing.push("Macro flip");
    blocker = missing.length > 0 ? missing.slice(0, 2).join(" OR ") : "Stronger scan signal";
  }

  return {
    symbol: sym,
    name: holding.name,
    asset_class: holding.asset_class,
    action, dollars, votes, net, conviction, blocker, prime, conflicted,
    scanAction, // for reference
  };
}

// ============================================================================
// TRADE PLAN ENGINE — Round 3
// Translates a verdict (ADD/TRIM/EXIT/PRIME) into a concrete actionable plan:
//   - Entry: price, style (now / staggered / limit), reasoning
//   - Stop: technical level (swing low or 50d MA) + invalidation condition
//   - Time horizon: weeks for tactical, months for thesis-based
//   - Exit ladder: trim levels with prices and percentages
//   - Re-entry trigger: when to add back after a TRIM
//
// Philosophy:
//   • Stops are TECHNICAL (chart-based), not hard %. Adapts to each asset's
//     actual volatility — silver gets a wider stop than KO.
//   • Entry style is SIGNAL-DRIVEN — RSI plays need speed, drop-from-peak plays
//     need patience.
//   • Numbers are derived from cached OHLCV, not hardcoded.
//   • If we lack data to compute confidently, we say so — never bluff.
// ============================================================================

// Helper: compute simple moving average over the last `period` closes
function computeSMA(closes, period) {
  if (closes.length < period) return null;
  const slice = closes.slice(-period);
  return slice.reduce((s, c) => s + c, 0) / period;
}

// Helper: find the lowest low in the recent N bars (swing low)
function recentSwingLow(ohlcv, bars = 20) {
  if (!ohlcv || ohlcv.length < bars) return null;
  const slice = ohlcv.slice(-bars);
  return Math.min(...slice.map(d => d.l));
}

// Helper: find the highest high in the recent N bars
function recentSwingHigh(ohlcv, bars = 20) {
  if (!ohlcv || ohlcv.length < bars) return null;
  const slice = ohlcv.slice(-bars);
  return Math.max(...slice.map(d => d.h));
}

// Helper: average true range — a measure of asset volatility used to size
// stops appropriately. Returns ATR as % of price.
function computeATRPct(ohlcv, period = 14) {
  if (!ohlcv || ohlcv.length < period + 1) return null;
  const trs = [];
  for (let i = ohlcv.length - period; i < ohlcv.length; i++) {
    const prev = ohlcv[i - 1];
    const cur = ohlcv[i];
    if (!prev || !cur) continue;
    const tr = Math.max(
      cur.h - cur.l,
      Math.abs(cur.h - prev.c),
      Math.abs(cur.l - prev.c)
    );
    trs.push(tr);
  }
  if (trs.length === 0) return null;
  const atr = trs.reduce((s, t) => s + t, 0) / trs.length;
  const lastClose = ohlcv[ohlcv.length - 1].c;
  return lastClose > 0 ? (atr / lastClose) * 100 : null;
}

// Identify which signal drove this verdict (so we pick the right entry style)
function dominantBuySignal(votes) {
  const buys = votes.filter(v => v.dir === "buy").sort((a, b) => b.weight - a.weight);
  if (buys.length === 0) return null;
  return buys[0].signal; // e.g. "Daily Scan", "Pre-Surge", "AI Analyze", "News"
}

// Main trade plan generator. Returns null if action is HOLD (no plan needed)
// or if we lack OHLCV data to compute meaningful levels.
function buildTradePlan(verdict, holding) {
  if (!verdict || verdict.action === "HOLD") return null;
  const sym = verdict.symbol;
  const data = state.prices[sym];
  const cur = data?.current_price;
  if (!cur || !data?.ohlcv || data.ohlcv.length < 30) return null;

  const ohlcv = data.ohlcv;
  const closes = ohlcv.map(d => d.c);
  const rsi = computeRSI(closes, 14);
  const sma50 = computeSMA(closes, 50);
  const sma200 = computeSMA(closes, 200);
  const swingLow = recentSwingLow(ohlcv, 20);
  const swingHigh = recentSwingHigh(ohlcv, 60); // 60d high for trim ladder
  const atrPct = computeATRPct(ohlcv, 14);
  const dominant = dominantBuySignal(verdict.votes);

  // Compute peak (90d) and drop from it — needed for stagger decisions
  const highs90 = ohlcv.slice(-90).map(d => d.h);
  const peak90 = highs90.length ? Math.max(...highs90) : cur;
  const dropFromPeak = peak90 > 0 ? ((cur - peak90) / peak90) * 100 : 0;

  // === EARNINGS-IMMINENT CHECK ===
  // If earnings within 3 calendar days for ADD/PRIME, the plan changes:
  // we don't enter ahead of a binary event. Override the entry with a "wait"
  // instruction. The rest of the plan (stop, horizon) still applies.
  const cal = calendarFor(sym);
  let earningsImminent = null;
  if (cal?.earnings_date) {
    const today = new Date(); today.setHours(0, 0, 0, 0);
    const earn = new Date(cal.earnings_date + "T00:00:00");
    const daysOut = Math.round((earn.getTime() - today.getTime()) / 86400000);
    if (daysOut >= 0 && daysOut <= 3) {
      earningsImminent = { daysOut, date: cal.earnings_date, isEstimate: !!cal.earnings_is_estimate };
    }
  }

  // === IV ELEVATION CHECK ===
  // High IV doesn't block entry like earnings does — it just changes HOW you
  // enter. High IV near earnings or a known catalyst means options are pricing
  // in a big move; the stock might be expensive *because* of that expectation.
  // We surface this as an advisory note attached to the entry plan, not a hard
  // override. Trader can still buy stock; advice is to consider sizing smaller
  // or wait for IV to compress.
  const ivData = ivRankFor(sym);
  let ivAdvisory = null;
  if (ivData && (ivData.iv_band === "high" || ivData.iv_band === "extreme")) {
    const r = Math.round(ivData.iv_rank);
    const isHv = ivData.source === "hv";
    if (ivData.iv_band === "extreme") {
      ivAdvisory = isHv
        ? `⚠ HV ${r} (extreme) — stock has been highly volatile recently. Consider smaller size; expect wide swings.`
        : `⚠ IV ${r} (extreme) — options market expects a big move. Consider smaller size or waiting for IV to compress.`;
    } else {
      ivAdvisory = isHv
        ? `HV ${r} (elevated) — stock more volatile than usual. Smaller-than-usual size suggested.`
        : `IV ${r} (elevated) — options are pricing in volatility. Smaller-than-usual size suggested.`;
    }
  }

  // === ADD verdict → ENTRY PLAN + STOP + EXIT LADDER ===
  if (verdict.action === "ADD") {
    const plan = {
      kind: "add",
      entry: null,
      stop: null,
      invalidation: null,
      horizon: null,
      exitLadder: null,
      earningsImminent, // surfaced so UI can flag the wait
      ivAdvisory,       // optional advisory shown on the trade plan
    };

    // EARNINGS GUARD: if binary event imminent, swap entry for "wait until after"
    if (earningsImminent) {
      const dayWord = earningsImminent.daysOut === 0 ? "today" : `in ${earningsImminent.daysOut}d (${earningsImminent.date})`;
      const estNote = earningsImminent.isEstimate ? " (date estimated, verify before earnings)" : "";
      plan.entry = {
        style: "wait",
        priceHint: cur,
        text: `Wait — earnings ${dayWord}${estNote}. Re-evaluate the morning AFTER earnings. Adding ahead of a binary event = gambling, not investing.`,
      };
      plan.horizon = "Re-evaluate post-earnings (1-2 days)";
      // Don't build out the rest — entry is the whole story when waiting
      return plan;
    }

    // ENTRY — driven by dominant signal (only reached when no earnings imminent)
    if (rsi != null && rsi < 35 && dropFromPeak > -15) {
      // RSI oversold: time-sensitive, buy now at market
      plan.entry = {
        style: "now",
        priceHint: cur,
        text: `Buy now at ~$${fmtUSD(cur)} — RSI ${rsi.toFixed(0)} oversold doesn't wait. Mean-reversion is time-sensitive.`,
      };
      plan.horizon = "2-3 weeks (mean reversion)";
    } else if (dropFromPeak <= -10) {
      // Drop-from-peak: pullback in trend, stagger
      const tranche = (verdict.dollars || 0) / 3;
      const dipTarget = cur * 0.97; // -3% more
      plan.entry = {
        style: "stagger",
        priceHint: cur,
        text: `Stagger entry over 2-3 days. Buy 1/3 (~$${fmtUSD(tranche, 0)}) now at $${fmtUSD(cur)}. Buy 1/3 on further dip to ~$${fmtUSD(dipTarget)}. Hold last 1/3 in reserve for either deeper weakness or confirmation rally above $${fmtUSD(cur * 1.02)}.`,
      };
      plan.horizon = "1-3 months (pullback recovery)";
    } else if (dominant === "Pre-Surge") {
      // Pre-Surge: momentum signal, don't wait
      plan.entry = {
        style: "now",
        priceHint: cur,
        text: `Buy now at ~$${fmtUSD(cur)} — Pre-Surge composite firing. Momentum windows close quickly; staggering means missing it.`,
      };
      plan.horizon = "2-6 weeks (momentum window)";
    } else if (dominant === "News") {
      // News catalyst: depends on timing — buy now if directional, but be wary of gap-ups
      const gappedUp = ohlcv.length >= 2 && ohlcv[ohlcv.length-1].o > ohlcv[ohlcv.length-2].c * 1.03;
      if (gappedUp) {
        plan.entry = {
          style: "limit",
          priceHint: ohlcv[ohlcv.length-2].c,
          text: `Stock gapped up >3% on news. Set limit at ~$${fmtUSD(ohlcv[ohlcv.length-2].c)} (yesterday's close) — don't chase. Skip if it doesn't fill within 2 days.`,
        };
      } else {
        plan.entry = {
          style: "now",
          priceHint: cur,
          text: `Buy now at ~$${fmtUSD(cur)} — news catalyst hasn't been priced in via a gap.`,
        };
      }
      plan.horizon = "2-8 weeks (catalyst follow-through)";
    } else if (dominant === "AI Analyze") {
      // AI ACCUMULATE: medium-term thesis — split entry
      const half = (verdict.dollars || 0) / 2;
      plan.entry = {
        style: "split",
        priceHint: cur,
        text: `Split entry. Buy half (~$${fmtUSD(half, 0)}) now at $${fmtUSD(cur)}. Hold the other half for a dip to ~$${fmtUSD(cur * 0.96)} or for a confirmation close above $${fmtUSD(cur * 1.03)}.`,
      };
      plan.horizon = "2-6 months (thesis play)";
    } else {
      // Fallback — buy now at market
      plan.entry = {
        style: "now",
        priceHint: cur,
        text: `Buy ~$${fmtUSD(verdict.dollars || 0, 0)} at current price ~$${fmtUSD(cur)}.`,
      };
      plan.horizon = "4-8 weeks (default)";
    }

    // STOP — technical, asset-aware
    // Pick the LOWER of: 20-day swing low, OR 50-day MA × 0.97 (3% buffer below)
    // Cap stop distance at 2× ATR to avoid absurd risk on very volatile assets.
    if (swingLow != null && sma50 != null) {
      const swingStop = swingLow * 0.98; // 2% below swing low to avoid wick stops
      const maStop = sma50 * 0.97;
      const candidateStop = Math.max(swingStop, maStop); // higher (tighter) of the two
      const stopDistancePct = ((cur - candidateStop) / cur) * 100;
      // If ATR-based max stop is tighter (less generous), use the wider technical level
      // since we want stops outside normal noise. But if technical is absurdly wide
      // (>15%), warn the user.
      let stopPrice = candidateStop;
      let stopBasis;
      if (Math.abs(swingStop - candidateStop) < Math.abs(maStop - candidateStop)) {
        stopBasis = `2% below 20-day swing low ($${fmtUSD(swingLow)})`;
      } else {
        stopBasis = `3% below 50-day MA ($${fmtUSD(sma50)})`;
      }
      plan.stop = {
        price: stopPrice,
        distancePct: stopDistancePct,
        basis: stopBasis,
        text: `Stop: $${fmtUSD(stopPrice)} (-${stopDistancePct.toFixed(1)}% from entry) — ${stopBasis}. Set as a mental stop or alert, not a market order. A close below this level on volume = thesis broken, exit on next bounce.`,
        wide: stopDistancePct > 15,
      };
      if (atrPct != null && stopDistancePct > 2.5 * atrPct) {
        // Stop is well outside normal noise — good
        plan.stop.fitsVolatility = true;
      }
    }

    // INVALIDATION — separate from stop. Conditions that cancel the trade
    // BEFORE it triggers, or invalidate the thesis after.
    const invalidators = [];
    if (verdict.votes.some(v => v.signal === "Daily Scan" && v.dir === "buy")) {
      invalidators.push("Daily Scan flips to TRIM");
    }
    if (verdict.votes.some(v => v.signal === "Macro" && v.weight > 0)) {
      invalidators.push("Macro regime shifts to risk-off");
    }
    if (verdict.votes.some(v => v.signal === "Pre-Surge")) {
      invalidators.push("Pre-Surge composite drops below 50");
    }
    if (sma200 != null && cur > sma200) {
      invalidators.push(`Close below 200-day MA ($${fmtUSD(sma200)})`);
    }
    plan.invalidation = {
      conditions: invalidators,
      text: invalidators.length > 0
        ? `Cancel/exit if: ${invalidators.slice(0, 3).join(" · ")}.`
        : "No specific invalidators — manage on stop and time horizon alone.",
    };

    // EXIT LADDER — where to take profits
    // Trim 25% at signal (your preference). Plus suggested upside targets.
    const target1 = cur * 1.15;
    const target2 = swingHigh != null ? swingHigh : cur * 1.30;
    plan.exitLadder = {
      text: `Take profits: Trim 25% at +15% (~$${fmtUSD(target1)}) when verdict next flips toward TRIM. ${swingHigh != null ? `Resistance/trim zone: prior swing high near $${fmtUSD(target2)}.` : ""} Let the remaining 75% run with the trailing stop.`,
    };

    // === REWARD-TO-RISK CHECK ===
    // A trade is only worth taking if the upside meaningfully outweighs the
    // downside. We measure first-target reward (+15%) against the technical
    // stop distance. Below MIN_REWARD_RISK (2:1) the plan is flagged so the
    // user sees the math BEFORE committing capital.
    if (plan.stop && plan.stop.price > 0) {
      const entryPrice = plan.entry?.priceHint || cur;
      const rr = rewardRiskRatio(entryPrice, plan.stop.price, target1);
      if (rr != null) {
        plan.rewardRisk = {
          ratio: rr,
          target: target1,
          stop: plan.stop.price,
          ok: rr >= MIN_REWARD_RISK,
          text: rr >= MIN_REWARD_RISK
            ? `Reward:risk ≈ ${rr.toFixed(1)}:1 — first target (+15%) vs stop (-${plan.stop.distancePct.toFixed(1)}%). Acceptable.`
            : `⚠ Reward:risk only ≈ ${rr.toFixed(1)}:1 — below the 2:1 minimum. The stop is too far from entry for the +15% target to justify it. Wait for a lower entry, a tighter level, or skip.`,
        };
      }
    }

    return plan;
  }

  // === TRIM verdict → EXIT PLAN + RE-ENTRY TRIGGER ===
  if (verdict.action === "TRIM") {
    const plan = { kind: "trim", entry: null, exit: null, reentry: null };
    plan.exit = {
      text: `Trim 25% of position at market ~$${fmtUSD(cur)} (your standard). Keep the rest. Don't trim more unless verdict deepens to EXIT or net moves below -2.`,
    };

    // Re-entry: define the conditions under which the verdict says it's
    // OK to add back. Usually a return-to-favor signal.
    const reentryConds = [];
    if (rsi != null && rsi > 50) {
      reentryConds.push(`RSI cools back below 40 (currently ${rsi.toFixed(0)})`);
    }
    if (swingLow != null && cur > swingLow * 1.10) {
      reentryConds.push(`Pullback to 20-day swing low ~$${fmtUSD(swingLow)}`);
    }
    reentryConds.push(`Daily Scan flips back to ADD on the symbol`);
    plan.reentry = {
      text: `Re-add the 25% when: ${reentryConds.slice(0, 2).join(" OR ")}. The trim was tactical, not a thesis change.`,
    };
    return plan;
  }

  // === EXIT verdict → FULL CLOSE + RE-EVALUATE ===
  if (verdict.action === "EXIT") {
    return {
      kind: "exit",
      exit: {
        text: `Close full position at market ~$${fmtUSD(cur)}. Net verdict ≤ -3 = multiple independent signals saying out. Don't average down. Don't hold for a bounce.`,
      },
      reentry: {
        text: `Don't re-add this symbol for at least 4 weeks unless an AI Analyze ACCUMULATE OR Pre-Surge ≥75 fires. Step back and reassess thesis.`,
      },
    };
  }

  return null;
}

// ----------------------------------------------------------------------------
// NEW-OPPORTUNITY VERDICT — what to open in (symbols NOT currently held)
// Returns: { symbol, action, conviction, votes, dollars, blocker }
// ----------------------------------------------------------------------------
function computeOpportunityVerdict(symbol, assetClassGuess) {
  const votes = [];

  // --- PRE-SURGE (the strongest opportunity signal) ---
  // state.preSurge now holds only CONFIRMED setups (gate-passed). The watching
  // band (coiling, not yet confirmed) gets partial credit — it's a lead, not a
  // trigger.
  const ps = preSurgeFlagFor(symbol);
  if (ps) {
    const dtc = dtcFor(symbol);
    if (dtc != null && dtc >= 10) {
      votes.push({ signal: "Pre-Surge", dir: "buy", weight: 3, note: `confirmed ${ps.composite} · SQUEEZE-PRONE DTC ${dtc.toFixed(1)}` });
    } else if (ps.composite >= 80) {
      votes.push({ signal: "Pre-Surge", dir: "buy", weight: 3, note: `confirmed ${ps.composite}` });
    } else {
      votes.push({ signal: "Pre-Surge", dir: "buy", weight: 2, note: `confirmed ${ps.composite}` });
    }
  } else {
    // Watching band — scored well but direction not yet confirmed. Partial credit.
    const psBelow = preSurgeScoreFor(symbol);
    if (psBelow && psBelow.composite >= PRESURGE_WATCH) {
      votes.push({ signal: "Pre-Surge", dir: "buy", weight: 1, note: `watching ${psBelow.composite} — not confirmed` });
    }
  }

  // --- WATCHLIST condition fired (for symbols on watchlist) ---
  const watchEntry = state.watchlist.find(w => w.symbol === symbol);
  if (watchEntry) {
    const snap = state.watchlistSnapshot[symbol];
    const fired = snap?.triggers?.length > 0;
    if (fired) {
      votes.push({ signal: "Watchlist", dir: "buy", weight: 1, note: `${snap.triggers.length} condition firing` });
    }
  }

  // --- NEWS big-opportunity ---
  if (state.newsItems) {
    const n = state.newsItems.find(item => item.symbol === symbol && item.direction === "long");
    if (n) {
      votes.push({ signal: "News", dir: "buy", weight: 2, note: n.urgency === "high" ? "high-urgency catalyst" : "catalyst flagged" });
    }
  }

  // --- ETF MOMENTUM (from leaderboard) ---
  // ETFs in the leaderboard with strong return + positive 200ma trend + bounded drawdown
  // are treated as opportunity candidates. Weight reflects strength: top-tier = 2, mid = 1.
  if (state.etfLeaderboard) {
    const etf = state.etfLeaderboard.find(e => e.symbol === symbol);
    if (etf && !etf.error && etf.return_pct != null) {
      // Strong: top-quartile return AND above 200ma AND drawdown bounded
      const aboveTrend = etf.trend_200ma === true || etf.trend_200ma === "above";
      const ddOK = etf.max_drawdown_pct == null || etf.max_drawdown_pct > -25; // not crashing
      if (etf.return_pct >= 20 && aboveTrend && ddOK) {
        votes.push({ signal: "ETF Momentum", dir: "buy", weight: 2, note: `+${etf.return_pct.toFixed(0)}% · above 200ma` });
      } else if (etf.return_pct >= 10 && aboveTrend) {
        votes.push({ signal: "ETF Momentum", dir: "buy", weight: 1, note: `+${etf.return_pct.toFixed(0)}% · trending` });
      }
    }
  }

  // --- DISCOVER IDEAS (curated/dynamic) ---
  // Reduced from weight 1 → 0.5 in Round 1: a curated-list mention alone shouldn't
  // be enough to flag something as a WATCH opportunity. Now needs to combine
  // with another signal (Pre-Surge near-threshold, watchlist firing, news,
  // ETF momentum, or macro tailwind) to clear the threshold.
  const ideaSrc = findInDiscoverIdeas(symbol);
  if (ideaSrc) {
    votes.push({ signal: "Idea", dir: "buy", weight: 0.5, note: ideaSrc.source });
  }

  // --- MACRO tilt ---
  const macroV = macroVerdictFor(symbol, assetClassGuess || guessAssetClass(symbol));
  if (macroV === "favored") {
    votes.push({ signal: "Macro", dir: "tilt", weight: 0.5, note: "regime tailwind" });
  } else if (macroV === "headwind") {
    votes.push({ signal: "Macro", dir: "tilt", weight: -0.5, note: "regime headwind" });
  }

  // --- TIMING vote (earnings / ex-div / macro / anniversary pivots) ---
  const timing = computeTimingVote(symbol, assetClassGuess || guessAssetClass(symbol));
  if (timing) {
    votes.push(timing);
  }

  // --- VOL vote (IV/HV rank as entry cost when no event nearby) ---
  const volVote = computeIvVote(symbol);
  if (volVote) {
    votes.push(volVote);
  }

  // --- Tally ---
  let net = 0;
  for (const v of votes) {
    if (v.dir === "buy")  net += v.weight;
    if (v.dir === "sell") net -= v.weight;
    if (v.dir === "tilt") net += v.weight;
  }

  // --- Classify ---
  // Raised thresholds in Round 1 to reduce noise. Previously net ≥ 0.5 cleared
  // WATCH, which meant a single Motley-Fool mention was enough to flag a stock.
  // Now WATCH requires two weak signals or one medium signal.
  let action, dollars = null;
  const portfolioValue = computeTotalPortfolioValue();
  if (net >= 4) {
    action = "STARTER";
    dollars = portfolioValue * 0.015; // 1.5% starter
  } else if (net >= 2.5) {
    action = "CONSIDER";
    dollars = portfolioValue * 0.005; // 0.5% nibble
  } else if (net >= 1) {
    action = "WATCH";
  } else {
    action = null; // not shown
  }

  return { symbol, action, votes, net, dollars };
}

// Trade plan for opportunities (non-held symbols). Lighter than buildTradePlan
// since we don't have cost basis/holding context yet — just entry + stop + horizon.
function buildOpportunityPlan(opp) {
  if (!opp || !opp.action || opp.action === "WATCH") return null; // WATCH = no entry plan yet
  const sym = opp.symbol;
  const data = state.prices[sym];
  const cur = data?.current_price;
  if (!cur || !data?.ohlcv || data.ohlcv.length < 30) return null;

  const ohlcv = data.ohlcv;
  const closes = ohlcv.map(d => d.c);
  const rsi = computeRSI(closes, 14);
  const sma50 = computeSMA(closes, 50);
  const sma200 = computeSMA(closes, 200);
  const swingLow = recentSwingLow(ohlcv, 20);
  const dominant = dominantBuySignal(opp.votes);

  const plan = { entry: null, stop: null, horizon: null };

  // ENTRY for new positions — usually start small, scale on confirmation
  const initialTranche = (opp.dollars || 0) * 0.6; // start with 60% of suggested size
  if (rsi != null && rsi < 35) {
    plan.entry = {
      text: `Open ~$${fmtUSD(initialTranche, 0)} now at $${fmtUSD(cur)} (RSI ${rsi.toFixed(0)} oversold). Add remaining $${fmtUSD((opp.dollars || 0) - initialTranche, 0)} on confirmation close above $${fmtUSD(cur * 1.03)}.`,
    };
    plan.horizon = "2-3 weeks (mean-reversion entry)";
  } else if (dominant === "Pre-Surge" || dominant === "ETF Momentum") {
    plan.entry = {
      text: `Buy ~$${fmtUSD(opp.dollars || 0, 0)} now at $${fmtUSD(cur)} — momentum signal, don't stagger.`,
    };
    plan.horizon = "2-6 weeks (momentum)";
  } else if (dominant === "News") {
    plan.entry = {
      text: `Open ~$${fmtUSD(initialTranche, 0)} at $${fmtUSD(cur)} or better on a 1-day cooldown. Skip if it gaps up >5% from here.`,
    };
    plan.horizon = "2-8 weeks (catalyst)";
  } else {
    plan.entry = {
      text: `Open ~$${fmtUSD(initialTranche, 0)} starter at $${fmtUSD(cur)}. Hold remaining $${fmtUSD((opp.dollars || 0) - initialTranche, 0)} for either weakness to $${fmtUSD(cur * 0.95)} or confirmation above $${fmtUSD(cur * 1.04)}.`,
    };
    plan.horizon = "1-3 months";
  }

  // STOP — same logic as held plan
  if (swingLow != null && sma50 != null) {
    const swingStop = swingLow * 0.98;
    const maStop = sma50 * 0.97;
    const stopPrice = Math.max(swingStop, maStop);
    const stopDistancePct = ((cur - stopPrice) / cur) * 100;
    const stopBasis = swingStop > maStop
      ? `below 20d swing low`
      : `below 50d MA`;
    plan.stop = {
      price: stopPrice,
      text: `Stop: $${fmtUSD(stopPrice)} (-${stopDistancePct.toFixed(1)}%) — ${stopBasis}. If position size × stop distance > 1% of portfolio, cut size, not stop.`,
    };
  }

  return plan;
}

// Helper for opportunity scoring: find symbol in static curated + dynamic ideas
function findInDiscoverIdeas(symbol) {
  if (typeof CURATED_PICKS !== "undefined") {
    const c = CURATED_PICKS.find(p => p.symbol === symbol);
    if (c) return { source: `${c.source.split(",")[0]}`, thesis: c.thesis };
  }
  if (state.discoverDynamic) {
    const d = state.discoverDynamic.find(p => p.symbol === symbol);
    if (d) return { source: d.source || "Live idea", thesis: d.thesis };
  }
  return null;
}

// Returns ranked list of all candidate opportunity symbols (not currently held)
// from: Pre-Surge flags, Pre-Surge near-threshold, watchlist (non-held), news,
// curated, and ETF leaderboard momentum (Round 1.5 addition).
function getOpportunityUniverse() {
  const held = new Set(state.holdings.filter(h => h.asset_class !== "cash").map(h => h.symbol));
  const candidates = new Set();

  // Pre-Surge confirmed flags
  for (const f of (state.preSurge || [])) candidates.add(f.symbol);
  // Pre-Surge watching band (composite ≥ PRESURGE_WATCH, not yet confirmed)
  for (const f of (state.preSurgeAllScored || [])) {
    if (f.composite >= PRESURGE_WATCH) candidates.add(f.symbol);
  }
  // Watchlist with firing conditions
  for (const w of state.watchlist) {
    const snap = state.watchlistSnapshot[w.symbol];
    if (snap?.triggers?.length > 0) candidates.add(w.symbol);
  }
  // News long-opportunities with a real symbol
  for (const n of (state.newsItems || [])) {
    if (n.symbol && n.direction === "long") candidates.add(n.symbol);
  }
  // Curated ideas (static, hardcoded list)
  if (typeof CURATED_PICKS !== "undefined") {
    for (const p of CURATED_PICKS) candidates.add(p.symbol);
  }
  // Dynamic Discover Ideas (refreshed via the "Refresh ideas" button)
  // Bug fix: previously only static CURATED_PICKS were added to the universe,
  // so dynamic picks could only vote if some OTHER signal (Pre-Surge, News,
  // Watchlist) independently surfaced the same symbol. Now they're proper
  // candidates in their own right, with the same 0.5 vote weight as static.
  if (state.discoverDynamic) {
    for (const p of state.discoverDynamic) {
      if (p.symbol) candidates.add(p.symbol);
    }
  }
  // ETF Leaderboard — Round 1.5: ETFs with strong momentum become candidates.
  // The opportunity scorer will filter further by trend/drawdown/return strength.
  for (const e of (state.etfLeaderboard || [])) {
    if (!e.error && e.return_pct != null && e.return_pct >= 10) {
      candidates.add(e.symbol);
    }
  }

  // Filter out anything currently held
  return Array.from(candidates).filter(s => !held.has(s));
}

function renderTodaysOpportunitiesCard() {
  const universe = getOpportunityUniverse();
  if (universe.length === 0) {
    // No raw candidates at all — likely scanner / watchlist data not loaded
    const needsScan = !state.preSurgeAllScored && !state.preSurge;
    return `
      <div class="opps-card empty">
        <div class="opps-head">
          <div>
            <h3>Today's Opportunities · New Entries</h3>
            <div class="opps-sub">Synthesizes Pre-Surge + Watchlist + News + Ideas + Macro</div>
          </div>
          ${needsScan ? `<button class="btn btn-sm" data-act="run-presurge">Run Pre-Surge</button>` : ""}
        </div>
        <div class="opps-empty-body">
          ${needsScan
            ? "Pre-Surge hasn't been run yet. Tap to scan ~165 symbols for the strongest entry setups."
            : "No actionable new entries today. Focus on managing existing positions."}
        </div>
      </div>
    `;
  }

  // Score all candidates
  const allScored = universe.map(s => computeOpportunityVerdict(s));
  // Filter to those with action (non-null)
  const actionable = allScored.filter(o => o.action !== null);
  // Dismissed filter
  const visible = actionable.filter(o => {
    const key = recKeyFor(o.symbol, "opportunity", "opps");
    return getRecStatus(key) !== "dismissed";
  });

  // Sort by net desc, cap to top 5
  visible.sort((a, b) => b.net - a.net);
  const top5 = visible.slice(0, 5);

  if (top5.length === 0) {
    // Some candidates exist but none crossed the threshold — show closest miss
    const closestMiss = allScored.filter(o => o.action === null).sort((a, b) => b.net - a.net)[0];
    return `
      <div class="opps-card">
        <div class="opps-head">
          <div>
            <h3>Today's Opportunities · New Entries</h3>
            <div class="opps-sub">${universe.length} candidates scanned · 0 actionable</div>
          </div>
        </div>
        <div class="opps-empty-body">
          No new entries cross the action threshold today.
          ${closestMiss ? `<br/>Closest: <b>${escAttr(closestMiss.symbol)}</b> net +${closestMiss.net.toFixed(1)} (need +0.5 to enter WATCH tier).` : ""}
        </div>
      </div>
    `;
  }

  const starterCount = top5.filter(o => o.action === "STARTER").length;
  const considerCount = top5.filter(o => o.action === "CONSIDER").length;
  const watchCount = top5.filter(o => o.action === "WATCH").length;

  return `
    <div class="opps-card">
      <div class="opps-head">
        <div>
          <h3>Today's Opportunities · New Entries</h3>
          <div class="opps-sub">${starterCount} starter · ${considerCount} consider · ${watchCount} watch</div>
        </div>
      </div>
      <div class="opps-list">
        ${top5.map(o => renderOpportunityItem(o)).join("")}
      </div>
      <div class="opps-footer">Top 5 by conviction · Pre-Surge + Watchlist + News + ETF Momentum + Ideas + Macro + Timing + Vol</div>
    </div>
  `;
}

async function addBreakoutConditionsToHeld() {
  const symbols = getHeldSymbolsMissingBreakouts();
  if (symbols.length === 0) {
    toast("All held positions already have upward alerts", 2400);
    return;
  }
  let added = 0;
  for (const sym of symbols) {
    try {
      const existing = state.watchlist.find(w => w.symbol === sym);
      // Three breakout conditions: 50-day high, near 52w high, RSI overbought
      const newConditions = [
        { id: cryptoRandomId(), type: "breakout_high", period: 50 },
        { id: cryptoRandomId(), type: "near_52w_high", threshold_pct: 3 },
        { id: cryptoRandomId(), type: "rsi_above", threshold: 70 },
      ];
      if (existing) {
        // Append to existing watchlist entry
        const mergedConds = [...(existing.conditions || []), ...newConditions];
        await db.collection("users").doc(state.uid).collection("watchlist").doc(existing.id).update({
          conditions: mergedConds,
        });
      } else {
        // Create new watchlist entry for this held symbol
        await db.collection("users").doc(state.uid).collection("watchlist").doc(sym).set({
          symbol: sym,
          name: state.holdings.find(h => h.symbol === sym)?.name || sym,
          conditions: newConditions,
          asset_class: guessAssetClass(sym),
          added_at: firebase.firestore.FieldValue.serverTimestamp(),
        });
      }
      added++;
    } catch (e) {
      console.warn("Failed to add breakout conditions for", sym, e);
    }
  }
  await loadWatchlist();
  // Auto-scan to evaluate new conditions
  fetchWatchlistSnapshot().catch(() => {});
  toast(`Added breakout alerts to ${added} position${added === 1 ? "" : "s"}`);
  // Dismiss the prompt so it doesn't reappear immediately
  state.breakoutPromptDismissed = true;
  localStorage.setItem("breakoutPromptDismissed", "1");
  renderCurrentView();
}

function dismissBreakoutPrompt() {
  state.breakoutPromptDismissed = true;
  localStorage.setItem("breakoutPromptDismissed", "1");
  renderCurrentView();
}

// ============================================================================
// DAILY PORTFOLIO SCAN — synthesized "what to do today" actions.
// Rule-based so it works in backtest. AI analyses are used as a conviction modifier.
// Sizing: each suggested ADD/OPEN includes a $ amount derived from portfolio total,
// conviction, and signal strength. Sizes are SUGGESTIONS — you decide.
// ============================================================================
function computeTotalPortfolioValue() {
  let total = 0;
  for (const h of state.holdings) {
    if (h.asset_class === "cash") { total += h.quantity || 0; continue; }
    const cur = state.prices[h.symbol]?.current_price;
    if (cur) total += (h.quantity || 0) * cur;
  }
  return total;
}
function getCashAvailable() {
  const cashH = state.holdings.find(h => h.asset_class === "cash" && h.symbol === "CASH");
  return cashH?.quantity || 0;
}
// ---- RISK-BASED POSITION SIZING ----------------------------------------
// MAX_RISK_PER_TRADE: the fraction of total portfolio we're willing to LOSE
// on a single trade if its stop is hit. This is the professional "1% rule" —
// the position size is derived FROM the stop, not the other way round.
//   shares  = (portfolio * riskFrac) / stopDistancePerShare
//   dollars = shares * entryPrice
// A wide stop (volatile asset) → smaller position. A tight stop → larger.
// This keeps the dollar loss constant regardless of the asset's volatility.
const MAX_RISK_PER_TRADE = 0.01;   // risk 1% of portfolio per trade
const MIN_REWARD_RISK    = 2.0;    // require ≥2:1 reward-to-risk to greenlight

// Suggested buy size for a symbol.
//   When `stopDistancePct` is supplied (>0), size is RISK-BASED:
//     dollars = (portfolio * MAX_RISK_PER_TRADE) / (stopDistancePct/100)
//   When no stop is known, falls back to the legacy conviction-weighted
//     %-of-portfolio model so nothing breaks for callers that lack a stop.
//   Either way the result is capped at 50% of available cash.
function suggestBuySize(symbol, kind, signalStrength = 1.0, stopDistancePct = null) {
  const total = computeTotalPortfolioValue();
  const cash = getCashAvailable();
  if (total <= 0 || cash <= 0) return { dollars: 0, pct: 0, basis: "none" };
  const a = state.analyses?.[symbol];
  const conv = (a?.conviction || "").toLowerCase();
  const convMult = conv === "high" ? 1.5 : conv === "low" ? 0.5 : 1.0;

  let dollars, basis;
  if (stopDistancePct != null && stopDistancePct > 0.1) {
    // RISK-BASED: position sized so a stop-out loses ~MAX_RISK_PER_TRADE of portfolio.
    const riskBudget = total * MAX_RISK_PER_TRADE * convMult * signalStrength;
    dollars = riskBudget / (stopDistancePct / 100);
    // Hard ceiling: never let a single risk-sized position exceed 15% of portfolio,
    // no matter how tight the stop — protects against a too-tight stop blowing up size.
    const maxPosition = total * 0.15;
    if (dollars > maxPosition) dollars = maxPosition;
    basis = "risk";
  } else {
    // LEGACY fallback: conviction-weighted % of portfolio.
    const basePct = kind === "open" ? 0.02 : 0.01;
    dollars = total * basePct * convMult * signalStrength;
    basis = "legacy";
  }

  // Cap at 50% of available cash so we don't deploy everything in one buy
  if (dollars > cash * 0.5) dollars = cash * 0.5;
  if (dollars < 50) return { dollars: 0, pct: 0, basis }; // too small to bother
  return {
    dollars,
    pct: (dollars / total) * 100,
    basis,
    riskDollars: stopDistancePct != null && stopDistancePct > 0.1
      ? dollars * (stopDistancePct / 100) : null,
  };
}

// Reward-to-risk ("R-multiple") for a planned trade.
//   entry, stop, target are absolute prices. Returns the ratio or null.
//   ratio < MIN_REWARD_RISK means the trade is not worth the risk.
function rewardRiskRatio(entry, stop, target) {
  if (!(entry > 0) || !(stop > 0) || !(target > 0)) return null;
  const risk = entry - stop;
  const reward = target - entry;
  if (risk <= 0 || reward <= 0) return null;
  return reward / risk;
}

function computeDailyScan() {
  const actions = [];

  for (const h of state.holdings) {
    if (h.asset_class === "cash") continue;
    const cur = state.prices[h.symbol]?.current_price;
    const data = state.prices[h.symbol];
    if (!cur || !data) continue;

    const hm = holdingMetrics(h);
    const analysis = state.analyses[h.symbol];
    const stance = (analysis?.stance || "").toLowerCase();
    const conv = (analysis?.conviction || "").toLowerCase();

    // Compute fresh indicators
    let rsi = null, dropFromPeak = null;
    let stopDistPct = null; // estimated stop distance for risk-based sizing
    if (data.ohlcv && data.ohlcv.length >= 30) {
      const closes = data.ohlcv.map(d => d.c);
      const highs = data.ohlcv.map(d => d.h);
      rsi = computeRSI(closes, 14);
      const slice90 = highs.slice(-90);
      if (slice90.length) {
        const peak = Math.max(...slice90);
        dropFromPeak = peak > 0 ? ((cur - peak) / peak) * 100 : 0;
      }
      // Stop estimate: 2% below the 20-day swing low, or 3% below 50d MA,
      // whichever is tighter (higher). Mirrors buildTradePlan's stop logic so
      // scan sizing and the trade plan agree.
      const swingLow = recentSwingLow(data.ohlcv, 20);
      const sma50v = computeSMA(closes, 50);
      if (swingLow != null && sma50v != null && cur > 0) {
        const candidateStop = Math.max(swingLow * 0.98, sma50v * 0.97);
        const d = ((cur - candidateStop) / cur) * 100;
        if (d > 0.1 && d < 50) stopDistPct = d;
      }
    }

    // Rule 1: ADD — held position with dip or RSI oversold (THIS IS THE LEAD)
    if (rsi != null && rsi < 40 && hm.pnlPct != null && hm.pnlPct > -12) {
      const strength = rsi < 30 ? 1.5 : 1.0;
      const size = suggestBuySize(h.symbol, "add", strength, stopDistPct);
      if (size.dollars > 0) {
        actions.push({
          symbol: h.symbol, kind: "add",
          text: `Add ~$${fmtUSD(size.dollars, 0)} of ${h.symbol} (~${size.pct.toFixed(1)}% of portfolio) at $${fmtUSD(cur)}`,
          why: `RSI ${rsi.toFixed(0)} oversold — productive add zone if thesis intact`,
          confidence: rsi < 30 ? "high" : "medium",
          sortKey: rsi,
          buySize: size,
        });
      }
    } else if (dropFromPeak != null && dropFromPeak <= -10 && hm.pnlPct != null && hm.pnlPct > -12) {
      const strength = dropFromPeak <= -15 ? 1.5 : 1.0;
      const size = suggestBuySize(h.symbol, "add", strength, stopDistPct);
      if (size.dollars > 0) {
        actions.push({
          symbol: h.symbol, kind: "add",
          text: `Add ~$${fmtUSD(size.dollars, 0)} of ${h.symbol} (~${size.pct.toFixed(1)}% of portfolio) at $${fmtUSD(cur)}`,
          why: `${dropFromPeak.toFixed(1)}% off 90d peak — normal pullback, not a breakdown`,
          confidence: dropFromPeak <= -15 ? "high" : "medium",
          sortKey: dropFromPeak,
          buySize: size,
        });
      }
    } else if (stance.includes("buy") || stance.includes("accumulate") || stance.includes("add")) {
      const strength = conv === "high" ? 1.3 : 1.0;
      const size = suggestBuySize(h.symbol, "add", strength);
      if (size.dollars > 0) {
        actions.push({
          symbol: h.symbol, kind: "add",
          text: `Add ~$${fmtUSD(size.dollars, 0)} of ${h.symbol} (~${size.pct.toFixed(1)}% of portfolio) per analysis`,
          why: analysis?.headline || `App stance: ${stance.toUpperCase()}`,
          confidence: analysis?.confidence || "medium",
          sortKey: -90,
          buySize: size,
        });
      }
    }

    // Rule 2: TRIM — secondary. Only on big gains or extreme overbought.
    // SUPPRESSED when asset is currently in a pullback (>10% off 90d peak):
    // contradicting "add on weakness" with "trim on strength" in the same card is confusing.
    // If the asset is far below its peak, the right action is ADD (which fires above), not TRIM.
    const inPullback = (dropFromPeak != null && dropFromPeak <= -10);
    if (!inPullback && hm.pnlPct != null && hm.pnlPct >= 40 && conv !== "low") {
      actions.push({
        symbol: h.symbol, kind: "trim",
        text: `Trim 20-30% of ${h.symbol} on strength above $${fmtUSD(cur)}`,
        why: `+${hm.pnlPct.toFixed(1)}% from cost — partial profit-take locks in gain without exiting thesis`,
        confidence: hm.pnlPct >= 70 ? "high" : "medium",
        sortKey: -hm.pnlPct,
      });
    } else if (!inPullback && rsi != null && rsi > 80) {
      actions.push({
        symbol: h.symbol, kind: "trim",
        text: `Trim 10-15% of ${h.symbol} on RSI extreme`,
        why: `RSI ${rsi.toFixed(0)} extreme overbought — short-term reversion likely`,
        confidence: "high",
        sortKey: -rsi,
      });
    } else if (stance.includes("sell") || stance.includes("trim") || stance.includes("reduce")) {
      // Analysis-based trim CAN fire even in a pullback because the AI has its own logic
      actions.push({
        symbol: h.symbol, kind: "trim",
        text: analysis?.recommended_action || `Trim ${h.symbol} per analysis`,
        why: analysis?.headline || `App stance: ${stance.toUpperCase()}`,
        confidence: analysis?.confidence || "medium",
        sortKey: -100,
      });
    }
  }

  // Also surface watchlist setups that aren't held (potential new positions)
  for (const w of (state.watchlist || [])) {
    const held = state.holdings.some(h => h.symbol === w.symbol && h.asset_class !== "cash");
    if (held) continue;
    const snap = state.watchlistSnapshot[w.symbol];
    if (!snap || !snap.triggers || snap.triggers.length === 0) continue;
    const cur = snap.current_price;
    const setup = snap.setup_score || 0;
    if (setup < 40) continue;
    const strength = setup >= 70 ? 1.5 : 1.0;
    const size = suggestBuySize(w.symbol, "open", strength);
    if (size.dollars > 0) {
      actions.push({
        symbol: w.symbol, kind: "open",
        text: `Open ~$${fmtUSD(size.dollars, 0)} position in ${w.symbol} (~${size.pct.toFixed(1)}% of portfolio) at $${fmtUSD(cur)}`,
        why: `${snap.triggers.length} condition${snap.triggers.length === 1 ? "" : "s"} firing · setup score ${setup}`,
        confidence: setup >= 70 ? "high" : "medium",
        sortKey: -setup,
        buySize: size,
      });
    } else {
      // Still show without dollar amount if portfolio is empty/cash is 0
      actions.push({
        symbol: w.symbol, kind: "open",
        text: `New setup on ${w.symbol} at $${fmtUSD(cur)} — consider opening starter position`,
        why: `${snap.triggers.length} condition${snap.triggers.length === 1 ? "" : "s"} firing · setup score ${setup}`,
        confidence: setup >= 70 ? "high" : "medium",
        sortKey: -setup,
      });
    }
  }

  // Dedup pass: if a symbol has both ADD/OPEN and TRIM, keep only the buy.
  // The buy is the higher-priority action — trimming and adding the same symbol simultaneously is contradictory.
  const buySymbols = new Set(actions.filter(a => a.kind === "add" || a.kind === "open").map(a => a.symbol));
  const deduped = actions.filter(a => !(a.kind === "trim" && buySymbols.has(a.symbol)));

  // Sort: ADDS first (priority — buying matters more than selling),
  // then OPENS (new ideas), then TRIMS (secondary). Within a kind, highest signal strength first.
  deduped.sort((a, b) => {
    const order = { add: 0, open: 1, trim: 2 };
    if (order[a.kind] !== order[b.kind]) return order[a.kind] - order[b.kind];
    return a.sortKey - b.sortKey;
  });

  const top = deduped.slice(0, 5);

  // ===== Portfolio-aware sizing =====
  // Compute total recommended cash deployment across all buy/open suggestions.
  // If total exceeds 50% of available cash, scale every suggestion down proportionally
  // so the cumulative deployment stays under 50% of cash. This prevents 5 ADD signals
  // all firing at full size and exhausting your cash budget in one card.
  const cashAvail = getCashAvailable();
  const portfolioTotal = computeTotalPortfolioValue();
  const DEPLOYMENT_CAP_PCT = 0.50; // hard cap: don't recommend deploying more than 50% of cash per scan
  const buyActions = top.filter(a => (a.kind === "add" || a.kind === "open") && a.buySize?.dollars > 0);
  const totalSuggested = buyActions.reduce((sum, a) => sum + a.buySize.dollars, 0);
  const maxDeployment = cashAvail * DEPLOYMENT_CAP_PCT;
  let scaleFactor = 1;
  if (totalSuggested > maxDeployment && totalSuggested > 0) {
    scaleFactor = maxDeployment / totalSuggested;
    // Apply scale to each buy action's size
    for (const a of buyActions) {
      const newDollars = a.buySize.dollars * scaleFactor;
      const newPct = portfolioTotal > 0 ? (newDollars / portfolioTotal) * 100 : 0;
      a.buySize = { dollars: newDollars, pct: newPct };
      // Rewrite the text with the new dollar amount
      // Find the original number after "~$" and replace, or rebuild
      a.text = a.text.replace(/~\$[\d,]+/, `~$${fmtUSD(newDollars, 0)}`);
      a.text = a.text.replace(/~[\d.]+%/, `~${newPct.toFixed(1)}%`);
    }
  }
  const finalTotalDeployment = buyActions.reduce((sum, a) => sum + a.buySize.dollars, 0);

  // Attach metadata to the result so renderDailyScan can show the summary header
  top._summary = {
    cashAvail,
    totalDeployment: finalTotalDeployment,
    deploymentPct: cashAvail > 0 ? (finalTotalDeployment / cashAvail) * 100 : 0,
    scaledDown: scaleFactor < 1,
    buyCount: buyActions.length,
    trimCount: top.filter(a => a.kind === "trim").length,
  };

  return top;
}

// ============================================================================
// SCAN RECENCY TRACKING
// Persists each day's scan to localStorage so today's actions can be compared
// to yesterday's. Each action gets a recency tag: NEW (first time seen),
// STRONGER (was there yesterday but signal strengthened), or CARRIED OVER
// (essentially same as yesterday). After 5+ days of carry-over, the scan
// shows a nudge to act-or-dismiss.
// ============================================================================
const SCAN_HISTORY_KEY = "scanHistory_v1";
const SCAN_HISTORY_MAX_DAYS = 30;

function loadScanHistory() {
  try {
    const raw = localStorage.getItem(SCAN_HISTORY_KEY);
    return raw ? JSON.parse(raw) : {};
  } catch (e) { return {}; }
}

function saveScanHistory(history) {
  try {
    // Trim old entries (older than 30 days)
    const cutoff = Date.now() - (SCAN_HISTORY_MAX_DAYS * 86400000);
    const trimmed = {};
    for (const [key, val] of Object.entries(history)) {
      if ((val.lastSeenTs || 0) >= cutoff) trimmed[key] = val;
    }
    localStorage.setItem(SCAN_HISTORY_KEY, JSON.stringify(trimmed));
  } catch (e) { /* localStorage may be full or disabled */ }
}

// Key for an action — symbol + kind. Same symbol with same action kind
// across days counts as "same recommendation"; symbol changing kind = new.
function scanActionKey(action) {
  return `${action.symbol}__${action.kind}`;
}

// Numeric measure of "signal strength" — used to detect STRONGER vs CARRIED.
// Higher = stronger signal. For ADD, deeper drop = stronger. For TRIM, higher gain = stronger.
function actionSignalStrength(action) {
  // sortKey is already designed so "more negative = stronger" for adds and trims.
  // We normalize to positive: stronger signal = higher number.
  if (action.kind === "trim") return -(action.sortKey || 0); // sortKey is -pnlPct or -rsi
  return -(action.sortKey || 0); // sortKey for adds is negative rsi/dropFromPeak
}

// Tags each action with recency info, comparing against scan history.
// Mutates and returns the actions array. Saves updated history.
function tagActionsWithRecency(actions) {
  const history = loadScanHistory();
  const now = Date.now();
  const todayKey = new Date().toISOString().slice(0, 10);

  for (const action of actions) {
    const key = scanActionKey(action);
    const prev = history[key];
    const currentStrength = actionSignalStrength(action);

    if (!prev) {
      // First time we've seen this recommendation
      action.recency = "new";
      action.daysActive = 1;
      history[key] = {
        firstSeen: todayKey,
        firstSeenTs: now,
        lastSeen: todayKey,
        lastSeenTs: now,
        peakStrength: currentStrength,
        daysActive: 1,
      };
    } else if (prev.lastSeen === todayKey) {
      // Already tagged this render today; preserve prior recency to avoid flicker
      action.recency = prev._todayRecency || "carried";
      action.daysActive = prev.daysActive || 1;
    } else {
      // Returning recommendation. Compare strength.
      const STRENGTHEN_THRESHOLD = 1.15; // 15% stronger to count as STRONGER
      const isStronger = currentStrength > (prev.peakStrength || 0) * STRENGTHEN_THRESHOLD;
      action.daysActive = (prev.daysActive || 0) + 1;
      action.recency = isStronger ? "stronger" : "carried";
      history[key] = {
        ...prev,
        lastSeen: todayKey,
        lastSeenTs: now,
        peakStrength: Math.max(prev.peakStrength || 0, currentStrength),
        daysActive: action.daysActive,
        _todayRecency: action.recency,
      };
    }
  }

  // Clean up: any keys in history not in today's actions get their "last seen" stale.
  // We don't delete here — saveScanHistory's age-based trim handles that.

  saveScanHistory(history);
  return actions;
}
