// ============================================================================
// PHASE C — Verdict zones.
// Three sections rendered in priority order: ACT (top), WATCH (middle),
// HOLD (bottom, collapsible). Each row is one holding with one verb and a
// one-line action. Tap to drill into the asset detail card.
// ============================================================================

function renderVerdictZones() {
  if (state.holdings.length === 0) return "";

  const verdictsBySymbol = new Map(state.verdicts.map(v => [v.symbol, v]));

  // Build row records for every holding. Even when the verdict is missing
  // (first load before /verdict completes, or it failed), show a placeholder
  // row so the user sees their book and a clear "Run analyze" path.
  const rows = state.holdings.map(h => {
    const v = verdictsBySymbol.get(h.symbol);
    const hm = holdingMetrics(h);
    const isCash = h.asset_class === "cash";
    if (isCash) {
      // Cash never gets a verdict — it's just there as portfolio context.
      return {
        symbol: h.symbol, name: h.name, asset_class: h.asset_class,
        verdict: "HOLD", action_line: `${((hm.value || 0) / Math.max(m_safe(), 1) * 100).toFixed(1)}% of portfolio`,
        severity: "low", freshness: "fresh", reasoning_short: "",
        missing_inputs: [], fired_trigger: null,
        value: hm.value, pnl_pct: 0, day_change_pct: 0,
        is_placeholder: false, is_cash: true,
      };
    }
    if (!v) {
      // No server verdict yet: synthesize a WATCH row that prompts an analysis.
      const a = state.analyses[h.symbol];
      const decay = a ? convictionDecay(a, h.asset_class) : null;
      let action_line, missing;
      if (!a) {
        action_line = "Run analyze for full read";
        missing = [`No analysis exists for ${h.symbol} — run analyze`];
      } else if (decay && decay.is_stale) {
        action_line = `Re-analyze — last call ${decay.days_old.toFixed(0)}d old`;
        missing = [`AI analysis on ${h.symbol} is ${decay.days_old.toFixed(0)}d old`];
      } else {
        action_line = state.verdictsLoading ? "Computing verdict…" : "Verdict pending — pull to refresh";
        missing = [];
      }
      return {
        symbol: h.symbol, name: h.name, asset_class: h.asset_class,
        verdict: "WATCH", action_line, severity: "low",
        freshness: a ? (decay?.status || "fresh") : "missing",
        reasoning_short: a?.headline || "", missing_inputs: missing, fired_trigger: null,
        stance_echo: a?.stance || null, conviction: a?.conviction || null,
        key_signal: "",
        value: hm.value, pnl_pct: hm.pnlPct, day_change_pct: null,
        is_placeholder: true, is_cash: false,
      };
    }
    return {
      symbol: v.symbol, name: v.name || h.name, asset_class: v.asset_class || h.asset_class,
      verdict: v.verdict, action_line: v.action_line, severity: v.severity,
      freshness: v.freshness, reasoning_short: v.reasoning_short,
      missing_inputs: v.missing_inputs || [], fired_trigger: v.fired_trigger,
      stance_echo: v.stance_echo || null, conviction: v.conviction || null,
      key_signal: v.key_signal || "",
      value: hm.value, pnl_pct: hm.pnlPct, day_change_pct: v.day_change_pct,
      is_placeholder: false, is_cash: false,
    };
  });

  const act   = rows.filter(r => r.verdict === "ACT");
  const watch = rows.filter(r => r.verdict === "WATCH");
  const hold  = rows.filter(r => r.verdict === "HOLD");

  // Sort: ACT primarily by severity, then by log(value) — so a high-severity
  // ACT on a $15k position outranks a high-severity ACT on a $500 position
  // (same severity bucket, but more money at stake). log() rather than raw
  // value so a 30x size difference doesn't dominate severity ordering when
  // they're in adjacent buckets.
  const sevRank = { high: 0, medium: 1, low: 2 };
  const sortKey = r => sevRank[r.severity] * 10 - Math.log10((r.value || 1) + 1);
  act.sort((a, b) => sortKey(a) - sortKey(b));
  watch.sort((a, b) => (b.missing_inputs.length - a.missing_inputs.length) || ((b.value || 0) - (a.value || 0)));
  hold.sort((a, b) => (b.value || 0) - (a.value || 0));

  // Eyebrow rollup: "2 actions · 5 holding · 1 watch"
  const counts = `${act.length} action${act.length === 1 ? "" : "s"} · ${hold.length} holding · ${watch.length} watch`;

  const loadingTag = state.verdictsLoading ? `<span class="verdict-loading-pill"><span class="spinner"></span> refreshing</span>` : "";
  const ageTag = state.verdictsAt && !state.verdictsLoading
    ? `<span class="verdict-age-pill">Updated ${fmtRel(state.verdictsAt)}</span>`
    : "";
  // Track in-flight "analyze all" runs. The button shows progress like
  // "Analyzing 3/8…" so the user knows it's working through the book.
  const aaTotal = state.analyzeAllTotal || 0;
  const aaDone = state.analyzeAllDone || 0;
  const isAnalyzingAll = state.analyzeAllRunning;
  const refreshBtn = `<button class="btn-ghost-sm" data-act="verdict-refresh" ${state.verdictsLoading ? "disabled" : ""}>Refresh</button>`;
  const analyzeAllBtn = `<button class="btn-ghost-sm btn-analyze-all" data-act="analyze-all" ${isAnalyzingAll ? "disabled" : ""}>${
    isAnalyzingAll ? `<span class="spinner"></span> ${aaDone}/${aaTotal}` : "Analyze all"
  }</button>`;

  const noteHtml = state.portfolioNote
    ? `<div class="portfolio-note">${escAttr(state.portfolioNote)}</div>`
    : "";

  return `
    <div class="verdict-header">
      <div class="verdict-header-left">
        <div class="verdict-eyebrow">${counts}</div>
        <div class="verdict-meta-row">${ageTag}${loadingTag}</div>
      </div>
      <div class="verdict-header-right">
        ${analyzeAllBtn}
        ${refreshBtn}
      </div>
    </div>
    ${noteHtml}
    ${act.length > 0 ? `
      <div class="verdict-zone verdict-zone-act">
        ${act.map(renderVerdictRow).join("")}
      </div>` : ""}
    ${watch.length > 0 ? `
      <div class="verdict-zone verdict-zone-watch">
        <div class="verdict-zone-label">Watch</div>
        ${watch.map(renderVerdictRow).join("")}
      </div>` : ""}
    ${hold.length > 0 ? `
      <div class="verdict-zone verdict-zone-hold">
        <button class="verdict-hold-toggle" data-act="toggle-hold-zone">
          <span class="verdict-zone-label" style="padding:0;">Hold · ${hold.length}</span>
          <span class="verdict-hold-chevron ${state.holdZoneExpanded ? 'open' : ''}">${state.holdZoneExpanded ? '▾' : '▸'}</span>
        </button>
        ${state.holdZoneExpanded ? hold.map(renderVerdictRow).join("") : `
          <div class="verdict-hold-collapsed">${hold.map(r => escAttr(r.symbol)).join(" · ")}</div>`}
      </div>` : ""}
  `;
}

// Single row renderer for the verdict list.
// Every row is information-dense: stance + conviction + key signal + reasoning
// alongside the verb. The right-side ⚡ Analyze button fires runAnalysis(symbol)
// directly without leaving Portfolio — used to refresh a stale read or
// re-evaluate a HOLD that feels wrong.
// ============================================================================
// PHASE G — Per-symbol verdict block on the asset detail card.
// Computed client-side via computeLocalVerdict so it appears the instant
// runAnalysis() finishes, without waiting for portfolio /verdict.
//
// Works for any symbol — held, watchlist, opportunity, or one-off lookup.
// The verb framing reframes based on isHeld:
//   - HELD: ACT = trim/add/exit, HOLD = on plan, WATCH = data stale
//   - NOT HELD: ACT = setup is live, HOLD = thesis intact but wait, WATCH = data stale
// ============================================================================
function renderAssetVerdictBlock(symbol, analysis, holding, currentPrice) {
  const isHeld = !!holding && holding.asset_class !== "cash";
  const decay = analysis ? convictionDecay(analysis, holding?.asset_class || "us_stock") : null;
  const v = computeLocalVerdict(analysis, holding, {
    isHeld,
    currentPrice,
    decay,
  });

  const verbClass = `avb-${v.verdict.toLowerCase()}`;
  const sevClass = v.verdict === "ACT" ? `avb-sev-${v.severity}` : "";
  const sevPill = v.verdict === "ACT"
    ? `<span class="vrow-sev-pill vrow-sev-pill-${escAttr(v.severity)}">${escAttr(v.severity)}</span>`
    : "";

  // Stance badge
  const stanceBadge = v.stance_echo
    ? `<span class="vrow-stance vrow-stance-${escAttr(v.stance_echo.toLowerCase())}">${escAttr(v.stance_echo)}${v.conviction ? ` · ${escAttr(v.conviction)}` : ""}</span>`
    : "";

  // Freshness badge (only when not fresh)
  const freshLabelMap = { aging: "AGING", stale: "OLD", very_stale: "OLD", missing: "NO ANALYSIS" };
  const freshLabel = freshLabelMap[v.freshness];
  const freshBadge = freshLabel
    ? `<span class="vrow-fresh-badge vrow-fresh-${escAttr(v.freshness)}">${escAttr(freshLabel)}</span>`
    : "";

  // Held-context label so the user knows whose framing is being applied
  const contextLabel = isHeld
    ? `<span class="avb-context avb-context-held">YOUR POSITION</span>`
    : `<span class="avb-context avb-context-new">${holding?.asset_class === "cash" ? "CASH" : "NEW ENTRY"}</span>`;

  // Plan block for ACT — pulls from the underlying analysis the same way the
  // Portfolio ACT rows do. Reused renderer logic, but inlined here so the
  // function is self-contained.
  let planBlock = "";
  if (v.verdict === "ACT" && analysis) {
    const parts = [];
    if (analysis.action?.price_zone) {
      parts.push(`<div class="vplan-row"><span class="vplan-k">Zone</span><span class="vplan-v">${escAttr(analysis.action.price_zone)}</span></div>`);
    }
    if (analysis.action?.invalidation && analysis.action.invalidation !== "N/A") {
      parts.push(`<div class="vplan-row"><span class="vplan-k">Invalidate</span><span class="vplan-v">${escAttr(analysis.action.invalidation)}</span></div>`);
    }
    const rr = analysis.reward_risk?.ratio ?? analysis.computed_reward_risk?.ratio;
    if (rr != null) {
      parts.push(`<div class="vplan-row"><span class="vplan-k">R:R</span><span class="vplan-v">${typeof rr === "number" ? rr.toFixed(2) : escAttr(rr)}</span></div>`);
    }
    if (analysis.action?.timeframe) {
      parts.push(`<div class="vplan-row"><span class="vplan-k">Timeframe</span><span class="vplan-v">${escAttr(analysis.action.timeframe)}</span></div>`);
    }
    if (parts.length > 0) {
      planBlock = `<div class="vplan">${parts.join("")}</div>`;
    }
  }

  // Missing-inputs prompt — direct action the user can take to upgrade the
  // verdict's confidence (run analyze when missing/stale, etc.).
  const missingBlock = (v.missing_inputs && v.missing_inputs.length > 0)
    ? `<div class="avb-missing">
         ${v.missing_inputs.map(s => `<div class="avb-missing-row">→ ${escAttr(s)}</div>`).join("")}
       </div>`
    : "";

  // Inline Analyze button — same affordance as on Portfolio rows. Useful when
  // the verdict is WATCH because the analysis is stale; tap to refresh and
  // the verdict block updates automatically when runAnalysis completes.
  const isAnalyzing = !!(state.analyzingSymbols && state.analyzingSymbols[symbol]);
  const analyzeBtn = `<button class="vrow-analyze ${isAnalyzing ? 'analyzing' : ''}"
            data-act="vrow-analyze" data-symbol="${escAttr(symbol)}"
            title="${analysis ? "Re-analyze" : "Analyze"} ${escAttr(symbol)}"
            ${isAnalyzing ? 'disabled' : ''}>
      ${isAnalyzing
        ? `<span class="spinner"></span>`
        : `<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>`}
    </button>`;

  // Substance blocks — surface the analyst's real rationale (why, top risks,
  // counter-argument). These are the fields the analyst spent the most time
  // on; the verdict block summarizes them here so the user doesn't have to
  // scroll to find the substance.
  const whyBlock = v.why
    ? `<div class="avb-section">
         <div class="avb-section-label">Why</div>
         <div class="avb-section-body">${escAttr(v.why)}</div>
       </div>`
    : "";

  const readBlock = (v.read && v.read !== v.reasoning_short && v.read.length > 20)
    ? `<div class="avb-section">
         <div class="avb-section-label">Read</div>
         <div class="avb-section-body">${escAttr(v.read)}</div>
       </div>`
    : "";

  const risksBlock = (v.key_risks && v.key_risks.length > 0)
    ? `<div class="avb-section avb-section-risks">
         <div class="avb-section-label">Top risks</div>
         <ul class="avb-section-list">
           ${v.key_risks.map(r => `<li>${escAttr(r)}</li>`).join("")}
         </ul>
       </div>`
    : "";

  const counterBlock = v.counter_argument
    ? `<div class="avb-section avb-section-counter">
         <div class="avb-section-label">Counter-argument</div>
         <div class="avb-section-body">${escAttr(v.counter_argument)}</div>
       </div>`
    : "";

  const avbDirective = renderDirectiveLine(deriveDirective({ ...v, symbol }));
  return `<div class="asset-verdict-block ${verbClass} ${sevClass}">
    <div class="avb-head">
      <span class="avb-verb-sym">${escAttr(symbol)}</span>
      ${freshBadge}
      ${contextLabel}
      <span class="vrow-spacer"></span>
      ${analyzeBtn}
    </div>
    ${avbDirective}
    ${v.reasoning_short ? `<div class="vrow-reasoning">${escAttr(v.reasoning_short)}</div>` : ""}
    ${planBlock}
    ${whyBlock}
    ${readBlock}
    ${risksBlock}
    ${counterBlock}
    ${missingBlock}
  </div>`;
}

// ============================================================================
// DIRECTIVE DERIVATION — the plain-language instruction shown at the top of
// every verdict row. Replaces the confusing ACT/HOLD/WATCH + stance·conviction
// stack with ONE imperative the user can read in a second:
//
//     BUY · $74,750 · add $1,200 · confidence HIGH
//
// Six verbs (user-defined):
//   BUY   — open a NEW position (not held). level + dollars.
//   ADD   — add to a HELD position. level + dollars.
//   SELL  — take partial profit on a HELD position. level (target) + dollars.
//   EXIT  — sell ALL (big red alarm — dip / thesis break).
//   HOLD  — held, do nothing, state of play.
//   WAIT  — not held, on the radar; shows the level that would make it a BUY.
//
// Confidence = the WEAKER of (signal strength, thesis conviction), mapped to
// HIGH/MED/LOW. Rationale: you should only size up when the setup is live AND
// the thesis is durable. Taking the min kills the "HOLD·HIGH" contradiction —
// one number, derived from both inputs, instead of two competing badges.
// ============================================================================
function deriveDirective(r) {
  const isHeld = state.holdings.some(h => h.symbol === r.symbol && h.asset_class !== "cash");
  const a = state.analyses[r.symbol] || null;
  const stance = String(r.stance_echo || a?.stance || "").toUpperCase();
  const price = state.prices?.[r.symbol]?.current_price ?? null;

  // ---- Confidence: blend signal strength (severity) with thesis conviction ----
  // Map both to a 0..2 scale, take the weaker, map back to a label.
  const sevToNum   = { high: 2, medium: 1, low: 0 };
  const convToNum  = { high: 2, medium: 1, low: 0 };
  const sigNum  = sevToNum[String(r.severity || "low").toLowerCase()] ?? 0;
  const convRaw = String(r.conviction || a?.conviction || "").toLowerCase();
  const convNum = convToNum[convRaw] ?? 1; // default medium when unknown
  const blended = Math.min(sigNum, convNum);
  const confidence = blended >= 2 ? "HIGH" : blended >= 1 ? "MED" : "LOW";

  // ---- Level: pull a concrete price out of the action zone / action line ----
  const zone = a?.action?.price_zone || "";
  const levelFromZone = (() => {
    const s = String(zone).replace(/[,]/g, "");
    const m = s.match(/[$£€]?\s*(\d[\d.]*)/);
    return m ? m[1] : null;
  })();
  const levelFromLine = (() => {
    const s = String(r.action_line || "").replace(/[,]/g, "");
    const m = s.match(/[$£€]\s*(\d[\d.]*)/);
    return m ? m[1] : null;
  })();
  const levelNum = levelFromLine || levelFromZone || (price != null ? String(price) : null);
  const level = levelNum != null ? `$${fmtUSD(parseFloat(levelNum), parseFloat(levelNum) >= 1000 ? 0 : 2)}` : null;

  // ---- Dollar size: from analysis position_sizing, else a sensible default ----
  const portVal = computeTotalPortfolioValue() || 0;
  let sizeUSD = null;
  const ps = a?.position_sizing;
  if (ps && typeof ps.recommended_pct_of_portfolio === "number" && portVal > 0) {
    sizeUSD = portVal * (ps.recommended_pct_of_portfolio / 100);
  } else if (ps && typeof ps.max_risk_dollars === "number") {
    sizeUSD = ps.max_risk_dollars;
  }

  // ---- Verb mapping ----
  let verb, sizeText = "", isAlarm = false, level_label = "at";
  if (r.verdict === "WATCH") {
    // Not actionable: either no data (held → HOLD-ish) or a watch-the-level case.
    verb = isHeld ? "HOLD" : "WAIT";
    return {
      verb, level: isHeld ? null : level, level_label: "watch",
      sizeText: "", confidence, isAlarm: false,
      note: r.action_line,
    };
  }
  if (r.verdict === "HOLD") {
    verb = isHeld ? "HOLD" : "WAIT";
    // For WAIT, surface the level that would flip it to BUY if present.
    return {
      verb, level: (!isHeld && level) ? level : null, level_label: "trigger",
      sizeText: "", confidence, isAlarm: false,
      note: r.action_line,
    };
  }
  // r.verdict === "ACT" → resolve to BUY / ADD / SELL / EXIT by stance + held.
  if (stance === "EXIT" || stance === "AVOID") {
    verb = "EXIT"; isAlarm = true; level_label = "now";
    sizeText = "sell all";
  } else if (stance === "TRIM") {
    verb = "SELL"; level_label = "at";
    sizeText = sizeUSD ? `take $${fmtUSD(sizeUSD, 0)}` : "take partial";
  } else if (stance === "ACCUMULATE" || /buy|add|accumulate/i.test(r.action_line || "")) {
    verb = isHeld ? "ADD" : "BUY"; level_label = "at";
    sizeText = sizeUSD ? `${isHeld ? "add" : "buy"} $${fmtUSD(sizeUSD, 0)}` : (isHeld ? "add" : "open starter");
  } else {
    // Defensive fallback — an ACT with an ambiguous stance.
    verb = isHeld ? "HOLD" : "WAIT"; level_label = "at";
  }
  return { verb, level, level_label, sizeText, confidence, isAlarm, note: r.action_line };
}

// Render the directive line. One imperative, colour-coded, with EXIT as alarm.
function renderDirectiveLine(d) {
  const cls = `dir-${d.verb.toLowerCase()}`;
  const parts = [`<span class="dir-verb ${cls}">${d.verb}</span>`];
  if (d.level) parts.push(`<span class="dir-piece">${d.level_label} ${escAttr(d.level)}</span>`);
  if (d.sizeText) parts.push(`<span class="dir-piece dir-size">${escAttr(d.sizeText)}</span>`);
  parts.push(`<span class="dir-piece dir-conf dir-conf-${d.confidence.toLowerCase()}">confidence ${d.confidence}</span>`);
  const noteHtml = d.note ? `<div class="vrow-directive-note">${escAttr(d.note)}</div>` : "";
  return `<div class="vrow-directive ${d.isAlarm ? "vrow-directive-alarm" : ""}">${parts.join('<span class="dir-dot">·</span>')}</div>${noteHtml}`;
}

function renderVerdictRow(r) {
  const verdictClass = `vrow-${r.verdict.toLowerCase()}`;
  const sevClass = r.verdict === "ACT" ? `vrow-sev-${r.severity}` : "";
  // Freshness badge. Visible on every non-cash row so the user always sees
  // whether the verdict is grounded in a recent analysis. Five states map to
  // three labels:
  //   fresh        → no badge (the default, quiet state)
  //   aging        → "AGING" (still inside the decay window but past halfway)
  //   stale        → "OLD" (past the decay window, needs re-analyze)
  //   very_stale   → "OLD" (past 2× the decay window)
  //   missing      → "NO ANALYSIS"
  const freshBadge = r.is_cash ? "" : (() => {
    const f = r.freshness;
    if (!f || f === "fresh") return "";
    const labelMap = { aging: "AGING", stale: "OLD", very_stale: "OLD", missing: "NO ANALYSIS" };
    const label = labelMap[f] || "";
    if (!label) return "";
    return `<span class="vrow-fresh-badge vrow-fresh-${escAttr(f)}" title="Analysis freshness: ${escAttr(f)}">${escAttr(label)}</span>`;
  })();
  // Phase O — if the row's symbol has a broken price feed, replace the
  // day-change pill with a visible PRICE ANOMALY badge so the user knows
  // not to trust the number.
  const anomaly = !r.is_cash ? priceAnomaly(r.symbol, r.asset_class) : { anomaly: false };
  const dayChange = anomaly.anomaly
    ? `<span class="vrow-day-anomaly" title="${escAttr(anomaly.reason)}">⚠ PRICE</span>`
    : (r.day_change_pct != null && !r.is_cash)
      ? `<span class="vrow-day ${r.day_change_pct >= 0 ? 'pos' : 'neg'}">${fmtPct(r.day_change_pct)}</span>`
      : "";
  const value = r.value != null
    ? `<span class="vrow-value">$${fmtUSD(r.value, 0)}</span>`
    : "";

  // Inline Analyze button — visible on all non-cash rows. Spinner state is
  // tracked by `state.analyzingSymbols` (a plain-object dict of in-flight
  // symbols, shared with the existing on-card analyze flow). Stops the row
  // click handler so tapping ⚡ doesn't also navigate to the asset page.
  const isAnalyzing = !!(state.analyzingSymbols && state.analyzingSymbols[r.symbol]);
  const analyzeBtn = r.is_cash ? "" : `
    <button class="vrow-analyze ${isAnalyzing ? 'analyzing' : ''}"
            data-act="vrow-analyze" data-symbol="${escAttr(r.symbol)}"
            title="Re-analyze ${escAttr(r.symbol)}"
            ${isAnalyzing ? 'disabled' : ''}>
      ${isAnalyzing
        ? `<span class="spinner"></span>`
        : `<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>`}
    </button>`;

  // Phase G — verb-change badge. If this symbol's verb changed on the most
  // recent /verdict call, show a small arrow indicator showing the transition
  // (e.g. HOLD → ACT) and add a class so CSS can briefly animate the row.
  const change = state.verdictChanges && state.verdictChanges[r.symbol];
  const changedClass = change ? " vrow-changed" : "";
  const changedBadge = change
    ? `<span class="vrow-changed-badge" title="Changed from ${escAttr(change.from)} to ${escAttr(change.to)}">↻ ${escAttr(change.from)}→${escAttr(change.to)}</span>`
    : "";

  // Stance + conviction badge — gives the row a "this is what the AI concluded"
  // anchor even when verdict is HOLD/WATCH. Only renders when stance_echo present.
  const stanceBadge = r.stance_echo
    ? `<span class="vrow-stance vrow-stance-${escAttr(r.stance_echo.toLowerCase())}">${escAttr(r.stance_echo)}${r.conviction ? ` · ${escAttr(r.conviction)}` : ""}</span>`
    : "";

  // Key signal: one-line data point. Shows on all verdicts where present.
  const keySignal = r.key_signal && !r.is_cash
    ? `<div class="vrow-keysignal">${escAttr(r.key_signal)}</div>`
    : "";

  // ACT rows get the full treatment: action line, key signal, reasoning,
  // severity pill, left-border accent — PLUS a plan block pulled from the
  // underlying analysis. The verdict is the verb; the plan is the levels:
  // entry zone, invalidation, reward:risk ratio, fired-trigger text. All of
  // this exists already in state.analyses[symbol] (the worker /analyze output),
  // so no extra API call.
  if (r.verdict === "ACT") {
    const a = state.analyses[r.symbol];
    const planParts = [];
    if (a) {
      // Action zone — entry or exit price band from the stored analysis.
      if (a.action?.price_zone) {
        planParts.push(`<div class="vplan-row"><span class="vplan-k">Zone</span><span class="vplan-v">${escAttr(a.action.price_zone)}</span></div>`);
      }
      // Invalidation — where the thesis breaks. Critical for risk management.
      if (a.action?.invalidation && a.action.invalidation !== "N/A") {
        planParts.push(`<div class="vplan-row"><span class="vplan-k">Invalidate</span><span class="vplan-v">${escAttr(a.action.invalidation)}</span></div>`);
      }
      // Reward:risk ratio — the system computes it from scenario implications.
      const rr = a.reward_risk?.ratio ?? a.computed_reward_risk?.ratio;
      if (rr != null) {
        planParts.push(`<div class="vplan-row"><span class="vplan-k">R:R</span><span class="vplan-v">${typeof rr === "number" ? rr.toFixed(2) : escAttr(rr)}</span></div>`);
      }
      // Timeframe — when the action should be taken / when to reassess.
      if (a.action?.timeframe) {
        planParts.push(`<div class="vplan-row"><span class="vplan-k">Timeframe</span><span class="vplan-v">${escAttr(a.action.timeframe)}</span></div>`);
      }
    }
    // Fired-trigger block — surfaces ALWAYS when the verdict response carried
    // a fired_trigger object, even when the underlying analysis isn't local.
    const firedBlock = r.fired_trigger
      ? `<div class="vplan-fired">
           <div class="vplan-fired-head">▼ ${escAttr(r.fired_trigger.direction === "bull" ? "BULL TRIGGER FIRED" : "BEAR TRIGGER FIRED")}</div>
           <div class="vplan-fired-body">${escAttr(r.fired_trigger.trigger_text || "")}</div>
           ${r.fired_trigger.fired_because ? `<div class="vplan-fired-why">Why: ${escAttr(r.fired_trigger.fired_because)}</div>` : ""}
         </div>`
      : "";
    const planBlock = planParts.length > 0
      ? `<div class="vplan">${planParts.join("")}</div>`
      : "";

    const directive = renderDirectiveLine(deriveDirective(r));
    return `<div class="vrow ${verdictClass} ${sevClass}${changedClass}" data-act="open-asset" data-symbol="${escAttr(r.symbol)}">
      <div class="vrow-head">
        <span class="vrow-symbol">${escAttr(r.symbol)}</span>
        ${freshBadge}
        ${changedBadge}
        <span class="vrow-spacer"></span>
        ${value}${dayChange}
        ${analyzeBtn}
      </div>
      ${directive}
      ${keySignal}
      ${r.reasoning_short ? `<div class="vrow-reasoning">${escAttr(r.reasoning_short)}</div>` : ""}
      ${firedBlock}
      ${planBlock}
      <div class="vrow-footer">
        <button class="btn-ghost-sm" data-act="log-trade" data-symbol="${escAttr(r.symbol)}">Log Trade</button>
      </div>
    </div>`;
  }

  // WATCH and HOLD rows: directive line (HOLD / WAIT) + state of play.
  const directive2 = renderDirectiveLine(deriveDirective(r));
  return `<div class="vrow ${verdictClass}${changedClass}" data-act="open-asset" data-symbol="${escAttr(r.symbol)}">
    <div class="vrow-head">
      <span class="vrow-symbol">${escAttr(r.symbol)}</span>
      ${freshBadge}
      ${changedBadge}
      <span class="vrow-spacer"></span>
      ${value}${dayChange}
      ${analyzeBtn}
    </div>
    ${directive2}
    ${keySignal}
    ${r.reasoning_short ? `<div class="vrow-reasoning">${escAttr(r.reasoning_short)}</div>` : ""}
  </div>`;
}

// Defensive: portfolioMetrics might return 0 totalValue (cash-only or empty).
// Used inside renderVerdictZones for the cash row's percent calculation.
function m_safe() {
  return portfolioMetrics().totalValue || 1;
}

// ----------------------------------------------------------------------------
// Attention slot — surfaces a fired breakout only. Portfolio risk and the
// portfolio-stance verdict live in Signals → Scans now.
// ----------------------------------------------------------------------------

// ----------------------------------------------------------------------------
// RENDER: Portfolio Risk card — allocation drift + correlation concentration.
// Shows only when there's something worth flagging; silent when balanced.
// ----------------------------------------------------------------------------


// ----- Watchlist
// Unified action for a Watchlist / Opportunity row. ONE vocabulary everywhere:
//   - If the name has been analyzed → the full directive line (BUY/ADD/SELL/
//     WAIT + level + size + confidence), identical to holdings and Portfolio.
//   - If NOT yet analyzed → the top Screener setup it scored (the free pre-read),
//     with a prompt to spend an Analyze for the full directive.
// This replaces the old raw condition-pills + "go look on another tab" pointer.
let _screenerSetupCache = { at: 0, map: null };
function screenerSetupFor(symbol) {
  // Cache the screener pass for ~1s so a full watchlist render doesn't recompute
  // the whole universe per row.
  if (!_screenerSetupCache.map || Date.now() - _screenerSetupCache.at > 1000) {
    try {
      const setups = (typeof computeScreenerSetups === "function") ? computeScreenerSetups() : [];
      const m = {};
      for (const s of setups) if (!m[s.symbol]) m[s.symbol] = s;
      _screenerSetupCache = { at: Date.now(), map: m };
    } catch (e) { _screenerSetupCache = { at: Date.now(), map: {} }; }
  }
  return _screenerSetupCache.map[symbol] || null;
}

// Shared score badge — the SAME number shown on the Screener card, so every
// surface (Screener, Watchlist, Opportunities) leads with one consistent score.
function renderScoreBadge(score, color) {
  if (score == null) return "";
  return `<span class="unified-score" style="color:${color || "var(--ink-soft)"};">${Math.round(score)}</span>`;
}

function renderUnifiedAction(symbol, currentPrice, isHeld) {
  const s = screenerScoreFor(symbol); // always returns a score if the name was scanned
  const hasSetup = s && s.setup;
  const color = (hasSetup && typeof SCREENER_SETUP_COLORS !== "undefined" && SCREENER_SETUP_COLORS[s.setup])
    || "var(--ink-muted)";
  const scoreBadge = s ? renderScoreBadge(s.score, color) : "";

  const analysis = state.analyses?.[symbol] || null;
  if (analysis) {
    // Analyzed → real directive, score badge kept on the left.
    const holding = state.holdings.find(h => h.symbol === symbol && h.asset_class !== "cash") || null;
    const v = computeLocalVerdict(analysis, holding, { currentPrice, isHeld });
    const d = deriveDirective({ ...v, symbol });
    return `<div class="unified-action">${scoreBadge}<div class="unified-action-body">${renderDirectiveLine(d)}</div></div>`;
  }

  // Not analyzed, has a named setup → score + setup tag + detail (= Screener row).
  if (hasSetup) {
    return `
      <div class="unified-action">
        ${scoreBadge}
        <div class="unified-action-body">
          <div class="vrow-directive" style="margin-top:0;">
            <span class="dir-verb" style="background:transparent;border:1px solid ${color};color:${color};font-weight:600;">${escAttr(s.setup)}</span>
            <span class="dir-dot">·</span>
            <span class="dir-piece">${escAttr(s.detail)}</span>
            <span class="dir-dot">·</span>
            <span class="dir-piece dir-conf-low">analyze for action</span>
          </div>
        </div>
      </div>`;
  }

  // Not analyzed, scanned but no setup cleared → show the score + "watching".
  if (s) {
    return `
      <div class="unified-action">
        ${scoreBadge}
        <div class="unified-action-body">
          <div class="vrow-directive" style="margin-top:0;">
            <span class="dir-piece dir-conf-low">No setup yet — watching. Analyze for a full read.</span>
          </div>
        </div>
      </div>`;
  }

  // Truly no scan data for this symbol.
  return `<div class="vrow-directive-note" style="margin-top:8px;">Not yet scanned. Tap Scan, then Analyze for a read.</div>`;
}

function renderWatchlist(opts) {
  const skipScreener = !!(opts && opts.skipScreener);
  if (state.selectedSymbol) {
    renderWatchDetail(state.selectedSymbol);
    return;
  }
  $("#topbarTitle").textContent = "Watchlist";
  const view = $("#view");

  const lastScan = state.lastScanAt ? `Last scan: ${fmtRel(state.lastScanAt)}` : "Not scanned yet";

  if (state.watchlist.length === 0) {
    view.innerHTML = `
      <div class="empty-state">
        <span class="display">Watchlist is empty</span>
        <p>Add tickers you'd consider buying. The app watches them and surfaces setups when conditions trigger.</p>
        <button class="btn" data-act="add-watch">Add to Watchlist</button>
      </div>
      ${skipScreener ? "" : renderScreenerCard()}
    `;
    return;
  }

  // Precompute the screener score once per symbol (the comparator runs many
  // times; scoring each name once keeps it cheap).
  const _wlScore = {};
  for (const w of state.watchlist) _wlScore[w.symbol] = screenerScoreFor(w.symbol)?.score ?? -1;
  const sorted = state.watchlist.slice().sort((a, b) => {
    // Urgency first: a fired alert outranks a high score (a tripped stop matters
    // more than a pretty setup). Within each band, rank by the live screener
    // score, high to low — the same score shown on each row.
    const sa = state.watchlistSnapshot[a.symbol];
    const sb = state.watchlistSnapshot[b.symbol];
    const ta = sa?.triggers?.length || 0;
    const tb = sb?.triggers?.length || 0;
    if ((ta > 0) !== (tb > 0)) return tb > 0 ? 1 : -1;  // fired-trigger band on top
    const scoreA = _wlScore[a.symbol], scoreB = _wlScore[b.symbol];
    if (scoreA !== scoreB) return scoreB - scoreA;       // high score → low
    return a.symbol.localeCompare(b.symbol);             // stable alpha tiebreak
  });

  const rows = sorted.map(w => {
    const snap = state.watchlistSnapshot[w.symbol];
    const hasTrigger = snap?.triggers?.length > 0;

    const dayClass = (snap?.day_change_pct || 0) >= 0 ? "pos" : "neg";
    const rsiClass = snap?.rsi14 < 35 ? "warn" : snap?.rsi14 > 70 ? "over" : "";
    const trendClass = snap?.trend === "above_200ma" ? "above" : "below";
    const wAnomaly = priceAnomaly(w.symbol, w.asset_class);
    const heldHere = state.holdings.some(h => h.symbol === w.symbol && h.asset_class !== "cash");

    // ONE action vocabulary: directive line after analysis, Screener setup
    // before. No more raw condition pills, no more "go look on another tab".
    const actionLine = renderUnifiedAction(w.symbol, snap?.current_price, heldHere);

    return `
      <div class="watch-row ${hasTrigger ? 'has-trigger' : ''}" data-act="open-watch" data-symbol="${escAttr(w.symbol)}">
        <div class="watch-head">
          <span class="watch-sym">${escAttr(w.symbol)}</span>
          <span class="watch-cls">${escAttr(ALLOC_LABELS[w.asset_class] || w.asset_class)}</span>
          <span class="watch-name">${escAttr(w.name || '')}</span>
        </div>
        <div>
          <div class="watch-price">${snap?.current_price != null ? '$' + fmtUSD(snap.current_price) : '—'}</div>
          ${wAnomaly.anomaly
            ? `<div class="watch-day-anomaly" title="${escAttr(wAnomaly.reason)}">⚠ PRICE</div>`
            : `<div class="watch-day ${dayClass}">${snap?.day_change_pct != null ? fmtPct(snap.day_change_pct) : '—'}</div>`}
        </div>
        <div class="watch-stats">
          <span class="watch-stat-rsi ${rsiClass}">RSI ${snap?.rsi14 != null ? snap.rsi14 : '—'}</span>
          <span class="watch-trend ${trendClass}">${snap?.trend === 'above_200ma' ? '↑ 200MA' : '↓ 200MA'}</span>
          <span>${snap?.pct_from_52w_high != null ? snap.pct_from_52w_high.toFixed(1) + '% from 52w high' : ''}</span>
        </div>
        ${actionLine}
        <div class="watch-actions">
          <button class="inline-action-btn" data-act="run-analysis-inline" data-symbol="${escAttr(w.symbol)}">⚡ Analyze</button>
        </div>
      </div>
    `;
  }).join("");

  view.innerHTML = `
    <div class="scan-bar">
      <span>${lastScan}</span>
      <button data-act="rescan">Scan now</button>
    </div>
    <div class="section-head" style="padding: 18px 20px 0;">
      <h2>Watchlist</h2>
      <button class="btn-ghost" data-act="add-watch" style="font-size:11px;letter-spacing:.1em;text-transform:uppercase;">+ Add</button>
    </div>
    <div class="holdings">${rows}</div>
    ${skipScreener ? "" : renderScreenerCard()}
  `;

  // Lazy snapshot fetch if missing
  const missingSnaps = state.watchlist.some(w => !state.watchlistSnapshot[w.symbol]);
  if (missingSnaps && !state._snapFetching) {
    state._snapFetching = true;
    fetchWatchlistSnapshot()
      .catch(() => {})
      .finally(() => {
        state._snapFetching = false;
        if (state.currentView === "discover" && state.discoverTab === "watchlist" && !state.selectedSymbol) renderDiscover();
      });
  }
}

function openWatchItem(symbol) {
  state.selectedSymbol = symbol;
  state.currentView = "discover";
  state.discoverTab = "watchlist";

// ============================================================================
// DISCOVER IDEAS — surface CURATED_PICKS, group by theme. Single-tap to add.
// Static picks + optional live-refreshed dynamic picks via worker.
// ============================================================================
function renderDiscoverIdeas() {
  const expanded = !!state.expandedAnalyses["discover"];
  const inWatchlist = new Set(state.watchlist.map(w => w.symbol));
  const held = new Set(state.holdings.filter(h => h.asset_class !== "cash").map(h => h.symbol));

  // Merge static + dynamic ideas, dedupe by symbol (dynamic wins — usually fresher)
  const merged = [];
  const seenSymbols = new Set();
  const dynamicPicks = state.discoverDynamic || [];
  for (const p of dynamicPicks) {
    if (seenSymbols.has(p.symbol)) continue;
    seenSymbols.add(p.symbol);
    merged.push({ ...p, _dynamic: true });
  }
  for (const p of CURATED_PICKS) {
    if (seenSymbols.has(p.symbol)) continue;
    seenSymbols.add(p.symbol);
    merged.push(p);
  }

  // Group by theme (BEFORE filter — themes list is the full universe of themes)
  const byThemeAll = {};
  for (const p of merged) {
    if (!byThemeAll[p.theme]) byThemeAll[p.theme] = [];
    byThemeAll[p.theme].push(p);
  }
  const allThemes = Object.keys(byThemeAll).sort((a, b) => byThemeAll[b].length - byThemeAll[a].length);

  // Apply search + theme filter
  const search = (state.discoverSearch || "").trim().toLowerCase();
  const themeFilter = state.discoverThemeFilter;
  const filtered = merged.filter(p => {
    if (themeFilter && p.theme !== themeFilter) return false;
    if (!search) return true;
    return (
      p.symbol.toLowerCase().includes(search) ||
      (p.name || "").toLowerCase().includes(search) ||
      (p.thesis || "").toLowerCase().includes(search) ||
      (p.theme || "").toLowerCase().includes(search) ||
      (p.source || "").toLowerCase().includes(search)
    );
  });

  // Group filtered results by theme for display
  const byTheme = {};
  for (const p of filtered) {
    if (!byTheme[p.theme]) byTheme[p.theme] = [];
    byTheme[p.theme].push(p);
  }
  const themes = Object.keys(byTheme).sort((a, b) => byTheme[b].length - byTheme[a].length);

  const freshLabel = state.discoverDynamicFetchedAt
    ? `Fresh: ${fmtRel(state.discoverDynamicFetchedAt)}`
    : "Static snapshot (Dec 2025 – May 2026)";

  // Summary shows filter context if any filter is active
  const filterActive = !!(search || themeFilter);
  const summary = filterActive
    ? `${filtered.length} of ${merged.length} ideas · ${freshLabel}`
    : `${merged.length} ideas · ${allThemes.length} themes · ${freshLabel}`;

  if (!expanded) {
    return `
      <div class="discover-card collapsed" data-act="toggle-analysis" data-key="discover">
        <div class="discover-head">
          <div>
            <h3>Discover Ideas</h3>
            <div class="discover-sub">${summary}</div>
          </div>
          <div class="collapsible-chev">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
          </div>
        </div>
      </div>
    `;
  }

  const refreshBtnLabel = state.discoverRefreshing ? "Refreshing..." : "Refresh ideas";

  const themeBlocks = themes.map(theme => {
    const picks = byTheme[theme];
    const items = picks.map(p => {
      const onList = inWatchlist.has(p.symbol);
      const owned = held.has(p.symbol);
      const dynamicBadge = p._dynamic ? `<span class="discover-fresh-badge">new</span>` : "";
      // Action buttons: always show Analyze + Chart; Watch only if not held/listed
      let actionButtons;
      if (owned) {
        actionButtons = `
          <div class="discover-actions-row">
            <span class="discover-tag held">Held</span>
            <button class="btn btn-secondary btn-sm" data-act="preview-chart" data-symbol="${escAttr(p.symbol)}" data-name="${escAttr(p.name)}">Chart</button>
            <button class="btn btn-secondary btn-sm" data-act="analyze-from-discover" data-symbol="${escAttr(p.symbol)}" data-name="${escAttr(p.name)}">Analyze</button>
          </div>`;
      } else if (onList) {
        actionButtons = `
          <div class="discover-actions-row">
            <span class="discover-tag onlist">On Watchlist</span>
            <button class="btn btn-secondary btn-sm" data-act="preview-chart" data-symbol="${escAttr(p.symbol)}" data-name="${escAttr(p.name)}">Chart</button>
            <button class="btn btn-secondary btn-sm" data-act="analyze-from-discover" data-symbol="${escAttr(p.symbol)}" data-name="${escAttr(p.name)}">Analyze</button>
          </div>`;
      } else {
        actionButtons = `
          <div class="discover-actions-row">
            <button class="btn btn-sm" data-act="add-curated" data-symbol="${escAttr(p.symbol)}" data-name="${escAttr(p.name)}">+ Watch</button>
            <button class="btn btn-secondary btn-sm" data-act="preview-chart" data-symbol="${escAttr(p.symbol)}" data-name="${escAttr(p.name)}">Chart</button>
            <button class="btn btn-secondary btn-sm" data-act="analyze-from-discover" data-symbol="${escAttr(p.symbol)}" data-name="${escAttr(p.name)}">Analyze</button>
          </div>`;
      }
      return `
        <div class="discover-item">
          <div class="discover-item-head">
            <div>
              <span class="discover-sym">${escAttr(p.symbol)}</span>
              <span class="discover-name">${escAttr(p.name)}</span>
              ${dynamicBadge}
            </div>
            ${actionButtons}
          </div>
          <div class="discover-thesis">${escAttr(p.thesis)}</div>
          <div class="discover-source">
            <span class="discover-src">${escAttr(p.source)}</span>
            <span class="discover-date">${escAttr(p.date)}</span>
          </div>
          ${renderPreviewChartFor(p.symbol)}
        </div>
      `;
    }).join("");
    return `
      <div class="discover-theme-block">
        <div class="discover-theme-head">${escAttr(theme)}</div>
        ${items}
      </div>
    `;
  }).join("");

  // Build theme filter pills (always show ALL themes, current selection highlighted)
  const themePills = allThemes.map(t => {
    const isActive = themeFilter === t;
    return `<button class="discover-theme-pill ${isActive ? 'active' : ''}" data-act="filter-theme" data-theme="${escAttr(t)}">${escAttr(t)} <span class="theme-pill-count">${byThemeAll[t].length}</span></button>`;
  }).join("");

  // Empty-state if filters return nothing
  const noResults = filtered.length === 0 && (search || themeFilter);

  return `
    <div class="discover-card expanded">
      <div class="discover-head" data-act="toggle-analysis" data-key="discover" style="cursor:pointer;">
        <div>
          <h3>Discover Ideas</h3>
          <div class="discover-sub">${summary}</div>
        </div>
        <div class="collapsible-chev" style="transform:rotate(180deg);">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
      </div>
      <div class="discover-actions">
        <button class="btn btn-sm" data-act="refresh-discover" ${state.discoverRefreshing ? "disabled" : ""}>${refreshBtnLabel}</button>
        ${state.discoverDynamicFetchedAt ? `<button class="btn btn-secondary btn-sm" data-act="clear-discover">Reset to static</button>` : ""}
      </div>
      <div class="discover-search-bar">
        <input type="text" id="discoverSearch" placeholder="Search symbol, name, thesis, source..." value="${escAttr(search)}" autocomplete="off" />
        ${(search || themeFilter) ? `<button class="discover-clear-btn" data-act="clear-discover-filters">Clear filters</button>` : ""}
      </div>
      <div class="discover-theme-pills">
        ${themePills}
      </div>
      <div class="discover-disclaimer">Research from credible sources. Not advice — you decide. Tap Refresh to fetch fresh ideas via AI (requires worker support).</div>
      ${noResults
        ? `<div class="discover-no-results">No ideas match your search${themeFilter ? ` in <strong>${escAttr(themeFilter)}</strong>` : ""}. Try a different keyword or clear the filter.</div>`
        : themeBlocks}
    </div>
  `;
}

async function refreshDiscover() {
  if (state.discoverRefreshing) return;
  state.discoverRefreshing = true;
  renderCurrentView();
  try {
    const res = await fetch(`${WORKER_URL}/discover-ideas`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        held_symbols: state.holdings.filter(h => h.asset_class !== "cash").map(h => h.symbol),
        watchlist_symbols: state.watchlist.map(w => w.symbol),
      }),
    });
    if (!res.ok) {
      if (res.status === 404) {
        toast("Worker doesn't support /discover-ideas yet — using static picks", 4000, "error");
      } else {
        toast(`Refresh failed: ${res.status}`, 3000, "error");
      }
      state.discoverRefreshing = false;
      renderCurrentView();
      return;
    }
    const j = await res.json();
    if (!Array.isArray(j.ideas)) {
      toast("Worker returned malformed response", 3000, "error");
      state.discoverRefreshing = false;
      renderCurrentView();
      return;
    }
    // Sanitize: ensure all entries have required fields
    const sanitized = j.ideas
      .filter(p => p && typeof p.symbol === "string")
      .map(p => ({
        symbol: String(p.symbol).toUpperCase().slice(0, 12),
        name: String(p.name || p.symbol),
        theme: String(p.theme || "Other"),
        source: String(p.source || "AI Refresh"),
        date: String(p.date || new Date().toISOString().slice(0, 10)),
        thesis: String(p.thesis || "").slice(0, 500),
      }));
    state.discoverDynamic = sanitized;
    state.discoverDynamicFetchedAt = new Date().toISOString();
    toast(`Refreshed ${sanitized.length} ideas`);
  } catch (e) {
    toast(`Refresh failed: ${e.message || e}`, 3000, "error");
  }
  state.discoverRefreshing = false;
  renderCurrentView();
}

function clearDiscoverDynamic() {
  state.discoverDynamic = null;
  state.discoverDynamicFetchedAt = null;
  renderCurrentView();
}

function toggleDiscoverThemeFilter(theme) {
  // Tap the active theme to clear it; tap a different theme to switch
  if (state.discoverThemeFilter === theme) {
    state.discoverThemeFilter = null;
  } else {
    state.discoverThemeFilter = theme;
  }
  renderCurrentView();
}

function clearDiscoverFilters() {
  state.discoverSearch = "";
  state.discoverThemeFilter = null;
  renderCurrentView();
}

const LEADERBOARD_CACHE_MS = 1000 * 60 * 30; // 30-minute soft refresh

async function fetchEtfLeaderboard(forceRefresh) {
  // Cache check
  if (!forceRefresh && state.etfLeaderboard && state.etfLeaderboardFetchedAt) {
    const age = Date.now() - new Date(state.etfLeaderboardFetchedAt).getTime();
    if (age < LEADERBOARD_CACHE_MS) return; // use cached
  }
  if (state.etfLeaderboardLoading) return;
  state.etfLeaderboardLoading = true;
  renderCurrentView();
  try {
    const res = await fetch(`${WORKER_URL}/etf-leaderboard`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        symbols: ETF_UNIVERSE.map(e => e.symbol),
        timeframe: state.etfLeaderboardTimeframe,
      }),
    });
    if (!res.ok) {
      if (res.status === 404) {
        toast("Worker doesn't support /etf-leaderboard yet — deploy worker v1.4", 4000, "error");
      } else {
        toast(`Leaderboard fetch failed: ${res.status}`, 3000, "error");
      }
      state.etfLeaderboardLoading = false;
      renderCurrentView();
      return;
    }
    const j = await res.json();
    // Merge worker results with universe metadata
    const merged = (j.results || []).map(r => {
      const meta = ETF_UNIVERSE.find(e => e.symbol === r.symbol);
      return {
        symbol: r.symbol,
        name: meta?.name || r.symbol,
        category: meta?.category || "Other",
        return_pct: r.return_pct,
        max_drawdown_pct: r.max_drawdown_pct,
        trend_200ma: r.trend_200ma,
        current_price: r.current_price,
        error: r.error || null,
      };
    });
    state.etfLeaderboard = merged;
    state.etfLeaderboardFetchedAt = new Date().toISOString();
  } catch (e) {
    toast(`Leaderboard failed: ${(e.message || e).slice(0, 100)}`, 3000, "error");
  }
  state.etfLeaderboardLoading = false;
  renderCurrentView();
}

function setLeaderboardTimeframe(tf) {
  if (state.etfLeaderboardTimeframe === tf) return;
  state.etfLeaderboardTimeframe = tf;
  // Timeframe change invalidates the cached data
  state.etfLeaderboard = null;
  state.etfLeaderboardFetchedAt = null;
  fetchEtfLeaderboard(true);
}

function setLeaderboardSort(sort) {
  state.etfLeaderboardSort = sort;
  renderCurrentView();
}

function renderEtfLeaderboard() {
  const tf = state.etfLeaderboardTimeframe;
  const tfLabel = tf === "3m" ? "3-month" : tf === "1y" ? "1-year" : "3-year";

  if (state.etfLeaderboardLoading && !state.etfLeaderboard) {
    return `
      <div class="leaderboard-card">
        <div class="leaderboard-head">
          <h3>Top Performing ETFs</h3>
          <div class="leaderboard-sub">Fetching ${tfLabel} returns across ${ETF_UNIVERSE.length} ETFs…</div>
        </div>
        <div style="padding: 30px 20px; text-align: center; color: var(--ink-muted);">
          <span class="spinner"></span>
        </div>
      </div>
    `;
  }

  const data = state.etfLeaderboard || [];
  const valid = data.filter(d => !d.error && d.return_pct != null);

  // Sort
  let sorted;
  if (state.etfLeaderboardSort === "drawdown") {
    sorted = [...valid].sort((a, b) => (b.max_drawdown_pct || -999) - (a.max_drawdown_pct || -999)); // least negative first
  } else if (state.etfLeaderboardSort === "trend") {
    sorted = [...valid].sort((a, b) => {
      const aAbove = a.trend_200ma === "above_200ma" ? 1 : 0;
      const bAbove = b.trend_200ma === "above_200ma" ? 1 : 0;
      if (aAbove !== bAbove) return bAbove - aAbove;
      return b.return_pct - a.return_pct;
    });
  } else {
    sorted = [...valid].sort((a, b) => b.return_pct - a.return_pct);
  }
  const top10 = sorted.slice(0, 10);

  const held = new Set(state.holdings.filter(h => h.asset_class !== "cash").map(h => h.symbol));
  const watched = new Set(state.watchlist.map(w => w.symbol));

  const tfPill = (key, label) => `<button class="lb-tf-pill ${tf === key ? 'active' : ''}" data-act="lb-tf" data-tf="${key}">${label}</button>`;
  const sortPill = (key, label) => `<button class="lb-sort-pill ${state.etfLeaderboardSort === key ? 'active' : ''}" data-act="lb-sort" data-sort="${key}">${label}</button>`;

  const ageLabel = state.etfLeaderboardFetchedAt
    ? `Updated ${fmtRel(state.etfLeaderboardFetchedAt)}`
    : "";

  const rows = top10.length === 0
    ? `<div style="padding: 24px 18px; text-align: center; color: var(--ink-muted); font-family: var(--mono); font-size: 12px;">No data loaded yet. Tap "Refresh leaderboard" to fetch performance for ${ETF_UNIVERSE.length} ETFs.</div>`
    : top10.map((d, i) => {
        const owned = held.has(d.symbol);
        const onList = watched.has(d.symbol);
        const retClass = d.return_pct >= 0 ? "pos" : "neg";
        const ddClass = d.max_drawdown_pct <= -20 ? "warn" : d.max_drawdown_pct <= -10 ? "med" : "ok";
        return `
          <div class="lb-row-wrap">
            <div class="lb-row">
              <div class="lb-rank">${i + 1}</div>
              <div class="lb-main">
                <div class="lb-symline">
                  <span class="lb-sym">${escAttr(d.symbol)}</span>
                  <span class="lb-cat">${escAttr(d.category)}</span>
                  ${owned ? `<span class="lb-tag held">held</span>` : ""}
                  ${onList ? `<span class="lb-tag onlist">watched</span>` : ""}
                </div>
                <div class="lb-name">${escAttr(d.name)}</div>
                <div class="lb-stats">
                  <span class="lb-stat ${retClass}">${d.return_pct >= 0 ? "+" : ""}${d.return_pct.toFixed(1)}% ${tfLabel} return</span>
                  <span class="lb-stat ${ddClass}">${d.max_drawdown_pct != null ? d.max_drawdown_pct.toFixed(1) + "% max DD" : ""}</span>
                  ${d.trend_200ma ? `<span class="lb-stat ${d.trend_200ma === 'above_200ma' ? 'pos' : 'neg'}">${d.trend_200ma === 'above_200ma' ? '↑' : '↓'} 200MA</span>` : ""}
                </div>
              </div>
              <div class="lb-actions">
                <button class="btn btn-secondary btn-sm" data-act="preview-chart" data-symbol="${escAttr(d.symbol)}" data-name="${escAttr(d.name)}">Chart</button>
                <button class="btn btn-sm" data-act="analyze-from-discover" data-symbol="${escAttr(d.symbol)}" data-name="${escAttr(d.name)}">Analyze</button>
                ${!owned && !onList ? `<button class="btn btn-secondary btn-sm" data-act="add-curated" data-symbol="${escAttr(d.symbol)}" data-name="${escAttr(d.name)}">+ Watch</button>` : ""}
              </div>
            </div>
            ${renderPreviewChartFor(d.symbol)}
          </div>
        `;
      }).join("");

  return `
    <div class="leaderboard-card">
      <div class="leaderboard-head">
        <h3>Top Performing ETFs</h3>
        <div class="leaderboard-sub">Ranked by ${tfLabel} return · ${valid.length}/${ETF_UNIVERSE.length} ETFs · ${ageLabel}</div>
      </div>
      <div class="lb-controls">
        <div class="lb-control-row">
          <span class="lb-control-label">Timeframe</span>
          <div class="lb-pills">
            ${tfPill("3m", "3M")}
            ${tfPill("1y", "1Y")}
            ${tfPill("3y", "3Y")}
          </div>
        </div>
        <div class="lb-control-row">
          <span class="lb-control-label">Rank by</span>
          <div class="lb-pills">
            ${sortPill("return", "Return")}
            ${sortPill("drawdown", "Risk")}
            ${sortPill("trend", "Trend")}
          </div>
        </div>
        <div class="lb-actions-row">
          <button class="btn btn-sm" data-act="refresh-leaderboard" ${state.etfLeaderboardLoading ? "disabled" : ""}>
            ${state.etfLeaderboardLoading ? "Loading…" : (state.etfLeaderboard ? "Refresh leaderboard" : "Load leaderboard")}
          </button>
        </div>
      </div>
      <div class="lb-disclaimer">
        <strong>Past performance ≠ future returns.</strong> Top performers tend to revert. Last year's #1 is rarely next year's #1. Use this for awareness of what's moved, not as a buy list.
      </div>
      ${rows}
    </div>
  `;
}

let _discoverSearchTimer = null;

    clearTimeout(_discoverSearchTimer);
    _discoverSearchTimer = setTimeout(() => {
      state.discoverSearch = e.target.value;
      // Re-render but keep focus on input
      renderCurrentView();
      const newInput = document.getElementById("discoverSearch");
      if (newInput) {
        newInput.focus();
        // Move cursor to end
        const len = newInput.value.length;
        newInput.setSelectionRange(len, len);
      }
    }, 220);
  }
});

async function addCuratedToWatchlist(symbol, name) {
  if (!symbol) return;
  const cls = guessAssetClass(symbol);
  // Same auto-armed defaults as manual add — oversold, pullback, breakout.
  const conditions = defaultConditionsFor(symbol, cls);
  try {
    await db.collection("users").doc(state.uid).collection("watchlist").doc(symbol).set({
      symbol,
      name: name || symbol,
      conditions,
      asset_class: cls,
      added_at: firebase.firestore.FieldValue.serverTimestamp(),

    toast(`${symbol} added · alerts armed`);
    renderCurrentView();
  } catch (e) {
    toast(`Failed to add: ${e.message || e}`, 3000, "error");

}

// INLINE CHART PREVIEW (Ideas + ETF Leaderboard)
// Lets you peek at a chart without adding to watchlist or spending AI tokens.
// One preview at a time — re-tapping closes; tapping a different row swaps.
// ============================================================================
async function togglePreviewChart(symbol, name) {
  if (!symbol) return;
  if (state.previewChart.symbol === symbol) {
    // Same row tapped again — collapse
    state.previewChart = { symbol: null, name: null, range: "3M", loading: false, data: null };
    renderCurrentView();
    return;
  }
  state.previewChart = { symbol, name: name || symbol, range: "3M", loading: true, data: null };
  renderCurrentView();
  try {
    // Use cached price if we have it, else fetch
    let priceData = state.prices[symbol];
    if (!priceData || !priceData.ohlcv) {
      const r = await fetch(`${WORKER_URL}/price/${encodeURIComponent(symbol)}`);
      if (!r.ok) throw new Error(`fetch_${r.status}`);
      priceData = await r.json();
      state.prices[symbol] = priceData;
    }
    state.previewChart.data = priceData;
    state.previewChart.loading = false;
    renderCurrentView();
    // After DOM update, draw the chart
    setTimeout(() => drawPreviewChart(), 60);
  } catch (e) {
    state.previewChart.loading = false;
    toast(`Couldn't load chart: ${(e.message || e).slice(0, 80)}`, 3000, "error");
    renderCurrentView();
  }
}

function setPreviewRange(range) {
  state.previewChart.range = range;
  renderCurrentView();
  setTimeout(() => drawPreviewChart(), 60);
}

function drawPreviewChart() {
  const el = document.getElementById("previewChartEl");
  if (!el || !window.LightweightCharts) return;
  const pc = state.previewChart;
  if (!pc.data || !pc.data.ohlcv) return;
  const range = pc.range || "3M";
  const days = range === "1M" ? 22 : range === "3M" ? 66 : range === "6M" ? 130 : range === "1Y" ? 252 : pc.data.ohlcv.length;
  const slice = pc.data.ohlcv.slice(-days);
  const c = getThemeColors();
  el.innerHTML = "";
  const chart = LightweightCharts.createChart(el, {
    width: el.clientWidth || 320,
    height: 220,
    layout: { background: { color: "transparent" }, textColor: c.muted, fontFamily: "ui-monospace, monospace" },
    grid: { vertLines: { color: c.rule }, horzLines: { color: c.rule } },
    rightPriceScale: { borderColor: c.rule },
    timeScale: { borderColor: c.rule, timeVisible: false },
    crosshair: { mode: 1 },
  });
  const series = chart.addAreaSeries({
    lineColor: c.accent || c.gold,
    topColor: (c.accent || c.gold) + "33",
    bottomColor: (c.accent || c.gold) + "08",
    lineWidth: 2,
  });
  const data = slice
    .filter(d => d.c != null && d.t)
    .map(d => ({ time: Math.floor((d.t || 0) / 1000), value: d.c }));
  if (data.length > 0) series.setData(data);
  chart.timeScale().fitContent();
}

function renderPreviewChartFor(symbol) {
  // Returns the inline preview chart HTML if it's open for this symbol; else "".
  if (state.previewChart.symbol !== symbol) return "";
  const pc = state.previewChart;
  if (pc.loading) {
    return `<div class="preview-chart-wrap"><div class="empty-state" style="padding:30px;"><span class="spinner"></span></div></div>`;
  }
  if (!pc.data) return "";
  const cur = pc.data.current_price;
  const prev = pc.data.prev_close;
  const dayPct = (cur != null && prev) ? ((cur - prev) / prev) * 100 : null;
  const dayClass = dayPct != null && dayPct >= 0 ? "pos" : "neg";
  const ranges = ["1M","3M","6M","1Y","ALL"];
  return `
    <div class="preview-chart-wrap">
      <div class="preview-chart-head">
        <div>
          <span class="pc-sym">${escAttr(symbol)}</span>
          <span class="pc-price">$${fmtUSD(cur)}</span>
          ${dayPct != null ? `<span class="pc-day ${dayClass}">${fmtPct(dayPct)}</span>` : ""}
        </div>
        <button class="pc-close" data-act="preview-chart" data-symbol="${escAttr(symbol)}" title="Close chart">×</button>
      </div>
      <div class="preview-chart-controls">
        ${ranges.map(r => `<button class="pc-range ${pc.range === r ? 'active' : ''}" onclick="event.stopPropagation(); window._setPreviewRange('${r}');">${r}</button>`).join("")}
      </div>
      <div id="previewChartEl" class="preview-chart-el"></div>
    </div>
  `;
}

              <div class="buy-suggest-eyebrow">${snap.triggers.length} condition${snap.triggers.length === 1 ? "" : "s"} firing</div>

            </div>

        </div>
      `;
    }
  }

  view.innerHTML = `
    <div class="detail-head">
      <button class="detail-back" data-act="back-watch">← Watchlist</button>
      <div class="detail-symbol">${escAttr(symbol)}</div>
      <div class="detail-name">${escAttr(w.name || '')}</div>
      <div class="detail-price">${snap?.current_price != null ? '$' + fmtUSD(snap.current_price) : '—'}</div>
      <div class="detail-change ${(snap?.day_change_pct || 0) >= 0 ? 'pos' : 'neg'}">${snap?.day_change_pct != null ? fmtPct(snap.day_change_pct) + ' today' : '—'}</div>
    </div>

    ${buyCard}

    <div class="ind-strip">
      <div class="ind-cell"><div class="label">RSI 14</div><div class="val ${snap?.rsi14 < 35 ? 'warn' : ''}">${snap?.rsi14 != null ? snap.rsi14 : '—'}</div></div>
      <div class="ind-cell"><div class="label">Trend</div><div class="val ${snap?.trend === 'above_200ma' ? 'pos' : 'neg'}">${snap?.trend === 'above_200ma' ? '↑ 200' : '↓ 200'}</div></div>
      <div class="ind-cell"><div class="label">52W</div><div class="val">${snap?.pct_from_52w_high != null ? snap.pct_from_52w_high.toFixed(1) + '%' : '—'}</div></div>
      <div class="ind-cell"><div class="label">90d Drop</div><div class="val ${snap?.drop_from_peak_90d < -10 ? 'warn' : ''}">${snap?.drop_from_peak_90d != null ? snap.drop_from_peak_90d.toFixed(1) + '%' : '—'}</div></div>
    </div>

    <div class="pos-card">
      <h3>Conditions</h3>
      ${condList || '<div style="font-size:12px;color:var(--ink-muted);padding:8px 0;">No conditions yet. Add one to get triggered when something interesting happens.</div>'}
      <div class="pos-actions">
        <button class="btn btn-sm" data-act="add-cond" data-symbol="${escAttr(symbol)}">+ Add Condition</button>
      </div>
    </div>

    <div class="watch-detail-actions">
      <button class="btn" data-act="open-asset-from-watch" data-symbol="${escAttr(symbol)}">View Chart & Analyze</button>
      <button class="btn btn-danger btn-sm" data-act="rm-watch" data-symbol="${escAttr(symbol)}">Remove</button>
    </div>
  `;
}

async function rescan() {
  // Both "Scan now" and the Screener's "Rescan" now run the SAME unified scan
  // (runPreSurge does snapshot + universe). This wrapper just exists for the
  // top-bar button's own spinner/label.
  const btn = $('[data-act="rescan"]');
  if (btn) { btn.innerHTML = '<span class="spinner"></span> Scanning…'; btn.disabled = true; }

    await runPreSurge();

async function renderAssetDetail(symbol) {
  $("#topbarTitle").textContent = symbol;
  const holding = state.holdings.find(h => h.symbol === symbol);
  const view = $("#view");
  const isCash = holding?.asset_class === "cash";
  let price = state.prices[symbol];
  const analysis = state.analyses[symbol];

  if (!price) {
    view.innerHTML = `
      <div class="detail-head">
        <button class="detail-back" data-act="back-markets">← Back</button>
        <div class="detail-symbol">${escAttr(symbol)}</div>
      </div>
      <div class="empty-state"><span class="spinner"></span><p style="margin-top:14px;">Loading data…</p></div>
    `;
    try {
      const r = await fetch(`${WORKER_URL}/price/${encodeURIComponent(symbol)}`);
      if (!r.ok) throw new Error(await r.text());
      state.prices[symbol] = await r.json();
      renderAssetDetail(symbol);
    } catch (e) {
      view.innerHTML = `
        <div class="detail-head">
          <button class="detail-back" data-act="back-markets">← Back</button>
          <div class="detail-symbol">${escAttr(symbol)}</div>
        </div>
        <div class="error-banner">⚠ Couldn't load price for ${escAttr(symbol)}: ${escAttr((e.message || '').slice(0, 200))}</div>
      `;
    }
    return;
  }

  const cur = price.current_price;
  const dayPct = price && price.prev_close ? ((cur - price.prev_close) / price.prev_close) * 100 : null;

  let posCard = "";
  if (holding) {
    const hm = holdingMetrics(holding);
    const m = portfolioMetrics();
    const pctOfPort = m.totalValue > 0 && hm.value ? (hm.value / m.totalValue) * 100 : null;
    posCard = `
      <div class="pos-card">
        <h3>Your Position</h3>
        <div class="pos-row"><span class="lbl">${isCash ? 'Amount' : 'Quantity'}</span><span class="val">${isCash ? '$' + fmtUSD(holding.quantity, 2) : fmtNum(holding.quantity, 6)}</span></div>
        ${!isCash ? `<div class="pos-row"><span class="lbl">Avg Cost</span><span class="val">$${fmtUSD(holding.avg_cost_unit)}</span></div>` : ''}
        <div class="pos-row"><span class="lbl">${isCash ? 'Value' : 'Cost Basis'}</span><span class="val">$${fmtUSD(holding.avg_cost_total, 0)}</span></div>
        ${!isCash ? `<div class="pos-row"><span class="lbl">Current Value</span><span class="val">$${fmtUSD(hm.value, 0)}</span></div>
        <div class="pos-row"><span class="lbl">Unrealized P&L</span><span class="val ${hm.pnlAbs >= 0 ? 'pos' : 'neg'}">${hm.pnlAbs >= 0 ? '+' : ''}$${fmtUSD(Math.abs(hm.pnlAbs), 0)} · ${fmtPct(hm.pnlPct)}</span></div>
        <div class="pos-row"><span class="lbl">% of Portfolio</span><span class="val">${pctOfPort != null ? pctOfPort.toFixed(1) + '%' : '—'}</span></div>` : ''}
        <div class="pos-actions">
          <button class="btn btn-secondary btn-sm" data-act="edit-holding" data-symbol="${escAttr(symbol)}">Edit</button>
          <button class="btn btn-danger btn-sm" data-act="delete-holding" data-symbol="${escAttr(symbol)}">Remove</button>
        </div>
      </div>
    `;
  }

  let aiCard = "";
  if (!isCash) aiCard = renderAiCard(symbol, analysis);

  // Phase G — per-symbol verdict block on the asset detail card. Computed
  // client-side from the latest analysis + live price + decay status. Updates
  // the instant runAnalysis() finishes, without waiting for the portfolio
  // /verdict round-trip. Works for any symbol — held, watchlist, opportunity,
  // or one-off lookup. Verbs reframe based on isHeld.
  let assetVerdictBlock = "";
  if (!isCash) {
    assetVerdictBlock = renderAssetVerdictBlock(symbol, analysis, holding, cur);
  }

  let chartBlock = "";
  let sentBlock = "";
  if (!isCash) {
    chartBlock = `
      <div class="chart-wrap">
        <div class="chart-controls">
          ${["1M","3M","6M","1Y","ALL"].map(r => `<button class="range-btn ${r === state.selectedRange ? 'active' : ''}" data-act="set-range" data-range="${r}" data-symbol="${escAttr(symbol)}">${r}</button>`).join("")}
        </div>
        <div id="chart"></div>
      </div>
      <div class="ind-strip" id="indStrip"></div>
    `;
    sentBlock = `<div id="sentBlock"></div>`;
  } else {
    chartBlock = `<div class="empty-state" style="padding:20px;color:var(--ink-muted);font-size:13px;">Cash holdings have no chart or technical analysis.</div>`;
  }

  view.innerHTML = `

      <div class="detail-price">$${fmtUSD(cur)}</div>
      ${!isCash ? `<div class="detail-change ${dayPct >= 0 ? 'pos' : 'neg'}">${dayPct >= 0 ? '+' : ''}$${fmtUSD(Math.abs((cur - price.prev_close)))} · ${fmtPct(dayPct)} today</div>` : `<div class="detail-change flat">Cash · fixed value</div>`}

      loadIndicators(symbol);
      loadSentiment(symbol);
