// ============================================================================
// SCREENER — the "find me trades worth my analyze credit" funnel.
//
// Pre-Surge catches QUIET accumulation before a move. The Screener catches the
// four ACTIVE setups a part-time tactical trader can actually act on:
//   • OVERSOLD BOUNCE — beaten-down quality, mean-reversion (RSI ≤ 30, above
//     200MA so it's a dip not a death-spiral, near support, bounded drawdown)
//   • BREAKOUT — closing at/near an N-day high WITH volume expansion
//   • MOMENTUM PULLBACK — strong 90d trend, above 50MA, RSI cooled to 40-50
//     (buyable dip inside an uptrend)
//   • ETF ROTATION — leaders by relative return + positive 200MA trend
//
// EVERYTHING here is computed from data ALREADY fetched (state.prices OHLCV,
// populated by the Pre-Surge scan; state.etfLeaderboard). ZERO AI calls. The AI
// Analyze is the LAST step — a single button on the 1-2 names you pick off the
// top of the ranked list. You never analyze blind; you never analyze the list.
// ============================================================================
const SCREENER_MIN_SCORE = 55; // only surface setups that clear this bar

function computeScreenerSetups() {
  const out = [];
  const universe = getPreSurgeUniverse();
  for (const sym of universe) {
    if (sym === "SPY") continue;
    const r = scoreSymbolSetups(sym);
    // Surface only named setups that clear the floor. Sub-floor / no-setup names
    // still get a score for their watchlist row, but don't clutter the curated list.
    if (r && r.setup && r.score >= SCREENER_MIN_SCORE) {
      out.push(r);
    }
  }
  out.sort((a, b) => b.score - a.score);
  return out;
}

const SCREENER_SETUP_COLORS = {
  "Oversold bounce":    "var(--green)",
  "Breakout":           "var(--gold)",
  "Momentum pullback":  "var(--accent)",
  "ETF rotation":       "var(--ink-soft)",
};

// Score a single symbol's setups from cached OHLCV. Returns the BEST candidate
// with its raw score (no floor), or null if no candidate pattern matched at all.
// Both the curated Screener card (which applies the 55 floor) and the per-row
// watchlist badge (which shows every score) use this — ONE scoring path.
function scoreSymbolSetups(sym) {
  const data = state.prices[sym];
  if (!data || !data.ohlcv || data.ohlcv.length < 60) return null;
  const ohlcv = data.ohlcv;
  const closes = ohlcv.map(d => d.c).filter(x => x != null);
  const vols   = ohlcv.map(d => d.v != null ? d.v : 0);
  const cur = data.current_price ?? closes[closes.length - 1];
  if (cur == null || closes.length < 60) return null;

  const rsi   = computeRSI(closes, 14);
  const sma50  = computeSMA(closes, 50);
  const sma200 = closes.length >= 200 ? computeSMA(closes, 200) : null;
  const swingLow = recentSwingLow(ohlcv, 20);
  const ret90 = closes.length >= 90 ? ((cur - closes[closes.length - 90]) / closes[closes.length - 90]) * 100 : null;
  const avgVol20 = vols.length >= 21 ? vols.slice(-21, -1).reduce((a, b) => a + b, 0) / 20 : null;
  const todayVol = vols[vols.length - 1];
  const volRatio = (avgVol20 && avgVol20 > 0) ? todayVol / avgVol20 : null;
  const high60 = Math.max(...closes.slice(-60));
  const peak90 = closes.length >= 90 ? Math.max(...closes.slice(-90)) : Math.max(...closes);
  const ddFromPeak = peak90 > 0 ? ((cur - peak90) / peak90) * 100 : 0;

  const candidates = [];

  // ---- OVERSOLD BOUNCE ----
  if (rsi != null && rsi <= 32 && sma200 != null) {
    let score = 0;
    score += rsi <= 22 ? 35 : rsi <= 28 ? 28 : 20;
    if (cur > sma200) score += 25; else score -= 10;
    if (swingLow != null && cur <= swingLow * 1.04) score += 20;
    if (ddFromPeak > -35) score += 10;
    if (volRatio != null && volRatio > 1.3) score += 10;
    score = Math.max(0, Math.min(100, score));
    candidates.push({ setup: "Oversold bounce", score,
      detail: `RSI ${rsi.toFixed(0)}${cur > sma200 ? " · above 200MA" : " · below 200MA"}${swingLow != null && cur <= swingLow * 1.04 ? " · at support" : ""}` });
  }

  // ---- BREAKOUT ----
  if (cur >= high60 * 0.995) {
    let score = 0;
    score += cur >= high60 ? 35 : 25;
    if (volRatio != null && volRatio > 1.5) score += 30;
    else if (volRatio != null && volRatio > 1.2) score += 18;
    else score -= 5;
    if (sma50 != null && cur > sma50) score += 15;
    if (ret90 != null && ret90 > 0) score += 10;
    score = Math.max(0, Math.min(100, score));
    candidates.push({ setup: "Breakout", score,
      detail: `${cur >= high60 ? "new" : "near"} 60d high${volRatio != null ? ` · vol ${volRatio.toFixed(1)}×` : ""}` });
  }

  // ---- MOMENTUM PULLBACK ----
  if (ret90 != null && ret90 > 12 && sma50 != null && rsi != null && rsi >= 38 && rsi <= 52) {
    let score = 0;
    score += ret90 > 30 ? 30 : 22;
    if (cur > sma50) score += 22;
    else if (cur > sma50 * 0.97) score += 12;
    if (rsi >= 40 && rsi <= 48) score += 20;
    if (sma200 != null && cur > sma200) score += 18;
    score = Math.max(0, Math.min(100, score));
    candidates.push({ setup: "Momentum pullback", score,
      detail: `90d +${ret90.toFixed(0)}% · RSI ${rsi.toFixed(0)} · ${cur > sma50 ? "above" : "testing"} 50MA` });
  }

  // ---- ETF OPPORTUNITY (relative strength + absolute setup, blended) --------
  // For an ETF, the opportunity isn't its raw return — it's whether it's LEADING
  // (beating SPY and trending up) or a buyable LAGGARD (pulled back but still in
  // a primary uptrend), timed by an absolute setup. We blend:
  //   • Relative strength vs SPY over ~3mo and ~6mo (rotation signal)
  //   • Trend (above 200MA) + smoothness (shallow drawdown)
  //   • An absolute timing kicker (oversold dip OR fresh breakout)
  // and tag WHY: "leading sector", "oversold laggard", or "breakout".
  const isEtf = (typeof ETF_UNIVERSE !== "undefined") && ETF_UNIVERSE.some(e => e.symbol === sym);
  if (isEtf && sma200 != null) {
    const bench = state.prices["SPY"]?.ohlcv?.map(d => d.c).filter(x => x != null);
    const aboveTrend = cur > sma200;
    const ret63  = closes.length >= 63  ? ((cur - closes[closes.length - 63])  / closes[closes.length - 63])  * 100 : null;
    const ret126 = closes.length >= 126 ? ((cur - closes[closes.length - 126]) / closes[closes.length - 126]) * 100 : ret90;

    // Relative strength vs SPY over the same windows (positive = outperforming).
    let rs63 = null, rs126 = null;
    if (bench && bench.length >= 126) {
      const bcur = bench[bench.length - 1];
      const b63  = ((bcur - bench[bench.length - 63])  / bench[bench.length - 63])  * 100;
      const b126 = ((bcur - bench[bench.length - 126]) / bench[bench.length - 126]) * 100;
      if (ret63  != null) rs63  = ret63  - b63;
      if (ret126 != null) rs126 = ret126 - b126;
    }
    const leadingNow  = rs63  != null && rs63  > 0;
    const leadingMed  = rs126 != null && rs126 > 0;

    let score = 0;
    // Relative strength is the core rotation signal.
    if (rs126 != null) score += rs126 >= 12 ? 28 : rs126 >= 5 ? 20 : rs126 >= 0 ? 12 : 0;
    if (rs63  != null) score += rs63  >= 8  ? 16 : rs63  >= 0 ? 8  : -6;   // recent leadership / fading
    // Trend & quality.
    if (aboveTrend) score += 20; else score -= 8;
    if (ddFromPeak > -10) score += 8; else if (ddFromPeak > -18) score += 4;

    // Absolute timing kicker + the "why" tag.
    let why = leadingMed ? "leading" : "lagging";
    if (rsi != null && rsi <= 35 && aboveTrend) {
      // Oversold but still in a primary uptrend = buyable laggard / pullback.
      score += 14; why = "oversold laggard";
    } else if (cur >= Math.max(...closes.slice(-60)) * 0.997) {
      score += 12; why = "breakout";
    } else if (leadingNow && leadingMed) {
      score += 8;  why = "leading sector";
    }
    score = Math.max(0, Math.min(100, score));

    // Detail line tells the rotation story in plain terms.
    const rsTxt = rs126 != null ? `${rs126 >= 0 ? "+" : ""}${rs126.toFixed(0)}% vs SPY` : (ret126 != null ? `${ret126 >= 0 ? "+" : ""}${ret126.toFixed(0)}% 6mo` : "trend");
    const detail = `${why} · ${rsTxt} · ${aboveTrend ? "above" : "below"} 200MA`;
    candidates.push({ setup: "ETF rotation", score, detail });
  }

  if (!candidates.length) {
    // No named pattern — still return a low "watching" score so the row shows a
    // number rather than nothing. Score reflects how close it is to a setup.
    let near = 20;
    if (rsi != null && rsi <= 40) near += 10;          // cooling toward oversold
    if (ret90 != null && ret90 > 8) near += 8;          // some momentum
    if (sma200 != null && cur > sma200) near += 6;      // healthy trend
    return { symbol: sym, current_price: cur, setup: null, score: Math.min(49, near), detail: "no setup yet" };
  }
  candidates.sort((a, b) => b.score - a.score);
  return { symbol: sym, current_price: cur, ...candidates[0] };
}

// Raw score for a single symbol (every scanned name gets one). Used by the
// inline watchlist/opportunity badge so no row is left numberless.
function screenerScoreFor(symbol) {
  try { return scoreSymbolSetups(symbol); } catch (e) { return null; }
}

// ============================================================================
// ETF ROTATION MAP — the one view that needs to stay separate from the merged
// list, because rotation is RELATIVE: a sector only means something ranked
// against other sectors. Ranks every ETF by short-window relative strength vs
// SPY (1mo + 3mo blended — rotation turns in weeks, so short windows catch it),
// grouped by category, with the 1-year return used only as a durability flag
// (★ = the leadership is backed by a real yearly trend, not a one-month spike).
// ============================================================================
function computeEtfRotation() {
  if (typeof ETF_UNIVERSE === "undefined") return [];
  const bench = state.prices["SPY"]?.ohlcv?.map(d => d.c).filter(x => x != null);
  if (!bench || bench.length < 63) return []; // need SPY history for RS
  const bcur = bench[bench.length - 1];
  const bRet = (n) => bench.length > n ? ((bcur - bench[bench.length - 1 - n]) / bench[bench.length - 1 - n]) * 100 : null;
  const b21 = bRet(21), b63 = bRet(63), b252 = bRet(252);

  const rows = [];
  for (const e of ETF_UNIVERSE) {
    if (e.symbol === "SPY") continue;
    const closes = state.prices[e.symbol]?.ohlcv?.map(d => d.c).filter(x => x != null);
    if (!closes || closes.length < 63) continue;
    const cur = state.prices[e.symbol]?.current_price ?? closes[closes.length - 1];
    const ret = (n) => closes.length > n ? ((cur - closes[closes.length - 1 - n]) / closes[closes.length - 1 - n]) * 100 : null;
    const r21 = ret(21), r63 = ret(63), r252 = ret(252);
    // Relative strength = ETF return − SPY return over the same window.
    const rs21 = (r21 != null && b21 != null) ? r21 - b21 : null;
    const rs63 = (r63 != null && b63 != null) ? r63 - b63 : null;
    const rs252 = (r252 != null && b252 != null) ? r252 - b252 : null;
    if (rs21 == null && rs63 == null) continue;
    // Blended RS: weight 1mo and 3mo equally — recent + confirmed.
    const rsBlend = (rs21 != null && rs63 != null) ? (rs21 * 0.5 + rs63 * 0.5)
                   : (rs21 != null ? rs21 : rs63);
    const sma200 = closes.length >= 200 ? computeSMA(closes, 200) : null;
    // Tri-state: true above, false below, null when we lack 200 bars to judge.
    // Avoids showing a confident ↑200 / ↓200 when the data can't support it.
    const aboveTrend = sma200 != null ? cur > sma200 : null;
    const durable = rs252 != null && rs252 > 0; // yearly RS positive = durable leadership
    rows.push({
      symbol: e.symbol, name: e.name, category: e.category,
      rs21, rs63, rs252, rsBlend, aboveTrend, durable, current_price: cur,
    });
  }
  rows.sort((a, b) => b.rsBlend - a.rsBlend);
  return rows;
}

function renderEtfRotationStrip() {
  const rows = computeEtfRotation();
  if (!rows.length) return ""; // no SPY benchmark or no ETF data yet
  // Group by category.
  const byCat = {};
  for (const r of rows) (byCat[r.category] = byCat[r.category] || []).push(r);

  // Sort categories by their STRONGEST member's RS, so the hottest sectors sit
  // first (read left-to-right / top-to-bottom = strongest to weakest rotation).
  const catBest = {};
  for (const c of Object.keys(byCat)) catBest[c] = Math.max(...byCat[c].map(r => r.rsBlend));
  const cats = Object.keys(byCat).sort((a, b) => catBest[b] - catBest[a]);

  // Heatmap cell: background intensity scales with RS magnitude. Strong green
  // for leaders, strong red for laggards, faint for the middle.
  const heatStyle = (v) => {
    if (v == null) return "";
    const mag = Math.min(1, Math.abs(v) / 20); // saturate at ±20% RS
    const alpha = (0.10 + mag * 0.45).toFixed(2);
    if (v >= 0) return `background: rgba(74, 122, 74, ${alpha});`;       // green
    return `background: rgba(176, 61, 45, ${alpha});`;                    // red
  };
  const fmtRs = (v) => v == null ? "—" : `${v >= 0 ? "+" : ""}${v.toFixed(1)}`;
  const trendMark = (t) => t === true ? `<span class="rot-trend up" title="Above 200-day average">↑</span>`
                        : t === false ? `<span class="rot-trend down" title="Below 200-day average">↓</span>`
                        : ``; // unknown — show nothing rather than a misleading arrow

  const catBlocks = cats.map(cat => {
    const members = byCat[cat].slice(0, 6);
    const best = catBest[cat];
    const catHeat = best >= 8 ? "hot" : best >= 0 ? "warm" : "cold";
    const rowsHtml = members.map(r => {
      const onList = state.watchlist.some(w => w.symbol === r.symbol);
      return `
      <div class="rot-row" data-act="open-asset" data-symbol="${escAttr(r.symbol)}" style="${heatStyle(r.rsBlend)}">
        <span class="rot-sym">${escAttr(r.symbol)}${r.durable ? `<span class="rot-star" title="Durable — positive 1-year relative strength">★</span>` : ""}</span>
        <span class="rot-rs">${fmtRs(r.rsBlend)}<span class="rot-pct">%</span></span>
        ${trendMark(r.aboveTrend)}
        ${onList
          ? `<span class="rot-watch on" title="On watchlist">✓</span>`
          : `<button class="rot-watch" data-act="add-curated" data-symbol="${escAttr(r.symbol)}" data-name="${escAttr(r.name)}" title="Add ${escAttr(r.symbol)} to watchlist" onclick="event.stopPropagation()">+</button>`}
      </div>`;
    }).join("");
    return `<div class="rot-cat">
      <div class="rot-cat-head"><span class="rot-cat-dot ${catHeat}"></span>${escAttr(cat)}</div>
      ${rowsHtml}
    </div>`;
  }).join("");

  // A one-line plain-English read of the rotation, derived from the data.
  const topCat = cats[0], botCat = cats[cats.length - 1];
  const leadName = byCat[topCat]?.[0]?.symbol;
  const readLine = (catBest[topCat] > 3)
    ? `Money is rotating into <b>${escAttr(topCat)}</b> (${escAttr(leadName)} leads) and out of <b>${escAttr(botCat)}</b>.`
    : `No strong rotation — leadership is flat across categories right now.`;

  return `
    <div class="presurge-card rotation-card">
      <div class="presurge-head">
        <div>
          <h3>ETF Rotation</h3>
          <div class="presurge-sub">Strength vs SPY · 1mo+3mo · ★ durable · greener = leading</div>
        </div>
        <button class="btn btn-sm" data-act="run-presurge">Rescan</button>
      </div>
      <div class="rot-read">${readLine}</div>
      <div class="rotation-grid">${catBlocks}</div>
      <div class="presurge-foot">Hottest categories first; leaders top each column. Tap any ETF to open it. Timing setups (oversold/breakout) appear in the Screener above.</div>
    </div>`;
}

function renderScreenerCard() {
  // The screener reuses the Pre-Surge scan's fetched OHLCV. If no scan has run,
  // it has nothing to score — prompt the user to run it (same fetch powers both).
  const scanned = !!state.preSurgeAllScored || !!state.preSurge;
  if (!scanned) {
    return `
      <div class="presurge-card empty">
        <div class="presurge-head">
          <div>
            <h3>Screener</h3>
            <div class="presurge-sub">Setup score 0–100 · Oversold · Breakout · Pullback · Rotation</div>
          </div>
          <button class="btn btn-sm" data-act="run-presurge">Run scan</button>
        </div>
        <div class="presurge-empty-body">
          Ranks your universe for four tradeable setups — oversold bounces, breakouts, momentum pullbacks, and ETF rotation leaders — using data already on hand. <b>No AI calls.</b> The <b>Setup score (0–100)</b> rates how ready each name is to trade right now. Run the scan once, then spend an Analyze only on the names at the top worth your time.
        </div>
      </div>`;
  }

  const setups = computeScreenerSetups();
  const visible = setups.filter(s => {
    const key = recKeyFor(s.symbol, "screener", s.setup);
    return getRecStatus(key) !== "dismissed";
  }).slice(0, 12);

  let body;
  if (visible.length === 0) {
    body = `<div class="presurge-empty-body">No setups clear the bar right now. That's normal in a quiet or strongly-trending tape — the screener stays silent rather than padding the list. Re-run after a session with more movement.</div>`;
  } else {
    body = `<div class="screener-list">
      ${visible.map(s => {
        const recKey = recKeyFor(s.symbol, "screener", s.setup);
        const held = state.holdings.some(h => h.symbol === s.symbol && h.asset_class !== "cash");
        const watched = state.watchlist.some(w => w.symbol === s.symbol);
        const color = SCREENER_SETUP_COLORS[s.setup] || "var(--ink-soft)";
        const isAnalyzing = !!(state.analyzingSymbols && state.analyzingSymbols[s.symbol]);
        return `
        <div class="screener-row" data-act="open-asset" data-symbol="${escAttr(s.symbol)}">
          <div class="screener-score" style="color:${color};">${s.score}</div>
          <div class="screener-mid">
            <div class="screener-sym-row">
              <span class="screener-sym">${escAttr(s.symbol)}</span>
              <span class="screener-setup" style="color:${color};border-color:${color};">${escAttr(s.setup)}</span>
              ${held ? `<span class="presurge-tag held">held</span>` : ""}
              ${watched ? `<span class="presurge-tag watched">watched</span>` : ""}
              ${s.current_price != null ? `<span class="presurge-price">$${fmtUSD(s.current_price)}</span>` : ""}
            </div>
            <div class="screener-detail">${escAttr(s.detail)}</div>
          </div>
          <div class="screener-actions">
            <button class="btn btn-sm screener-analyze ${isAnalyzing ? 'analyzing' : ''}"
                    data-act="vrow-analyze" data-symbol="${escAttr(s.symbol)}"
                    title="Spend one Analyze on ${escAttr(s.symbol)}"
                    ${isAnalyzing ? 'disabled' : ''}
                    onclick="event.stopPropagation()">
              ${isAnalyzing ? `<span class="spinner"></span>` : "Analyze"}
            </button>
            ${(!watched && !held) ? `<button class="btn btn-secondary btn-sm" data-act="add-curated" data-symbol="${escAttr(s.symbol)}" data-name="${escAttr(s.symbol)}" title="Add ${escAttr(s.symbol)} to watchlist" onclick="event.stopPropagation()">+ Watch</button>` : ""}
            <button class="presurge-del" data-act="dismiss-rec" data-rec-key="${escAttr(recKey)}" title="Hide" onclick="event.stopPropagation()">×</button>
          </div>
        </div>`;
      }).join("")}
    </div>`;
  }

  return `
    <div class="presurge-card">
      <div class="presurge-head">
        <div>
          <h3>Screener</h3>
          <div class="presurge-sub">Setup score 0–100 · ${visible.length} setup${visible.length === 1 ? "" : "s"} · ${state.preSurgeRanAt ? "Updated " + fmtRel(state.preSurgeRanAt) : ""}</div>
        </div>
        <button class="btn btn-sm" data-act="run-presurge">Rescan</button>
      </div>
      ${body}
      <div class="presurge-footer">Ranks four setups from data already fetched — no AI calls. Tap <b>Analyze</b> only on the names worth spending a credit on. The full read costs the AI call; the shortlist is free.</div>
    </div>`;
}

// ============================================================================
// PRE-SURGE CARD RENDERING (sits above Daily Scan on the Portfolio tab)
// Composite ≥ 70 from three leading indicators:
//   • Squeeze (BB bandwidth in lowest 10% of 6mo + days-in-squeeze + vol expansion)
//   • Accumulation (OBV slope positive while price flat, + up/down volume ratio)
//   • Relative Strength (RS line slope vs SPY rising while price flat, + RS pctile)
// ============================================================================
function renderPreSurgeCard() {
  const cached = state.preSurge;
  const loading = state.preSurgeLoading;
  const ranAt = state.preSurgeRanAt;

  // First-time empty state
  if (!cached && !loading) {
    return `
      <div class="presurge-card empty">
        <div class="presurge-head">
          <div>
            <h3>Pre-Surge Scanner</h3>
            <div class="presurge-sub">Squeeze · Accumulation · Relative Strength</div>
          </div>
          <button class="btn btn-sm" data-act="run-presurge">Scan</button>
        </div>
        <div class="presurge-empty-body">
          Scans your watchlist, holdings, ETF universe, and a curated mid-cap universe (where pre-surge patterns actually show up) for three leading-indicator setups: Bollinger squeeze, OBV accumulation divergence, and relative-strength rotation. A <b>confirmed flag</b> needs a high composite <i>and</i> a direction — accumulation and RS both stepping in, not a squeeze on its own. Coils that score well but haven't confirmed appear under <b>Watching</b>. First scan downloads OHLCV histories — takes 30-60 seconds; later scans are instant.
        </div>
      </div>
    `;
  }

  if (loading) {
    const p = state.preSurgeProgress || { fetched: 0, total: 0 };
    const pct = p.total > 0 ? Math.round((p.fetched / p.total) * 100) : 0;
    return `
      <div class="presurge-card loading">
        <div class="presurge-head">
          <div>
            <h3>Pre-Surge Scanner</h3>
            <div class="presurge-sub">${p.total > 0 ? `Fetching ${p.fetched}/${p.total} · ${pct}%` : "Computing scores…"}</div>
          </div>
          <button class="btn btn-sm" disabled><span class="spinner" style="width:12px;height:12px;border-width:1.5px;"></span> Scanning…</button>
        </div>
        <div class="presurge-progress"><div class="presurge-progress-bar" style="width:${pct}%;"></div></div>
      </div>
    `;
  }

  const flags = cached || [];
  const allScored = state.preSurgeAllScored || [];
  const debug = state.preSurgeDebug;
  const recentHistory = getRecentPreSurgeFlags(3, 30, 5);

  // Filter out dismissed entries (only applies to flagged view, not debug)
  const visibleFlags = flags.filter(f => {
    const key = recKeyFor(f.symbol, "presurge", "presurge");
    return getRecStatus(key) !== "dismissed";
  });

  // Debug mode: render top 10 by composite score regardless of threshold.
  // Use this to verify the math is working when zero flags shows up. If the
  // top 10 are all in the 30-50 range, scoring is fine — market just isn't
  // presenting strong setups today. If everything's <15, something's wrong.
  if (debug) {
    const top = allScored.slice(0, 10);
    const stats = {
      total: allScored.length,
      max: top[0]?.composite || 0,
      median: top.length ? top[Math.floor(top.length / 2)].composite : 0,
      with_squeeze: allScored.filter(s => s.squeeze > 0).length,
      with_accum: allScored.filter(s => s.accumulation > 0).length,
      with_rs: allScored.filter(s => s.rs > 0).length,
    };
    return `
      <div class="presurge-card debug">
        <div class="presurge-head">
          <div>
            <h3>Pre-Surge · Debug View</h3>
            <div class="presurge-sub">Top 10 by composite · threshold ignored · ${ranAt ? "scanned " + fmtRel(ranAt) : ""}</div>
          </div>
          <button class="btn btn-sm" data-act="toggle-presurge-debug">Exit Debug</button>
        </div>
        <div class="presurge-debug-stats">
          <div class="pds-cell"><span class="pds-lbl">Scored</span><span class="pds-val">${stats.total}</span></div>
          <div class="pds-cell"><span class="pds-lbl">Top</span><span class="pds-val">${stats.max}</span></div>
          <div class="pds-cell"><span class="pds-lbl">Median</span><span class="pds-val">${stats.median}</span></div>
          <div class="pds-cell"><span class="pds-lbl">w/ Squeeze</span><span class="pds-val">${stats.with_squeeze}</span></div>
          <div class="pds-cell"><span class="pds-lbl">w/ Accum</span><span class="pds-val">${stats.with_accum}</span></div>
          <div class="pds-cell"><span class="pds-lbl">w/ RS</span><span class="pds-val">${stats.with_rs}</span></div>
        </div>
        <div class="presurge-debug-hint">
          ${stats.total === 0 ? "⚠ No symbols scored — OHLCV data missing. Run Rescan." :
            stats.max < 20 ? "⚠ Top score very low — market may genuinely have no setups, or check your data freshness." :
            stats.max >= 40 ? "✓ Scoring is firing normally. Top names just below the 70 threshold are worth a manual look." :
            "Scoring works. The market just isn't presenting strong setups today — normal in trending markets."}
        </div>
        <div class="presurge-list">
          ${top.length === 0 ? `<div class="presurge-empty-body">No symbols produced a score. Data probably didn't load. Try Rescan.</div>` :
          top.map(f => {
            const held = state.holdings.some(h => h.symbol === f.symbol && h.asset_class !== "cash");
            const watched = state.watchlist.some(w => w.symbol === f.symbol);
            const aboveThresh = f.composite >= PRESURGE_THRESHOLD;
            return `
            <div class="presurge-row ${aboveThresh ? 'over-thresh' : ''}" data-act="open-asset" data-symbol="${escAttr(f.symbol)}">
              <div class="presurge-rank">${f.composite}</div>
              <div class="presurge-mid">
                <div class="presurge-sym-row">
                  <span class="presurge-sym">${escAttr(f.symbol)}</span>
                  ${aboveThresh ? `<span class="presurge-tag held" style="background:rgba(176,141,60,0.18);color:var(--gold);border-color:var(--gold);">FLAGGED</span>` : ""}
                  ${held ? `<span class="presurge-tag held">held</span>` : ""}
                  ${watched ? `<span class="presurge-tag watched">watched</span>` : ""}
                  ${renderShortInterestBadge(f.symbol)}
                  <span class="presurge-price">$${fmtUSD(f.current_price)}</span>
                </div>
                <div class="presurge-bars">
                  ${renderPresurgeBar("Squeeze", f.squeeze, 40, "var(--gold)")}
                  ${renderPresurgeBar("Accum",   f.accumulation, 30, "var(--green)")}
                  ${renderPresurgeBar("RS",      f.rs, 30, "var(--ink-soft)")}
                </div>
                <div class="presurge-details">
                  ${f.breakdown.map(b => `<span class="presurge-detail-chip">${escAttr(b.detail)}</span>`).join("")}
                </div>
              </div>
            </div>
          `;}).join("")}
        </div>
        <div class="presurge-footer">Debug mode · all scored symbols visible · normal threshold is composite ≥ 70</div>
      </div>
    `;
  }

  let body;
  if (visibleFlags.length === 0) {
    // Empty state — show a hint about debug mode and the median score
    const topUnflagged = allScored[0];
    const hint = topUnflagged
      ? ` Highest scoring today: ${topUnflagged.symbol} at ${topUnflagged.composite}.`
      : "";
    body = `<div class="presurge-empty-body">
      No setups above the threshold today.${hint} Tap <b>Debug</b> to see the top 10 scored symbols regardless of threshold — useful for verifying the scanner is working.
    </div>`;
  } else {
    body = `
      <div class="presurge-list">
        ${visibleFlags.slice(0, 8).map(f => {
          const recKey = recKeyFor(f.symbol, "presurge", "presurge");
          const status = getRecStatus(recKey);
          const isDone = status === "done";
          const held = state.holdings.some(h => h.symbol === f.symbol && h.asset_class !== "cash");
          const watched = state.watchlist.some(w => w.symbol === f.symbol);
          return `
          <div class="presurge-row ${isDone ? 'rec-done' : ''}" data-act="open-asset" data-symbol="${escAttr(f.symbol)}">
            <div class="presurge-rank">${f.composite}</div>
            <div class="presurge-mid">
              <div class="presurge-sym-row">
                <span class="presurge-sym">${escAttr(f.symbol)}</span>
                ${held ? `<span class="presurge-tag held">held</span>` : ""}
                ${watched ? `<span class="presurge-tag watched">watched</span>` : ""}
                ${renderShortInterestBadge(f.symbol)}
                <span class="presurge-price">$${fmtUSD(f.current_price)}</span>
              </div>
              <div class="presurge-bars">
                ${renderPresurgeBar("Squeeze", f.squeeze, 40, "var(--gold)")}
                ${renderPresurgeBar("Accum",   f.accumulation, 30, "var(--green)")}
                ${renderPresurgeBar("RS",      f.rs, 30, "var(--ink-soft)")}
              </div>
              <div class="presurge-details">
                ${f.breakdown.map(b => `<span class="presurge-detail-chip">${escAttr(b.detail)}</span>`).join("")}
              </div>
            </div>
            <div class="presurge-actions">
              <button class="presurge-del" data-act="dismiss-rec" data-rec-key="${escAttr(recKey)}" title="Hide">×</button>
            </div>
          </div>
        `;}).join("")}
      </div>
    `;
  }

  // Watching band — coils that scored well but haven't confirmed direction.
  // Rendered as a distinct, visually-quieter section so they read as "building"
  // not "act now". This is the safe home for the lower-composite names that the
  // old design would have mislabeled as flags if you'd just dropped the cutoff.
  const watchingRaw = state.preSurgeWatching || [];
  const watchingVisible = watchingRaw.filter(f => {
    const key = recKeyFor(f.symbol, "presurge", "presurge");
    return getRecStatus(key) !== "dismissed";
  }).slice(0, 6);
  let watchingBand = "";
  if (watchingVisible.length > 0) {
    watchingBand = `
      <div class="presurge-watching">
        <div class="presurge-watching-head">Watching · coiling, not yet confirmed</div>
        <div class="presurge-list">
          ${watchingVisible.map(f => {
            const held = state.holdings.some(h => h.symbol === f.symbol && h.asset_class !== "cash");
            const watched = state.watchlist.some(w => w.symbol === f.symbol);
            // Why it hasn't confirmed — the missing leg(s).
            const need = [];
            if ((f.accumulation ?? 0) < PRESURGE_MIN_ACCUM) need.push("accum");
            if ((f.rs ?? 0) < PRESURGE_MIN_RS) need.push("RS");
            const needTxt = need.length ? `needs ${need.join(" + ")}` : "near confirm";
            return `
            <div class="presurge-row presurge-row-watching" data-act="open-asset" data-symbol="${escAttr(f.symbol)}">
              <div class="presurge-rank presurge-rank-watching">${f.composite}</div>
              <div class="presurge-mid">
                <div class="presurge-sym-row">
                  <span class="presurge-sym">${escAttr(f.symbol)}</span>
                  ${held ? `<span class="presurge-tag held">held</span>` : ""}
                  ${watched ? `<span class="presurge-tag watched">watched</span>` : ""}
                  <span class="presurge-price">$${fmtUSD(f.current_price)}</span>
                  <span class="presurge-tag presurge-tag-need">${needTxt}</span>
                </div>
                <div class="presurge-bars">
                  ${renderPresurgeBar("Squeeze", f.squeeze, 40, "var(--gold)")}
                  ${renderPresurgeBar("Accum",   f.accumulation, 30, "var(--green)")}
                  ${renderPresurgeBar("RS",      f.rs, 30, "var(--ink-soft)")}
                </div>
              </div>
            </div>
          `;}).join("")}
        </div>
      </div>
    `;
  }

  // Track record panel — flags from 3-30 days ago with their since-flag return.
  // This is the scanner's self-audit: are flagged names actually moving up?
  let trackRecord = "";
  if (recentHistory.length > 0) {
    const avg = recentHistory.reduce((s, h) => s + h.since_flag_pct, 0) / recentHistory.length;
    const wins = recentHistory.filter(h => h.since_flag_pct > 0).length;
    const avgCls = avg >= 0 ? "pos" : "neg";
    trackRecord = `
      <div class="presurge-track">
        <div class="presurge-track-head">
          <span>Recent Flags · Track Record</span>
          <span class="presurge-track-stats">
            ${wins}/${recentHistory.length} positive · avg <span class="${avgCls}">${avg >= 0 ? "+" : ""}${avg.toFixed(1)}%</span>
          </span>
        </div>
        <div class="presurge-track-list">
          ${recentHistory.map(h => {
            const cls = h.since_flag_pct >= 0 ? "pos" : "neg";
            const ageDisp = h.age_days < 1 ? "today" : `${Math.round(h.age_days)}d ago`;
            return `
              <div class="presurge-track-row" data-act="open-asset" data-symbol="${escAttr(h.symbol)}">
                <span class="ptr-sym">${escAttr(h.symbol)}</span>
                <span class="ptr-age">${ageDisp}</span>
                <span class="ptr-score">cs ${h.composite}</span>
                <span class="ptr-pnl ${cls}">${h.since_flag_pct >= 0 ? "+" : ""}${h.since_flag_pct.toFixed(1)}%</span>
              </div>
            `;
          }).join("")}
        </div>
      </div>
    `;
  }

  return `
    <div class="presurge-card">
      <div class="presurge-head">
        <div>
          <h3>Pre-Surge Scanner</h3>
          <div class="presurge-sub">${visibleFlags.length} confirmed${watchingVisible.length > 0 ? ` · ${watchingVisible.length} watching` : ""}${allScored.length > 0 ? ` · ${allScored.length} scored` : ""} · ${ranAt ? "Updated " + fmtRel(ranAt) : "Just now"}</div>
        </div>

}

// Renders a "SQUEEZE-PRONE" / "HIGH SHORT" badge if DTC data is known for this
// symbol AND DTC > 5. Empty string otherwise — including when data is missing
// (international tickers, low-volume, or Yahoo not returning it).
function renderShortInterestBadge(symbol) {
  const si = state.shortInterest;
  if (!si || !si[symbol]) return "";
  const dtc = si[symbol].dtc;
  const sp = si[symbol].shortPctFloat;
  if (dtc == null) return "";
  if (dtc < 5) return "";
  // Tooltip shows short pct of float when available
  const tip = sp != null
    ? `Days-to-cover ${dtc.toFixed(1)} · ${sp.toFixed(1)}% of float short`
    : `Days-to-cover ${dtc.toFixed(1)}`;
  const cls = dtc >= 10 ? "squeeze-prone" : "high-short";
  const label = dtc >= 10 ? `SQUEEZE-PRONE · DTC ${dtc.toFixed(1)}` : `HIGH SHORT · DTC ${dtc.toFixed(1)}`;
  return `<span class="presurge-tag short-${cls}" title="${escAttr(tip)}">${label}</span>`;
}

async function fetchShortInterestBackground() {
  // Fire-and-forget. Only fetches for the SCAN_UNIVERSE — international tickers,
  // ETFs, and crypto don't have meaningful short-interest data.
  // Skipped silently on failure since this is purely informational badging.
  try {
    const cached = loadShortInterestCache();
    if (cached) { state.shortInterest = cached; return; }
    const symbols = (typeof SCAN_UNIVERSE !== "undefined" ? SCAN_UNIVERSE : []);
    if (symbols.length === 0) return;
    const results = await fetchShortInterestForUniverse(symbols);
    state.shortInterest = results;
    // Re-render so badges appear on existing pre-surge rows
    if (state.currentView === "portfolio") renderCurrentView();
  } catch (e) { /* silent — badge is non-essential */ }
}

async function runPreSurge() {
  if (state.preSurgeLoading) return;
  state.preSurgeLoading = true;
  state.preSurgeProgress = { fetched: 0, total: 0 };
  renderCurrentView();
  try {
    // UNIFIED SCAN: one operation behind every scan button. First refresh the
    // watchlist snapshot (row prices/RSI/triggers), then run the universe scan
    // that powers the Screener + Pre-Surge. Previously "Rescan" on the Screener
    // skipped the snapshot while "Scan now" did it — same button, different
    // result. Now they're identical no matter where pressed.
    try { if (state.watchlist?.length) await runScan(); } catch (e) { /* snapshot best-effort */ }
    await ensurePreSurgeData((fetched, total) => {
      state.preSurgeProgress = { fetched, total };
      // Only re-render every ~5 items to avoid flicker on slow networks
      if (fetched % 5 === 0 || fetched === total) renderCurrentView();
    });
    const { flagged, watching, allScored } = computePreSurgeUniverse();
    state.preSurge = flagged;
    state.preSurgeWatching = watching;
    state.preSurgeAllScored = allScored;
    state.preSurgeRanAt = new Date().toISOString();
    state.lastScanAt = new Date().toISOString();
    const added = recordPreSurgeFlags(flagged);
    state.preSurgeLoading = false;
    state.preSurgeProgress = null;
    // Invalidate the screener cache so the next render recomputes on fresh data.
    _screenerSetupCache = { at: 0, map: null };
    renderCurrentView();
    toast(`Scan complete · ${allScored.length} names scored`);
    // Kick off DTC fetch in background to enrich rows with short-interest badges
    fetchShortInterestBackground();
  } catch (e) {
    state.preSurgeLoading = false;
    state.preSurgeProgress = null;
    renderCurrentView();
    toast(`Scan failed: ${(e.message || e).slice(0, 80)}`, 3000, "error");
  }
}

function renderDailyScan() {
  let actions = computeDailyScan();
  if (actions.length === 0) {
    return `
      <div class="scan-card">
        <div class="scan-head">
          <h3>Today's Buys & Adds</h3>
          <span class="scan-pill" style="background:var(--bg-elev);color:var(--ink-muted);">No setups</span>
        </div>
        <div class="scan-empty">No actionable buy setups today. Hold positions, wait for weakness.</div>
      </div>
    `;
  }
  // Tag each action with NEW / STRONGER / CARRIED OVER based on history
  actions = tagActionsWithRecency(actions);
  const iconFor = k => k === "trim" ? "↓" : k === "add" ? "↑" : "+";
  const colorFor = k => k === "trim" ? "var(--red)" : k === "add" ? "var(--green)" : "var(--gold)";

  const summary = actions._summary;
  let summaryHeader = "";
  if (summary && summary.totalDeployment > 0) {
    const depPctDisplay = summary.deploymentPct.toFixed(0);
    let toneClass = "medium";
    if (summary.deploymentPct < 15) toneClass = "low";
    else if (summary.deploymentPct >= 40) toneClass = "high";
    summaryHeader = `
      <div class="scan-deployment-summary ${toneClass}">
        <div class="sds-row">
          <span class="sds-label">Total suggested deployment</span>
          <span class="sds-value">$${fmtUSD(summary.totalDeployment, 0)} of $${fmtUSD(summary.cashAvail, 0)} cash (${depPctDisplay}%)</span>
        </div>
        ${summary.scaledDown ? `<div class="sds-note">Scaled down to stay under 50% of available cash per scan</div>` : ""}
      </div>
    `;
  }

  // Recency badge HTML
  const recencyBadge = (r, days) => {
    if (r === "new") return `<span class="scan-recency new">NEW</span>`;
    if (r === "stronger") return `<span class="scan-recency stronger">↑ STRONGER · day ${days}</span>`;
    if (r === "carried" && days >= 5) return `<span class="scan-recency stale">DAY ${days} · ACT OR DISMISS</span>`;
    if (r === "carried") return `<span class="scan-recency carried">DAY ${days}</span>`;
    return "";
  };

  // Filter out dismissed recommendations from the visible list
  const visibleActions = actions.filter(a => {
    const key = recKeyFor(a.symbol, a.kind, "scan");
    return getRecStatus(key) !== "dismissed";
  });

  return `
    <div class="scan-card">
      <div class="scan-head">
        <h3>Today's Buys & Adds</h3>
        <span class="scan-pill">${visibleActions.length} idea${visibleActions.length === 1 ? "" : "s"}</span>
      </div>
      ${summaryHeader}
      <div class="scan-list">
        ${visibleActions.map(a => {
          const recKey = recKeyFor(a.symbol, a.kind, "scan");
          const status = getRecStatus(recKey);
          const isDone = status === "done";
          return `
          <div class="scan-item ${a.recency === "carried" && a.daysActive >= 5 ? "stale" : ""} ${isDone ? "rec-done" : ""}" data-act="open-asset" data-symbol="${escAttr(a.symbol)}">
            <div class="scan-icon" style="color:${colorFor(a.kind)};">${iconFor(a.kind)}</div>
            <div class="scan-body">
              <div class="scan-action">${escAttr(a.text)}</div>
              <div class="scan-why">${escAttr(a.why)}</div>
              <div class="scan-pills">
                <span class="scan-sym">${escAttr(a.symbol)}</span>
                <span class="scan-kind ${a.kind}">${a.kind.toUpperCase()}</span>
                <span class="scan-conf ${escAttr(a.confidence)}">${escAttr(a.confidence)} conf</span>
                ${isDone ? `<span class="scan-recency done">✓ DONE</span>` : recencyBadge(a.recency, a.daysActive || 1)}
              </div>
            </div>
            <div class="scan-actions-col">
              ${isDone
                ? `<button class="scan-log done" disabled title="Logged">✓</button>`
                : `<button class="scan-log" data-act="log-trade" data-symbol="${escAttr(a.symbol)}" data-rec-key="${escAttr(recKey)}" title="Log this trade">Log</button>`}
              <button class="scan-del" data-act="dismiss-rec" data-rec-key="${escAttr(recKey)}" title="Hide this recommendation">×</button>
            </div>
          </div>
        `;}).join("")}
      </div>
      <div class="scan-footer">Rule-based · NEW = first time seen · STRONGER = signal deepened · DAY N = same as N days ago</div>
    </div>
  `;
}
