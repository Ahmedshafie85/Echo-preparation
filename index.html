<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
<meta name="theme-color" content="#1a1814" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Portfolio" />
<title>Portfolio Advisor</title>
<link rel="manifest" href="manifest.json" />
<link rel="apple-touch-icon" href="icons/icon-192.png" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700;9..144,800&family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

<style>
:root {
  --bg:           #f5f1e8;
  --bg-elev:     #ede7d6;
  --bg-card:     #fbf8f0;
  --ink:          #1a1814;
  --ink-soft:    #4a4639;
  --ink-muted:   #8a8473;
  --rule:        #d8d2bf;
  --rule-soft:   #e8e2cf;
  --accent:      #a13d2d;
  --accent-soft: #c46b54;
  --green:       #4a7a4a;
  --green-soft:  #6b9b6b;
  --red:         #a13d2d;
  --red-soft:    #c46b54;
  --gold:        #b08d3c;
  --shadow:      0 1px 0 rgba(26,24,20,.04), 0 6px 18px -10px rgba(26,24,20,.18);
  --shadow-deep: 0 24px 60px -24px rgba(26,24,20,.28);
  --radius:      14px;
  --radius-sm:    8px;
  --display: 'Fraunces', Georgia, 'Times New Roman', serif;
  --sans:    'IBM Plex Sans', -apple-system, system-ui, sans-serif;
  --mono:    'IBM Plex Mono', 'SF Mono', Menlo, monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body {
  height: 100%;
  background: var(--bg); color: var(--ink);
  font-family: var(--sans); font-size: 15px; line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  font-feature-settings: 'ss01', 'cv11', 'tnum';
  overscroll-behavior-y: none;
}
body {
  display: flex; flex-direction: column;
  min-height: 100vh; min-height: 100dvh;
  padding-top: env(safe-area-inset-top);
}
.display { font-family: var(--display); font-weight: 500; letter-spacing: -0.02em; line-height: 1.05; }
.mono    { font-family: var(--mono); font-feature-settings: 'tnum', 'zero'; }
.eyebrow { font-size: 10.5px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--ink-muted); font-weight: 500; }
.label   { font-size: 11.5px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink-muted); font-weight: 500; }

.app { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.view {
  flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
  padding-bottom: 96px;
}

.topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 20px 12px;
  border-bottom: 1px solid var(--rule);
  background: var(--bg);
  position: sticky; top: 0; z-index: 30;
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
}
.topbar-title { font-family: var(--display); font-size: 22px; font-weight: 500; letter-spacing: -0.02em; }
.topbar-meta { font-family: var(--mono); font-size: 11px; color: var(--ink-muted); letter-spacing: 0.04em; }
.topbar-icons { display: flex; gap: 6px; }
.icon-btn {
  width: 36px; height: 36px; display: grid; place-items: center;
  border: none; background: transparent; color: var(--ink-soft);
  cursor: pointer; border-radius: 50%;
  transition: background .15s, color .15s;
}
.icon-btn:hover, .icon-btn:active { background: var(--bg-elev); color: var(--ink); }
.icon-btn svg { width: 20px; height: 20px; }

.tabs {
  position: fixed; bottom: 0; left: 0; right: 0;
  display: grid; grid-template-columns: repeat(4, 1fr);
  background: var(--bg);
  border-top: 1px solid var(--rule);
  padding: 6px 4px calc(6px + env(safe-area-inset-bottom));
  z-index: 40;
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
}
.tab {
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  padding: 8px 2px; border: none; background: transparent;
  color: var(--ink-muted);
  font-family: var(--sans); font-size: 11px; font-weight: 500; letter-spacing: 0.03em;
  cursor: pointer; transition: color .15s; border-radius: 10px;
}
.tab.active { color: var(--ink); }
.tab svg { width: 22px; height: 22px; stroke-width: 1.5; pointer-events: none; }
.tab.active svg { stroke-width: 2; }

/* Sub-tab bar inside Discover and Signals.
   Sits below the topbar, scrolls with content (not sticky). */
.subtabs {
  display: flex; gap: 4px; padding: 12px 16px 4px;
  border-bottom: 1px solid var(--rule-soft);
  margin-bottom: 14px;
  overflow-x: auto; -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.subtabs::-webkit-scrollbar { display: none; }
.subtab {
  flex: 0 0 auto;
  padding: 8px 14px;
  border: none; background: transparent;
  color: var(--ink-muted);
  font-family: var(--sans); font-size: 13px; font-weight: 500;
  letter-spacing: 0.01em;
  cursor: pointer; border-radius: 999px;
  transition: background .15s, color .15s;
  white-space: nowrap;
}
.subtab:hover { color: var(--ink-soft); }
.subtab.active {
  background: var(--ink); color: var(--bg);
}

/* "All quiet" pill — shown on Portfolio when there's nothing urgent to surface.
   Tap to jump to Signals where the demoted cards live. */
.attention-quiet {
  display: flex; align-items: center; gap: 10px;
  margin: 0 16px 4px; padding: 12px 14px;
  background: var(--bg-card);
  border: 1px solid var(--rule-soft);
  border-radius: var(--radius);
  color: var(--ink-soft);
  font-size: 13px;
  cursor: pointer;
  transition: background .15s, border-color .15s;
}
.attention-quiet:hover { background: var(--bg-elev); border-color: var(--rule); }
.attention-quiet-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--green-soft);
  flex-shrink: 0;
}
.attention-quiet-text { flex: 1; }
.attention-quiet-arrow { color: var(--ink-muted); font-size: 14px; }

/* ===========================================================================
   Phase B — Triggers Banner.
   Pinned at the top of Portfolio. One row per fired trigger, severity-coded.
   Each row is tap-to-open-asset; the × button acknowledges (hides) that row.
   =========================================================================== */
.triggers-banner {
  margin: 12px 16px 4px;
  padding: 14px 14px 12px;
  background: var(--bg-card);
  border: 1px solid var(--rule);
  border-radius: var(--radius);
  border-left: 3px solid var(--gold);
}
.triggers-banner.triggers-loading {
  display: flex; align-items: center; gap: 10px;
  color: var(--ink-soft); font-size: 13px;
}
.triggers-banner-head {
  display: flex; align-items: flex-start; justify-content: space-between;
  gap: 10px; margin-bottom: 10px;
}
.triggers-banner-title {
  font-family: var(--sans); font-weight: 600; font-size: 14px;
  color: var(--ink); letter-spacing: -0.01em;
}
.triggers-banner-sub {
  font-size: 11px; color: var(--ink-muted); margin-top: 2px;
}
.triggers-banner-actions { display: flex; gap: 6px; flex-shrink: 0; }
/* Drawdown gauge — sits between hero and verdict zones on Portfolio. Shows
   how much of the user's stated drawdown_tolerance_pct has been used up. */
.drawdown-gauge {
  margin: 0 16px 14px;
  padding: 10px 14px;
  background: var(--bg-card);
  border: 1px solid var(--rule-soft);
  border-radius: var(--radius);
}
.drawdown-gauge .dd-row {
  display: flex; justify-content: space-between; align-items: baseline;
  gap: 12px; margin-bottom: 8px;
}
.drawdown-gauge .dd-label {
  font-family: var(--sans); font-size: 12.5px; font-weight: 600;
  color: var(--ink);
}
.drawdown-gauge .dd-meta {
  font-family: var(--sans); font-size: 10.5px; color: var(--ink-muted);
  letter-spacing: 0.01em; text-align: right;
}
.drawdown-gauge .dd-bar {
  height: 6px; background: var(--bg-elev); border-radius: 999px; overflow: hidden;
}
.drawdown-gauge .dd-fill {
  height: 100%; border-radius: 999px;
  transition: width .3s, background .3s;
}
.drawdown-gauge.dd-green .dd-fill { background: var(--green); }
.drawdown-gauge.dd-gold  .dd-fill { background: var(--gold); }
.drawdown-gauge.dd-red   .dd-fill { background: var(--red); }
.drawdown-gauge.dd-gold  { border-color: rgba(202, 138, 4, 0.3); }
.drawdown-gauge.dd-red   { border-color: rgba(220, 38, 38, 0.3); }

/* Plan block on ACT rows — entry zone, invalidation, R:R, timeframe.
   Mono font for the values so price levels read like data, not prose.
   Two-column grid keeps it compact on mobile. */
.vplan {
  margin-top: 10px;
  padding: 10px 12px;
  background: var(--bg-elev);
  border-radius: 8px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px 14px;
}
.vplan-row {
  display: flex; flex-direction: column; gap: 2px;
  min-width: 0;
}
.vplan-k {
  font-family: var(--sans); font-size: 9.5px; font-weight: 700;
  letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--ink-muted);
}
.vplan-v {
  font-family: var(--mono); font-size: 12px; color: var(--ink);
  line-height: 1.35;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.vplan-fired {
  margin-top: 10px;
  padding: 10px 12px;
  border-left: 3px solid var(--red);
  background: rgba(220, 38, 38, 0.06);
  border-radius: 6px;
}
.vplan-fired-head {
  font-family: var(--sans); font-size: 10px; font-weight: 700;
  letter-spacing: 0.12em; color: var(--red);
}
.vplan-fired-body {
  font-family: var(--sans); font-size: 12.5px; color: var(--ink);
  line-height: 1.4; margin-top: 4px;
}
.vplan-fired-why {
  font-family: var(--sans); font-size: 11.5px; color: var(--ink-soft);
  line-height: 1.4; margin-top: 4px;
}

@media (min-width: 600px) {
  .vplan { grid-template-columns: repeat(4, 1fr); }
}

/* ============================================================
   Phase H2 — Trade log UI
   ============================================================ */

/* Footer slot on ACT verdict rows for the Log Trade affordance. The button
   itself reuses .btn-ghost-sm; this wrapper just puts it on its own line
   below the plan block so it doesn't visually compete with the plan data. */
.vrow-footer {
  display: flex; justify-content: flex-end;
  margin-top: 10px;
}

/* Verdict-context summary inside the Log Trade modal. Shows the user what
   they're acting on so the snapshot they're about to save is visible. */
.trade-ctx {
  margin: 0 0 14px;
  padding: 10px 12px;
  background: var(--bg-elev);
  border-radius: 8px;
  border-left: 3px solid var(--ink-muted);
}
.trade-ctx-label {
  font-family: var(--sans); font-size: 10px; font-weight: 700;
  letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-muted);
  margin-bottom: 4px;
}
.trade-ctx-body {
  font-family: var(--sans); font-size: 13px; color: var(--ink); line-height: 1.4;
}
.trade-ctx-verb {
  display: inline-block;
  font-family: var(--sans); font-size: 10px; font-weight: 700;
  letter-spacing: 0.12em; padding: 2px 7px; border-radius: 999px;
  margin-right: 6px;
  background: var(--ink-soft); color: var(--bg);
}
.trade-ctx-verb-hold  { background: var(--bg); color: var(--ink-muted); border: 1px solid var(--rule); }
.trade-ctx-verb-watch { background: rgba(202,138,4,0.15); color: var(--gold); }
.trade-ctx-empty {
  border-left-color: var(--rule); color: var(--ink-muted);
  font-style: italic; font-size: 12px;
}

/* Trade log list rows in Settings. Tight, monospaced for numbers. */
.trade-log-list {
  display: flex; flex-direction: column; gap: 8px;
}
.trade-row {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 12px;
  background: var(--bg-card);
  border: 1px solid var(--rule-soft);
  border-radius: 8px;
}
.trade-row-main { flex: 1; min-width: 0; }
.trade-row-head {
  display: flex; align-items: baseline; gap: 8px; flex-wrap: wrap;
}
.trade-dir {
  font-family: var(--sans); font-size: 10.5px; font-weight: 700;
  letter-spacing: 0.1em;
}
.trade-sym {
  font-family: var(--mono); font-size: 13px; font-weight: 600;
  color: var(--ink);
}
.trade-qty {
  font-family: var(--mono); font-size: 11.5px; color: var(--ink-soft);
}
.trade-row-meta {
  font-family: var(--sans); font-size: 11px; color: var(--ink-muted);
  margin-top: 2px; line-height: 1.4;
}
.trade-why {
  font-family: var(--sans); font-size: 11.5px; color: var(--ink-soft);
  margin-top: 4px; line-height: 1.45;
  padding: 5px 8px; background: var(--bg-elev); border-radius: 6px;
  border-left: 2px solid var(--rule);
}
.trade-why-verb { font-weight: 600; color: var(--ink); }
.trade-why-none { color: var(--ink-muted); font-style: italic; background: none; border-left-color: transparent; padding-left: 2px; }
.trade-row-right {
  display: flex; align-items: center; gap: 6px; flex-shrink: 0;
}
.trade-outcome {
  font-family: var(--sans); font-size: 9.5px; font-weight: 600;
  letter-spacing: 0.08em; text-transform: uppercase;
  padding: 2px 7px; border-radius: 999px;
  white-space: nowrap;
}
.trade-outcome-pending   { background: var(--bg-elev); color: var(--ink-muted); }
.trade-outcome-successful { background: rgba(22,163,74,0.10); color: var(--green); }
.trade-outcome-partial_success { background: rgba(22,163,74,0.06); color: var(--green); opacity: 0.85; }
.trade-outcome-failed    { background: rgba(220,38,38,0.10); color: var(--red); }
.trade-outcome-ambiguous { background: rgba(202,138,4,0.10); color: var(--gold); }

/* Trade trajectory expander — one row per weekly evaluation. Mono for the
   d+N day count + the move %; the reasoning string is plain sans for
   readability. Hidden by default; .expanded class flips it on. */
.trade-traj {
  display: none;
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px solid var(--rule-soft);
}
.trade-traj.expanded { display: block; }
.trade-traj-row {
  display: flex; align-items: baseline; gap: 8px;
  padding: 4px 0;
  font-family: var(--sans); font-size: 11.5px;
}
.trade-traj-day {
  font-family: var(--mono); font-weight: 600;
  color: var(--ink-soft); min-width: 38px;
}
.trade-traj-outcome {
  font-family: var(--sans); font-size: 9.5px; font-weight: 700;
  letter-spacing: 0.06em; text-transform: uppercase;
  padding: 2px 6px; border-radius: 999px;
  white-space: nowrap;
}
.trade-traj-move {
  font-family: var(--mono); font-size: 11px; font-weight: 500;
  min-width: 56px;
}
.trade-traj-move.pos { color: var(--green); }
.trade-traj-move.neg { color: var(--red); }
.trade-traj-reason {
  flex: 1; color: var(--ink-muted); line-height: 1.4;
}
.trade-traj-final {
  margin-top: 6px;
  padding: 6px 8px;
  background: var(--bg-elev);
  border-radius: 6px;
  font-family: var(--sans); font-size: 11px; color: var(--ink-soft);
  font-style: italic;
}

/* ============================================================
   Phase H4 — Track Record dashboard (Settings)
   ============================================================ */
.tr-overall {
  background: var(--bg-card);
  border: 1px solid var(--rule-soft);
  border-radius: var(--radius);
  padding: 14px 16px;
  margin-bottom: 12px;
}
.tr-overall-top {
  display: flex; justify-content: space-between; align-items: baseline;
  gap: 12px;
}
.tr-overall-label {
  font-family: var(--sans); font-size: 10.5px; font-weight: 700;
  letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-muted);
}
.tr-overall-rate { display: flex; align-items: baseline; gap: 6px; }
.tr-rate-big {
  font-family: var(--display); font-size: 30px; font-weight: 500;
  letter-spacing: -0.02em; color: var(--ink);
}
.tr-overall-meta {
  font-family: var(--sans); font-size: 11.5px; color: var(--ink-muted);
  line-height: 1.5; margin-top: 6px;
}

.tr-block { margin-bottom: 16px; }
.tr-block-label {
  font-family: var(--sans); font-size: 10.5px; font-weight: 700;
  letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-muted);
  padding: 0 4px 6px;
}
.tr-table {
  width: 100%; border-collapse: collapse;
  background: var(--bg-card);
  border: 1px solid var(--rule-soft);
  border-radius: var(--radius);
  overflow: hidden;
}
.tr-table th, .tr-table td {
  padding: 8px 10px;
  font-family: var(--sans); font-size: 12px;
  text-align: left;
  border-top: 1px solid var(--rule-soft);
}
.tr-table thead th {
  font-size: 10px; font-weight: 700;
  letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--ink-muted);
  background: var(--bg-elev);
  border-top: none;
}
.tr-table tbody tr:first-child td { border-top: none; }
.tr-key {
  font-family: var(--mono); font-weight: 600; color: var(--ink);
  text-transform: uppercase; font-size: 11px;
}
.tr-count {
  font-family: var(--mono); color: var(--ink-soft);
  width: 36px;
}
.tr-rate-cell {
  font-family: var(--sans);
}
.tr-rate { font-weight: 600; color: var(--ink); }
.tr-rate-detail { color: var(--ink-muted); font-size: 11px; }
.tr-rate-empty { color: var(--ink-muted); font-size: 11px; font-style: italic; }
.tr-active { color: var(--gold); }
.tr-days {
  font-family: var(--mono); color: var(--ink-soft);
  width: 60px; text-align: right;
}

.tr-disclaimer {
  margin-top: 10px; padding: 0 4px;
  font-family: var(--sans); font-size: 10.5px; color: var(--ink-muted);
  line-height: 1.5;
}

/* ============================================================
   Phase M — Paper-trade toggle in Log Trade modal
   ============================================================ */
.lt-paper-row {
  display: flex; align-items: center; gap: 10px;
  margin: 0 0 14px;
  padding: 10px 12px;
  background: var(--bg-elev);
  border-radius: 8px;
  flex-wrap: wrap;
}
.lt-toggle {
  display: inline-flex; align-items: center; gap: 8px;
  cursor: pointer;
  font-family: var(--sans); font-size: 13px; font-weight: 600; color: var(--ink);
}
.lt-toggle input[type="checkbox"] {
  width: 16px; height: 16px; margin: 0;
  cursor: pointer;
  accent-color: var(--ink);
}
.lt-paper-hint {
  font-family: var(--sans); font-size: 10.5px; color: var(--ink-muted);
  line-height: 1.4; flex: 1; min-width: 200px;
}

/* Paper badge in the trade log row */
.trade-paper-badge {
  font-family: var(--sans); font-size: 9px; font-weight: 700;
  letter-spacing: 0.12em; text-transform: uppercase;
  padding: 2px 6px; border-radius: 999px;
  background: rgba(120, 120, 200, 0.12);
  color: var(--ink-soft);
}

/* Inline action buttons — used on Watchlist + Opportunity rows for Analyze
   + Verdict expanders. Distinct from the verdict-zone Analyze button (which
   is icon-only); these have small labels because they sit inside rows that
   also display row-open click affordance. */
.watch-actions, .opp-actions-row {
  display: flex; gap: 8px; flex-wrap: wrap;
  margin-top: 10px;
}
.inline-action-btn {
  font-family: var(--sans); font-size: 11px; font-weight: 600;
  letter-spacing: 0.03em;
  padding: 5px 10px;
  background: var(--bg-elev);
  color: var(--ink-soft);
  border: 1px solid var(--rule-soft);
  border-radius: 6px;
  cursor: pointer;
  transition: background 0.15s, color 0.15s;
}
.inline-action-btn:hover {
  background: var(--rule-soft);
  color: var(--ink);
}

/* Inline verdict expander block. Same data source (computeLocalVerdict) as
   the asset detail page; tighter layout. Left-border accent matches the
   verdict zone styling on Portfolio. */
.inline-verdict {
  margin-top: 12px;
  padding: 12px 14px;
  background: var(--bg-elev);
  border-radius: 8px;
  border-left: 3px solid var(--ink-muted);
  cursor: default;
}
.inline-verdict.verb-act    { border-left-color: var(--red); }
.inline-verdict.verb-watch  { border-left-color: var(--gold); }
.inline-verdict.verb-hold   { border-left-color: var(--ink-muted); }
.inline-verdict-empty {
  font-family: var(--sans); font-size: 12px; color: var(--ink-muted);
  font-style: italic;
}
.iv-head {
  display: flex; align-items: center; flex-wrap: wrap;
  gap: 6px; margin-bottom: 8px;
}
.iv-verb {
  font-family: var(--sans); font-size: 10px; font-weight: 700;
  letter-spacing: 0.12em; padding: 2px 7px; border-radius: 999px;
  background: var(--ink-soft); color: var(--bg);
}
.inline-verdict.verb-act .iv-verb    { background: var(--red); color: var(--bg); }
.inline-verdict.verb-watch .iv-verb  { background: var(--gold); color: var(--bg); }
.iv-sev {
  font-family: var(--sans); font-size: 9.5px; font-weight: 700;
  letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-muted);
}
.iv-stance, .iv-conviction {
  font-family: var(--sans); font-size: 10px; color: var(--ink-muted);
  padding: 2px 6px; border-radius: 4px;
  background: var(--bg);
  text-transform: uppercase; letter-spacing: 0.06em;
}
.iv-action {
  font-family: var(--sans); font-size: 13px; font-weight: 600; color: var(--ink);
  line-height: 1.4; margin-bottom: 6px;
}
.iv-reasoning {
  font-family: var(--sans); font-size: 11.5px; color: var(--ink-soft);
  line-height: 1.5; margin-bottom: 10px;
}
.iv-section {
  margin-top: 8px;
}
.iv-section-label {
  font-family: var(--sans); font-size: 9.5px; font-weight: 700;
  letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-muted);
  margin-bottom: 3px;
}
.iv-section-body {
  font-family: var(--sans); font-size: 11.5px; color: var(--ink); line-height: 1.5;
}

/* ============================================================
   Phase R — Paper Performance panel
   ============================================================ */
.pp-headline {
  display: flex; align-items: center; justify-content: space-between;
  gap: 16px;
  background: var(--bg-card);
  border: 1px solid var(--rule-soft);
  border-radius: var(--radius);
  padding: 16px 18px;
  margin-bottom: 10px;
}
.pp-headline-main { display: flex; flex-direction: column; gap: 2px; }
.pp-exp {
  font-family: var(--display); font-size: 34px; font-weight: 600;
  letter-spacing: -0.02em; line-height: 1;
}
.pp-exp.pp-pos { color: var(--green); }
.pp-exp.pp-neg { color: var(--red); }
.pp-exp-label {
  font-family: var(--sans); font-size: 10.5px; color: var(--ink-muted);
  letter-spacing: 0.04em; text-transform: uppercase;
}
.pp-headline-side { display: flex; gap: 16px; }
.pp-stat { display: flex; flex-direction: column; align-items: flex-end; gap: 1px; }
.pp-stat-v { font-family: var(--mono); font-size: 15px; font-weight: 600; color: var(--ink); }
.pp-stat-l { font-family: var(--sans); font-size: 9.5px; color: var(--ink-muted); letter-spacing: 0.03em; text-transform: uppercase; }
.pp-breakdown {
  background: var(--bg-card);
  border: 1px solid var(--rule-soft);
  border-radius: var(--radius);
  padding: 12px 14px;
  margin-bottom: 12px;
}
.pp-bd-row {
  display: grid; grid-template-columns: auto 1fr auto 1fr;
  align-items: baseline; gap: 8px;
  margin-bottom: 10px;
}
.pp-bd-label {
  font-family: var(--sans); font-size: 10.5px; color: var(--ink-muted);
  letter-spacing: 0.03em; text-transform: uppercase;
}
.pp-bd-val { font-family: var(--mono); font-size: 14px; font-weight: 600; }
.pp-bd-val.pp-pos { color: var(--green); }
.pp-bd-val.pp-neg { color: var(--red); }
.pp-bd-exits { display: flex; flex-wrap: wrap; gap: 6px; }
.pp-exit-chip {
  font-family: var(--sans); font-size: 10.5px; font-weight: 500;
  padding: 3px 9px; border-radius: 999px;
  background: var(--bg-elev); color: var(--ink-soft);
}
.pp-exit-chip.pp-exit-target { background: rgba(22,163,74,0.12); color: var(--green); }
.pp-exit-chip.pp-exit-stop   { background: rgba(220,38,38,0.12); color: var(--red); }
.pp-exit-chip.pp-exit-timeout{ background: rgba(202,138,4,0.12); color: var(--gold); }
.pp-exit-chip.pp-exit-open   { background: var(--bg-elev); color: var(--ink-muted); }
.pp-block { margin-top: 14px; }
.pp-block-label {
  font-family: var(--sans); font-size: 11px; font-weight: 600;
  letter-spacing: 0.04em; text-transform: uppercase; color: var(--ink-muted);
  margin-bottom: 6px; padding-left: 2px;
}
.pp-pos { color: var(--green); }
.pp-neg { color: var(--red); }

/* Track Record split: paper vs real side-by-side rows */
.tr-overall-split {
  background: var(--bg-card);
  border: 1px solid var(--rule-soft);
  border-radius: var(--radius);
  padding: 4px 0;
  margin-bottom: 12px;
  overflow: hidden;
}
.tr-split-row {
  display: grid;
  grid-template-columns: 80px 1fr auto;
  align-items: baseline;
  gap: 12px;
  padding: 10px 16px;
  border-top: 1px solid var(--rule-soft);
}
.tr-split-row:first-child { border-top: none; }
.tr-split-label {
  font-family: var(--sans); font-size: 10.5px; font-weight: 700;
  letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-muted);
}
.tr-split-rate {
  font-family: var(--display);
}
.tr-split-pct {
  font-size: 20px; font-weight: 500; color: var(--ink);
  letter-spacing: -0.01em;
}
.tr-split-meta {
  font-family: var(--mono); font-size: 10.5px; color: var(--ink-muted);
}

/* ============================================================
   Phase N — Error modal (long/structured errors)
   ============================================================ */
.err-modal-message {
  font-family: var(--sans); font-size: 14px; color: var(--ink);
  line-height: 1.5;
  margin: 0 0 14px;
  padding: 12px 14px;
  background: rgba(220, 38, 38, 0.06);
  border-left: 3px solid var(--red);
  border-radius: 6px;
  word-wrap: break-word;
}
.err-modal-details {
  margin: 0 0 14px;
  font-family: var(--sans); font-size: 12px;
}
.err-modal-details summary {
  cursor: pointer;
  color: var(--ink-muted);
  padding: 6px 0;
  user-select: none;
}
.err-modal-details summary:hover { color: var(--ink); }
.err-modal-raw {
  font-family: var(--mono); font-size: 10.5px;
  color: var(--ink-soft); line-height: 1.5;
  background: var(--bg-elev);
  padding: 10px 12px;
  border-radius: 6px;
  white-space: pre-wrap;
  word-break: break-all;
  max-height: 280px;
  overflow-y: auto;
  margin-top: 8px;
}
.err-modal-actions {
  display: flex; gap: 8px;
  margin-top: 4px;
}

/* ============================================================
   Phase O — Price-feed anomaly indicators
   ============================================================ */
.price-anomaly-banner {
  margin: 14px 0;
  padding: 12px 14px;
  font-family: var(--sans); font-size: 12.5px; line-height: 1.5;
  color: var(--gold);
  background: rgba(202, 138, 4, 0.08);
  border-left: 3px solid var(--gold);
  border-radius: 8px;
}
.vrow-day-anomaly {
  font-family: var(--sans); font-size: 10px; font-weight: 700;
  letter-spacing: 0.08em;
  padding: 2px 7px; border-radius: 999px;
  background: rgba(202, 138, 4, 0.14);
  color: var(--gold);
  cursor: help;
  white-space: nowrap;
}
.watch-day-anomaly {
  font-family: var(--sans); font-size: 10px; font-weight: 700;
  letter-spacing: 0.05em;
  text-align: right;
  color: var(--gold);
  cursor: help;
}

/* ============================================================
   Phase P — Holdings management list in Settings
   ============================================================ */
.holdings-list-settings {
  display: flex; flex-direction: column; gap: 8px;
}
.holding-row-settings {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 12px;
  background: var(--bg-card);
  border: 1px solid var(--rule-soft);
  border-radius: 8px;
}
.holding-row-main { flex: 1; min-width: 0; }
.holding-row-head {
  display: flex; align-items: baseline; gap: 10px;
}
.holding-row-sym {
  font-family: var(--mono); font-size: 13px; font-weight: 600; color: var(--ink);
}
.holding-row-cls {
  font-family: var(--sans); font-size: 10px; font-weight: 600;
  letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink-muted);
  padding: 2px 7px; border-radius: 999px;
  background: var(--bg-elev);
}
.holding-row-meta {
  font-family: var(--sans); font-size: 11.5px; color: var(--ink-soft);
  margin-top: 3px; line-height: 1.4;
}
.holding-row-actions {
  display: flex; gap: 4px; flex-shrink: 0;
}


/* Verb-change badge — surfaces "row used to be HOLD, now is ACT". Auto-clears
   30 seconds after the verdict call returns. Subtle row pulse animates once. */
.vrow-changed-badge {
  font-family: var(--sans); font-size: 9.5px; font-weight: 600;
  padding: 2px 7px; border-radius: 999px;
  background: rgba(22, 163, 74, 0.12); color: var(--green);
  letter-spacing: 0.02em;
}
.vrow-changed {
  animation: vrowPulse 1.2s ease-out;
}
@keyframes vrowPulse {
  0%   { background: rgba(22, 163, 74, 0.10); }
  100% { background: var(--bg-card); }
}

/* ===========================================================================
   Asset Verdict Block — appears at the top of every asset detail card.
   Same conceptual shape as a Portfolio ACT row, but standalone and slightly
   richer (shows held-vs-new-entry context, missing-inputs hints).
   =========================================================================== */
.asset-verdict-block {
  margin: 14px 16px 18px;
  padding: 14px 16px;
  background: var(--bg-card);
  border: 1px solid var(--rule-soft);
  border-radius: var(--radius);
}
.asset-verdict-block.avb-act { border-left: 3px solid var(--ink-muted); }
.asset-verdict-block.avb-act.avb-sev-high   { border-left-color: var(--red); }
.asset-verdict-block.avb-act.avb-sev-medium { border-left-color: var(--gold); }
.asset-verdict-block.avb-act.avb-sev-low    { border-left-color: var(--ink-muted); }
.asset-verdict-block.avb-watch { border-left: 3px solid var(--gold); }
.asset-verdict-block.avb-hold  { border-left: 3px solid var(--rule); }

.avb-head {
  display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  margin-bottom: 8px;
}
.avb-verb {
  font-family: var(--sans); font-size: 11px; font-weight: 700;
  letter-spacing: 0.14em; text-transform: uppercase;
  padding: 3px 10px; border-radius: 999px;
  background: var(--ink-soft); color: var(--bg);
}
.avb-verb-sym {
  font-family: var(--display); font-size: 18px; font-weight: 600;
  letter-spacing: -0.01em; color: var(--ink);
}
.asset-verdict-block.avb-hold  .avb-verb { background: var(--bg-elev); color: var(--ink-muted); }
.asset-verdict-block.avb-watch .avb-verb { background: rgba(202, 138, 4, 0.15); color: var(--gold); }
.avb-context {
  font-family: var(--sans); font-size: 9.5px; font-weight: 700;
  letter-spacing: 0.12em; text-transform: uppercase;
  padding: 2px 7px; border-radius: 999px;
  background: var(--bg-elev); color: var(--ink-muted);
}
.avb-context-held { background: rgba(22, 163, 74, 0.10); color: var(--green); }
.avb-action {
  font-family: var(--sans); font-size: 14.5px; font-weight: 500;
  color: var(--ink); line-height: 1.45;
  margin-bottom: 4px;
}
.avb-missing {
  margin-top: 10px;
  padding: 10px 12px;
  background: var(--bg-elev);
  border-radius: 8px;
}
.avb-missing-row {
  font-family: var(--sans); font-size: 12px; color: var(--ink-soft);
  line-height: 1.5;
}
.avb-missing-row + .avb-missing-row { margin-top: 4px; }

/* Substance sections inside the verdict block — Why / Read / Top risks /
   Counter-argument. Each is a labeled, compact block surfacing one piece of
   the analyst's reasoning so the verdict block reads as a real summary
   instead of a placeholder. */
.avb-section {
  margin-top: 12px;
  padding-top: 12px;
  border-top: 1px solid var(--rule-soft);
}
.avb-section-label {
  font-family: var(--sans); font-size: 10px; font-weight: 700;
  letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--ink-muted);
  margin-bottom: 6px;
}
.avb-section-body {
  font-family: var(--sans); font-size: 13px; color: var(--ink);
  line-height: 1.55;
}
.avb-section-list {
  margin: 0; padding-left: 16px;
  font-family: var(--sans); font-size: 12.5px; color: var(--ink-soft);
  line-height: 1.5;
}
.avb-section-list li + li { margin-top: 4px; }
.avb-section-counter {
  border-left: 2px solid var(--gold);
  padding-left: 10px;
  padding-top: 0;
  margin-top: 12px;
  border-top: none;
}
.avb-section-counter .avb-section-label { color: var(--gold); }

.btn-ghost-sm {
  padding: 4px 10px; border: 1px solid var(--rule); background: transparent;
  color: var(--ink-soft); font-family: var(--sans); font-size: 11px;
  font-weight: 500; letter-spacing: 0.02em; border-radius: 999px;
  cursor: pointer; transition: background .15s, color .15s, border-color .15s;
  display: inline-flex; align-items: center; gap: 6px;
}
.btn-ghost-sm:hover { color: var(--ink); border-color: var(--ink-muted); }
.btn-ghost-sm:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-ghost-sm .spinner { width: 11px; height: 11px; }
.btn-analyze-all { color: var(--ink); border-color: var(--ink-muted); }
.btn-analyze-all:hover { background: var(--bg-elev); }
.verdict-header-right {
  display: flex; gap: 6px; align-items: center; flex-shrink: 0;
}

/* Minimal modal — used by confirmModal for the "Analyze all" cost prompt and
   any future blocking confirmations. */
.modal-backdrop {
  position: fixed; inset: 0; background: rgba(0,0,0,0.4);
  display: flex; align-items: center; justify-content: center;
  z-index: 9999; padding: 20px;
}
.modal-content {
  background: var(--bg); border: 1px solid var(--rule);
  border-radius: var(--radius); padding: 22px 22px 18px;
  width: 100%; box-shadow: 0 10px 40px rgba(0,0,0,0.15);
}
.modal-content .btn {
  padding: 8px 16px; border: 1px solid var(--ink);
  background: var(--ink); color: var(--bg);
  font-family: var(--sans); font-size: 12.5px; font-weight: 500;
  border-radius: 999px; cursor: pointer;
}
.modal-content .btn:hover { opacity: 0.9; }

.triggers-banner-list {
  display: flex; flex-direction: column; gap: 8px;
}
.trigger-row {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 10px 12px;
  background: var(--bg); border-radius: 8px;
  border: 1px solid var(--rule-soft);
  cursor: pointer;
  transition: border-color .15s;
}
.trigger-row:hover { border-color: var(--ink-muted); }
.trigger-row.trigger-high  { border-left: 3px solid var(--red); }
.trigger-row.trigger-medium { border-left: 3px solid var(--gold); }
.trigger-row.trigger-low { border-left: 3px solid var(--ink-muted); }
.trigger-row-left { flex: 1; min-width: 0; }
.trigger-row-head {
  display: flex; flex-wrap: wrap; align-items: center; gap: 8px;
  margin-bottom: 4px;
}
.trigger-symbol {
  font-family: var(--mono); font-weight: 600; font-size: 13px; color: var(--ink);
  letter-spacing: 0.02em;
}
.trigger-dir {
  display: inline-flex; align-items: center; gap: 4px;
  font-family: var(--sans); font-size: 11px; font-weight: 500;
  letter-spacing: 0.02em; color: var(--ink-muted);
}
.trigger-dir-bull { color: var(--green); }
.trigger-dir-bear { color: var(--red); }
.trigger-sev-pill {
  font-family: var(--sans); font-size: 10px; font-weight: 600;
  letter-spacing: 0.08em; text-transform: uppercase;
  padding: 2px 6px; border-radius: 999px;
}
.trigger-sev-pill.trigger-sev-high   { background: rgba(220, 38, 38, 0.12); color: var(--red); }
.trigger-sev-pill.trigger-sev-medium { background: rgba(202, 138, 4, 0.12); color: var(--gold); }
.trigger-sev-pill.trigger-sev-low    { background: var(--bg-elev); color: var(--ink-muted); }
.trigger-row-condition {
  font-family: var(--mono); font-size: 11.5px; color: var(--ink-soft);
  line-height: 1.45; margin-bottom: 4px;
}
.trigger-row-because {
  font-family: var(--sans); font-size: 12px; color: var(--ink); line-height: 1.45;
}
.trigger-row-action {
  font-family: var(--sans); font-size: 12px; color: var(--ink-soft);
  line-height: 1.45; margin-top: 4px; font-style: italic;
}
.trigger-ack {
  flex-shrink: 0; width: 24px; height: 24px;
  border: none; background: transparent;
  color: var(--ink-muted); font-size: 18px; line-height: 1;
  cursor: pointer; border-radius: 6px;
  transition: background .15s, color .15s;
}
.trigger-ack:hover { background: var(--bg-elev); color: var(--ink); }

/* ===========================================================================
   Phase B — Conviction Decay UI.
   Stale-dot: tiny inline indicator on holding rows.
   Decay banner: top of the AI card, prompts re-analysis on stale verdicts.
   =========================================================================== */
.stale-dot {
  display: inline-block;
  width: 6px; height: 6px; border-radius: 50%;
  margin-left: 6px; vertical-align: middle;
  background: var(--gold);
  box-shadow: 0 0 0 2px var(--bg);
}
.stale-dot.stale-very_stale { background: var(--red); }
.stale-dot.stale-stale { background: var(--gold); }

.ai-card.ai-card-stale {
  /* Subtle desaturation of the underlying card so the eye lands on the banner */
  position: relative;
}
.ai-card.ai-card-stale .stance-hero { opacity: 0.92; }

.decay-banner {
  display: flex; align-items: center; justify-content: space-between;
  gap: 12px; padding: 10px 14px;
  background: var(--bg-elev);
  border-bottom: 1px solid var(--rule-soft);
  border-left: 3px solid var(--gold);
}
.decay-banner.decay-very_stale { border-left-color: var(--red); }
.decay-banner-left { flex: 1; min-width: 0; }
.decay-banner-title {
  font-family: var(--sans); font-weight: 600; font-size: 12.5px;
  color: var(--ink); letter-spacing: -0.005em;
}
.decay-banner-sub {
  font-family: var(--sans); font-size: 11px; color: var(--ink-muted);
  margin-top: 2px; line-height: 1.4;
}

/* ===========================================================================
   Phase C — Verdict zones.
   The Portfolio screen is now a single integrated list: ACT (top), WATCH,
   HOLD. One row per holding, one verb, one action line. The full asset detail
   card is one tap away — no ingredients on the home screen.
   =========================================================================== */
.verdict-header {
  display: flex; align-items: flex-start; justify-content: space-between;
  gap: 12px; padding: 18px 16px 8px;
}
.verdict-header-left { flex: 1; min-width: 0; }
.verdict-eyebrow {
  font-family: var(--sans); font-size: 13px; font-weight: 600;
  color: var(--ink); letter-spacing: -0.005em;
}
.verdict-meta-row { display: flex; gap: 6px; align-items: center; margin-top: 4px; flex-wrap: wrap; }
.verdict-age-pill,
.verdict-loading-pill {
  font-family: var(--sans); font-size: 10.5px; color: var(--ink-muted);
  letter-spacing: 0.02em;
  display: inline-flex; align-items: center; gap: 4px;
}
.portfolio-note {
  margin: 0 16px 12px;
  padding: 10px 12px;
  background: var(--bg-elev);
  border-radius: 8px;
  border-left: 3px solid var(--ink-muted);
  font-family: var(--sans); font-size: 12.5px; line-height: 1.45;
  color: var(--ink-soft);
}

.verdict-zone {
  margin: 0 16px 16px;
  display: flex; flex-direction: column; gap: 8px;
}
.verdict-zone-label {
  font-family: var(--sans); font-size: 10px; font-weight: 600;
  letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--ink-muted);
  margin-top: 4px; margin-bottom: 2px;
  padding-left: 2px;
}
.verdict-hold-toggle {
  display: flex; align-items: center; justify-content: space-between;
  width: 100%; background: none; border: none; cursor: pointer;
  padding: 6px 2px 4px; margin-top: 4px;
}
.verdict-hold-chevron { color: var(--ink-muted); font-size: 11px; }
.verdict-hold-collapsed {
  padding: 8px 12px; font-family: var(--mono); font-size: 11px;
  color: var(--ink-muted); letter-spacing: 0.02em; line-height: 1.6;
  background: var(--bg-card); border: 1px solid var(--rule-soft);
  border-radius: var(--radius);
}

.vrow {
  padding: 12px 14px;
  background: var(--bg-card);
  border: 1px solid var(--rule-soft);
  border-radius: var(--radius);
  cursor: pointer;
  transition: border-color .15s, background .15s;
}
.vrow:hover { border-color: var(--ink-muted); }
.vrow-head {
  display: flex; align-items: center; gap: 10px;
  flex-wrap: wrap;
}
.vrow-verb {
  font-family: var(--sans); font-size: 10px; font-weight: 700;
  letter-spacing: 0.14em; text-transform: uppercase;
  padding: 2px 8px; border-radius: 999px;
  color: var(--ink-soft); background: var(--bg-elev);
  flex-shrink: 0;
}
.vrow-symbol {
  font-family: var(--mono); font-weight: 600; font-size: 14px;
  color: var(--ink); letter-spacing: 0.01em;
}
.vrow-spacer { flex: 1; }
.vrow-value {
  font-family: var(--mono); font-size: 12.5px; color: var(--ink-soft);
}
.vrow-day {
  font-family: var(--mono); font-size: 11.5px; font-weight: 500;
  padding: 2px 6px; border-radius: 4px;
}
.vrow-day.pos { color: var(--green); background: rgba(22, 163, 74, 0.08); }
.vrow-day.neg { color: var(--red); background: rgba(220, 38, 38, 0.08); }
.vrow-action {
  font-family: var(--sans); font-size: 13.5px; font-weight: 500;
  color: var(--ink); line-height: 1.45;
  margin-top: 8px;
}
/* Plain-language directive line — the one-second instruction. */
.vrow-directive {
  display: flex; flex-wrap: wrap; align-items: baseline; gap: 0;
  margin-top: 9px; font-family: var(--sans); font-size: 14px;
  line-height: 1.4;
}
.dir-verb {
  font-weight: 800; letter-spacing: 0.02em; font-size: 14.5px;
  padding: 1px 8px; border-radius: 6px; margin-right: 2px;
}
.dir-buy  { background: var(--green); color: var(--bg); }
.dir-add  { background: rgba(74,122,74,0.16); color: var(--green); border: 1px solid var(--green); }
.dir-sell { background: var(--gold); color: var(--bg); }
.dir-exit { background: var(--red); color: #fff; }
.dir-hold { background: var(--bg-elev); color: var(--ink-muted); border: 1px solid var(--rule); }
.dir-wait { background: var(--bg-elev); color: var(--ink-soft); border: 1px dashed var(--rule); }
.dir-piece { color: var(--ink); font-weight: 500; }
.dir-size  { font-weight: 600; }
.dir-dot   { color: var(--ink-muted); margin: 0 7px; }
.dir-conf  { font-weight: 600; }
.dir-conf-high { color: var(--green); }
.dir-conf-med  { color: var(--gold); }
.dir-conf-low  { color: var(--ink-muted); }
.vrow-directive-note {
  font-family: var(--sans); font-size: 12.5px; color: var(--ink-soft);
  line-height: 1.45; margin-top: 5px;
}
/* EXIT alarm — loud, so a thesis-break dip can't be missed. */
.vrow-directive-alarm .dir-verb {
  animation: dir-pulse 1.4s ease-in-out infinite;
}
@keyframes dir-pulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(220,38,38,0.5); }
  50%      { box-shadow: 0 0 0 5px rgba(220,38,38,0); }
}
.vrow-action-inline {
  font-family: var(--sans); font-size: 12.5px; color: var(--ink-soft);
  line-height: 1.4;
  /* allow wrapping after symbol */
  flex-basis: 100%;
  margin-top: 2px;
}
.vrow-reasoning {
  font-family: var(--sans); font-size: 12px; color: var(--ink-muted);
  line-height: 1.5; margin-top: 4px;
}
.vrow-sev-pill {
  font-family: var(--sans); font-size: 9.5px; font-weight: 700;
  letter-spacing: 0.1em; text-transform: uppercase;
  padding: 2px 6px; border-radius: 999px;
}
.vrow-sev-pill-high   { background: rgba(220, 38, 38, 0.12); color: var(--red); }
.vrow-sev-pill-medium { background: rgba(202, 138, 4, 0.12); color: var(--gold); }
.vrow-sev-pill-low    { background: var(--bg-elev); color: var(--ink-muted); }
.vrow-fresh-dot {
  width: 6px; height: 6px; border-radius: 50%; display: inline-block;
}
.vrow-fresh-dot.vrow-fresh-stale       { background: var(--gold); }
.vrow-fresh-dot.vrow-fresh-very_stale  { background: var(--red); }
.vrow-fresh-dot.vrow-fresh-missing     { background: var(--ink-muted); }

/* Freshness badge — labeled version of the dot. Visible whenever the analysis
   is anything other than "fresh", so the user can read the verdict's
   grounding at a glance. */
.vrow-fresh-badge {
  font-family: var(--sans); font-size: 9.5px; font-weight: 700;
  letter-spacing: 0.1em; text-transform: uppercase;
  padding: 2px 6px; border-radius: 999px;
  white-space: nowrap;
}
.vrow-fresh-badge.vrow-fresh-aging      { background: var(--bg-elev); color: var(--ink-muted); }
.vrow-fresh-badge.vrow-fresh-stale      { background: rgba(202, 138, 4, 0.14); color: var(--gold); }
.vrow-fresh-badge.vrow-fresh-very_stale { background: rgba(220, 38, 38, 0.14); color: var(--red); }
.vrow-fresh-badge.vrow-fresh-missing    { background: rgba(220, 38, 38, 0.10); color: var(--red); }

/* ACT rows get a left border in red/gold/grey by severity. The whole row
   stays card-shaped — the severity is signalled by the accent, not by tinting
   the background, so the type stays readable on small screens. */
.vrow.vrow-act { border-left: 3px solid var(--ink-muted); }
.vrow.vrow-act.vrow-sev-high   { border-left-color: var(--red); }
.vrow.vrow-act.vrow-sev-medium { border-left-color: var(--gold); }
.vrow.vrow-act.vrow-sev-low    { border-left-color: var(--ink-muted); }
.vrow.vrow-act .vrow-verb { color: var(--ink); background: var(--ink-soft); color: var(--bg); }

/* WATCH rows: muted, gold accent. */
.vrow.vrow-watch { border-left: 3px solid var(--gold); }
.vrow.vrow-watch .vrow-verb { color: var(--gold); }

/* HOLD rows: tightest, no left accent, no day-pill highlight. */
.vrow.vrow-hold { padding: 10px 14px; }
.vrow.vrow-hold .vrow-verb { color: var(--ink-muted); }

/* Inline Analyze button. Sits in the row head, doesn't compete with day-change
   pill. Uses .spinner from the global spinner styles. */
.vrow-analyze {
  flex-shrink: 0;
  width: 28px; height: 28px;
  border: 1px solid var(--rule);
  background: var(--bg);
  color: var(--ink-soft);
  display: inline-flex; align-items: center; justify-content: center;
  border-radius: 6px;
  cursor: pointer;
  transition: background .15s, border-color .15s, color .15s;
  padding: 0;
  margin-left: 4px;
}
.vrow-analyze:hover {
  border-color: var(--ink-muted);
  color: var(--ink);
  background: var(--bg-elev);
}
.vrow-analyze:disabled, .vrow-analyze.analyzing {
  opacity: 0.7; cursor: wait;
}
.vrow-analyze .spinner {
  width: 12px; height: 12px;
}

/* Stance + conviction badge — gives the row an anchor regardless of verb. */
.vrow-stance {
  font-family: var(--sans); font-size: 10px; font-weight: 600;
  letter-spacing: 0.06em; text-transform: uppercase;
  padding: 2px 7px; border-radius: 999px;
  background: var(--bg-elev); color: var(--ink-soft);
}
.vrow-stance.vrow-stance-accumulate { background: rgba(22, 163, 74, 0.10); color: var(--green); }
.vrow-stance.vrow-stance-trim       { background: rgba(202, 138, 4, 0.12); color: var(--gold); }
.vrow-stance.vrow-stance-exit       { background: rgba(220, 38, 38, 0.12); color: var(--red); }
.vrow-stance.vrow-stance-avoid      { background: rgba(220, 38, 38, 0.12); color: var(--red); }
.vrow-stance.vrow-stance-hold       { background: var(--bg-elev); color: var(--ink-soft); }

/* Key signal: single-line data point under the action. */
.vrow-keysignal {
  font-family: var(--mono); font-size: 11.5px; color: var(--ink-soft);
  line-height: 1.4; margin-top: 4px; letter-spacing: 0.005em;
}


.section-head {
  display: flex; justify-content: space-between; align-items: baseline;
  margin-bottom: 14px;
}
.section-head h2 { font-family: var(--display); font-size: 26px; font-weight: 500; letter-spacing: -0.02em; }

.hero {
  background: var(--bg-card);
  border: 1px solid var(--rule); border-radius: var(--radius);
  padding: 22px 20px 20px;
  margin: 16px 20px 8px;
  position: relative; overflow: hidden;
}
.hero::before {
  content: ""; position: absolute; top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--accent) 0%, var(--gold) 50%, var(--accent) 100%);
}
.hero .eyebrow { margin-bottom: 8px; }
.hero-value { font-family: var(--display); font-size: 44px; font-weight: 500; letter-spacing: -0.03em; line-height: 1; }
.hero-value .currency-prefix {
  font-size: 22px; color: var(--ink-muted);
  margin-right: 4px; vertical-align: top; position: relative; top: 8px;
}
.hero-meta {
  display: flex; gap: 24px;
  margin-top: 14px; padding-top: 14px;
  border-top: 1px solid var(--rule-soft);
}
.hero-stat { flex: 1; }
.hero-stat-value { font-family: var(--mono); font-size: 15px; font-weight: 500; margin-top: 2px; }
.hero-stat-value.pos { color: var(--green); }
.hero-stat-value.neg { color: var(--red); }

.alloc-strip {
  display: flex; height: 6px; border-radius: 3px;
  overflow: hidden; margin-top: 14px; background: var(--rule);
}
.alloc-seg { height: 100%; transition: flex .3s; }
.alloc-legend {
  display: grid; grid-template-columns: repeat(2, 1fr);
  gap: 6px 16px; margin-top: 10px; font-size: 12px;
}
.alloc-legend-item { display: flex; align-items: center; gap: 8px; color: var(--ink-soft); }
.alloc-dot { width: 8px; height: 8px; border-radius: 50%; }

.holdings { margin: 8px 0 20px; }
.holding {
  display: flex; align-items: center;
  padding: 16px 20px;
  border-bottom: 1px solid var(--rule-soft);
  cursor: pointer; transition: background .15s; position: relative;
}
.holding:hover, .holding:active { background: var(--bg-elev); }
.holding * { pointer-events: none; }
.holding-icon {
  width: 38px; height: 38px; border-radius: 50%;
  background: var(--bg-elev);
  display: grid; place-items: center;
  font-family: var(--display); font-weight: 600; font-size: 14px;
  color: var(--ink-soft);
  margin-right: 14px; flex-shrink: 0;
  border: 1px solid var(--rule);
}
.holding-icon[data-class="crypto"] { background: var(--bg); border-color: var(--gold); color: var(--gold); }
.holding-icon[data-class="metal"]  { background: var(--bg); border-color: var(--gold); color: var(--gold); }
.holding-icon[data-class="etf"]    { background: var(--bg); border-color: var(--ink-soft); color: var(--ink-soft); }
.holding-icon[data-class="cash"]   { background: var(--bg); border-color: var(--ink-muted); color: var(--ink-muted); }
.holding-main { flex: 1; min-width: 0; display: flex; flex-direction: column; }
.holding-symbol { font-family: var(--display); font-size: 17px; font-weight: 600; letter-spacing: -0.01em; }
.holding-name {
  font-size: 11.5px; color: var(--ink-muted); margin-top: 1px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 180px;
}
.holding-right { text-align: right; font-family: var(--mono); }
.holding-value { font-size: 14px; font-weight: 500; color: var(--ink); }
.holding-pnl { font-size: 11.5px; margin-top: 1px; letter-spacing: 0.02em; }
.holding-pnl.pos { color: var(--green); }
.holding-pnl.neg { color: var(--red); }
.holding-pnl.flat { color: var(--ink-muted); }
.holding-stance {
  position: static !important;
  top: auto !important; right: auto !important; left: auto !important; bottom: auto !important;
  font-family: var(--mono); font-size: 8.5px; font-weight: 600;
  padding: 1px 5px; border-radius: 3px; letter-spacing: 0.10em;
  display: none;
  margin-top: 4px;
  align-self: flex-start;
  text-transform: uppercase;
  white-space: nowrap;
  line-height: 1.4;
}
.holding-stance.show { display: inline-block; }
.holding-stance.ACCUMULATE,
.holding-stance.BUY,
.holding-stance.ADD       { background: rgba(74,122,74,0.15); color: var(--green); }
.holding-stance.HOLD,
.holding-stance.NEUTRAL,
.holding-stance.WAIT      { background: var(--bg-elev); color: var(--ink-soft); }
.holding-stance.TRIM      { background: rgba(176,141,60,0.15); color: var(--gold); }
.holding-stance.SELL,
.holding-stance.EXIT      { background: rgba(161,61,45,0.15); color: var(--red); }
.holding-stance.AVOID     { background: rgba(161,61,45,0.10); color: var(--red-soft); }

.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  padding: 12px 18px;
  border: 1px solid var(--ink); background: var(--ink); color: var(--bg);
  border-radius: var(--radius-sm);
  font-family: var(--sans); font-size: 13px; font-weight: 500; letter-spacing: 0.04em;
  cursor: pointer; transition: opacity .15s, transform .1s;
  text-transform: uppercase;
}
.btn:active { transform: scale(0.98); }
.btn:hover  { opacity: 0.92; }
.btn-secondary { background: transparent; color: var(--ink); border-color: var(--rule); }
.btn-ghost { background: transparent; color: var(--ink-soft); border: none; padding: 10px 14px; }
.btn-block { display: flex; width: 100%; }
.btn-sm { padding: 8px 14px; font-size: 11.5px; }
.btn-danger { background: transparent; color: var(--red); border-color: var(--red-soft); }

.btn-portfolio-analyze {
  display: flex; align-items: center; justify-content: space-between;
  margin: 14px 20px;
  padding: 14px 18px;
  background: var(--bg-card);
  border: 1px solid var(--rule); border-radius: var(--radius);
  cursor: pointer; transition: background .15s;
  position: relative; overflow: hidden;
}
.btn-portfolio-analyze::before {
  content: ""; position: absolute; left: 0; top: 0; bottom: 0;
  width: 3px; background: var(--accent);
}
.btn-portfolio-analyze:hover { background: var(--bg-elev); }
.btn-portfolio-analyze .lbl { font-family: var(--display); font-size: 16px; font-weight: 500; }
.btn-portfolio-analyze .sub { font-size: 11px; color: var(--ink-muted); margin-top: 2px; }
.btn-portfolio-analyze .arrow { color: var(--accent); font-size: 18px; }

/* Opportunity pulse card */
.opp-pulse {
  margin: 14px 20px;
  background: var(--bg-card);
  border: 1px solid var(--gold);
  border-radius: var(--radius);
  overflow: hidden;
  position: relative;
}
.opp-pulse::before {
  content: ""; position: absolute; left: 0; top: 0; bottom: 0;
  width: 4px; background: var(--gold);
}
.opp-pulse-head {
  padding: 14px 18px 10px;
  display: flex; justify-content: space-between; align-items: center;
}
.opp-pulse-head .ttl { font-family: var(--display); font-size: 17px; font-weight: 500; }
.opp-pulse-head .count {
  font-family: var(--mono); font-size: 11px;
  background: rgba(176,141,60,0.15); color: var(--gold);
  padding: 3px 9px; border-radius: 3px; letter-spacing: 0.08em; font-weight: 600;
}
.opp-pulse-eyebrow {
  font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--gold); font-weight: 600; margin-bottom: 4px;
}
.opp-row {
  display: flex; align-items: center;
  padding: 12px 18px;
  border-top: 1px solid var(--rule-soft);
  cursor: pointer; transition: background .15s;
}
.opp-row * { pointer-events: none; }
.opp-row:hover { background: var(--bg-elev); }
.opp-row .opp-main { flex: 1; min-width: 0; }
.opp-row .opp-sym { font-family: var(--display); font-size: 15px; font-weight: 600; }
.opp-row .opp-cond {
  font-family: var(--mono); font-size: 11px;
  color: var(--gold); margin-top: 2px; letter-spacing: 0.02em;
}
.opp-row .opp-meta {
  font-family: var(--mono); font-size: 10.5px; color: var(--ink-muted);
  margin-top: 2px;
}
.opp-row .opp-arrow { color: var(--gold); font-size: 18px; margin-left: 12px; }

/* Watchlist */
.watch-row {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 6px 12px;
  padding: 14px 20px;
  border-bottom: 1px solid var(--rule-soft);
  cursor: pointer; transition: background .15s;
  position: relative;
}
.watch-row * { pointer-events: none; }
/* Re-enable pointer events on the suggest-strip buttons so they can receive taps */
.watch-row .watch-suggest-strip .wss-log,
.watch-row .watch-suggest-strip .wss-del { pointer-events: auto; }
.watch-row:hover { background: var(--bg-elev); }
.watch-row.has-trigger { background: rgba(176,141,60,0.05); }
.watch-row.has-trigger::before {
  content: ""; position: absolute; left: 0; top: 0; bottom: 0;
  width: 3px; background: var(--gold);
}
.watch-head { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.watch-sym { font-family: var(--display); font-size: 16px; font-weight: 600; }
.watch-name { font-size: 11px; color: var(--ink-muted); }
.watch-cls {
  font-family: var(--mono); font-size: 8.5px;
  padding: 1px 6px; border-radius: 3px;
  background: var(--bg-elev); color: var(--ink-muted);
  letter-spacing: 0.06em; text-transform: uppercase;
}
.watch-price { font-family: var(--mono); font-size: 14px; font-weight: 500; text-align: right; }
.watch-day { font-family: var(--mono); font-size: 11px; text-align: right; }
.watch-day.pos { color: var(--green); }
.watch-day.neg { color: var(--red); }
.watch-stats {
  grid-column: 1 / -1;
  display: flex; flex-wrap: wrap; gap: 14px;
  font-family: var(--mono); font-size: 10.5px; color: var(--ink-soft);
  margin-top: 2px; letter-spacing: 0.02em;
}
.watch-stat-rsi.warn { color: var(--accent); }
.watch-stat-rsi.over { color: var(--gold); }
.watch-trend.above { color: var(--green); }
.watch-trend.below { color: var(--red); }
.watch-cond-pills {
  grid-column: 1 / -1;
  display: flex; flex-wrap: wrap; gap: 4px;
  margin-top: 6px;
}
.watch-cond-pill {
  font-family: var(--mono); font-size: 9px; font-weight: 500;
  padding: 2px 7px; border-radius: 3px;
  background: var(--bg-elev); color: var(--ink-muted);
  letter-spacing: 0.06em; text-transform: uppercase;
}
.watch-cond-pill.fired {
  background: rgba(176,141,60,0.18); color: var(--gold);
  border: 1px solid var(--gold);
}

/* Suggested entry strip — shown at bottom of watch row when conditions fire */
.watch-suggest-strip {
  grid-column: 1 / -1;
  display: flex; align-items: center; gap: 10px;
  margin-top: 8px;
  padding: 8px 11px;
  background: rgba(74,122,74,0.10);
  border: 1px solid var(--green);
  border-radius: 5px;
  font-family: var(--mono); font-size: 11px;
}
.watch-suggest-strip.contradicts {
  background: rgba(176,141,60,0.10);
  border-color: var(--gold);
}
.watch-suggest-strip.contradicts .wss-action {
  color: var(--gold);
}
.watch-suggest-strip.pointer {
  background: var(--bg-elev);
  border-color: var(--rule-soft);
  border-style: dashed;
}
.watch-suggest-strip.pointer .wss-action {
  color: var(--ink-muted);
  font-style: italic;
}
.wss-action {
  font-family: var(--display); font-weight: 500; font-size: 12.5px;
  color: var(--green); flex: 1; min-width: 0;
}
.wss-price {
  color: var(--ink-soft); font-size: 10.5px; white-space: nowrap;
}
.wss-log {
  background: var(--green); color: var(--bg); border: none;
  padding: 4px 10px; border-radius: 4px;
  font-family: var(--sans); font-size: 10.5px; font-weight: 500;
  letter-spacing: 0.04em; cursor: pointer;
  flex-shrink: 0;
}
.wss-log:hover { opacity: 0.85; }

.watch-detail-actions {
  display: flex; gap: 8px; flex-wrap: wrap;
  padding: 14px 20px;
  border-top: 1px solid var(--rule-soft);
  background: var(--bg-card);
}

.cond-list { margin: 6px 0 14px; }
.cond-item {
  display: flex; justify-content: space-between; align-items: center;
  padding: 10px 12px;
  background: var(--bg-elev);
  border-radius: 6px;
  margin-bottom: 6px;
  font-family: var(--mono); font-size: 11.5px;
}
.cond-item .cond-text { color: var(--ink); }
.cond-item button {
  background: transparent; border: none; color: var(--ink-muted);
  cursor: pointer; font-size: 16px; padding: 0 6px;
}

.scan-bar {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 16px;
  background: var(--bg-elev);
  border-bottom: 1px solid var(--rule);
  font-family: var(--mono); font-size: 11px; color: var(--ink-muted);
  letter-spacing: 0.02em;
}
.scan-bar button {
  margin-left: auto;
  padding: 5px 12px;
  background: var(--ink); color: var(--bg); border: none;
  border-radius: 4px; font-family: var(--sans); font-size: 11px;
  font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase;
  cursor: pointer;
}

.pin-screen {
  position: fixed; inset: 0; background: var(--bg);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  z-index: 100; padding: 40px 30px;
}
.pin-logo { font-family: var(--display); font-size: 36px; font-weight: 500; letter-spacing: -0.02em; margin-bottom: 6px; }
.pin-tag { font-size: 12px; color: var(--ink-muted); letter-spacing: 0.16em; text-transform: uppercase; margin-bottom: 50px; }
.pin-prompt { font-size: 13px; color: var(--ink-soft); margin-bottom: 18px; letter-spacing: 0.04em; }
.pin-dots { display: flex; gap: 14px; margin-bottom: 36px; }
.pin-dot {
  width: 14px; height: 14px; border-radius: 50%;
  border: 1.5px solid var(--ink-soft); background: transparent;
  transition: background .15s, border-color .15s, transform .15s;
}
.pin-dot.filled { background: var(--ink); border-color: var(--ink); transform: scale(1.1); }
.pin-dot.error { background: var(--red); border-color: var(--red); animation: shake .4s; }
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-6px); }
  75% { transform: translateX(6px); }
}
.pin-pad { display: grid; grid-template-columns: repeat(3, 72px); gap: 12px; }
.pin-key {
  width: 72px; height: 72px;
  border: 1px solid var(--rule); background: var(--bg-card); color: var(--ink);
  font-family: var(--display); font-size: 26px; font-weight: 500;
  border-radius: 50%; cursor: pointer;
  transition: background .12s, transform .1s;
}
.pin-key:active { background: var(--bg-elev); transform: scale(0.95); }
.pin-key.empty { visibility: hidden; }
.pin-key.del { font-size: 22px; }
.pin-error { color: var(--red); font-size: 12px; margin-top: 14px; letter-spacing: 0.04em; height: 16px; }

/* ===== AUTH SCREEN ===== */
.auth-screen {
  position: fixed; inset: 0; background: var(--bg);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  z-index: 99; padding: 40px 22px;
  overflow-y: auto;
}
.auth-card {
  width: 100%; max-width: 380px;
  background: var(--bg-card);
  border: 1px solid var(--rule);
  border-radius: var(--radius);
  padding: 30px 24px 22px;
}
.auth-logo { font-family: var(--display); font-size: 28px; font-weight: 500; letter-spacing: -0.02em; text-align: center; margin-bottom: 4px; }
.auth-tag { font-size: 11.5px; color: var(--ink-muted); letter-spacing: 0.12em; text-transform: uppercase; text-align: center; margin-bottom: 24px; }
.auth-tabs {
  display: flex; gap: 0;
  margin-bottom: 20px;
  border-bottom: 1px solid var(--rule-soft);
}
.auth-tab {
  flex: 1; padding: 10px 0; background: transparent; border: none;
  font-family: var(--sans); font-size: 13px; color: var(--ink-muted);
  cursor: pointer; border-bottom: 2px solid transparent;
  letter-spacing: 0.04em;
}
.auth-tab.active { color: var(--ink); border-bottom-color: var(--ink); }
.auth-fields .field { margin-bottom: 14px; }
.auth-fields .field label { display: block; font-size: 11px; color: var(--ink-muted); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 6px; }
.auth-fields .field input {
  width: 100%; padding: 10px 12px;
  background: var(--bg); border: 1px solid var(--rule); border-radius: 6px;
  font-family: var(--sans); font-size: 14px; color: var(--ink);
  -webkit-appearance: none;
}
.auth-fields .field input:focus { outline: none; border-color: var(--ink); }
.auth-error {
  color: var(--red); font-size: 12px; min-height: 16px;
  margin-bottom: 10px; line-height: 1.4;
}
.auth-secondary { text-align: center; margin-top: 14px; }
.link-btn {
  background: transparent; border: none; color: var(--ink-muted);
  font-family: var(--sans); font-size: 12px; cursor: pointer;
  text-decoration: underline; padding: 4px 8px;
}
.auth-migrate {
  margin-top: 18px; padding: 14px;
  background: rgba(176,141,60,0.10);
  border: 1px solid var(--gold);
  border-radius: 8px;
}
.auth-migrate-head { font-family: var(--display); font-size: 14px; font-weight: 500; margin-bottom: 6px; }
.auth-migrate p { font-size: 12px; color: var(--ink-soft); line-height: 1.4; margin-bottom: 12px; }
.auth-migrate-actions { display: flex; gap: 8px; }
.auth-migrate-actions button { flex: 1; }

.loader-screen {
  position: fixed; inset: 0; background: var(--bg);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  z-index: 95;
}
.loader-logo { font-family: var(--display); font-size: 28px; margin-bottom: 18px; letter-spacing: -0.01em; }
.loader-bar { width: 120px; height: 1.5px; background: var(--rule); position: relative; overflow: hidden; }
.loader-bar::after {
  content: ""; position: absolute; inset: 0; width: 40%;
  background: var(--ink); animation: loader 1.2s infinite ease-in-out;
}
@keyframes loader {
  0% { transform: translateX(-100%); }
  100% { transform: translateX(350%); }
}

.detail-head { padding: 18px 20px 12px; }
.detail-back {
  font-family: var(--sans); font-size: 13px; color: var(--ink-soft);
  background: none; border: none; padding: 4px 0; margin-bottom: 14px;
  cursor: pointer; letter-spacing: 0.04em;
  display: inline-flex; align-items: center; gap: 4px;
}
.detail-symbol { font-family: var(--display); font-size: 36px; font-weight: 500; letter-spacing: -0.025em; line-height: 1; }
.detail-name { font-size: 12px; color: var(--ink-muted); margin-top: 4px; letter-spacing: 0.02em; }
.detail-price { font-family: var(--mono); font-size: 28px; font-weight: 500; margin-top: 14px; letter-spacing: -0.01em; }
.detail-change { font-family: var(--mono); font-size: 13px; margin-top: 4px; }
.detail-change.pos { color: var(--green); }
.detail-change.neg { color: var(--red); }
.detail-change.flat { color: var(--ink-muted); }

.chart-wrap {
  margin: 14px 20px;
  border: 1px solid var(--rule); border-radius: var(--radius);
  background: var(--bg-card); overflow: hidden;
}
.chart-controls { display: flex; border-bottom: 1px solid var(--rule-soft); }
.range-btn {
  flex: 1; padding: 10px 0; border: none; background: transparent;
  color: var(--ink-muted);
  font-family: var(--mono); font-size: 11.5px; font-weight: 500; letter-spacing: 0.06em;
  cursor: pointer; transition: color .15s, background .15s;
}
.range-btn.active { color: var(--ink); background: var(--bg-elev); }
#chart { height: 280px; padding: 8px 4px; }

.ind-strip {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px;
  background: var(--rule-soft);
  margin: 14px 20px;
  border: 1px solid var(--rule); border-radius: var(--radius);
  overflow: hidden;
}
.ind-cell { background: var(--bg-card); padding: 12px 10px; text-align: center; }
.ind-cell .label { font-size: 9.5px; letter-spacing: 0.1em; }
.ind-cell .val { font-family: var(--mono); font-size: 14px; font-weight: 500; margin-top: 4px; color: var(--ink); }
.ind-cell .val.pos { color: var(--green); }
.ind-cell .val.neg { color: var(--red); }
.ind-cell .val.warn { color: var(--accent); }

.pos-card {
  margin: 14px 20px;
  border: 1px solid var(--rule); border-radius: var(--radius);
  background: var(--bg-card); padding: 16px 18px;
}
.pos-card h3 { font-family: var(--display); font-size: 16px; font-weight: 500; margin-bottom: 12px; letter-spacing: -0.01em; }
.pos-row { display: flex; justify-content: space-between; padding: 6px 0; font-size: 13px; }
.pos-row .lbl { color: var(--ink-muted); letter-spacing: 0.02em; }
.pos-row .val { font-family: var(--mono); font-weight: 500; }
.pos-row .val.pos { color: var(--green); }
.pos-row .val.neg { color: var(--red); }
.pos-row .val.flat { color: var(--ink-muted); }

.pos-actions {
  display: flex; gap: 8px; margin-top: 14px;
  padding-top: 14px; border-top: 1px solid var(--rule-soft);
}

/* AI card */
.ai-card {
  margin: 14px 20px;
  border: 1px solid var(--rule); border-radius: var(--radius);
  background: var(--bg-card); padding: 0;
  position: relative; overflow: hidden;
}
.ai-card::before {
  content: ""; position: absolute; top: 0; left: 0;
  width: 4px; height: 100%; background: var(--accent);
}
.stance-hero { padding: 22px 20px 18px; border-bottom: 1px solid var(--rule-soft); }
.stance-eyebrow {
  font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase;
  color: var(--ink-muted); font-weight: 500; margin-bottom: 8px;
}
.stance-verb {
  font-family: var(--display); font-weight: 700;
  font-size: 38px; letter-spacing: -0.025em; line-height: 1;
}
.stance-verb.ACCUMULATE { color: var(--green); }
.stance-verb.HOLD       { color: var(--ink); }
.stance-verb.TRIM       { color: var(--gold); }
.stance-verb.EXIT       { color: var(--red); }
.stance-verb.AVOID      { color: var(--red-soft); }
.stance-headline { font-size: 14px; color: var(--ink-soft); margin-top: 8px; line-height: 1.45; }
.stance-pills { display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap; }
.pill {
  display: inline-flex; align-items: center;
  font-family: var(--mono); font-size: 9.5px; font-weight: 500;
  padding: 4px 9px; border-radius: 4px;
  letter-spacing: 0.1em; text-transform: uppercase;
}
.pill-conf { background: var(--bg-elev); color: var(--ink-soft); border: 1px solid var(--rule); }
.pill-conv { background: transparent; color: var(--ink-muted); border: 1px dashed var(--rule); }
.pill-conv.high, .pill-conf.high { color: var(--ink); border-color: var(--ink-soft); }
.pill-conv.medium, .pill-conf.medium { color: var(--ink-soft); }
.pill-conv.low, .pill-conf.low { color: var(--ink-muted); opacity: 0.85; }

.action-block {
  padding: 16px 20px;
  background: linear-gradient(180deg, transparent 0%, rgba(161,61,45,0.04) 100%);
  border-bottom: 1px solid var(--rule-soft);
}
.action-block h4 {
  font-size: 10.5px; letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--ink-muted); font-weight: 500; margin-bottom: 10px;
}
.action-what {
  font-family: var(--display); font-size: 18px; font-weight: 500;
  letter-spacing: -0.01em; color: var(--ink); line-height: 1.3;
}
.action-meta { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 12px; }
.action-meta-cell {
  background: var(--bg); border: 1px solid var(--rule-soft);
  border-radius: var(--radius-sm); padding: 8px 10px;
}
.action-meta-cell .lbl {
  font-size: 9.5px; letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--ink-muted); font-weight: 500;
}
.action-meta-cell .val {
  font-family: var(--mono); font-size: 12.5px; font-weight: 500;
  color: var(--ink); margin-top: 3px;
}
.invalidation-row {
  margin-top: 12px;
  padding: 10px 12px;
  background: rgba(161,61,45,0.06);
  border: 1px solid var(--red-soft);
  border-radius: var(--radius-sm);
  font-size: 12px; color: var(--ink); line-height: 1.45;
}
.invalidation-row strong {
  font-family: var(--mono); font-size: 9.5px; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--red); font-weight: 600;
  display: block; margin-bottom: 3px;
}

.horizon-strip { display: grid; grid-template-columns: repeat(3, 1fr); border-bottom: 1px solid var(--rule-soft); }
.horizon-cell { padding: 12px 10px; text-align: center; border-right: 1px solid var(--rule-soft); }
.horizon-cell:last-child { border-right: none; }
.horizon-cell .lbl { font-size: 9.5px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-muted); font-weight: 500; }
.horizon-cell .signal-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-top: 6px; }
.signal-dot.bullish        { background: var(--green); }
.signal-dot.neutralbullish { background: var(--green-soft); opacity: 0.7; }
.signal-dot.neutral        { background: var(--ink-muted); }
.signal-dot.neutralbearish { background: var(--red-soft); opacity: 0.7; }
.signal-dot.bearish        { background: var(--red); }
.horizon-cell .signal-text { font-family: var(--mono); font-size: 9.5px; letter-spacing: 0.04em; color: var(--ink-soft); margin-top: 5px; }
.horizon-cell .note { font-size: 10.5px; color: var(--ink-soft); margin-top: 6px; line-height: 1.35; min-height: 28px; }

.ai-body { padding: 16px 20px; }
.ai-section { margin-bottom: 16px; }
.ai-section:last-child { margin-bottom: 0; }
.ai-section h4 { font-size: 10.5px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-muted); font-weight: 500; margin-bottom: 6px; }
.ai-section p { font-size: 13.5px; color: var(--ink); line-height: 1.55; }

.confluence-row { display: flex; align-items: baseline; gap: 8px; margin-bottom: 4px; }
.confluence-score { font-family: var(--display); font-size: 22px; font-weight: 600; color: var(--ink); letter-spacing: -0.01em; }

.scenarios-grid { display: grid; grid-template-columns: 1fr; gap: 8px; margin-top: 6px; }
.scenario { padding: 10px 12px; border-radius: var(--radius-sm); border: 1px solid var(--rule-soft); background: var(--bg); }
.scenario.bull { border-left: 3px solid var(--green); }
.scenario.bear { border-left: 3px solid var(--red); }
.scenario.base { border-left: 3px solid var(--ink-muted); }
.scenario .scn-lbl { font-family: var(--mono); font-size: 9.5px; letter-spacing: 0.1em; text-transform: uppercase; font-weight: 600; margin-bottom: 4px; }
.scenario.bull .scn-lbl { color: var(--green); }
.scenario.bear .scn-lbl { color: var(--red); }
.scenario.base .scn-lbl { color: var(--ink-muted); }
.scenario .scn-cond { font-size: 12.5px; color: var(--ink); line-height: 1.45; }
.scenario .scn-impl { font-size: 11.5px; color: var(--ink-soft); margin-top: 4px; line-height: 1.4; font-style: italic; }

.risks ul { list-style: none; margin-top: 4px; }
.risks li { font-size: 13px; padding: 5px 0 5px 18px; position: relative; color: var(--ink); line-height: 1.45; }
.risks li::before { content: ""; position: absolute; left: 4px; top: 12px; width: 4px; height: 1px; background: var(--accent); }

.what-changed {
  padding: 10px 12px;
  background: var(--bg-elev);
  border-radius: var(--radius-sm);
  font-size: 12.5px; color: var(--ink-soft);
  line-height: 1.5; font-family: var(--sans);
}
.what-changed::before {
  content: "WHAT CHANGED"; display: block;
  font-family: var(--mono); font-size: 9px; font-weight: 600;
  letter-spacing: 0.14em; color: var(--ink-muted); margin-bottom: 4px;
}

.counter-arg {
  margin-top: 10px; padding: 12px 14px;
  background: rgba(176,141,60,0.06);
  border: 1px dashed var(--gold);
  border-radius: var(--radius-sm);
}
.counter-arg .ca-lbl {
  font-family: var(--mono); font-size: 9.5px; letter-spacing: 0.12em;
  text-transform: uppercase; color: var(--gold); font-weight: 600; margin-bottom: 5px;
}
.counter-arg .ca-text { font-size: 12.5px; color: var(--ink); line-height: 1.55; font-style: italic; }

.position-context-block {
  padding: 10px 12px;
  background: var(--bg);
  border: 1px solid var(--rule-soft);
  border-radius: var(--radius-sm);
  font-size: 12.5px; color: var(--ink); line-height: 1.5;
}

.ai-actions { display: flex; gap: 8px; padding: 14px 20px; border-top: 1px solid var(--rule-soft); }
.ai-stamp {
  font-family: var(--mono); font-size: 9.5px; color: var(--ink-muted);
  letter-spacing: 0.04em; padding: 0 20px 14px; line-height: 1.5;
}
.ai-sanity-note {
  margin: 0 20px 14px;
  padding: 8px 12px;
  background: rgba(176,141,60,0.10);
  border: 1px solid var(--gold);
  border-radius: 5px;
  font-family: var(--mono); font-size: 10.5px;
  color: var(--gold);
  line-height: 1.5;
}

.empty-ai { text-align: center; padding: 30px 20px; color: var(--ink-muted); font-size: 13px; }
.empty-ai .display { font-size: 16px; color: var(--ink-soft); margin-bottom: 14px; display: block; }

.port-analysis-card {
  margin: 14px 20px;
  border: 1px solid var(--rule); border-radius: var(--radius);
  background: var(--bg-card); padding: 0;
  position: relative; overflow: hidden;
}
.port-analysis-card::before { content: ""; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: var(--gold); }
.port-stance-hero { padding: 22px 20px 18px; border-bottom: 1px solid var(--rule-soft); }
.port-stance-verb {
  font-family: var(--display); font-weight: 700;
  font-size: 32px; letter-spacing: -0.02em; line-height: 1;
}
.port-stance-verb.DEFENSIVE { color: var(--ink-soft); }
.port-stance-verb.BALANCED  { color: var(--ink); }
.port-stance-verb.AGGRESSIVE { color: var(--accent); }
.port-stance-verb.MISALIGNED, .port-stance-verb.MIS-ALIGNED { color: var(--red); }

.list-block {
  background: var(--bg);
  border: 1px solid var(--rule-soft);
  border-radius: var(--radius-sm);
  padding: 4px 0; margin-top: 6px;
}
.list-block .li { padding: 8px 12px; border-bottom: 1px solid var(--rule-soft); font-size: 12.5px; color: var(--ink); line-height: 1.5; }
.list-block .li:last-child { border-bottom: none; }

.rec-block {
  background: var(--bg);
  border: 1px solid var(--rule-soft);
  border-radius: var(--radius-sm);
  padding: 12px; margin-top: 8px;
}
.rec-block.high { border-left: 3px solid var(--accent); }
.rec-block.medium { border-left: 3px solid var(--gold); }
.rec-block.low { border-left: 3px solid var(--ink-muted); }
.rec-action { font-family: var(--display); font-size: 14px; font-weight: 500; color: var(--ink); line-height: 1.4; }
.rec-rationale { font-size: 12px; color: var(--ink-soft); line-height: 1.5; margin-top: 5px; }
.rec-priority {
  font-family: var(--mono); font-size: 9px; font-weight: 600;
  letter-spacing: 0.12em; text-transform: uppercase;
  margin-top: 6px; display: inline-block;
  padding: 2px 6px; border-radius: 3px;
}
.rec-priority.high { background: rgba(161,61,45,0.12); color: var(--accent); }
.rec-priority.medium { background: rgba(176,141,60,0.15); color: var(--gold); }
.rec-priority.low { background: var(--bg-elev); color: var(--ink-muted); }

.sent-card {
  margin: 14px 20px;
  border: 1px solid var(--rule); border-radius: var(--radius);
  background: var(--bg-card); padding: 18px 20px;
}
.sent-card h3 { font-family: var(--display); font-size: 16px; font-weight: 500; margin-bottom: 12px; }
.sent-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 8px 0; font-size: 13px;
  border-bottom: 1px solid var(--rule-soft);
}
.sent-row:last-child { border: none; }
.sent-row .lbl { color: var(--ink-muted); }
.sent-row .val { font-family: var(--mono); font-weight: 500; }
.news-list { margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--rule-soft); }
.news-item { padding: 8px 0; border-bottom: 1px solid var(--rule-soft); }
.news-item:last-child { border: none; }
.news-item a { color: var(--ink); text-decoration: none; font-size: 13px; line-height: 1.4; display: block; }
.news-item a:hover { color: var(--accent); }
.news-meta { font-family: var(--mono); font-size: 10.5px; color: var(--ink-muted); margin-top: 3px; letter-spacing: 0.02em; }

.modal-bg {
  position: fixed; inset: 0;
  background: rgba(20,17,13,0.5);
  z-index: 90; opacity: 0; pointer-events: none;
  transition: opacity .2s;
  backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
}
.modal-bg.show { opacity: 1; pointer-events: all; }
.modal {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--bg-card);
  border-radius: 18px 18px 0 0;
  padding: 28px 24px calc(28px + env(safe-area-inset-bottom));
  z-index: 91; transform: translateY(100%);
  transition: transform .25s cubic-bezier(0.32, 0.72, 0, 1);
  max-height: 88vh; overflow-y: auto;
  box-shadow: var(--shadow-deep);
}
.modal.show { transform: translateY(0); }
.modal-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; }
